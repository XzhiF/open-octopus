# yaml-language-server: $schema=./workflow-schema.json
apiVersion: octopus/v1
kind: Workflow
name: prd-forge
description: >
  PRD Forge — 将 Idea 锻造为完整 PRD 的精简工作流。
  10 节点：Setup → Requirements → Acceptance-Cases → Design(可选 Swarm)
  → Design-Review(跨模型) → UI/UX → Completeness → Output。
  产出 3+1 文档：brief + requirements + solution + PRD-FINAL。
  原 swarm 变体(prd-forge-swarm)已废弃，design-swarm 合并为本节点的可选模式。

model: pro-max
engine: claude
execution_mode: serial
timeout: 86400

inputs:
  idea:
    description: "产品 Idea 描述（自然语言，越详细越好）"
    required: true
  output_format:
    description: "输出格式：markdown（默认）或 pdf"
    required: false
    default: "markdown"
  enable_adversarial:
    description: "开启跨模型审查（design-review 用 sonnet 审查 opus 产出）"
    required: false
    default: "true"
  enable_swarm:
    description: "Design 阶段启用 swarm debate（多专家辩论）。false=单 agent 设计"
    required: false
    default: "false"
  completeness_threshold:
    description: "完整性审查允许的最大缺失维度数"
    required: false
    default: "3"
  scope_mode:
    description: |
      范围控制模式。
      - strict（默认）：只把用户明确提出的功能视为需求。
      - creative：允许 LLM 发散补全，标记为 EXTENSION-CANDIDATE。
    required: false
    default: "strict"

variables:
  # ── 文档目录 ──
  output_root: "./docs/prd-forge"
  output_dir: ""
  prd_index: ""
  prd_name: ""
  display_name: "PRD Forge"
  conclusion: ""
  # ── 产出文件（3+1） ──
  brief_file: ""
  requirements_file: ""
  solution_file: ""
  acceptance_cases_file: ""
  final_prd_file: ""
  # ── 项目元数据 ──
  project_type: ""
  design_focus: ""
  key_decisions: ""
  user_emphasis: ""
  # ── 统计 ──
  completeness_score: "0"
  completeness_missing: ""
  completeness_passed: "false"
  personas_count: "0"
  user_stories_count: "0"
  entities_count: "0"
  api_count: "0"
  acceptance_cases_count: "0"
  prd_word_count: "0"
  ui_pages_count: "0"
  # ── UI/UX (ui-ux 节点写入，下游 completeness/output 读取) ──
  ui_file: ""
  ux_file: ""
  # ── Swarm 统计（仅 enable_swarm=true 时填充） ──
  design_swarm_rounds: "0"
  design_swarm_consensus: ""

auto_answers:
  - pattern: ".*"
    answer: "proceed"

providers:
  hermes-cli:
    type: hermes
    timeout: 30
    min_severity: info

channels:
  default:
    provider: hermes-cli
    target: "telegram:xzf_hermes"

hooks:
  on_workflow_failure:
    - id: notify-failure
      type: notify
      channel: default
      template:
        severity: error
        title: "❌ $vars.display_name — 工作流失败"
        body: "📝 Idea: $inputs.idea\n🔴 失败节点: ${hook.failed_node_id | default:unknown}\n⏱️ 已运行: ${hook.total_duration_ms | duration}\n\n💡 错误: ${hook.error | default:Unknown error}"

  on_complete:
    - id: notify-complete
      type: notify
      channel: default
      template:
        severity: info
        title: "🏁 $vars.display_name — 工作流完成"
        body: "状态: $hook.final_status\n✅ 完成: $hook.completed_count / ⏭️ 跳过: $hook.skipped_count / ❌ 失败: $hook.failed_count / 📊 总计: $hook.total_count\n⏱️ 总耗时: ${hook.total_duration_ms | duration}"

  on_node_success:
    - id: notify-setup
      type: notify
      nodes: [setup]
      channel: default
      template:
        severity: info
        title: "🔨 $vars.display_name 启动"
        body: "📝 Idea: $inputs.idea\n📂 输出: $vars.output_dir\n📊 项目类型: $vars.project_type\n🎯 范围: $inputs.scope_mode"

    - id: notify-requirements
      type: notify
      nodes: [requirements]
      channel: default
      template:
        severity: info
        title: "📋 $vars.display_name — Requirements 完成"
        body: "👤 画像: $vars.personas_count | 📖 故事: $vars.user_stories_count\n📄 $vars.requirements_file\n\n💡 $vars.conclusion"

    - id: notify-acceptance
      type: notify
      nodes: [acceptance-cases]
      channel: default
      template:
        severity: info
        title: "✅ $vars.display_name — Acceptance Cases 完成"
        body: "📊 用例: $vars.acceptance_cases_count\n📄 $vars.acceptance_cases_file\n\n💡 $vars.conclusion"

    - id: notify-design-swarm
      type: notify
      nodes: [design-swarm]
      channel: default
      condition: '$inputs.enable_swarm == "true"'
      template:
        severity: info
        title: "🏗️ $vars.display_name — Design Swarm 完成"
        body: "🔄 轮次: $vars.design_swarm_rounds | 🤝 共识: $vars.design_swarm_consensus\n📊 实体: $vars.entities_count | 🔌 API: $vars.api_count\n\n💡 $vars.conclusion"

    - id: notify-design-simple
      type: notify
      nodes: [design-simple]
      channel: default
      condition: '$inputs.enable_swarm != "true"'
      template:
        severity: info
        title: "🏗️ $vars.display_name — Design 完成"
        body: "📊 实体: $vars.entities_count | 🔌 API: $vars.api_count\n📄 $vars.solution_file\n\n💡 $vars.conclusion"

    - id: notify-design-review
      type: notify
      nodes: [design-review]
      channel: default
      condition: '$inputs.enable_adversarial == "true"'
      template:
        severity: info
        title: "🔍 $vars.display_name — Design Review 完成（跨模型）"
        body: "📄 $vars.solution_file\n\n💡 $vars.conclusion"

    - id: notify-uiux
      type: notify
      nodes: [ui-ux]
      channel: default
      template:
        severity: info
        title: "🎨 $vars.display_name — UI/UX 完成"
        body: "📄 页面: $vars.ui_pages_count\n\n💡 $vars.conclusion"

    - id: notify-completeness
      type: notify
      nodes: [completeness]
      channel: default
      template:
        severity: info
        title: "📊 $vars.display_name — Completeness 完成"
        body: "📊 覆盖: $vars.completeness_score\n📝 缺失: ${vars.completeness_missing | default:无}\n\n💡 $vars.conclusion"

    - id: notify-output
      type: notify
      nodes: [output]
      channel: default
      template:
        severity: info
        title: "✅ $vars.display_name — PRD 生成完成！"
        body: "📝 名称: $vars.prd_name\n📊 完整性: $vars.completeness_score\n📄 PRD: $vars.final_prd_file\n📝 字数: $vars.prd_word_count\n\n💡 $vars.conclusion"

nodes:
  # ═══════════════════════════════════════════════════════════════
  # Phase 0: Setup — 环境准备 + 项目分类 + 范围锁定（三合一）
  # 合并原 setup + clarify + locked-scope，减少 2 次 LLM 调用
  # ═══════════════════════════════════════════════════════════════
  - id: setup
    type: agent
    timeout: 900
    prompt: |
      你正在执行 PRD Forge 工作流的准备阶段。本节点完成三件事：
      1. 安装角色代理
      2. 初始化输出目录
      3. 分析 Idea + 分类项目类型 + 锁定范围

      ## 用户 Idea
      $inputs.idea

      ## 任务 1: 安装角色代理

      ### 1a. 安装 superpowers-zh
      ```bash
      npx superpowers-zh@latest --tool claude --force 2>&1 | head -5
      ```

      ### 1b. 安装 agency-agents-zh
      ```bash
      AGENTS_TARGET="$(pwd)/.claude/agents"
      mkdir -p "$AGENTS_TARGET"
      NEED_CLONE=false
      for agent in product-manager design-ux-architect design-ui-designer engineering-software-architect engineering-security-engineer; do
        [ ! -f "$AGENTS_TARGET/$agent.md" ] && NEED_CLONE=true && break
      done
      if [ "$NEED_CLONE" = "true" ]; then
        DEPS_DIR="$(pwd)/dependencies"
        mkdir -p "$DEPS_DIR"
        [ ! -d "$DEPS_DIR/agency-agents-zh" ] && git clone --depth 1 https://github.com/jnMetaCode/agency-agents-zh.git "$DEPS_DIR/agency-agents-zh" 2>&1
        REPO="$DEPS_DIR/agency-agents-zh"
        [ -f "$REPO/product/product-manager.md" ] && cp "$REPO/product/product-manager.md" "$AGENTS_TARGET/"
        [ -f "$REPO/design/design-ux-architect.md" ] && cp "$REPO/design/design-ux-architect.md" "$AGENTS_TARGET/"
        [ -f "$REPO/design/design-ui-designer.md" ] && cp "$REPO/design/design-ui-designer.md" "$AGENTS_TARGET/"
        [ -f "$REPO/engineering/engineering-software-architect.md" ] && cp "$REPO/engineering/engineering-software-architect.md" "$AGENTS_TARGET/"
        [ -f "$REPO/engineering/engineering-security-engineer.md" ] && cp "$REPO/engineering/engineering-security-engineer.md" "$AGENTS_TARGET/"
      fi
      ```

      ### 1c. 安装 core-pack agents
      ```bash
      AGENTS_TARGET="$(pwd)/.claude/agents"
      COREPACK_AGENTS=""
      for d in "$(pwd)/.octopus/core-pack/agents" "$(pwd)/packages/core-pack/agents" "$(pwd)/../core-pack/agents"; do
        [ -f "$d/devil-advocate.md" ] && COREPACK_AGENTS="$d" && break
      done
      [ -n "$COREPACK_AGENTS" ] && cp "$COREPACK_AGENTS/devil-advocate.md" "$AGENTS_TARGET/" && [ -f "$COREPACK_AGENTS/architecture-explorer.md" ] && cp "$COREPACK_AGENTS/architecture-explorer.md" "$AGENTS_TARGET/"
      ```

      ## 任务 2: 初始化输出目录
      ```bash
      OUTPUT_ROOT="./docs/prd-forge"
      mkdir -p "$OUTPUT_ROOT"
      MAX_INDEX=0
      for dir in "$OUTPUT_ROOT"/prd-*/; do
        [ -d "$dir" ] && INDEX=$(basename "$dir" | sed 's/prd-0*//' | sed 's/^$/0/') && [ "$INDEX" -gt "$MAX_INDEX" ] 2>/dev/null && MAX_INDEX=$INDEX
      done
      NEW_INDEX=$((MAX_INDEX + 1))
      PRD_INDEX=$(printf "%03d" $NEW_INDEX)
      OUTPUT_DIR="$OUTPUT_ROOT/prd-$PRD_INDEX"
      mkdir -p "$OUTPUT_DIR"
      echo "Output: $OUTPUT_DIR"
      ```

      ## 任务 3: Idea 分析 + 项目分类 + 范围锁定

      ### 3a. 项目类型识别 ⭐ 最重要
      | 类型 | 特征 | 后续重点 |
      |------|------|----------|
      | **product** | 面向终端用户、UI/UX、商业模式 | 用户画像、故事、API、UI/UX |
      | **infrastructure** | 内部工具、配置改造、架构重构 | 接口设计、配置语法、迁移策略 |
      | **hybrid** | 兼具两者特征 | 两者兼顾 |

      ### 3b. 关键设计决策提取
      - 用户提到的权衡（"A 还是 B"）
      - 用户明确排除的方案
      - 用户偏好的方向

      ### 3c. 用户核心价值推断
      - 用户反复强调的关键词
      - 用户期望的深度和创造性

      ### 3d. PRD 名称
      生成英文 kebab-case 名称（最多 5 个单词）

      ### 3e. 范围锁定
      范围模式: $inputs.scope_mode

      **strict 模式**：
      1. **IN-SCOPE**：仅用户明确用功能动词表达的需求（"实现 X"、"需要 Y"、"支持 Z"）
      2. **EXAMPLE-ONLY**：以"例如"、"比如"、"参考"开头的内容（仅作说明）
      3. **OUT-OF-SCOPE**：用户没提但 LLM 觉得"应该加"的通用功能（认证、日志、监控等）

      **creative 模式**：同 strict + 允许 **EXTENSION-CANDIDATE**（LLM 推断"会让产品更完整"的功能）

      将范围分类表保存到 `$OUTPUT_DIR/00-brief.md` 的 "Scope Lock" 章节。

      ## 输出文件
      将以上所有内容（项目分类 + 关键决策 + 核心价值 + 范围分类）保存到 `$OUTPUT_DIR/00-brief.md`

      ## 输出
      直接输出纯 JSON 行（不要用代码块包裹）:
      {"vars_update":{"output_dir":"$OUTPUT_DIR","prd_index":"<序号>","prd_name":"<名称>","display_name":"PRD Forge #<序号> · <名称>","brief_file":"$OUTPUT_DIR/00-brief.md","project_type":"<product/infrastructure/hybrid>","design_focus":"<设计重点>","key_decisions":"<关键决策>","user_emphasis":"<核心价值>","conclusion":"<2-3句话: 这个idea的本质>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 1: Requirements — 需求发现 + 定义（二合一，无对抗审查）
  # 合并原 discover + refine-discover + define + refine-define
  # ═══════════════════════════════════════════════════════════════
  - id: requirements
    type: agent
    depends_on: [setup]
    timeout: 7200
    prompt: |
      你是资深产品经理，正在撰写完整的需求定义文档。

      ## 用户 Idea
      $inputs.idea

      ## 项目简报
      $vars.brief_file

      ## 项目类型: $vars.project_type（$vars.design_focus）
      ## 用户核心价值: $vars.user_emphasis
      ## 输出目录: $vars.output_dir

      ## 你的任务

      基于 Idea 和简报，直接输出完整的需求定义文档。
      **必须覆盖以下所有维度**：

      ### 1. 用户画像（Personas）
      至少 2-3 个，每个包含：名字、职业背景、使用场景、核心痛点、期望目标、技术水平。

      ### 2. 用户故事（User Stories）
      每个核心功能至少 3 个，格式：
      ```
      **Story**: 作为 [画像]，我想要 [操作]，以便 [结果]。
      **验收标准**（Given/When/Then）:
      - Given [前置条件]
      - When [用户操作]
      - Then [预期结果]
      ```

      **⚠️ UI 操作完整性**：涉及 UI 操作的 Story，验收标准必须额外包含：
      - **UI 入口**: 从哪个页面/菜单进入？
      - **操作步骤**: 具体 UI 操作序列
      - **页面状态**: 操作前/中/后的状态
      - **错误反馈**: 失败时用户看到什么？

      ### 3. 功能界面声明
      | 声明项 | 值 |
      |--------|---|
      | **是否有用户界面** | 是/否 |
      | **界面类型** | Web UI / CLI / API-only / 混合 |
      | **核心页面清单** | （列出所有页面及用途） |

      如有 UI，必须定义：页面间导航关系、每个页面覆盖的 5 种状态（空/加载/成功/错误/部分数据）。

      ### 4. Non-Goals（不做的事 + 原因）

      ### 5. 用户旅程地图
      从入口 → 核心流程 → 留存的完整路径，标注每步对应的页面和用户操作。

      ### 6. 边界情况
      - 空状态 / 错误状态 / 极端数据 / 并发场景
      - 每种情况标注 UI 表现

      ### 7. 功能优先级
      - **P0（必需）**: 用户输入的所有功能 + 关键依赖
      - **P1（增强）**: Agent 建议的体验提升功能
      - **Won't Have**: 明确排除的功能
      ⛔ P0/P1 都必须 100% 实现和测试。P0 要求深度测试，P1 要求基本验证通过。

      ## 规则
      - 中文输出
      - $vars.user_emphasis 对应的维度必须最深入
      - infrastructure 型重点关注技术债务、架构约束、迁移成本
      - product 型重点关注用户痛点、市场信号、竞品分析

      ## 输出
      保存到 `$vars.output_dir/01-requirements.md`

      直接输出纯 JSON 行（不要用代码块包裹）:
      {"vars_update":{"requirements_file":"$vars.output_dir/01-requirements.md","personas_count":"<画像数>","user_stories_count":"<故事数>","conclusion":"<2-3句话总结>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 2: Acceptance Cases — BDD 验收用例
  # ═══════════════════════════════════════════════════════════════
  - id: acceptance-cases
    type: agent
    depends_on: [requirements]
    timeout: 3600
    prompt: |
      你是验收测试架构师，为 PRD 生成抽象验收用例（BDD 左移）。

      ## 需求定义: $vars.requirements_file（重点读取 User Stories）
      ## 项目类型: $vars.project_type
      ## 输出目录: $vars.output_dir

      ## 用例提取规则
      逐一遍历 User Stories，每个 Story 至少 1 条 P0 用例。

      ## 用例字段
      | 字段 | 说明 |
      |------|------|
      | case_id | TC-001 起递增 |
      | story_id | 关联 Story 编号 |
      | priority | P0(必需) / P1(增强) |
      | source | user(用户输入) / agent(Agent 建议) |
      | scenario | 一句话场景 |
      | given | 抽象前置条件 |
      | when | 抽象操作（不写具体路径/selector） |
      | then | 断言意图 |
      | evidence_type | api_response / ui_state / file_content / cli_output / workflow_execution |
      | binding_hints | 给 prd-impl 的绑定提示 |

      ## 项目类型适配
      - **product**: 每个 UI Story 必须含 evidence_type: ui_state 用例
      - **infrastructure**: 偏向 cli_output / file_content
      - **hybrid**: 两者兼顾

      ## 边界用例
      至少为 30% 的 Story 补充边界/错误/并发场景用例。

      ## 输出
      保存到 `$vars.output_dir/03-acceptance-cases.md`

      直接输出纯 JSON 行（不要用代码块包裹）:
      {"vars_update":{"acceptance_cases_file":"$vars.output_dir/03-acceptance-cases.md","acceptance_cases_count":"<总数>","conclusion":"<2-3句话>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 3: Design — 技术方案设计（可选 Swarm debate）
  # 当 enable_swarm=true 时走 swarm 路径，否则走单 agent
  # Swarm 部分从已废弃的 prd-forge-swarm.yaml 合并而来
  # ═══════════════════════════════════════════════════════════════
  - id: design-swarm
    type: swarm
    depends_on: [requirements]
    execute_when: '$inputs.enable_swarm == "true"'
    timeout: 7200
    topic: |
      基于需求定义，设计完整的技术方案，同时多角度审查。

      ## 需求定义: $vars.requirements_file
      ## 项目简报: $vars.brief_file
      ## 项目类型: $vars.project_type
      ## 用户核心价值: $vars.user_emphasis
      ## 设计重点: $vars.design_focus
      ## 输出目录: $vars.output_dir
    mode: debate
    rounds: 2
    consensus_threshold: 0.7
    budget: 800000
    context_tier: "1m"

    expert_defaults:
      model: pro-max
      tools: ["Read", "Grep", "Glob", "Write"]

    experts:
      - role: software-architect
        agent_file: ".claude/agents/engineering-software-architect.md"
        perspective: "资深软件架构师，负责系统架构、数据模型、API 设计"
        task: |
          基于需求定义输出完整技术方案。

          **根据 $vars.project_type 选择模板：**
          - infrastructure: 概述 → 架构对比图 → 接口与配置设计 → 迁移策略 → 技术选型 → 安全 → 性能 → 错误处理
          - product: 概述 → 架构图 → UI/UX 设计 → 数据模型 → API 设计 → 技术选型 → 安全 → 性能 → 错误处理
          - hybrid: 合并两个模板

          核心原则：深度优先于广度。$vars.user_emphasis 对应的章节必须最详细。

      - role: security-engineer
        agent_file: ".claude/agents/engineering-security-engineer.md"
        perspective: "安全工程师，关注认证授权、数据保护、威胁建模"
        task: |
          从安全视角审查和补充技术方案：
          1. 认证/授权设计完备性
          2. 数据传输和存储加密
          3. CSRF/XSS/SQL注入 防护
          4. API 速率限制和输入验证
          5. 审计日志设计
          6. **symlink/路径遍历防护**（文件操作场景必须考虑）

      - role: architecture-explorer
        agent_file: ".claude/agents/architecture-explorer.md"
        perspective: "架构探索者 — 默认立场：方案还可以更深入"
        task: |
          探索让方案从"能用"变为"出色"的机会：
          1. 被忽视的更优设计路径
          2. $vars.user_emphasis 是否被充分展开
          3. 创造性的解法
          4. 业界优雅的设计参考
          按 🟢 OPPORTUNITY / 🔵 DEEPEN / 💡 CREATIVE 分级。

    host:
      role: design-host
      model: pro-max
      prompt: |
        综合所有专家的技术方案意见，产出最终技术方案文档。

        ## 综合原则
        1. 软件架构师的方案是基础骨架
        2. 安全工程师的补充必须纳入（认证/授权/加密/路径安全）
        3. 架构探索者的建议：
           - 🟢 OPPORTUNITY: 评估后纳入，与 $vars.user_emphasis 相关的必须纳入
           - 🔵 DEEPEN: 选至少 2 个方向深入展开
           - 💡 CREATIVE: 可行的纳入"替代方案"或"未来演进"
        4. 专家间的冲突需要你的判断

        ## 输出
        将完整技术方案作为 synthesis 输出，markdown 格式。
        保持 4000 字以内。

        ## 共识评估（JSON，最后一行）
        ```json
        {"assessment": {"consensus_score": 0.0-1.0, "should_continue": true/false, "reason": "<1-2句>"}}
        ```

  # ── design-swarm 输出落盘 ──
  - id: design-swarm-write
    type: agent
    depends_on: [design-swarm]
    execute_when: '$inputs.enable_swarm == "true"'
    timeout: 300
    prompt: |
      将 design-swarm 综合输出写入文件。

      ## 任务
      1. 读取 $vars.design-swarm_synthesis
      2. 写入 `$vars.output_dir/02-solution.md`
      3. 统计实体数和 API 数

      ## 输出
      {"vars_update":{"solution_file":"$vars.output_dir/02-solution.md","design_swarm_rounds":"$vars.design-swarm_rounds_used","design_swarm_consensus":"$vars.design-swarm_consensus_score","entities_count":"<实体数>","api_count":"<API数>","conclusion":"<2-3句话>"}}

  # ── 非 swarm 路径：单 agent 设计 ──
  - id: design-simple
    type: agent
    depends_on: [requirements]
    execute_when: '$inputs.enable_swarm != "true"'
    timeout: 7200
    prompt: |
      你是资深软件架构师，正在设计技术方案。

      ## 需求定义: $vars.requirements_file（先读取）
      ## 项目简报: $vars.brief_file
      ## 项目类型: $vars.project_type
      ## 用户核心价值: $vars.user_emphasis
      ## 设计重点: $vars.design_focus
      ## 输出目录: $vars.output_dir

      ## 你的任务

      **根据 $vars.project_type 选择模板：**

      ### infrastructure 型：
      1. 方案概述（核心改造思路）
      2. 系统架构（改造前 vs 后对比图）
      3. 接口与配置设计（完整格式 + 多个示例）
      4. 迁移策略（分阶段、可验证、可回滚）
      5. 技术选型 + ADR
      6. 安全设计
      7. 性能设计
      8. 错误处理
      9. 依赖清单
      10. 风险评估

      ### product 型：
      1. 方案概述
      2. 系统架构图
      3. UI/UX 设计（页面清单、核心页面、交互流程、状态设计、响应式）
      4. 数据模型（实体+字段+类型+关系图）
      5. API 设计（端点清单 + 数据流向图 + 资源边界）
      6. 技术选型 + ADR
      7. 安全设计
      8. 性能设计
      9. 错误处理
      10. 依赖清单
      11. 风险评估

      ### hybrid 型：合并两个模板

      ## 规则
      - 深度优先于广度
      - $vars.user_emphasis 对应的章节必须最详细
      - 每个用户故事都有对应技术方案
      - API 设计给架构级描述（清单+数据流），不写工程细节（留给 prd-impl）

      ## 输出
      保存到 `$vars.output_dir/02-solution.md`

      {"vars_update":{"solution_file":"$vars.output_dir/02-solution.md","entities_count":"<实体数>","api_count":"<API数>","conclusion":"<2-3句话>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 3.5: Design Review — 跨模型审查（打破回音室）
  # 用 sonnet 审查 opus/pro-max 产出，不同模型 = 不同视角
  # ═══════════════════════════════════════════════════════════════
  - id: design-review
    type: agent
    depends_on: [design-swarm-write, design-simple]
    execute_when: '$inputs.enable_adversarial == "true"'
    timeout: 1800
    model: pro
    prompt: |
      你是独立技术方案审查者。你的模型与方案设计者不同，这是刻意的——
      不同模型有不同的注意力模式和偏见，跨模型审查比同模型"角色扮演"更有效。

      ## 技术方案: $vars.solution_file（必读全文）
      ## 需求定义: $vars.requirements_file（交叉对照）
      ## 项目类型: $vars.project_type

      ## 审查维度（独立判断，不因"方案已存在"而默认接受）

      ### 🔴 CRITICAL（必须修正）
      - 方案是否覆盖所有用户故事？
      - 是否有安全漏洞？（注入/路径遍历/认证绕过/CSRF）
      - 是否有单点故障？
      - 向后兼容策略是否可行？（infrastructure 型）
      - 数据模型是否覆盖所有实体？（product 型）

      ### 🟡 RISK（评估后修正或记录）
      - 是否过度设计？
      - 工作量估算是否合理？
      - 是否有被忽视的更优路径？

      ### 🔵 IMPROVEMENT（酌情采纳）
      - 性能优化机会
      - 代码组织改进

      ## 你的任务
      1. 逐条审查上述维度
      2. 直接在 $vars.solution_file 末尾追加 "## 跨模型审查回应" section
      3. 对 CRITICAL 问题，必须补充方案内容
      4. 对 RISK/IMPROVEMENT，评估后补充或记录拒绝理由

      ## 输出
      {"vars_update":{"conclusion":"<2-3句话: CRITICAL N 条 / RISK M 条 / 补充了什么>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 3.8: UI/UX — 合并 UI 规范 + UX 交互（条件触发）
  # 仅 product/hybrid 项目执行，infrastructure 跳过
  # ═══════════════════════════════════════════════════════════════
  - id: ui-ux
    type: agent
    depends_on: [design-review, design-swarm-write, design-simple]
    timeout: 3600
    execute_when: '$vars.project_type != "infrastructure"'
    prompt: |
      你是 UI/UX 设计师，产出统一的 UI/UX 规范文档。
      合并原 ui.md（静态表现）+ ux.md（动态行为）为单文件。

      ## 需求定义: $vars.requirements_file（页面清单与状态）
      ## 技术方案: $vars.solution_file（架构章节）
      ## 项目简报: $vars.brief_file
      ## 输出目录: $vars.output_dir

      ## 必须覆盖的章节

      ### 1. 页面全谱
      | 页面ID | 名称 | 路由 | 用途 | 主要组件 | Story 关联 |

      ### 2. 设计 Tokens
      - 色彩: primary / secondary / accent / semantic / neutral
      - 字体: 字号梯度、行高、字重
      - 间距: 4/8/12/16/24/32/48 梯度、圆角、阴影
      - 断点: 移动 / 平板 / 桌面

      ### 3. 组件清单（按四大类）
      - 表单类（Input / Select / Textarea / DatePicker）
      - 反馈类（Toast / Modal / Loading / EmptyState / ErrorBoundary）
      - 导航类（Sidebar / TopBar / Breadcrumb / Tabs）
      - 数据展示类（Table / Card / List / Chart）
      每个标注 P0/P1。

      ### 4. 布局规范
      - 栅格系统、容器宽度、页面布局模板

      ### 5. 页面状态机（核心页面逐个展开）
      每个页面 5 种状态及转换：
      | 状态 | 触发条件 | UI 表现 | 可转换状态 |
      |------|----------|---------|------------|
      | 空态 | 首次访问 | 引导文案+主操作按钮 | 加载态 |
      | 加载态 | API 请求中 | 骨架屏 | 成功/错误 |
      | 成功态 | 返回数据 | 正常展示 | 部分数据/错误 |
      | 错误态 | 网络/权限 | 错误提示+重试 | 加载态 |
      | 部分数据 | 分页 | 加载更多 | 成功态 |

      ### 6. 核心交互序列
      每个 P0 Story 的完整交互：入口 → 触发 → 表单 → 提交 → 反馈 → 后续

      ### 7. 错误与恢复路径
      - 表单验证失败 UI 提示
      - API 错误分类（4xx/5xx/网络）不同 UI 表现
      - 临界状态（token 过期、权限变动）引导

      ### 8. 响应式与无障碍
      - 移动端适配策略
      - 键盘导航、ARIA 标签

      ## 输出
      保存到 `$vars.output_dir/04-ui-ux.md`

      {"vars_update":{"ui_file":"$vars.output_dir/04-ui-ux.md","ux_file":"$vars.output_dir/04-ui-ux.md","ui_pages_count":"<页面数>","conclusion":"<2-3句话>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 4: Completeness — 完整性检查 + 自修复（单节点）
  # 合并原 completeness-review + completeness-fix + gate
  # ═══════════════════════════════════════════════════════════════
  - id: completeness
    type: agent
    depends_on: [acceptance-cases, ui-ux, design-review, design-swarm-write, design-simple]
    timeout: 3600
    prompt: |
      你是完整性检查员 + 修复员。一次性完成检查和修复。

      ## 文档清单（读取所有）
      - 项目简报: $vars.brief_file
      - 需求定义: $vars.requirements_file
      - 技术方案: $vars.solution_file
      - 验收用例: $vars.acceptance_cases_file
      - UI/UX 规范: $vars.ui_file（可能为空）

      ## 项目类型: $vars.project_type
      ## 用户核心价值: $vars.user_emphasis

      ## 完整性维度（12 个）

      1. 问题定义 — Idea 有清晰分析
      2. 目标用户 — 画像具体（名字、场景、痛点）
      3. 用户故事 — Given/When/Then 格式、可验证
      4. 功能范围 — Non-Goals 明确
      5. 技术方案 — 数据模型/接口定义/架构
      6. API 设计 — 端点清单 + 数据流向
      7. 项目类型适配 — 文档重点匹配项目类型
      8. UI 规范 — 页面全谱 + Tokens + 组件（非 infrastructure 时 CRITICAL）
      9. UX 交互 — 状态机 + 交互序列（非 infrastructure 时 CRITICAL）
      10. 验收用例 — 覆盖 Story + 边界
      11. 安全 — 认证/授权/数据保护
      12. 用户核心价值 — $vars.user_emphasis 在 PRD 中有深入展开

      ## 你的任务
      1. 读取所有文档
      2. 逐维度判断：✅ 覆盖 / ❌ 缺失 / ⚠️ 部分覆盖
      3. 对 ❌ 维度，直接补充到对应文档中（就地修复）
      4. 重新评估修复后的维度

      ## 判定规则
      - ❌ 数量 <= $inputs.completeness_threshold → 通过
      - ❌ 数量 > $inputs.completeness_threshold → 不通过（但继续到 output）

      ## 输出
      {"vars_update":{"completeness_score":"<通过维度数>/12","completeness_missing":"<缺失维度列表>","completeness_passed":"<true/false>","conclusion":"<2-3句话>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 5: Output — 最终 PRD 撰写
  # ═══════════════════════════════════════════════════════════════
  - id: output
    type: agent
    depends_on: [completeness]
    timeout: 3600
    prompt: |
      你是资深产品经理，正在撰写最终 PRD 文档。

      ## ⚠️ 这不是文档拼接任务
      基于一手材料，以专业产品经理视角，**重新撰写**一份连贯的 PRD。
      找到文档间的逻辑关系，用一条叙事线贯穿全文。
      对矛盾和冲突给出你的判断。

      ## 输入材料（全部读取）
      - 项目简报: $vars.brief_file
      - 需求定义: $vars.requirements_file
      - 技术方案: $vars.solution_file
      - 验收用例: $vars.acceptance_cases_file
      - UI/UX 规范: $vars.ui_file（非 infrastructure 项目）
      - 完整性状态: $vars.completeness_score ($vars.completeness_passed)

      ## 撰写原则

      ### 1. 叙事线贯穿
      "我们面对什么问题 → 谁有这个问题 → 我们的方案是什么 → 为什么这样设计 → 如何落地"

      ### 2. 用户强调的点深入展开
      $vars.user_emphasis 对应的章节必须最详细——给配置示例、接口定义、使用场景。

      ### 3. 项目类型适配
      - **infrastructure**: 重点写配置语法、接口设计、迁移策略、向后兼容
      - **product**: 重点写用户画像与故事、API 设计、数据模型、UI/UX
      - 不要硬套不适合的章节

      ### 4. 质量优先于覆盖
      宁可 5 个章节深入透彻，不要 9 个章节都是概述。

      ### 5. 发布计划（直接生成）
      - 发布阶段（infrastructure: PoC→试点→全量 | product: Alpha→Beta→GA）
      - 成功指标（具体数字）
      - GTM 沟通简报
      - 回滚方案
      - 时间线和里程碑

      ## PRD 结构
      ```
      # PRD: $vars.prd_name

      ## 执行摘要
      ## 1. 问题陈述
      ## 2. 目标与成功指标
      ## 3. Non-Goals
      ## 4. 用户画像与故事
      ## 5. 技术方案
      ## 6. 技术考量（选型、安全、性能、错误处理、风险）
      ## 7. 发布计划
      ## 8. 附录（完整性状态、对抗审查摘要）
      ```

      ## 规则
      - 中文输出
      - 章节编号连续
      - 如果完整性未达标，附录中记录"已知缺失与改进建议"

      ## 输出
      保存到 `$vars.output_dir/PRD-FINAL.md`

      {"vars_update":{"final_prd_file":"$vars.output_dir/PRD-FINAL.md","prd_word_count":"<字数>","conclusion":"<2-3句话>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 6: Done
  # ═══════════════════════════════════════════════════════════════
  - id: done
    type: bash
    depends_on: [output]
    timeout: 10
    bash: |
      echo "═══════════════════════════════════════"
      echo "  ✅ PRD Forge 完成"
      echo "═══════════════════════════════════════"
      echo "📂 输出: $vars.output_dir"
      echo "📄 PRD:  $vars.final_prd_file"
      echo "📊 完整性: $vars.completeness_score"
      echo "📄 Brief: $vars.brief_file"
      echo "📄 Requirements: $vars.requirements_file"
      echo "📄 Solution: $vars.solution_file"
      echo "📄 Acceptance: $vars.acceptance_cases_file"
      echo "═══════════════════════════════════════"
