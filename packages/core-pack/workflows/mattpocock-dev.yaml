# yaml-language-server: $schema=~/.octopus/workflow-schema.json
apiVersion: octopus/v1
kind: Workflow
name: mattpocock-dev
description: >
  Matt Pocock 方法论工作流 — Grill → Spec → Tickets → TDD Loop → Architecture Review → Ship。
  通过 skills 引用实现: grilling, domain-modeling, codebase-design, to-spec, to-tickets,
  implement, tdd, code-review, diagnosing-bugs, improve-codebase-architecture。
  单一工作流保持推理链连续，每个 Ticket context:new 隔离上下文。

model: pro-max
engine: claude
execution_mode: serial
timeout: 86400

inputs:
  idea:
    description: "产品 Idea 描述（自然语言，越详细越好）"
    required: true
  base_branch:
    description: "PR 目标分支"
    required: false
    default: "main"
  max_tickets:
    description: "最大 Ticket 数量（防止拆分过细）"
    required: false
    default: "15"
  project_path:
    description: "目标项目路径（默认自动检测 ./projects/ 下首个项目）"
    required: false
    default: ""
  skip_arch_review:
    description: "跳过架构审查节点（加速但牺牲架构可见性）"
    required: false
    default: "false"

variables:
  output_dir: ""
  display_name: "Matt Pocock Dev"
  conclusion: ""
  # Grill
  brief_file: ""
  decision_count: "0"
  context_file: ""
  context_mode: "single"  # single | multi
  context_packages: ""
  # Spec
  spec_file: ""
  seam_count: "0"
  user_stories_count: "0"
  # Tickets
  tickets_queue_file: ""
  tickets_progress_file: ""
  ticket_count: "0"
  tickets_done_count: "0"
  tickets_blocked_count: "0"
  # TDD Loop
  current_ticket_id: ""
  current_ticket_title: ""
  ticket_status: ""
  all_tickets_done: "false"
  # Review
  review_blockers: "0"
  review_issues: ""
  standards_passed: "false"
  spec_passed: "false"
  # Anti-TODO
  todo_count: "0"
  # Architecture Review
  arch_review_file: ""
  arch_blockers: "0"
  # Ship
  pr_urls: ""
  pr_count: "0"
  # Stats
  total_commits: "0"
  tdd_cycles: "0"

auto_answers:
  - pattern: ".*"
    answer: "proceed"

providers:
  hermes-cli:
    type: hermes
    timeout: 30
    min_severity: info

channels:
  default:
    provider: hermes-cli
    target: "telegram:xzf_hermes"

hooks:
  on_workflow_failure:
    - id: notify-failure
      type: notify
      channel: default
      template:
        severity: error
        title: "❌ $vars.display_name — 工作流失败"
        body: "🔴 失败节点: ${hook.failed_node_id | default:unknown}\n⏱️ 已运行: ${hook.total_duration_ms | duration}\n💡 ${hook.error | default:Unknown}"

  on_complete:
    - id: notify-complete
      type: notify
      channel: default
      template:
        severity: info
        title: "{{#if $hook.final_status}}🎉{{/if}}{{#if $hook.failed_count}}😵{{/if}} $vars.display_name — 完成"
        body: "📊 {{#if $hook.final_status}}✅{{/if}}{{#if $hook.failed_count}}❌{{/if}} $hook.final_status\n✅ $hook.completed_count / ❌ $hook.failed_count / 📊 $hook.total_count\n⏱️ ${hook.total_duration_ms | duration}"

  on_node_success:
    - id: notify-grill
      type: notify
      nodes: [grill]
      channel: default
      template:
        severity: info
        title: "🔥 Grill 完成 — $vars.decision_count 个决策已确认"
        body: "📄 $vars.brief_file\n📖 $vars.context_file ($vars.context_mode)\n💡 $vars.conclusion"

    - id: notify-spec
      type: notify
      nodes: [spec]
      channel: default
      template:
        severity: info
        title: "📋 Spec 完成 — $vars.user_stories_count 个用户故事"
        body: "📄 $vars.spec_file\n🧵 Seams: $vars.seam_count\n💡 $vars.conclusion"

    - id: notify-tickets
      type: notify
      nodes: [tickets]
      channel: default
      template:
        severity: info
        title: "🎫 Tickets 拆分完成 — $vars.ticket_count 个垂直切片"
        body: "📄 $vars.tickets_queue_file\n💡 $vars.conclusion"

    - id: notify-tdd-loop
      type: notify
      nodes: [tdd-loop]
      channel: default
      template:
        severity: info
        title: "🔁 TDD Loop 完成 — $vars.tickets_done_count/$vars.ticket_count 通过"
        body: "📊 Commits: $vars.total_commits | TDD cycles: $vars.tdd_cycles | Blocked: $vars.tickets_blocked_count\n💡 $vars.conclusion"

    - id: notify-arch-review
      type: notify
      nodes: [architecture-review]
      channel: default
      template:
        severity: info
        title: "🏗️ 架构审查完成 — $vars.arch_blockers 个 Blockers"
        body: "📄 $vars.arch_review_file\n💡 $vars.conclusion"

    - id: notify-ship
      type: notify
      nodes: [ship]
      channel: default
      template:
        severity: info
        title: "🚀 PR 已创建"
        body: "🔗 $vars.pr_urls\n📊 PRs: $vars.pr_count\n💡 $vars.conclusion"

nodes:
  # ═══════════════════════════════════════════════════════════════
  # Phase 1: Grill — 逐问决策拷问 + Domain Modeling
  # ═══════════════════════════════════════════════════════════════
  - id: grill
    type: agent
    timeout: 3600
    skills: [grilling, domain-modeling]
    prompt: |
      按照 **grilling** skill 的纪律逐个拷问用户 Idea。
      同时按照 **domain-modeling** skill 主动构建领域模型。

      ## Step 0: 准备

      ### 输出目录
      ```bash
      OUTPUT_ROOT="./docs/mattpocock-dev"
      mkdir -p "$OUTPUT_ROOT"
      MAX_INDEX=0
      for dir in "$OUTPUT_ROOT"/run-*/; do
        [ -d "$dir" ] && INDEX=$(basename "$dir" | sed 's/run-0*//' | sed 's/^$/0/') && [ "$INDEX" -gt "$MAX_INDEX" ] 2>/dev/null && MAX_INDEX=$INDEX
      done
      NEW_INDEX=$((MAX_INDEX + 1))
      OUTPUT_DIR="$OUTPUT_ROOT/run-$(printf "%03d" $NEW_INDEX)"
      mkdir -p "$OUTPUT_DIR"
      ```

      ### 项目探索（grilling skill: facts from environment）
      快速扫描项目，为后续拷问提供事实依据：
      1. Glob `package.json` / `pyproject.toml` / `Cargo.toml` / `go.mod` — 识别技术栈
      2. Glob `*/src/{index,main,app}.{ts,js,py,go}` — 识别入口
      3. Read CLAUDE.md / README.md（如存在）
      4. Glob `CONTEXT-MAP.md` / `*/CONTEXT.md` / `packages/*/package.json` — Context 模式检测
         - monorepo + packages 有独立 src/ → **multi** 模式
         - 否则 → **single** 模式

      ## 输入
      - 用户 Idea: $inputs.idea
      - 项目路径: $inputs.project_path（如为空，扫描 ./projects/ 下首个项目）

      ## 拷问维度（8-13 个问题，grilling skill 纪律：一次一个，带推荐答案，决策归人事实归环境）

      1. 核心问题定义
      2. 目标用户
      3. MVP 边界
      4. 技术方案偏好（基于项目探索结果推荐）
      5. 集成约束（基于项目结构推断）
      6. 数据模型核心
      7. API 设计方向（基于项目现有风格）
      8. UI 需求
      9. 安全与权限
      10. 性能与规模
      11. 测试策略
      12. 部署与运维
      13. 核心领域概念（用 codebase-design 词汇：Module / Interface / Seam / Adapter）

      ## 领域建模（domain-modeling skill 纪律贯穿 Q&A）

      每个答案解决时立即：
      - 挑战术语冲突（用户说的 vs 代码实际行为不一致）
      - 锐化模糊语言
      - 具体场景压力测试
      - 即时更新术语表

      ## 产出

      ### 1. Grill 决策文档 → `$OUTPUT_DIR/00-brief.md`

      ```markdown
      # Grill Decisions
      ## Idea
      ## Decisions
      ### D{N}: <标题>
      **问题**: ...
      **决策**: ...
      **理由**: ...
      ```

      ### 2. Domain Model

      **single 模式** → 写入 `$OUTPUT_DIR/CONTEXT.md`：
      ```markdown
      # Domain Glossary
      | Term | Definition | Notes |
      # Key Relationships
      # Open Questions
      # ADR Candidates（三条件：hard to reverse + surprising + real trade-off）
      ```

      **multi 模式** → 写入 `$OUTPUT_DIR/CONTEXT-MAP.md`（索引）+ 每个相关 package 写入 `$OUTPUT_DIR/contexts/<pkg>-CONTEXT.md`：
      ```markdown
      # Context Map
      ## System-wide Glossary
      | Term | Definition | Used By |
      ## Package Contexts
      | Package | Context File | Domain |
      ## Cross-Package Relationships
      ## System-wide ADR Candidates
      ```

      ## 输出
      {"vars_update":{"output_dir":"$OUTPUT_DIR","brief_file":"$OUTPUT_DIR/00-brief.md","context_file":"<single: CONTEXT.md / multi: CONTEXT-MAP.md 路径>","context_mode":"<single|multi>","context_packages":"<comma-separated, empty if single>","decision_count":"<数>","conclusion":"<2-3句: Idea 本质 + 关键决策 + 领域术语数 + context 模式>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 2: Spec — 综合规格文档
  # ═══════════════════════════════════════════════════════════════
  - id: spec
    type: agent
    depends_on: [grill]
    timeout: 3600
    skills: [to-spec, codebase-design]
    prompt: |
      按照 **to-spec** skill 综合 Grill 决策为 Spec。不重新采访用户。
      Implementation Decisions 和 Testing Decisions 使用 **codebase-design** skill 词汇。

      ## 输入
      - Grill 决策: $vars.brief_file
      - 用户 Idea: $inputs.idea
      - 领域模型: $vars.context_file（multi 模式还读 `$vars.output_dir/contexts/` 下所有文件）

      ## Spec 结构（to-spec 模板）

      - **Problem Statement**: 从 D1 提取
      - **Solution**: 从 D4-D7 综合
      - **User Stories**: 极其详尽的编号列表（≥20 个），覆盖正常 + 边界 + 错误
      - **Implementation Decisions**: 用 codebase-design 词汇（Module/Interface/Depth/Seam/Adapter），禁止文件路径/代码片段
      - **Testing Decisions**: Seam 约定（interface = test surface，seam 越少越好）
      - **Out of Scope**: 从 D3 排除项提取
      - **Further Notes**

      ## 质量规则
      - 中文输出
      - 写完自审：遗漏 story？Seam 可执行？模块深度合理？术语与 CONTEXT 一致？

      ## 产出
      保存到 `$vars.output_dir/01-spec.md`

      ## 输出
      {"vars_update":{"spec_file":"$vars.output_dir/01-spec.md","user_stories_count":"<数>","seam_count":"<数>","conclusion":"<2-3句>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 3: Tickets — 垂直切片拆分
  # ═════════════════════════════════════════════════════════════
  - id: tickets
    type: agent
    depends_on: [spec]
    timeout: 1800
    skills: [to-tickets]
    prompt: |
      按照 **to-tickets** skill 将 Spec 拆分为垂直切片（Tracer Bullet）队列。

      ## 输入
      - Spec: $vars.spec_file
      - 领域模型: $vars.context_file（multi 模式读 CONTEXT-MAP.md + 相关 package CONTEXT）
      - 最大 Ticket 数: $inputs.max_tickets

      ## 硬约束
      - 垂直切片（穿越所有层），≤3 文件变更，端到端行为描述
      - 禁止水平切片
      - 宽重构用 expand-contract 序列

      ## Ticket 结构
      ```markdown
      ## T{NN} — <标题>
      **端到端行为**: ...
      **Blocked by**: T{XX} / None
      **验收标准**: Given/When/Then
      **涉及范围**: 模块/层
      **复杂度**: low / medium / high
      ```

      ## 产出
      - Ticket 队列: `$vars.output_dir/02-tickets-queue.md`
      - 进度追踪: `$vars.output_dir/tickets-progress.json`
        ```json
        {"tickets": [{"id":"T01","title":"...","status":"pending","blocked_by":[],"round":0}]}
        ```

      ## 输出
      {"vars_update":{"tickets_queue_file":"$vars.output_dir/02-tickets-queue.md","tickets_progress_file":"$vars.output_dir/tickets-progress.json","ticket_count":"<数>","conclusion":"<2-3句>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 4: TDD Loop — 逐 Ticket TDD + 并行审查 + Debug Fallback
  # ═══════════════════════════════════════════════════════════════
  - id: tdd-loop
    type: loop
    depends_on: [tickets]
    max_iterations: 20
    break_when: '$vars.all_tickets_done == "true" || $vars.ticket_status == "no_ticket"'
    nodes:
      - id: ticket-impl
        type: agent
        context: new
        timeout: 7200
        skills: [implement, tdd, code-review, diagnosing-bugs]
        agents:
          standards-reviewer:
            description: "Standards 轴审查员 — 只看代码质量（不看 Spec）"
            agent_file: ".claude/agents/engineering-code-reviewer"
            model: pro-max
            tools: ["Read", "Grep", "Glob"]
          spec-reviewer:
            description: "Spec 轴审查员 — 只看需求覆盖（不看代码标准）"
            agent_file: ".claude/agents/engineering-code-reviewer"
            model: pro-max
            tools: ["Read", "Grep", "Glob"]
        prompt: |
          你是 TDD 实现工程师。从队列取下一个 Ticket，按 skill 纪律执行。

          ## 输入
          - Ticket 队列: $vars.tickets_queue_file
          - 进度文件: $vars.tickets_progress_file
          - Spec: $vars.spec_file
          - 项目路径: $inputs.project_path
          - 领域模型: $vars.context_file（multi 模式读 CONTEXT-MAP.md + 当前 Ticket 涉及的 package CONTEXT）

          ## Step 0: 取下一个 Ticket

          读 `$vars.tickets_progress_file`，找第一个 pending 且 blocked_by 都 done 的 Ticket。
          找不到 → `all_tickets_done: "true"` 或 `ticket_status: "no_ticket"`。
          找到 → 更新 status 为 "in_progress"。

          ## 项目探索（实现前必做）
          Read CLAUDE.md / README.md（如存在），Glob 关键文件，了解现有约定。
          ⛔ 不创建重复组件 ⛔ 必须复用现有资产 ⛔ 必须使用项目现有集成方式

          ## Step 1-3: TDD 循环（按 tdd + implement skill 纪律）

          按 **tdd** skill 执行 SEAM → RED → GREEN → REFACTOR：
          - **SEAM**: 确认测试边界（优先复用宿主 Seam，interface = test surface）
          - **RED**: 写失败测试（独立真相源，禁止自证测试，禁止 mock 内部协作者）
          - **GREEN**: 最小实现（不添加 Spec 未要求功能，禁止 TODO/FIXME/placeholder）
          - **REFACTOR**: 按 **codebase-design** 原则改善结构（deletion test / depth check / seam validation），不添加功能，运行测试确认仍 GREEN

          ## Step 4: VERIFY

          ```bash
          pnpm tsc --noEmit 2>&1 || true
          pnpm test -- --testPathPattern="<相关文件>" 2>&1 || true
          pnpm test 2>&1 || true
          ```
          有失败 → 修复 → 重跑。最多 3 轮。

          ## Step 5: REVIEW（按 code-review skill — 两轴并行）

          保存变更文件列表后，**同时委派两个子代理**：

          **standards-reviewer**: 只看代码质量。读项目现有代码约定 + 变更文件。按 code-review skill 的 Standards 轴审查（Fowler 12-smell baseline + 违反项目约定 = BLOCKER）。
          **spec-reviewer**: 只看需求覆盖。读 Ticket 描述 + 变更文件。按 code-review skill 的 Spec 轴审查（missing/partial = BLOCKER, scope creep = WARNING）。

          两轴独立报告，不合并不重排。

          ## Step 5.5: Anti-TODO 门禁
          ```bash
          TODO_COUNT=$(grep -rn "TODO\|FIXME\|HACK\|XXX\|not.implemented\|throw new Error.*Not yet" \
            $(cat /tmp/mattpocock-review-files.txt) 2>/dev/null | wc -l | tr -d ' ')
          ```
          TODO_COUNT > 0 → 每个匹配计为 BLOCKER。

          ## Step 6: Fix 循环 + Debug Fallback

          blockers > 0 → 修复 → VERIFY → REVIEW。最多 3 轮。
          3 轮后仍失败 → 按 **diagnosing-bugs** skill 执行：
          1. Build feedback loop（核心：建立紧致 pass/fail 信号）
          2. Reproduce + minimize → 3-5 hypotheses → targeted instrumentation
          3. Fix at correct seam → regression test → cleanup debug markers
          仍失败 → ticket status = "blocked"，继续下一个。

          ## Step 7: COMMIT
          ```bash
          git add -A
          git commit -m "feat(T{NN}): <Ticket 标题>"
          ```

          ## Step 8: 更新进度

          ## 输出
          成功: {"vars_update":{"current_ticket_id":"T{NN}","ticket_status":"done","tickets_done_count":"<数>","total_commits":"$vars.total_commits + 1","tdd_cycles":"$vars.tdd_cycles + <数>","conclusion":"T{NN}: <摘要>"}}
          Blocked: {"vars_update":{"current_ticket_id":"T{NN}","ticket_status":"blocked","tickets_blocked_count":"$vars.tickets_blocked_count + 1","conclusion":"T{NN}: blocked — <原因>"}}
          无待处理: {"vars_update":{"all_tickets_done":"true","ticket_status":"no_ticket","conclusion":"所有 Ticket 完成或无待处理 (blocked: $vars.tickets_blocked_count)"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 5: Architecture Review
  # ═══════════════════════════════════════════════════════════════
  - id: architecture-review
    type: agent
    depends_on: [tdd-loop]
    execute_when: '$inputs.skip_arch_review != "true"'
    timeout: 1800
    skills: [improve-codebase-architecture, codebase-design]
    agents:
      architecture-reviewer:
        description: "架构审查员 — 扫描新代码的模块深度和 seam 质量"
        agent_file: ".claude/agents/architecture-explorer"
        model: pro
        tools: ["Read", "Write", "Grep", "Glob"]
    prompt: |
      按照 **improve-codebase-architecture** skill 扫描本次工作流产生的新代码。
      使用 **codebase-design** skill 词汇评估架构质量。

      ## 输入
      - Spec: $vars.spec_file
      - 领域模型: $vars.context_file（multi 模式读 CONTEXT-MAP.md + per-package CONTEXT）
      - 变更文件: `git diff --name-only $inputs.base_branch`

      ## 审查维度

      按 codebase-design 原则扫描：
      1. **Shallow Module Detection**: deletion test, pass-through modules
      2. **Missing Seam Detection**: direct instantiation without adapter, hard-coded deps
      3. **Depth Assessment**: 每个新模块 deep/shallow 评估
      4. **Seam Quality**: adapter pairs, interface = test surface

      委派 architecture-reviewer 子代理扫描变更文件，标记 BLOCKER/WARNING。

      ## 产出
      报告 → `$vars.output_dir/03-architecture-review.md`

      BLOCKER 条件：
      - Shallow module with >3 callers
      - Missing seam with >2 direct instantiations
      - Interface ≠ test surface

      ## 输出
      {"vars_update":{"arch_review_file":"$vars.output_dir/03-architecture-review.md","arch_blockers":"<数>","conclusion":"<2-3句>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 6: Ship
  # ═══════════════════════════════════════════════════════════════
  - id: ship
    type: agent
    depends_on: [architecture-review]
    execute_when: '$vars.all_tickets_done == "true" && ($inputs.skip_arch_review == "true" || $vars.arch_blockers == "0")'
    timeout: 1800
    prompt: |
      提交、推送并创建 PR。

      ## 输入
      - 项目: $vars.project_path
      - 目标分支: $inputs.base_branch
      - Spec: $vars.spec_file
      - 领域模型: $vars.context_file
      - 架构报告: $vars.arch_review_file（如存在）

      ## PR 标题
      `feat: <功能名> — <一句话描述>`
      ⛔ 禁止泛化用语

      ## PR Body
      ```markdown
      ## 🎯 功能概述
      ## 🏗️ 实现内容（from git log）
      ## 📊 完成状态
      - Tickets / TDD Cycles / Commits / Blocked
      ## 🏛️ 架构质量
      <details><summary>📋 Spec 全文</summary>...</details>
      <details><summary>📖 领域模型</summary>...</details>
      ```

      ## 步骤
      1. `git status --porcelain`
      2. 有未提交 → `git add -A && git commit -m "chore: final cleanup"`
      3. `git push -u origin HEAD`
      4. 创建 PR（检查已有 PR 则 comment）

      ## 输出
      {"vars_update":{"pr_urls":"$PR_URL","pr_count":"1","conclusion":"PR: $PR_URL"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 7: Done
  # ═══════════════════════════════════════════════════════════════
  - id: done
    type: bash
    depends_on: [ship]
    timeout: 10
    bash: |
      echo "═══════════════════════════════════════"
      echo "  ✅ mattpocock-dev 完成"
      echo "═══════════════════════════════════════"
      echo "📂 输出: $vars.output_dir"
      echo "📋 Spec: $vars.spec_file"
      echo "📖 领域模型: $vars.context_file ($vars.context_mode)"
      echo "🎫 Tickets: $vars.tickets_done_count / $vars.ticket_count (blocked: $vars.tickets_blocked_count)"
      echo "🏗️ 架构报告: $vars.arch_review_file"
      echo "🔗 PRs: $vars.pr_urls"
