# yaml-language-server: $schema=./workflow-schema.json
apiVersion: octopus/v1
kind: Workflow

# ============================================================
# XZF Development Pipeline
# Idea → PR/MR 完整开发流水线
# ============================================================

name: xzf-dev
description: |
  从 Idea 到 PR/MR 的端到端开发流水线。
  需求澄清 → 简报综合 → Spec + Tracer Bullet 设计 → 垂直切片执行 → E2E 全量验证 → 交付。
version: 1.0.0
# --- 全局配置 ---
engine: claude
model: pro-max
timeout: 86400 # 全局超时 24h
execution_mode: serial

# --- 输入 ---
inputs:
  idea:
    description: "你的 Idea — 描述想要实现的功能或需求"
    required: true
  feature:
    description: "Feature 名称（可选）— 用于目录隔离。不提供则从 Idea 自动生成 kebab-case slug"
    required: false
    default: ""
  research_guidance:
    description: "Research 指引（可选）— 指定需要重点研究的 codebase 模块或外部技术。不提供则由模型根据 Idea 语义自行判断"
    required: false
    default: ""

# --- 变量 ---
variables:
  branch: ""
  feature: ""
  remote_type: ""
  user_guidance: ""
  clarify_decision: ""
  verify_decision: ""
  spec_count: "0"
  current_spec: "0"
  spec_status: ""
  e2e_status: ""
  e2e_decision: ""
  requirements_checklist_status: ""
  env_checklist_status: ""

# --- 通知提供者 ---
providers:
  hermes-cli:
    type: hermes
    timeout: 30
    min_severity: info

channels:
  xzf_hermes:
    provider: hermes-cli
    target: "telegram:xzf_hermes"

# --- 钩子 ---
hooks:
  on_workflow_failure:
    - id: notify-failure
      type: notify
      channel: xzf_hermes
      template:
        severity: error
        title: "❌ xzf-dev — 工作流失败"
        body: "🌿 $vars.feature @ $vars.branch\n🔴 失败节点: ${hook.failed_node_id | default:unknown}\n⏱️ 已运行: ${hook.total_duration_ms | duration}\n\n💡 错误: ${hook.error | default:Unknown error}"

  on_complete:
    - id: notify-complete
      type: notify
      channel: xzf_hermes
      template:
        severity: info
        title: "🏁 xzf-dev — 工作流完成"
        body: "🌿 $vars.feature @ $vars.branch\n✅ 完成: ${hook.completed_count | default:0}\n⏱️ 总耗时: ${hook.total_duration_ms | duration}"

  on_node_success:
    - id: save-approval-answer
      nodes: [requirements-approval, verification-approval]
      bash: |
        case "$hook.node_id" in
          requirements-approval|verification-approval) DIR=".octopus/xzf/$vars.feature/02-clarification" ;;
          *)                   DIR=".octopus/xzf/$vars.feature/approval-answers" ;;
        esac
        mkdir -p "$DIR"
        FILE="$DIR/$hook.node_id-$hook.timestamp.md"
        cat > "$FILE" << 'EOF'
        # $hook.node_id

        **决策**: $hook.node_decision
        **时间**: $hook.timestamp

        ## 用户输入

        $hook.node_comment
        EOF
        echo "Saved: $FILE"

    - id: notify-init
      type: notify
      nodes: [init]
      channel: xzf_hermes
      template:
        severity: info
        title: "✅ xzf-dev — 初始化完成"
        body: "🌿 $vars.feature @ $vars.branch\n🔗 Remote: $vars.remote_type"

    - id: notify-research
      type: notify
      nodes: [idea-research]
      channel: xzf_hermes
      template:
        severity: info
        title: "🔍 xzf-dev — Codebase 研究完成"
        body: "🌿 $vars.feature @ $vars.branch"

    - id: notify-clarify
      type: notify
      nodes: [requirements-clarify-loop]
      channel: xzf_hermes
      template:
        severity: info
        title: "💬 xzf-dev — 需求澄清完成"
        body: "🌿 $vars.feature"

    - id: notify-verify
      type: notify
      nodes: [verification-clarify-loop]
      channel: xzf_hermes
      template:
        severity: info
        title: "🧪 xzf-dev — 验证方式澄清完成"
        body: "🌿 $vars.feature"

    - id: notify-brief
      type: notify
      nodes: [brief-maker]
      channel: xzf_hermes
      template:
        severity: info
        title: "📋 xzf-dev — 需求简报生成完成"
        body: "🌿 $vars.feature"

    - id: notify-spec
      type: notify
      nodes: [spec-planner]
      channel: xzf_hermes
      template:
        severity: info
        title: "📐 xzf-dev — Spec + Task 设计完成"
        body: "🌿 $vars.feature\n📊 Specs: $vars.spec_count"

    - id: notify-execution
      type: notify
      nodes: [execution-loop]
      channel: xzf_hermes
      template:
        severity: info
        title: "⚡ xzf-dev — 代码执行完成"
        body: "🌿 $vars.feature\n📊 状态: $vars.spec_status"

    - id: notify-e2e
      type: notify
      nodes: [e2e-verify-loop]
      channel: xzf_hermes
      template:
        severity: info
        title: "🎯 xzf-dev — E2E 验证完成"
        body: "🌿 $vars.feature\n📊 状态: $vars.e2e_status"

    - id: notify-ship
      type: notify
      nodes: [ship]
      channel: xzf_hermes
      template:
        severity: info
        title: "🚀 xzf-dev — 交付完成"
        body: "🌿 $vars.feature @ $vars.branch"

# ============================================================
# Stage 0: 初始化
# ============================================================

nodes:
  - id: init
    type: agent
    context: new
    skills: [octo-xzf-init]
    prompt: |
      使用 octo-xzf-init skill 初始化 XZF Pipeline 工作环境。

      ═══ Feature Slug ═══
      IF $inputs.feature 非空 → feature = "$inputs.feature"
      ELSE → 从 $inputs.idea 提取关键词生成 kebab-case slug（max 40 chars）
             格式: {verb}-{subject} 或 {topic}，例如 add-user-auth, fix-cart-total

      ═══ 目录结构 ═══
      基础目录: .octopus/xzf/$feature/
      用 Bash `mkdir -p` 一次性创建所有子目录（不要依赖 Write 自动创建）:

      ```bash
      BASE=".octopus/xzf/$feature"
      mkdir -p "$BASE"/{00-init,01-research/_scan,02-clarification,03-specs,04-execution,05-reports/{e2e-scripts,e2e-screenshots,e2e-data},06-ship}
      ```

      ═══ 写入文件 ═══
      将用户 Idea 写入 .octopus/xzf/$feature/00-init/idea.md：

      ```
      # Idea
      ## 需求描述
      $inputs.idea

      ## Research 指引
      $inputs.research_guidance
      ```

      如 research_guidance 为空，写入：
      "（无特定指引 — 请根据 Idea 语义自行判断需要研究的 codebase 模块和外部技术）"

      汇报：分支名、feature slug、remote 类型、workspace 项目数。

      输出 vars_update:
      {"vars_update": {"branch": "{git branch}", "feature": "{feature slug}", "remote_type": "{github|gitlab}"}}

  # ============================================================
  # Stage 1: Codebase 研究
  # ============================================================

  # --- 1a: 预扫描（秒级） ---
  - id: idea-scan
    type: bash
    depends_on: [init]
    bash: |
      BASE=".octopus/xzf/$vars.feature/01-research/_scan"
      mkdir -p "$BASE"

      # 文件结构概览
      find . -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.go" -o -name "*.py" -o -name "*.vue" -o -name "*.rs" \) \
        -not -path "*/node_modules/*" -not -path "*/.git/*" -not -path "*/dist/*" -not -path "*/build/*" \
        | sort > "$BASE/file-tree.txt"

      # 项目配置摘要
      for f in $(find . -maxdepth 3 \( -name "package.json" -o -name "go.mod" -o -name "Cargo.toml" -o -name "pyproject.toml" \) -not -path "*/node_modules/*"); do
        echo "=== $f ===" >> "$BASE/deps.txt"
        head -30 "$f" >> "$BASE/deps.txt"
        echo "" >> "$BASE/deps.txt"
      done

      # 项目文档
      find . -maxdepth 3 -name "CLAUDE.md" -exec sh -c 'echo "=== {} ==="; cat "{}"; echo ""' \; > "$BASE/claude-mds.txt"

      # 路由/API 入口
      grep -rn "router\.\|app\.\(get\|post\|put\|delete\|patch\)\|@\(Get\|Post\|Put\|Delete\)Mapping\|\.Route(" \
        --include="*.ts" --include="*.go" --include="*.py" --include="*.java" \
        -l 2>/dev/null | sort > "$BASE/api-entries.txt"

      # DB Schema / Migration
      find . -type f \( -name "*.migration.*" -o -name "*schema*" -o -name "*.entity.*" -o -path "*/migrations/*" \) \
        -not -path "*/node_modules/*" | sort > "$BASE/db-schemas.txt"

      # 测试配置
      find . -maxdepth 3 \( -name "vitest.*" -o -name "jest.*" -o -name "playwright.*" -o -name "*.test.*" -o -name "*.spec.*" \) \
        -not -path "*/node_modules/*" -not -path "*/dist/*" \
        | head -50 | sort > "$BASE/test-config.txt"

      echo "Scan complete."

  # --- 1b: 聚焦研究辩论（swarm debate + expert_pool 动态选择） ---
  - id: idea-research
    type: swarm
    depends_on: [idea-scan]
    mode: debate
    dynamic: true
    max_experts: 3
    rounds: 2
    consensus_threshold: 0.7
    context_tier: "200k"
    expert_defaults:
      skills: [octo-xzf-research]
      tools: [Read, Grep, Glob, Bash, WebFetch, WebSearch]
    expert_pool:
      - role: codebase-architect
        agent_file: .claude/agents/octo-xzf-codebase-architect.md
      - role: external-researcher
        agent_file: .claude/agents/octo-xzf-external-researcher.md
      - role: risk-analyst
        agent_file: .claude/agents/octo-xzf-risk-analyst.md
    topic: |
      ═══ Codebase Research Debate ═══

      Idea: 请读取 .octopus/xzf/$vars.feature/00-init/idea.md
      Workspace: 请读取 .octopus/xzf/$vars.feature/00-init/workspace-topology.md

      ⚠️ 如 00-init/idea.md 包含「Research 指引」，按指引聚焦研究范围。

      预扫描结果（用于快速定位，避免盲读）:
      - 文件树: .octopus/xzf/$vars.feature/01-research/_scan/file-tree.txt
      - 依赖摘要: .octopus/xzf/$vars.feature/01-research/_scan/deps.txt
      - 项目文档: .octopus/xzf/$vars.feature/01-research/_scan/claude-mds.txt
      - API 入口: .octopus/xzf/$vars.feature/01-research/_scan/api-entries.txt
      - DB Schema: .octopus/xzf/$vars.feature/01-research/_scan/db-schemas.txt
      - 测试配置: .octopus/xzf/$vars.feature/01-research/_scan/test-config.txt

      ═══ 辩论焦点 ═══
      围绕这个 Idea 进行聚焦讨论，不要写通用 domain overview：

      1. 这个 Idea 涉及哪些模块？证据是什么？（引用 _scan/ 中的具体文件）
      2. 现有模式哪些可复用？哪些需要新建或改造？
      3. 有什么约束和风险？（技术债、性能、兼容性）
      4. 需要外部调研吗？（仅在 Idea 涉及外部 API/技术时用 WebFetch/WebSearch）

      ⚠️ 互相挑战对方的假设。例：architect 说"改 X 模块" → 其他专家质疑"X 的 schema/API 能支撑吗？"
      ⚠️ 每位专家发言控制在 1000 字以内。聚焦结论和分歧点，不写冗长分析。
      ⚠️ 如果某位专家的领域与这个 Idea 无关，直接说"本领域无重大影响"，不要硬凑内容。
    host:
      role: research-synthesizer
      prompt: |
        读取所有轮次的讨论记录。综合达成共识的结论，标注仍有分歧的点。

        写入 .octopus/xzf/$vars.feature/01-research/research-brief.md：

        ```markdown
        # Research Brief

        ## Affected Modules
        | 模块/包 | 影响类型 | 现有代码定位 | 证据 |
        |---------|---------|-------------|------|

        ## Existing Patterns to Reuse
        - {pattern}: {在哪里} → {本 Idea 如何复用}

        ## Constraints & Risks
        - {constraint}: {原因} → {对实现的影响}

        ## External Knowledge
        {仅在涉及外部技术时有此节，否则删除}

        ## Open Questions
        {专家间仍有分歧的点，需在澄清阶段确认}
        ```

        ⚠️ 只保留有价值的结论。不填充无内容的章节。
        Synthesis 输出 brief 摘要即可。

  # ============================================================
  # Stage 2a: 需求澄清循环
  # ============================================================

  - id: requirements-clarify-loop
    type: loop
    depends_on: [idea-research]
    max_iterations: 10
    break_when: '$vars.clarify_decision == "proceed" && $vars.requirements_checklist_status == "COMPLETE"'
    nodes:
      - id: requirements-clarify
        type: agent
        skills: [octo-xzf-clarify]
        prompt: |
          ═══ 需求澄清 — Round $iteration ═══

          读取:
          - Idea: .octopus/xzf/$vars.feature/00-init/idea.md
          - Research: .octopus/xzf/$vars.feature/01-research/research-brief.md
          - Workspace: .octopus/xzf/$vars.feature/00-init/workspace-topology.md

          用户上轮回复:
          $requirements-approval.output.comment

          职责: 需求澄清 — 功能边界、优先级、用户场景、技术约束。
          不涉及测试环境和验证方式（下一阶段处理）。

          澄清方法论、问题格式、Round 流程参见 octo-xzf-clarify skill。
          输出: .octopus/xzf/$vars.feature/02-clarification/questions.md

          ⚠️ 最终输出（last_output）包含 Synthesis 三部分：「待澄清」+「用户补充」+「已确认摘要」。
          「已确认摘要」始终输出（已确认决策概览），让用户审阅自确认项。
          下游 approval 直接引用 $requirements-clarify.output.last_output 展示给用户。

          最后输出 vars_update JSON:
          {"vars_update": {"requirements_checklist_status": "COMPLETE 或 INCOMPLETE: ..."}}

      - id: requirements-approval
        type: approval
        depends_on: [requirements-clarify]
        execute_when: '$vars.clarify_decision != "proceed" || $vars.requirements_checklist_status != "COMPLETE"'
        comment_label: "澄清输入:"
        comment_placeholder: "请在此输入您对以上问题的回答..."
        prompt: |
          Round $iteration | 📁 02-clarification/questions.md
          未回答的问题将采用推荐方案。
          $requirements-clarify.output.last_output
        options:
          - label: "继续"
            value: "continue"
          - label: "完成"
            value: "proceed"
        outputs:
          $vars.clarify_decision: "$last_output"

  # ============================================================
  # Stage 2b: 验证方式与测试环境澄清循环
  # ============================================================

  - id: verification-clarify-loop
    type: loop
    depends_on: [requirements-clarify-loop]
    max_iterations: 10
    break_when: '$vars.verify_decision == "proceed" && $vars.env_checklist_status == "COMPLETE"'
    nodes:
      - id: verification-clarify
        type: agent
        skills: [octo-xzf-verification]
        prompt: |
          ═══ 验证策略规划 — Round $iteration ═══

          读取:
          - Idea: .octopus/xzf/$vars.feature/00-init/idea.md
          - Research: .octopus/xzf/$vars.feature/01-research/research-brief.md
          - 已澄清需求: .octopus/xzf/$vars.feature/02-clarification/questions.md
          - Workspace: .octopus/xzf/$vars.feature/00-init/workspace-topology.md

          用户上轮回复:
          $verification-approval.output.comment

          验证策略方法论参见 octo-xzf-verification skill。
          输出: .octopus/xzf/$vars.feature/02-clarification/verification.md

          ⚠️ 最终输出（last_output）包含 Synthesis 三部分：「待确认」+「用户补充」+「推荐验证方案」。
          「推荐验证方案」始终输出（测试环境、验收条件概览、E2E 场景列表），这是 agent 推荐的测试策略，用户可审阅纠正。
          下游 approval 直接引用 $verification-clarify.output.last_output 展示给用户。

          最后输出 vars_update JSON:
          {"vars_update": {"env_checklist_status": "COMPLETE 或 INCOMPLETE: ..."}}

      - id: verification-approval
        type: approval
        depends_on: [verification-clarify]
        execute_when: '$vars.verify_decision != "proceed" || $vars.env_checklist_status != "COMPLETE"'
        comment_label: "补充/修正:"
        comment_placeholder: "请在此补充或修正验证策略..."
        prompt: |
          Round $iteration | 环境: $vars.env_checklist_status | 📁 02-clarification/verification.md
          ⚠️ INCOMPLETE 时必须补全才能进入下一阶段。
          $verification-clarify.output.last_output
        options:
          - label: "继续"
            value: "continue"
          - label: "完成"
            value: "proceed"
        outputs:
          $vars.verify_decision: "$last_output"

  # ============================================================
  # Stage 3: 需求简报（综合澄清结果 → brief.md）
  # ============================================================

  - id: brief-maker
    type: agent
    depends_on: [verification-clarify-loop]
    skills: [octo-xzf-brief-maker]
    prompt: |
      使用 octo-xzf-brief-maker skill 生成需求简报。

      读取:
      - Idea: .octopus/xzf/$vars.feature/00-init/idea.md
      - 需求澄清: .octopus/xzf/$vars.feature/02-clarification/questions.md
      - 验证方式: .octopus/xzf/$vars.feature/02-clarification/verification.md
      - Workspace: .octopus/xzf/$vars.feature/00-init/workspace-topology.md

      输出: .octopus/xzf/$vars.feature/02-clarification/brief.md

      原则: 只保留结论，不保留讨论过程。下游节点只读 brief.md。
      裁剪无内容章节。确保每个验收标准有验证方法。

  # ============================================================
  # Stage 4: Spec + Task 生成（单 agent，一次完成）
  # ============================================================

  - id: spec-planner
    type: agent
    depends_on: [brief-maker]
    skills: [octo-xzf-spec-designer]
    prompt: |
      使用 octo-xzf-spec-designer skill 生成所有 spec 和 tracer bullet tasks。

      读取:
      - 需求简报: .octopus/xzf/$vars.feature/02-clarification/brief.md
      - Research 知识: .octopus/xzf/$vars.feature/01-research/research-brief.md
      - Workspace: .octopus/xzf/$vars.feature/00-init/workspace-topology.md

      ═══ 输出 ═══
      1. 每个 spec 写入:
         .octopus/xzf/$vars.feature/03-specs/spec-NNN-{name}.md
      2. 每个 spec 的 tracer bullets 写入子目录:
         .octopus/xzf/$vars.feature/03-specs/spec-NNN-{name}/T-N-{name}.md
         ⚠️ 所有 spec 必须建子目录（即使只有 1 个 task），下游执行循环靠子目录中的 T-N 文件发现任务
      3. 生成索引: .octopus/xzf/$vars.feature/03-specs/spec-index.md
         （按执行顺序: # | 文件名 | 标题 | Tracer Bullets 数 | Depends）
      4. 生成 E2E 测试计划: .octopus/xzf/$vars.feature/03-specs/e2e-test-plan.md
         综合所有 spec 的 E2E 验证方法，按执行顺序编排为一份完整测试计划
      5. 若有遗留文件（重跑），先清空 03-specs/ 再写入

      ═══ 原则 ═══
      - 简单需求 → 1 个 spec 即可，不强制拆分
      - Task 用垂直切片（tracer bullet）：每个 task 横穿全栈，独立可验证
      - Task 描述用户视角："用户能做什么"，不写"改什么文件"
      - 不写文件路径，agent 自行决定实现方式
      - 每个 spec 必须定义反假跑标准（区分"真通过"vs"假通过"）
      - 格式参见 octo-xzf-spec-designer skill

      最后输出 vars_update JSON:
      {"vars_update": {"spec_count": N}}

  # ============================================================
  # Stage 5: 任务执行（per spec → per tracer bullet，基础验证）
  # ============================================================

  - id: execution-loop
    type: loop
    depends_on: [spec-planner]
    max_iterations: 99
    break_when: "$vars.current_spec >= $vars.spec_count"
    nodes:
      - id: execute-spec-tasks
        type: agent
        context: new
        skills: [octo-xzf-implementer]
        tools: [Read, Write, Edit, Bash, Grep, Glob]
        prompt: |
          你是全栈实现者，使用 octo-xzf-implementer skill 执行当前 spec 的所有 tracer bullets。

          ═══ 你的任务范围 ═══
          ⚠️ 严格限定：你只能执行 spec-index.md 中的第 $vars.current_spec 行（0-based）对应的 spec。
          不要读取或执行其他 spec 的文件。一个迭代只做一个 spec。

          ═══ 执行流程 ═══
          1. 读取 Spec 索引: .octopus/xzf/$vars.feature/03-specs/spec-index.md
          2. 找到第 $vars.current_spec 行（0-based）对应的 spec 文件
          3. 读取 spec 文件 + 子目录下所有 T-N-*.md（tracer bullets）
          4. 检查 checkpoint: .octopus/xzf/$vars.feature/04-execution/spec-{NNN}/checkpoint.json
          5. IF checkpoint 存在且 status=="completed" → 直接跳到「完成」，输出 vars_update
          6. IF checkpoint 存在但 status!="completed" → 跳过已完成 task，从断点恢复
          7. IF 不存在 → 从头开始

          ═══ 执行每个 tracer bullet ═══
          按依赖顺序逐个执行:
          - 读取 T-N.md 的目标和验收标准
          - 实现（全栈：DB → API → UI → test）
          - 基础验证（单测 + 集成测试，对照 spec 反假跑标准）
          - 自治 verify-fix 循环（max 3 次，含 code smell 检查，详见 skill）
          - 通过后更新 checkpoint.json（严格按 octo-xzf-implementer skill 的 Schema）
          - 3 次仍失败 → 标记 task 为 failed，记录到 checkpoint，继续下一个 task
          ⚠️ 此阶段不跑 E2E 测试，E2E 在 Stage 6 统一执行。

          ═══ 完成（必须执行）═══
          无论全部通过或部分失败，你必须输出以下 JSON 来推进到下一个 spec:
          {"vars_update": {"spec_status": "passed|partial", "current_spec": <当前 $vars.current_spec 的值 + 1>}}
          - spec_status: "passed"（全部通过）或 "partial"（有 task 失败但已记录）
          - current_spec: 当前值 $vars.current_spec 加 1（例: 当前 0 → 输出 1，当前 1 → 输出 2）
          ⚠️ 不输出此 JSON = 循环卡死，永远无法进入下一个 spec。这是你的最后一步，必须执行。
        outputs:
          $vars.spec_status: "$last_output"

  # ============================================================
  # Stage 6: E2E 全量验证（完整用户流程测试 + 修复循环）
  # ============================================================

  - id: e2e-verify-loop
    type: loop
    depends_on: [execution-loop]
    max_iterations: 10
    break_when: '$vars.e2e_status == "passed" || $vars.e2e_decision == "skip"'
    nodes:
      - id: e2e-runner
        type: agent
        context: new
        model: se
        timeout: 1800 # 30min — E2E 测试可能涉及浏览器操作/长请求，给足时间
        skills: [octo-xzf-implementer]
        tools: [Read, Write, Edit, Bash, Grep, Glob]
        prompt: |
          你是 E2E 验证者，执行所有 spec 的全量 E2E 测试。

          用户上轮指导:
          $vars.user_guidance

          如有指导，按指导调整修复策略。

          ═══ 执行流程 ═══
          1. 读取 E2E 测试计划: .octopus/xzf/$vars.feature/03-specs/e2e-test-plan.md
          2. 按计划顺序执行 E2E 测试（浏览器操作 / curl / playwright）
          3. 收集证据（截图、API 响应、DB 查询）
          4. 对照反假跑标准，确认"真通过"

          ═══ 文件存放 ═══
          - 测试脚本（SQL/shell/curl）: .octopus/xzf/$vars.feature/05-reports/e2e-scripts/
          - 截图: .octopus/xzf/$vars.feature/05-reports/e2e-screenshots/
          - 临时数据（mock 数据、API 响应文本、fixture 等）: .octopus/xzf/$vars.feature/05-reports/e2e-data/
          - 测试报告: .octopus/xzf/$vars.feature/05-reports/e2e-report.md
          ⚠️ 所有 E2E 产物统一放 05-reports/，不污染源码目录。

          ═══ 失败修复 ═══
          某个 E2E 失败时:
          - 定位到具体 spec 和 tracer bullet
          - 尝试修复（max 3 次）
          - 修复后只重跑失败的 E2E 步骤，不从头跑
          - 3 次仍失败 → 记录失败详情，继续下一个 spec 的 E2E

          ═══ 输出 ═══
          写入 E2E 报告: .octopus/xzf/$vars.feature/05-reports/e2e-report.md
          格式: 每个 spec 的 E2E 结果（PASS/FAIL + 证据 + 修复记录）

          全部通过: {"vars_update": {"e2e_status": "passed", "user_guidance": ""}}
          仍有失败: {"vars_update": {"e2e_status": "failed", "user_guidance": ""}}
        outputs:
          $vars.e2e_status: "$last_output"

      # --- E2E 失败 → 通知用户处理 ---
      - id: e2e-notify
        type: bash
        depends_on: [e2e-runner]
        execute_when: '$vars.e2e_status == "failed"'
        bash: octopus notify --channel xzf_hermes --severity warn --title "⚠️ xzf-dev — E2E 测试有失败" --body "🌿 $vars.feature | 📁 05-reports/e2e-report.md | 需要你处理：重试或跳过"

      # --- E2E 失败 → 用户决定重试或跳过 ---
      - id: e2e-approval
        type: approval
        depends_on: [e2e-notify]
        execute_when: '$vars.e2e_status == "failed"'
        prompt: |
          E2E 测试仍有失败 | 📁 05-reports/e2e-report.md
          在评论中输入修复指导，或选择跳过继续交付。
        options:
          - label: "重试"
            value: "retry"
          - label: "跳过"
            value: "skip"
        outputs:
          $vars.e2e_decision: "$last_output"
          $vars.user_guidance: "$last_output.comment"

  # ============================================================
  # Stage 7: Ship 交付
  # ============================================================

  - id: ship
    type: agent
    depends_on: [e2e-verify-loop]
    context: new
    skills: [octo-xzf-ship]
    tools: [Read, Bash, Grep, Glob]
    prompt: |
      使用 octo-xzf-ship skill 完成 Ship 交付（PR/MR 提交 + Feature 归档）。

      运行时上下文:
      - Feature slug: $vars.feature
      - 分支: $vars.branch
      - Remote 类型: $vars.remote_type
      - 产物目录: .octopus/xzf/$vars.feature/
      - Workspace 拓扑: .octopus/xzf/$vars.feature/00-init/workspace-topology.md

      按 skill 定义的 Step 1 → Step 2 → Step 3 顺序执行。
