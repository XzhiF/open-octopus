# yaml-language-server: $schema=./workflow-schema.json
apiVersion: octopus/v1
kind: Workflow

# ============================================================
# XZF Development Pipeline
# Idea → PR/MR 完整开发流水线
# ============================================================

name: xzf-dev
description: |
  从 Idea 到 PR/MR 的端到端开发流水线。
  6 位专家（架构师、产品经理、测试架构师、前端、后端、安全）通过
  swarm debate 进行多轮讨论，故事驱动迭代，验证先行。
version: 1.0.0
# --- 全局配置 ---
engine: claude
model: pro-max
timeout: 86400 # 全局超时 24h

# --- 输入 ---
inputs:
  idea:
    description: "你的 Idea — 描述想要实现的功能或需求"
    required: true
  feature:
    description: "Feature 名称（可选）— 用于目录隔离。不提供则从 Idea 自动生成 kebab-case slug"
    required: false
    default: ""
  research_guidance:
    description: "Research 指引（可选）— 指定需要重点研究的 codebase 模块或外部技术。不提供则由模型根据 Idea 语义自行判断"
    required: false
    default: ""

# --- 变量 ---
variables:
  branch: ""
  feature: ""
  workspace_topology: ""
  remote_type: ""
  user_guidance: ""
  clarify_decision: ""
  verify_decision: ""
  spec_count: "0"
  current_spec: "0"
  spec_status: ""
  requirements_checklist_status: ""
  env_checklist_status: ""
  pending_questions: ""

# --- 通知 ---
notify:
  on_failure:
    channel: xzf_hermes
    message: "[xzf-dev] 执行失败: $failed_node_id — $vars.feature @ $vars.branch"
  on_complete:
    channel: xzf_hermes
    message: "[xzf-dev] 完成: $vars.feature @ $vars.branch — PR/MR 已提交"

# --- 钩子 ---
hooks:
  on_node_success:
    - id: save-approval-answer
      nodes: [requirements-approval, verification-approval]
      bash: |
        case "$hook.node_id" in
          requirements-approval|verification-approval) DIR=".octopus/xzf/$vars.feature/03-clarification" ;;
          *)                   DIR=".octopus/xzf/$vars.feature/approval-answers" ;;
        esac
        mkdir -p "$DIR"
        FILE="$DIR/$hook.node_id-$hook.timestamp.md"
        cat > "$FILE" << 'EOF'
        # $hook.node_id

        **决策**: $hook.node_decision
        **时间**: $hook.timestamp

        ## 用户输入

        $hook.node_comment
        EOF
        echo "Saved: $FILE"

# ============================================================
# Stage 0: 初始化
# ============================================================

nodes:
  - id: init
    type: agent
    context: new
    skills: [octo-xzf-init]
    prompt: |
      使用 octo-xzf-init skill 初始化 XZF Pipeline 工作环境。

      ═══ Feature Slug ═══
      IF $inputs.feature 非空 → feature = "$inputs.feature"
      ELSE → 从 $inputs.idea 提取关键词生成 kebab-case slug（max 40 chars）
             格式: {verb}-{subject} 或 {topic}，例如 add-user-auth, fix-cart-total

      ═══ 目录结构 ═══
      基础目录: .octopus/xzf/$feature/
      子目录: 01-idea.md, 02-research/, 03-clarification/, 04-specs/,
              05-execution/, 06-reports/, 07-ship/

      workspace-topology.md 放在 .octopus/xzf/$feature/ 目录（每个 feature 独立拓扑，因为不同 feature 可能增删项目）。

      ═══ 写入 Idea 文件 ═══
      将用户 Idea 写入 .octopus/xzf/$feature/01-idea.md：

      ```
      # Idea
      ## 需求描述
      $inputs.idea

      ## Research 指引
      $inputs.research_guidance
      ```

      如 research_guidance 为空，写入：
      "（无特定指引 — 请根据 Idea 语义自行判断需要研究的 codebase 模块和外部技术）"

      汇报：分支名、feature slug、remote 类型、workspace 项目数。

      输出 vars_update:
      {"vars_update": {"branch": "{git branch}", "feature": "{feature slug}", "remote_type": "{github|gitlab}", "workspace_topology": "已生成"}}

  # ============================================================
  # Stage 1: Codebase 研究
  # ============================================================

  # --- 1a: 预扫描（秒级） ---
  - id: idea-scan
    type: bash
    depends_on: [init]
    bash: |
      BASE=".octopus/xzf/$vars.feature/02-research/_scan"
      mkdir -p "$BASE"

      # 文件结构概览
      find . -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.go" -o -name "*.py" -o -name "*.vue" -o -name "*.rs" \) \
        -not -path "*/node_modules/*" -not -path "*/.git/*" -not -path "*/dist/*" -not -path "*/build/*" \
        | sort > "$BASE/file-tree.txt"

      # 项目配置摘要
      for f in $(find . -maxdepth 3 \( -name "package.json" -o -name "go.mod" -o -name "Cargo.toml" -o -name "pyproject.toml" \) -not -path "*/node_modules/*"); do
        echo "=== $f ===" >> "$BASE/deps.txt"
        head -30 "$f" >> "$BASE/deps.txt"
        echo "" >> "$BASE/deps.txt"
      done

      # 项目文档
      find . -maxdepth 3 -name "CLAUDE.md" -exec sh -c 'echo "=== {} ==="; cat "{}"; echo ""' \; > "$BASE/claude-mds.txt"

      # 路由/API 入口
      grep -rn "router\.\|app\.\(get\|post\|put\|delete\|patch\)\|@\(Get\|Post\|Put\|Delete\)Mapping\|\.Route(" \
        --include="*.ts" --include="*.go" --include="*.py" --include="*.java" \
        -l 2>/dev/null | sort > "$BASE/api-entries.txt"

      # DB Schema / Migration
      find . -type f \( -name "*.migration.*" -o -name "*schema*" -o -name "*.entity.*" -o -path "*/migrations/*" \) \
        -not -path "*/node_modules/*" | sort > "$BASE/db-schemas.txt"

      # 测试配置
      find . -maxdepth 3 \( -name "vitest.*" -o -name "jest.*" -o -name "playwright.*" -o -name "*.test.*" -o -name "*.spec.*" \) \
        -not -path "*/node_modules/*" -not -path "*/dist/*" \
        | head -50 | sort > "$BASE/test-config.txt"

      echo "Scan complete."

  # --- 1b: 并行领域研究（swarm review） ---
  - id: idea-research
    type: swarm
    depends_on: [idea-scan]
    mode: review
    context_tier: "200k"
    expert_defaults:
      skills: [octo-xzf-research]
      tools: [Read, Grep, Glob, Bash, WebFetch, WebSearch]
    topic: |
      ═══ Codebase 领域研究 ═══

      Idea: 请读取 .octopus/xzf/$vars.feature/01-idea.md
      Workspace: 请读取 .octopus/xzf/$vars.feature/workspace-topology.md

      ⚠️ 如 01-idea.md 包含「Research 指引」，按指引聚焦研究范围。

      预扫描结果（用于快速定位，避免盲读）:
      - 文件树: .octopus/xzf/$vars.feature/02-research/_scan/file-tree.txt
      - 依赖摘要: .octopus/xzf/$vars.feature/02-research/_scan/deps.txt
      - 项目文档: .octopus/xzf/$vars.feature/02-research/_scan/claude-mds.txt
      - API 入口: .octopus/xzf/$vars.feature/02-research/_scan/api-entries.txt
      - DB Schema: .octopus/xzf/$vars.feature/02-research/_scan/db-schemas.txt
      - 测试配置: .octopus/xzf/$vars.feature/02-research/_scan/test-config.txt

      每位专家独立研究自己的领域，基于 _scan/ 预扫描数据。
      每位专家将研究发现写入: .octopus/xzf/$vars.feature/02-research/{domain}.md
      研究方法和输出格式参见 octo-xzf-research skill。

      ⚠️ 每位专家发言控制在 1500 字以内。详细分析写入指定文件，发言只放关键发现、GAPS 和决策点。
    experts:
      - role: senior-architect
        agent_file: .claude/agents/octo-xzf-architect.md
        task: |
          研究: 整体架构、模块边界、跨项目通信、核心模式
          写入: 02-research/architecture.md
          额外: 如发现未覆盖领域，标记 ## GAPS
      - role: backend-expert
        agent_file: .claude/agents/octo-xzf-backend-expert.md
        task: |
          研究: 后端服务架构、DB schema、API 实现模式
          外部: 如有外部平台 API 对接需求，使用 WebFetch 调研
          写入: 02-research/backend.md
      - role: frontend-expert
        agent_file: .claude/agents/octo-xzf-frontend-expert.md
        task: |
          研究: 前端组件结构、状态管理、路由、UI 框架
          写入: 02-research/frontend.md
      - role: test-architect
        agent_file: .claude/agents/octo-xzf-test-architect.md
        task: |
          研究: 测试框架、测试模式、CI 配置、测试数据策略
          写入: 02-research/testing.md
      - role: security-expert
        agent_file: .claude/agents/octo-xzf-security-expert.md
        task: |
          研究: 认证实现、权限模型、安全中间件、密钥管理
          写入: 02-research/security.md
    host:
      role: research-indexer
      prompt: |
        读取 02-research/ 下所有 .md 文件（不含 _scan/）。
        写入 .octopus/xzf/$vars.feature/02-research/index.md 索引文件，格式：

        | 文件 | 领域 | 关键发现 | 与 Idea 关系 |
        |------|------|---------|-------------|

        如有 GAPS，汇总到索引末尾。不重写内容。
        Synthesis 输出索引摘要即可。

  # ============================================================
  # Stage 2a: 需求澄清循环
  # ============================================================

  - id: requirements-clarify-loop
    type: loop
    depends_on: [idea-research]
    max_iterations: 99
    break_when: '$vars.clarify_decision == "proceed" && $vars.requirements_checklist_status == "COMPLETE"'
    nodes:
      - id: requirements-clarify
        type: agent
        skills: [octo-xzf-clarify]
        prompt: |
          ═══ 需求澄清 — Round $iteration ═══

          读取:
          - Idea: .octopus/xzf/$vars.feature/01-idea.md
          - Research: .octopus/xzf/$vars.feature/02-research/index.md
          - Workspace: .octopus/xzf/$vars.feature/workspace-topology.md

          用户上轮回复:
          $requirements-approval.output.comment

          职责: 需求澄清 — 功能边界、优先级、用户场景、技术约束。
          不涉及测试环境和验证方式（下一阶段处理）。

          澄清方法论、问题格式、Round 流程参见 octo-xzf-clarify skill。
          输出: .octopus/xzf/$vars.feature/03-clarification/questions.md

          ⚠️ 最终输出（last_output）只包含 Synthesis 内容（「待澄清」+「用户补充」原样输出）。
          下游 approval 直接引用 $requirements-clarify.output.last_output 展示给用户。

          最后输出 vars_update JSON:
          {"vars_update": {"requirements_checklist_status": "COMPLETE 或 INCOMPLETE: ..."}}

      - id: requirements-approval
        type: approval
        depends_on: [requirements-clarify]
        execute_when: '$vars.clarify_decision != "proceed" || $vars.requirements_checklist_status != "COMPLETE"'
        comment_label: "澄清输入:"
        comment_placeholder: "请在此输入您对以上问题的回答..."
        prompt: |
          Round $iteration | 📁 03-clarification/questions.md
          未回答的问题将采用推荐方案。
          $requirements-clarify.output.last_output
        options:
          - label: "继续讨论"
            value: "continue"
          - label: "进入验证澄清"
            value: "proceed"
        outputs:
          $vars.clarify_decision: "$last_output"

  # ============================================================
  # Stage 2b: 验证方式与测试环境澄清循环
  # ============================================================

  - id: verification-clarify-loop
    type: loop
    depends_on: [requirements-clarify-loop]
    max_iterations: 99
    break_when: '$vars.verify_decision == "proceed" && $vars.env_checklist_status == "COMPLETE"'
    nodes:
      - id: verification-clarify
        type: agent
        skills: [octo-xzf-clarify]
        prompt: |
          ═══ 验证方式与测试环境澄清 — Round $iteration ═══

          读取:
          - Idea: .octopus/xzf/$vars.feature/01-idea.md
          - Research: .octopus/xzf/$vars.feature/02-research/index.md
          - 已澄清需求: .octopus/xzf/$vars.feature/03-clarification/questions.md
          - Workspace: .octopus/xzf/$vars.feature/workspace-topology.md

          用户上轮回复:
          $verification-approval.output.comment

          职责: 验证方式与测试环境澄清。必须明确以下内容:
          1. 测试环境配置（DB、端口、依赖服务、mock 策略）
          2. 验证方法（单元测试、E2E、手动验证标准）
          3. 测试数据策略
          4. CI 集成方式

          敏感凭据强制澄清（账号/中间件连接/数据集）参见 octo-xzf-clarify skill。

          澄清方法论、问题格式、Round 流程参见 octo-xzf-clarify skill。
          输出: .octopus/xzf/$vars.feature/03-clarification/verification.md

          ⚠️ 最终输出（last_output）只包含 Synthesis 内容（「待澄清」+「用户补充」原样输出）。
          下游 approval 直接引用 $verification-clarify.output.last_output 展示给用户。

          最后输出 vars_update JSON:
          {"vars_update": {"env_checklist_status": "COMPLETE 或 INCOMPLETE: ..."}}

      - id: verification-approval
        type: approval
        depends_on: [verification-clarify]
        execute_when: '$vars.verify_decision != "proceed" || $vars.env_checklist_status != "COMPLETE"'
        comment_label: "澄清输入:"
        comment_placeholder: "请在此输入您对验证方式的回答..."
        prompt: |
          Round $iteration | 环境: $vars.env_checklist_status | 📁 03-clarification/verification.md
          ⚠️ INCOMPLETE 时必须补全才能进入下一阶段。
          $verification-clarify.output.last_output
        options:
          - label: "继续讨论"
            value: "continue"
          - label: "确认"
            value: "proceed"
        outputs:
          $vars.verify_decision: "$last_output"

  # ============================================================
  # Stage 3: 需求简报（综合澄清结果 → brief.md）
  # ============================================================

  - id: brief-maker
    type: agent
    depends_on: [verification-clarify-loop]
    skills: [octo-xzf-brief-maker]
    prompt: |
      使用 octo-xzf-brief-maker skill 生成需求简报。

      读取:
      - Idea: .octopus/xzf/$vars.feature/01-idea.md
      - 需求澄清: .octopus/xzf/$vars.feature/03-clarification/questions.md
      - 验证方式: .octopus/xzf/$vars.feature/03-clarification/verification.md
      - Workspace: .octopus/xzf/$vars.feature/workspace-topology.md

      输出: .octopus/xzf/$vars.feature/03-clarification/brief.md

      原则: 只保留结论，不保留讨论过程。下游节点只读 brief.md。
      裁剪无内容章节。确保每个验收标准有验证方法。

  # ============================================================
  # Stage 4: Spec + Task 生成（单 agent，一次完成）
  # ============================================================

  - id: spec-planner
    type: agent
    depends_on: [brief-maker]
    skills: [octo-xzf-spec-designer]
    prompt: |
      使用 octo-xzf-spec-designer skill 生成所有 spec 和 tracer bullet tasks。

      读取:
      - 需求简报: .octopus/xzf/$vars.feature/03-clarification/brief.md
      - Research 知识: .octopus/xzf/$vars.feature/02-research/index.md
      - Workspace: .octopus/xzf/$vars.feature/workspace-topology.md

      ═══ 输出 ═══
      1. 每个 spec 写入:
         .octopus/xzf/$vars.feature/04-specs/spec-NNN-{name}.md
      2. 每个 spec 的 tracer bullets 写入子目录:
         .octopus/xzf/$vars.feature/04-specs/spec-NNN-{name}/T-N-{name}.md
         简单 spec（1-2 个 task）可不建子目录
      3. 生成索引: .octopus/xzf/$vars.feature/04-specs/spec-index.md
         （按执行顺序: # | 文件名 | 标题 | Tracer Bullets 数 | Depends）
      4. 若有遗留文件（重跑），先清空 04-specs/ 再写入

      ═══ 原则 ═══
      - 简单需求 → 1 个 spec 即可，不强制拆分
      - Task 用垂直切片（tracer bullet）：每个 task 横穿全栈，独立可验证
      - Task 描述用户视角："用户能做什么"，不写"改什么文件"
      - 不写文件路径，agent 自行决定实现方式
      - 每个 spec 必须定义反假跑标准（区分"真通过"vs"假通过"）
      - 格式参见 octo-xzf-spec-designer skill

      最后输出 vars_update JSON:
      {"vars_update": {"spec_count": N}}

  # ============================================================
  # Stage 5: 任务执行（per spec → per tracer bullet 循环）
  # ============================================================

  - id: execution-loop
    type: loop
    depends_on: [spec-planner]
    max_iterations: 99
    break_when: "$vars.current_spec >= $vars.spec_count"
    nodes:
      - id: execute-spec-tasks
        type: agent
        context: new
        skills: [octo-xzf-implementer]
        tools: [Read, Write, Edit, Bash, Grep, Glob]
        prompt: |
          你是全栈实现者，使用 octo-xzf-implementer skill 执行当前 spec 的所有 tracer bullets。
          当前 spec 序号: $vars.current_spec + 1（0-based，+1 后对应 spec-index 第 N 行）

          ═══ 用户指导（上次失败后提供）═══
          $vars.user_guidance

          如有用户指导，结合指导分析上次失败原因并调整策略。

          ═══ 执行流程 ═══
          1. 读取 Spec 索引: .octopus/xzf/$vars.feature/04-specs/spec-index.md
          2. 找到第 ($vars.current_spec + 1) 行对应的 spec 文件
          3. 读取 spec 文件 + 子目录下所有 T-N-*.md（tracer bullets）
          4. 检查 checkpoint: .octopus/xzf/$vars.feature/05-execution/spec-{NNN}/checkpoint.json
          5. IF checkpoint 存在 → 跳过已完成 task，从断点恢复
          6. IF 不存在 → 从头开始

          ═══ 执行每个 tracer bullet ═══
          按依赖顺序逐个执行:
          - 读取 T-N.md 的目标和验收标准
          - 实现（全栈：DB → API → UI → test）
          - 验证（对照 spec 反假跑标准，确保"真通过"）
          - 自治 verify-fix 循环（max 3 次）
          - 通过后更新 checkpoint.json（严格按 octo-xzf-implementer skill 的 Schema）
          - 失败时写入 checkpoint + 生成失败报告到 06-reports/

          ═══ 完成 ═══
          通过: {"vars_update": {"spec_status": "passed", "user_guidance": "", "current_spec": <当前值+1>}}
          失败: {"vars_update": {"spec_status": "failed", "failure_reason": "..."}}
          ⚠️ current_spec 是 0-based 整数。通过时输出当前值 +1（如当前 0 → 输出 1）。失败时不包含 current_spec（保持原值重试）。
        outputs:
          $vars.spec_status: "$last_output"

      # --- 失败 → 暂停等用户指导 ---
      - id: failure-approval
        type: approval
        depends_on: [execute-spec-tasks]
        execute_when: '$vars.spec_status == "failed"'
        prompt: |
          Spec #$iteration 失败 | 📁 06-reports/ | Checkpoint: 05-execution/
          在评论中输入修复指导，从断点恢复重试。
        options:
          - label: "重试"
            value: "retry"
        outputs:
          $vars.user_guidance: "$last_output.comment"

  # ============================================================
  # Stage 6: Ship 交付
  # ============================================================

  - id: ship
    type: agent
    depends_on: [execution-loop]
    context: new
    skills: [octo-xzf-ship]
    tools: [Read, Bash, Grep, Glob]
    prompt: |
      使用 octo-xzf-ship skill 完成 Ship 交付。

      ═══ Step 1: 生成 PR/MR Summary ═══
      读取以下文件，生成 summary:
      - 需求简报: .octopus/xzf/$vars.feature/03-clarification/brief.md
      - Specs: .octopus/xzf/$vars.feature/04-specs/
      - 验证结果: .octopus/xzf/$vars.feature/05-execution/

      写入: .octopus/xzf/$vars.feature/07-ship/summary.md

      ═══ Step 2: 遍历 Workspace 所有项目提交 PR/MR ═══
      Remote 类型: $vars.remote_type
      分支: $vars.branch

      读取 workspace-topology.md 获取所有项目列表。
      对每个项目:
        1. cd 到项目目录
        2. git diff --quiet main...HEAD → 无变更则跳过
        3. 有变更则提交 PR/MR:

      IF remote_type == "github":
        gh pr create --title "[{project}] {feature标题}" --body-file summary.md --base main
      ELIF remote_type == "gitlab":
        glab mr create --title "[{project}] {feature标题}" --description "$(cat summary.md)" --target-branch main

      汇总所有 PR/MR URL，输出最终结果。
