# yaml-language-server: $schema=./workflow-schema.json
apiVersion: octopus/v1
kind: Workflow

# ============================================================
# XZF Development Pipeline
# Idea → PR/MR 完整开发流水线
# ============================================================

name: xzf-pipeline
description: |
  从 Idea 到 PR/MR 的端到端开发流水线。
  6 位专家（架构师、产品经理、测试架构师、前端、后端、安全）通过
  swarm debate 进行多轮讨论，故事驱动迭代，验证先行。
version: 1.0.0

# --- 全局配置 ---
engine: claude
model: pro
timeout: 86400          # 全局超时 24h

# --- 输入 ---
inputs:
  idea:
    description: "你的 Idea — 描述想要实现的功能或需求"
    required: true
  research_guidance:
    description: "Research 指引（可选）— 指定需要重点研究的 codebase 模块或外部技术。不提供则由模型根据 Idea 语义自行判断"
    required: false
    default: ""

# --- 变量 ---
variables:
  branch: ""
  workspace_topology: ""
  remote_type: ""
  user_decision: ""
  spec_count: "0"
  spec_status: ""
  env_checklist_status: ""
  pending_questions: ""
  spec_feedback: ""
  intervention_feedback: ""
  pr_url: ""
  pipeline_aborted: "false"

# --- 通知 ---
notify:
  on_failure:
    channel: xzf_hermes
    message: "[xzf-pipeline] 执行失败: $failed_node_id — $vars.branch"
  on_complete:
    channel: xzf_hermes
    message: "[xzf-pipeline] 完成: $vars.branch — PR/MR 已提交"

# ============================================================
# Stage 0: 初始化
# ============================================================

nodes:
  - id: init
    type: agent
    context: new
    skills: [octo-xzf-init]
    prompt: |
      使用 octo-xzf-init skill 初始化 XZF Pipeline 工作环境。
      汇报：分支名、remote 类型、workspace 项目数。

      ═══ 写入 Idea 文件 ═══
      初始化目录后，将用户的 Idea 写入 01-idea.md：

      ```
      # Idea
      ## 需求描述
      $inputs.idea

      ## Research 指引
      $inputs.research_guidance
      ```

      如 research_guidance 为空，写入：
      "（无特定指引 — 请根据 Idea 语义自行判断需要研究的 codebase 模块和外部技术）"

      输出 vars_update:
      {"vars_update": {"branch": "{git branch}", "remote_type": "{github|gitlab}", "workspace_topology": "已生成"}}

# ============================================================
# Stage 1: Codebase 研究
# ============================================================

  # --- 1a: 预扫描（秒级） ---
  - id: idea-scan
    type: bash
    depends_on: [init]
    command: |
      BASE=".octopus/xzf/$vars.branch/02-research/_scan"
      mkdir -p "$BASE"

      # 文件结构概览
      find . -type f \( -name "*.ts" -o -name "*.tsx" -o -name "*.go" -o -name "*.py" -o -name "*.vue" -o -name "*.rs" \) \
        -not -path "*/node_modules/*" -not -path "*/.git/*" -not -path "*/dist/*" -not -path "*/build/*" \
        | sort > "$BASE/file-tree.txt"

      # 项目配置摘要
      for f in $(find . -maxdepth 3 \( -name "package.json" -o -name "go.mod" -o -name "Cargo.toml" -o -name "pyproject.toml" \) -not -path "*/node_modules/*"); do
        echo "=== $f ===" >> "$BASE/deps.txt"
        head -30 "$f" >> "$BASE/deps.txt"
        echo "" >> "$BASE/deps.txt"
      done

      # 项目文档
      find . -maxdepth 3 -name "CLAUDE.md" -exec sh -c 'echo "=== {} ==="; cat "{}"; echo ""' \; > "$BASE/claude-mds.txt"

      # 路由/API 入口
      grep -rn "router\.\|app\.\(get\|post\|put\|delete\|patch\)\|@\(Get\|Post\|Put\|Delete\)Mapping\|\.Route(" \
        --include="*.ts" --include="*.go" --include="*.py" --include="*.java" \
        -l 2>/dev/null | sort > "$BASE/api-entries.txt"

      # DB Schema / Migration
      find . -type f \( -name "*.migration.*" -o -name "*schema*" -o -name "*.entity.*" -o -path "*/migrations/*" \) \
        -not -path "*/node_modules/*" | sort > "$BASE/db-schemas.txt"

      # 测试配置
      find . -maxdepth 3 \( -name "vitest.*" -o -name "jest.*" -o -name "playwright.*" -o -name "*.test.*" -o -name "*.spec.*" \) \
        -not -path "*/node_modules/*" -not -path "*/dist/*" \
        | head -50 | sort > "$BASE/test-config.txt"

      echo "Scan complete."

  # --- 1b: 并行领域研究（swarm dispatch） ---
  - id: idea-research
    type: swarm
    depends_on: [idea-scan]
    mode: dispatch
    rounds: 1
    context_tier: "200k"
    expert_defaults:
      skills: [octo-xzf-research]
      tools: [Read, Grep, Glob, Bash, WebFetch, WebSearch]
    topic: |
      ═══ Codebase 领域研究 ═══

      Idea: 请读取 .octopus/xzf/$vars.branch/01-idea.md
      Workspace: 请读取 .octopus/xzf/$vars.branch/workspace-topology.md

      ⚠️ 如 01-idea.md 包含「Research 指引」，按指引聚焦研究范围。

      预扫描结果（用于快速定位，避免盲读）:
      - 文件树: .octopus/xzf/$vars.branch/02-research/_scan/file-tree.txt
      - 依赖摘要: .octopus/xzf/$vars.branch/02-research/_scan/deps.txt
      - 项目文档: .octopus/xzf/$vars.branch/02-research/_scan/claude-mds.txt
      - API 入口: .octopus/xzf/$vars.branch/02-research/_scan/api-entries.txt
      - DB Schema: .octopus/xzf/$vars.branch/02-research/_scan/db-schemas.txt
      - 测试配置: .octopus/xzf/$vars.branch/02-research/_scan/test-config.txt

      每位专家将研究发现写入: .octopus/xzf/$vars.branch/02-research/{domain}.md
      研究方法和输出格式参见 octo-xzf-research skill。

      ⚠️ 每位专家发言控制在 1500 字以内。详细分析写入指定文件，发言只放关键发现、GAPS 和决策点。
    experts:
      - role: senior-architect
        agent_file: .claude/agents/octo-xzf-architect.md
        task: |
          研究: 整体架构、模块边界、跨项目通信、核心模式
          写入: 02-research/architecture.md
          额外: 如发现未覆盖领域，标记 ## GAPS
      - role: backend-expert
        agent_file: .claude/agents/octo-xzf-backend-expert.md
        task: |
          研究: 后端服务架构、DB schema、API 实现模式
          外部: 如有外部平台 API 对接需求，使用 WebFetch 调研
          写入: 02-research/backend.md
        depends_on: [senior-architect]
      - role: frontend-expert
        agent_file: .claude/agents/octo-xzf-frontend-expert.md
        task: |
          研究: 前端组件结构、状态管理、路由、UI 框架
          写入: 02-research/frontend.md
        depends_on: [senior-architect]
      - role: test-architect
        agent_file: .claude/agents/octo-xzf-test-architect.md
        task: |
          研究: 测试框架、测试模式、CI 配置、测试数据策略
          写入: 02-research/testing.md
        depends_on: [senior-architect]
      - role: security-expert
        agent_file: .claude/agents/octo-xzf-security-expert.md
        task: |
          研究: 认证实现、权限模型、安全中间件、密钥管理
          写入: 02-research/security.md
        depends_on: [senior-architect]
    host:
      role: research-indexer
      prompt: |
        读取 02-research/ 下所有 .md 文件（不含 _scan/）。
        写入 .octopus/xzf/$vars.branch/02-research/index.md 索引文件，格式：

        | 文件 | 领域 | 关键发现 | 与 Idea 关系 |
        |------|------|---------|-------------|

        如有 GAPS，汇总到索引末尾。不重写内容。
        Synthesis 输出索引摘要即可。

# ============================================================
# Stage 2: 需求澄清循环
# ============================================================

  - id: clarification-loop
    type: loop
    depends_on: [idea-research]
    max_iterations: 99
    break_when: '$vars.user_decision == "proceed"'
    nodes:

      # --- 2a. 专家团头脑风暴 ---
      - id: brainstorm
        type: swarm
        mode: debate
        rounds: 2
        context_tier: "200k"
        expert_defaults:
          skills: [octo-xzf-clarify]
        topic: |
          ═══ 需求澄清 — Round $iteration ═══

          输入:
          - Idea: .octopus/xzf/$vars.branch/01-idea.md
          - Research 知识: .octopus/xzf/$vars.branch/02-research/index.md
          - Workspace: .octopus/xzf/$vars.branch/workspace-topology.md

          用户上轮回复:
          $brainstorm-approval.output.comment

          输出: .octopus/xzf/$vars.branch/03-clarification/questions.md

          澄清方法论和问题格式参见 octo-xzf-clarify skill。

          ⚠️ 每位专家发言控制在 1500 字以内。详细问题清单写入 questions.md，发言只放核心澄清项和分歧点。
        experts:
          - role: senior-architect
            agent_file: .claude/agents/octo-xzf-architect.md
          - role: product-manager
            agent_file: .claude/agents/octo-xzf-product-manager.md
          - role: test-architect
            agent_file: .claude/agents/octo-xzf-test-architect.md
          - role: frontend-expert
            agent_file: .claude/agents/octo-xzf-frontend-expert.md
          - role: backend-expert
            agent_file: .claude/agents/octo-xzf-backend-expert.md
          - role: security-expert
            agent_file: .claude/agents/octo-xzf-security-expert.md
        host:
          role: clarify-host
          prompt: |
            综合专家意见。

            1. 将完整问题清单写入 .octopus/xzf/$vars.branch/03-clarification/questions.md
               （含已回答 ✅ + 待澄清 ❓，按 Round 标记）
            2. Synthesis 中列出本轮需要用户回答的待澄清问题：
               编号 + 问题 + 推荐方案 + 备选方案
            3. 测试环境状态评估（写入 VarPool 变量 env_checklist_status）：
               逐项检查强制清单 6 项，输出:
               - "COMPLETE" — 全部明确
               - "INCOMPLETE: {缺失项逗号分隔}" — 有未明确项

      # --- 2b. 用户审批（内联显示待澄清问题） ---
      - id: brainstorm-approval
        type: approval
        depends_on: [brainstorm]
        prompt: |
          ═══ 需求澄清 — Round $iteration ═══

          📁 完整文档: .octopus/xzf/$vars.branch/03-clarification/questions.md

          📋 测试环境状态: $vars.env_checklist_status

          ─── 本轮需要澄清的问题 ───

          $brainstorm_synthesis

          ─────────────────────────
          请在评论中回答问题。
          如部分问题未回答但选择"进入下一阶段"，将采用专家推荐方案。
          ⚠️ 如测试环境状态为 INCOMPLETE，建议在进入下一阶段前补全。
        options:
          - label: "回答并继续讨论"
            value: "continue"
          - label: "回答并进入下一阶段"
            value: "proceed"
          - label: "补充新的讨论话题"
            value: "add-topics"
        outputs:
          $vars.user_decision: "$last_output"

# ============================================================
# Stage 3: 故事总汇循环
# ============================================================

  - id: stories-loop
    type: loop
    depends_on: [clarification-loop]
    max_iterations: 99
    break_when: '$vars.user_decision == "proceed"'
    nodes:

      # --- 3a. 生成用户故事 ---
      - id: story-generation
        type: swarm
        mode: debate
        rounds: 2
        consensus_threshold: 0.75
        context_tier: "200k"
        expert_defaults:
          skills: [octo-xzf-story-writer]
        topic: |
          ═══ 用户故事总汇 — Round $iteration ═══

          输入:
          - Idea: .octopus/xzf/$vars.branch/01-idea.md
          - Research 知识: .octopus/xzf/$vars.branch/02-research/index.md
          - 澄清文档: .octopus/xzf/$vars.branch/03-clarification/questions.md
          - Workspace: .octopus/xzf/$vars.branch/workspace-topology.md

          用户上轮反馈:
          $story-approval.output.comment

          输出:
          - .octopus/xzf/$vars.branch/04-stories/summary.md
          - .octopus/xzf/$vars.branch/04-stories/technical-guide.md
          - .octopus/xzf/$vars.branch/04-stories/test-environment.md

          ⚠️ 每个故事标注 SERVICE_CHAIN。
          文档结构和格式参见 octo-xzf-story-writer skill。

          ⚠️ 每位专家发言控制在 1500 字以内。详细内容写入文件，发言只放故事线要点和服务链分歧。
        experts:
          - role: senior-architect
            agent_file: .claude/agents/octo-xzf-architect.md
          - role: product-manager
            agent_file: .claude/agents/octo-xzf-product-manager.md
          - role: test-architect
            agent_file: .claude/agents/octo-xzf-test-architect.md
        host:
          role: story-host
          prompt: |
            综合专家意见，生成完整用户故事总汇文档、技术指导文档和测试环境配置。
            直接写入 04-stories/ 目录下三个文件:
            - summary.md（故事总汇）
            - technical-guide.md（技术约束 + 架构决策）
            - test-environment.md（测试环境完整配置，供 Stage 6 执行时读取）

            Synthesis 中列出故事摘要：
            每个故事一行：编号 + 标题 + 角色 + 服务链

      # --- 3b. 用户审批（内联显示故事摘要） ---
      - id: story-approval
        type: approval
        depends_on: [story-generation]
        prompt: |
          ═══ 用户故事总汇 — Round $iteration ═══

          📁 完整文档:
          - .octopus/xzf/$vars.branch/04-stories/summary.md
          - .octopus/xzf/$vars.branch/04-stories/technical-guide.md
          - .octopus/xzf/$vars.branch/04-stories/test-environment.md

          ─── 故事摘要 ───

          $story-generation_synthesis

          ─────────────────
          如满意，进入 Spec 设计阶段。
          如需修改，请在评论中说明。
        options:
          - label: "满意，进入 Spec 设计"
            value: "proceed"
          - label: "需要修改"
            value: "continue"
        outputs:
          $vars.user_decision: "$last_output"

# ============================================================
# Stage 4: Spec 设计
# ============================================================

  - id: spec-design-loop
    type: loop
    depends_on: [stories-loop]
    max_iterations: 99
    break_when: '$vars.user_decision == "proceed"'
    nodes:

      # --- 4a. 专家团拆分 Spec ---
      - id: spec-design
        type: swarm
        mode: debate
        rounds: 3
        consensus_threshold: 0.7
        context_tier: "200k"
        expert_defaults:
          skills: [octo-xzf-spec-designer]
        topic: |
          ═══ Spec 设计 ═══

          输入:
          - Idea: .octopus/xzf/$vars.branch/01-idea.md
          - Research 知识: .octopus/xzf/$vars.branch/02-research/index.md
          - 故事总汇: .octopus/xzf/$vars.branch/04-stories/summary.md
          - 技术指导: .octopus/xzf/$vars.branch/04-stories/technical-guide.md
          - Workspace: .octopus/xzf/$vars.branch/workspace-topology.md

          用户上轮反馈:
          $vars.spec_feedback

          输出: .octopus/xzf/$vars.branch/05-specs/spec-NNN-{name}.md

          Spec DSL 格式和拆分方法论参见 octo-xzf-spec-designer skill。

          ⚠️ 每位专家发言控制在 2000 字以内。Spec 详细设计写入文件，发言只放拆分方案、架构决策和分歧点。
        experts:
          - role: senior-architect
            agent_file: .claude/agents/octo-xzf-architect.md
          - role: product-manager
            agent_file: .claude/agents/octo-xzf-product-manager.md
          - role: test-architect
            agent_file: .claude/agents/octo-xzf-test-architect.md
            skills: [octo-xzf-task-planner]
          - role: frontend-expert
            agent_file: .claude/agents/octo-xzf-frontend-expert.md
          - role: backend-expert
            agent_file: .claude/agents/octo-xzf-backend-expert.md
          - role: security-expert
            agent_file: .claude/agents/octo-xzf-security-expert.md
            skills: [octo-xzf-task-planner]
        host:
          role: spec-host
          prompt: |
            综合专家意见，确定 Spec 拆分方案。
            直接写入各 spec 文件到 05-specs/ 目录。
            生成 05-specs/spec-index.md 索引文件（按执行顺序列出所有 spec 的文件名、标题、优先级、依赖）。

            Synthesis 中列出 spec 摘要：编号 + 文件名 + 标题 + Priority

            最后输出 vars_update JSON:
            {"vars_update": {"spec_count": N}}

      # --- 4b. 确认 Spec 设计 ---
      - id: spec-confirm
        type: approval
        depends_on: [spec-design]
        prompt: |
          ═══ Spec 设计完成 ═══

          共 $vars.spec_count 个 Spec:
          $spec-design_synthesis

          请查看 .octopus/xzf/$vars.branch/05-specs/ 目录下的 Spec 文件。

          确认拆分方案后进入任务计划阶段。
        options:
          - label: "确认，进入任务计划"
            value: "proceed"
          - label: "需要调整 Spec"
            value: "revise"
        outputs:
          $vars.user_decision: "$last_output"
          $vars.spec_feedback: "$last_output.comment"

# ============================================================
# Stage 5: 任务计划（per spec 循环）
# ============================================================

  - id: task-planning-loop
    type: loop
    depends_on: [spec-design-loop]
    max_iterations: 99    # break_when 是真正的退出条件，99 仅作为安全阀
    break_when: '$iteration > $vars.spec_count'
    nodes:

      # --- 5a. 为当前 spec 生成任务计划 ---
      - id: plan-spec
        type: swarm
        mode: dispatch
        rounds: 1
        context_tier: "200k"
        expert_defaults:
          skills: [octo-xzf-task-planner]
        topic: |
          ═══ 任务计划 — Spec #$iteration ═══

          读取 Spec 索引: .octopus/xzf/$vars.branch/05-specs/spec-index.md
          找到第 $iteration 行对应的 spec 文件，读取该 spec。

          Research 知识: 请读取 .octopus/xzf/$vars.branch/02-research/index.md 并根据话题读取对应领域文件
          Workspace 拓扑: 请读取 .octopus/xzf/$vars.branch/workspace-topology.md

          输出目录: .octopus/xzf/$vars.branch/06-plans/spec-{NNN}-{name}/

          任务拆解方法论和文档格式参见 octo-xzf-task-planner skill。

          ⚠️ 每位专家发言控制在 1500 字以内。详细任务文档写入文件，发言只放任务分配要点和接口契约。
        experts:
          - role: senior-architect
            agent_file: .claude/agents/octo-xzf-architect.md
            task: "制定技术总纲领 consensus.md，确定文件变更和接口契约"
          - role: test-architect
            agent_file: .claude/agents/octo-xzf-test-architect.md
            skills: [octo-xzf-spec-designer]    # 验证设计需参考 spec DSL 格式
            task: "设计验证方法 verify-*.md 和 E2E 测试路线 spec-test.md"
            depends_on: [senior-architect]
          - role: frontend-expert
            agent_file: .claude/agents/octo-xzf-frontend-expert.md
            task: "前端任务拆解 task-*-frontend.md"
            depends_on: [senior-architect]
          - role: backend-expert
            agent_file: .claude/agents/octo-xzf-backend-expert.md
            task: "后端任务拆解 task-*-backend.md"
            depends_on: [senior-architect]
          - role: security-expert
            agent_file: .claude/agents/octo-xzf-security-expert.md
            skills: [octo-xzf-spec-designer]    # 安全审查需参考 spec DSL 格式
            task: "审查安全相关任务，补充安全验证项"
            depends_on: [senior-architect, test-architect]
        host:
          role: plan-host
          prompt: |
            综合各专家输出，检查一致性并作为 synthesis 输出:
            1. consensus.md 中接口契约是否一致
            2. verify 和 task 编号是否对齐
            3. spec-test.md 是否覆盖完整故事线
            4. 列出检测到的不一致（如有）

            所有文件内容由专家直接写入 06-plans/ 目录，host 不写文件。

# ============================================================
# Stage 6: 任务执行（per spec → per task 循环）
# ============================================================

  - id: execution-loop
    type: loop
    depends_on: [task-planning-loop]
    max_iterations: 99    # break_when 是真正的退出条件，99 仅作为安全阀
    break_when: '$iteration > $vars.spec_count'
    nodes:

      # --- 6a. 执行当前 spec 的所有 task ---
      - id: execute-spec-tasks
        type: agent
        context: new
        skills: [octo-xzf-orchestrator]
        agents:
          backend-expert:
            description: "后端实现 — 自治 verify-fix (max 3)"
            agent_file: .claude/agents/octo-xzf-backend-expert.md
            skills: [octo-xzf-implementer]
            tools: [Read, Write, Edit, Bash, Grep, Glob]
          frontend-expert:
            description: "前端实现 — 自治 verify-fix (max 3)"
            agent_file: .claude/agents/octo-xzf-frontend-expert.md
            skills: [octo-xzf-implementer]
            tools: [Read, Write, Edit, Bash, Grep, Glob]
          test-expert:
            description: "E2E 验证 — 自治 E2E-fix (max 3)"
            agent_file: .claude/agents/octo-xzf-test-architect.md
            skills: [octo-xzf-implementer]
            tools: [Read, Write, Edit, Bash, Grep, Glob]
        prompt: |
          你是执行协调者（线性委派器），使用 octo-xzf-orchestrator skill 编排 Spec #$iteration。

          ═══ 你的唯一职责：排序 + 委派 + 检查结果 ═══
          ⚠️ 你不实现代码、不运行测试、不修复 bug。
          verify-fix 循环在子代理内部完成（octo-xzf-implementer skill）。

          ═══ 初始化 ═══
          1. 读取 Spec 索引: .octopus/xzf/$vars.branch/05-specs/spec-index.md
          2. 找到第 $iteration 行对应的 spec 文件
          3. 列出 06-plans/spec-{NNN}-{name}/ 下所有文件名（不读内容）
          4. 读取共识文档: 06-plans/spec-{NNN}-{name}/consensus.md
          5. 读取测试环境: .octopus/xzf/$vars.branch/04-stories/test-environment.md

          ═══ 环境就绪检查 ═══
          读取 test-environment.md 的「环境就绪检查」清单，
          确认服务已启动、DB 已连接、E2E 工具可用。
          未就绪则尝试自动准备（Bash 启动服务），仍失败则报告 failed。

          ═══ Phase 1: 按依赖顺序委派实现任务 ═══
          从 consensus.md 和文件名 (task-X-Y-project-role.md) 确定执行顺序：
          1. Migration / Schema 变更 → delegate_to_backend-expert
          2. 后端 DAO → Service → Controller → delegate_to_backend-expert
          3. 前端组件 → 页面 → 集成 → delegate_to_frontend-expert

          对每个 task:
            a. delegate_to_{role}-expert(task: |
               执行任务。请先 Read:
               - 任务: 06-plans/spec-NNN/{task-file}
               - 共识: 06-plans/spec-NNN/consensus.md
               - 环境: 04-stories/test-environment.md
               按 octo-xzf-implementer skill 的自治 verify-fix 流程执行。
            )
            b. 解析子代理返回 JSON（status: passed/failed）
            c. IF status == "passed": 记录通过，继续下一个 task
            d. IF status == "failed":
               - 记录失败原因到 fix-log.md
               - 重新委派同一 task（携带上次 failure_reason + fix_attempts）
               - 解析新返回 JSON
               - IF 仍然 failed → spec_status: "failed"，停止

          ═══ Phase 2: E2E 验证 ═══
          所有 task 通过后:
            a. delegate_to_test-expert(task: |
               执行 E2E 验证。请先 Read:
               - 测试路线: 06-plans/spec-NNN/spec-test.md
               - 环境: 04-stories/test-environment.md
               按 octo-xzf-implementer skill 的自治 E2E-fix 流程执行。
            )
            b. 解析返回 JSON
            c. IF status == "passed": spec 完成
            d. IF status == "failed":
               - 重新委派 test-expert（携带上次失败信息）
               - 仍然 failed → spec_status: "failed"

          ═══ 完成 ═══
          所有验证通过: {"vars_update": {"spec_status": "passed"}}
          失败: {"vars_update": {"spec_status": "failed", "failure_reason": "..."}}
        outputs:
          $vars.spec_status: "$last_output"

      # --- 6b. 检查执行结果 ---
      - id: check-spec-result
        type: condition
        depends_on: [execute-spec-tasks]
        cases:
          - when: '$vars.spec_status == "failed"'
            then: handle-failure
          - when: "default"
            then: spec-passed

      # --- 6c. 失败处理 ---
      - id: handle-failure
        type: agent
        context: new
        prompt: |
          ═══ Spec #$iteration 执行失败 ═══

          生成失败报告:
          .octopus/xzf/$vars.branch/08-reports/failure-{timestamp}.md

          报告内容:
          - 失败位置 (Spec/Task/Verify)
          - 失败原因详细分析
          - 已尝试的修复 (最多 3 次)
          - 现场保留 (代码 diff、日志、截图)
          - 建议的人工干预方案

          发送通知到 xzf_hermes 群。

      # --- 6d. 等待人工干预 ---
      - id: human-intervention
        type: approval
        depends_on: [handle-failure]
        approval_timeout: 86400    # 24 小时超时
        prompt: |
          ═══ 执行失败 — 等待人工干预 ═══

          Spec #$iteration 执行失败。
          请查看失败报告: .octopus/xzf/$vars.branch/08-reports/

          选择下一步操作:
        options:
          - label: "重试当前 Spec"
            value: "retry"
          - label: "跳过当前 Spec，继续下一个"
            value: "skip"
          - label: "终止流水线"
            value: "abort"
        outputs:
          $vars.user_decision: "$last_output"
          $vars.intervention_feedback: "$last_output.comment"

      # --- 6e. 处理用户干预决策 ---
      - id: intervention-router
        type: condition
        depends_on: [human-intervention]
        cases:
          - when: '$vars.user_decision == "abort"'
            then: execution-abort
          - when: '$vars.user_decision == "retry"'
            then: execute-spec-tasks
          - when: '$vars.user_decision == "skip"'
            then: skip-spec
          - when: "default"
            then: spec-passed

      # --- 6f. 跳过当前 spec（记录日志） ---
      - id: skip-spec
        type: agent
        context: new
        prompt: |
          ═══ 跳过 Spec #$iteration ═══

          用户选择跳过当前 spec。
          记录跳过原因到 .octopus/xzf/$vars.branch/08-reports/skip-spec-$iteration.md:
          - 跳过的 spec 标识
          - 用户反馈: $vars.intervention_feedback
          - 失败报告引用

          输出:
          {"vars_update": {"spec_status": "skipped"}}

      # --- 6g. Spec 通过 ---
      - id: spec-passed
        type: bash
        command: |
          echo "Spec #$iteration 执行通过"

  # --- 6h. 终止执行标记 ---
  - id: execution-abort
    type: agent
    context: new
    prompt: |
      ═══ 流水线终止 ═══
      用户选择终止执行。
      输出: {"vars_update": {"pipeline_aborted": "true"}}

# ============================================================
# Stage 7: Ship 交付
# ============================================================

  # --- 7a. 生成 PR/MR Summary ---
  - id: ship-summary
    type: agent
    execute_when: '$vars.pipeline_aborted != "true"'
    depends_on: [execution-loop]
    context: new
    skills: [octo-xzf-ship]
    prompt: |
      使用 octo-xzf-ship skill 生成 PR/MR Summary。

      输入:
      - Idea: .octopus/xzf/$vars.branch/01-idea.md
      - 故事: .octopus/xzf/$vars.branch/04-stories/summary.md
      - Specs: .octopus/xzf/$vars.branch/05-specs/
      - 验证结果: .octopus/xzf/$vars.branch/07-execution/

      输出: .octopus/xzf/$vars.branch/09-ship/summary.md

  # --- 7b. 检测 remote 并提交 ---
  - id: ship-submit
    type: bash
    depends_on: [ship-summary]
    command: |
      REMOTE_TYPE="$vars.remote_type"
      BRANCH="$vars.branch"
      SUMMARY=".octopus/xzf/$BRANCH/09-ship/summary.md"
      TITLE=$(head -1 "$SUMMARY" | sed 's/^# //')

      if [ "$REMOTE_TYPE" = "github" ]; then
        gh pr create --title "$TITLE" --body-file "$SUMMARY" --base main
      elif [ "$REMOTE_TYPE" = "gitlab" ]; then
        glab mr create --title "$TITLE" --description "$(cat "$SUMMARY")" --target-branch main
      else
        echo "Unknown remote type: $REMOTE_TYPE"
        echo "请手动提交 PR/MR，summary 文件位于: $SUMMARY"
      fi
    outputs:
      $vars.pr_url: "$last_output"

  # --- 7c. 确认提交 ---
  - id: ship-confirm
    type: approval
    depends_on: [ship-submit]
    prompt: |
      ═══ Ship 完成 ═══

      PR/MR: $vars.pr_url

      请确认提交结果。
    options:
      - label: "确认完成"
        value: "done"
      - label: "需要修改"
        value: "revise"