# yaml-language-server: $schema=./doc/workflow-schema.json
#
# ⚠️ 节点同步约定（v3 Always-Deliver / Harness 设计）
# 以下节点在 prd-impl.yaml 和 prd-impl-e2e-resume.yaml 之间必须保持一致：
#   host-audit / e2e-setup / real-e2e-ui / e2e-completeness-round /
#   e2e-teardown / pre-pr-cleanup / delivery-audit
# 修改任一文件中的这些节点时，必须同步另一份。
# 引擎未提供节点级 import/include，靠本注释纪律维护。
#
apiVersion: octopus/v1
kind: Workflow
name: prd-impl
description: >
  PRD Implementation Flow — 消费 PRD Forge 产出，按交付物类型智能路由实现路径。
  流程: Setup → Plan → Challenge → Route → Implement → Review+Fix → E2E → Ship。
  交付物类型自动检测: yaml-workflow (生成工作流 YAML) / monolith-code (单体代码) /
  split-code (前后端分离，走 Contract → Backend∥Frontend → Integrate) / docs-config (文档/配置)。
  PRD Given/When/Then 驱动 E2E 测试用例生成，独立 git worktree 隔离测试执行。

model: opus[1m]
engine: claude
execution_mode: auto
max_concurrent: 3
timeout: 86400

inputs:
  prd_dir:
    description: "PRD Forge 产出目录路径。链式执行时自动从 prd-forge 获取；独立运行时自动检测最新 PRD 目录。"
    required: false
    default: "$parent.var_pool.output_dir"
  base_branch:
    description: "PR 目标分支"
    required: false
    default: "main"
  enable_adversarial:
    description: "开启 Plan 阶段对抗审查（可行性审查 + 修正）"
    required: false
    default: "true"
  run_e2e:
    description: "是否运行 PRD 驱动的 E2E 验收测试"
    required: false
    default: "true"
  # 完整度固定为 100% strict 模式（所有维度必须 100% 覆盖），不再接受外部配置。
  # P0/P1 是质量分级：P0=核心功能(深度测试)，P1=增强功能(基本验证)。两者都必须 100% 实现和测试。
  completeness_max_rounds:
    description: "产品完整度验证最大轮数（每轮评估→修复→重测）"
    required: false
    default: "10"
  e2e_fix_rounds:
    description: "E2E 测试失败后的最大修复轮数"
    required: false
    default: "10"
  protected_ports:
    description: "E2E 期间不能杀死的端口列表（逗号分隔）。这些端口上运行的进程属于用户自身环境，e2e-setup 必须使用 --isolated 隔离端口而非杀占用进程。"
    required: false
    default: "3000,3001,3098,3099"
  impl_type:
    description: "交付物类型覆盖。auto=由 Plan 自动检测。可选: yaml-workflow / monolith-code / split-code / docs-config"
    required: false
    default: "auto"
  e2e_regenerate:
    description: "控制 e2e-case-bind 和 completeness-bind 的重新生成行为。auto=文件存在则跳过；e2e-cases=强制重新生成测试用例；completeness-checklist=强制重新生成检查清单；all=全部重新生成。"
    required: false
    default: "auto"
  e2e_project_rules:
    description: "E2E 项目特定规则。描述构建、启动、健康检查等命令。默认值适用于 Octopus 项目，其他项目请自定义。"
    required: false
    default: |
      ## E2E 项目规则
      - 构建命令: `pnpm build`
      - 启动隔离服务: `pnpm dev --isolated`（自动分配 hash 端口，不碰保护端口）
      - 健康检查: `GET /api/health`
      - 禁止直接运行子包 dev/start 脚本（pre-hooks 可能杀保护端口）
      - **重启规则**: 只允许 `kill $vars.e2e_dev_pid` 杀 e2e 隔离服务进程。禁止 `pgrep`/`pkill`/`lsof -ti :port | kill`/`kill-port`/`fuser -k`/`kill $(...)` 等广杀模式。重启后用 `nohup + disown` 启动，并在 vars_update 中更新 `e2e_dev_pid` 为新 PID。
      - ⛔ **保护端口**: 绝对不能触碰 3000, 3001, 3098, 3099。这些是用户自身的开发环境，任何杀进程操作都必须确认目标 PID 不在这些端口上。

variables:
  # ── PRD 文件路径 (Setup 填充) ──
  prd_final_file: ""
  requirements_file: ""
  solution_file: ""
  clarify_file: ""
  completeness_file: ""
  project_type: ""
  # ── PRD v2 分层文档 (Setup 填充) ──
  acceptance_cases_file: ""
  ui_file: ""
  ux_file: ""
  # ── PRD v3 范围契约 (Setup 填充) ──
  scope_file: ""
  scope_mode: "strict"

  # ── 宿主项目契约 (host-audit 填充) ──
  host_contract_file: ""
  host_has_ui: "false"
  project_path: ""

  # ── 交付物路由 (Plan 填充) ──
  impl_type: "auto"
  project_structure: ""

  # ── 环境 ──
  projects: ""
  pkg_manager: ""
  branch: ""
  display_name: ""
  notify_target: "telegram:xzf_hermes"

  # ── 产出文件 ──
  plan_file: ""
  plan_skeleton_file: ""
  plan_balance_report: ""
  plan_balance_passed: "false"
  plan_review_file: ""
  contract_file: ""
  conclusion: ""

  # ── Review ──
  review_blockers: "0"
  review_issues: ""
  completeness_score: "0"
  completeness_must_have_score: "0"
  completeness_passed: "false"
  completeness_exit_code: ""
  integration_passed: "false"

  # ── 失败原因记录（交给 on_workflow_failure 使用） ──
  failed_reason: ""

  # ── E2E ──
  e2e_cases_file: ""
  completeness_checklist_file: ""
  e2e_worktree: ""
  e2e_port: ""
  e2e_passed: "false"
  e2e_summary: ""
  e2e_results: ""
  e2e_total: "0"
  e2e_p0_count: "0"
  e2e_p1_count: "0"
  e2e_fail_count: "0"
  e2e_skipped: "0"
  e2e_excluded: "0"
  e2e_fix_rounds: "0"
  completeness_rounds: "0"
  completeness_missing: ""

  # ── E2E 环境（e2e-setup 写入） ──
  e2e_server_port: ""
  e2e_web_port: ""
  e2e_dev_pid: ""
  e2e_octopus_dir: ""
  e2e_workspace_id: ""
  e2e_sandbox_dir: ""

  # ── Real E2E UI（real-e2e-ui 写入） ──
  real_e2e_ui_passed: "false"
  real_e2e_ui_total: "0"
  real_e2e_ui_failed_list: ""
  real_e2e_ui_report: ""

  # ── 交付审计（delivery-audit 写入） ──
  audit_file: ""
  ready_to_merge: "false"
  scope_leak_count: "0"
  host_contract_violations: "0"
  pr_cleaned: "false"

  # ── E2E 测试结果（e2e-test-execute 写入，fix-loop 更新） ──
  e2e_p0_passed: "0"
  e2e_p1_passed: "0"
  e2e_fix_all_passed: "false"

  # ── Reality Check ──
  e2e_reality_issues: "0"
  e2e_reality_verified: "0"

  # ── E2E 完整度 R3 卡死检测 ──
  completeness_score_n1: "-:-"
  completeness_score_n2: "-:-"

  # ── Ship ──
  pr_urls: ""
  pr_count: "0"

  # ── 文档目录 ──
  output_dir: ""

  # ── 全局规则 ──
  workspace_rules: |
    ## 工作空间规范
    - 当前 cwd 是 octopus 聚合工作空间，不是单个 git 仓库
    - 项目在 ./projects/ 目录下，每个是独立的 git worktree
    - git 命令必须在具体项目目录内执行
    - **所有项目级命令必须在对应项目目录内执行**:
      - 构建/测试/启动/安装依赖等命令必须 cd 到 ./projects/{项目名}/ 再执行
      - 禁止在 workspace 根目录执行 pnpm dev / pnpm build 等项目命令
      - 示例: `cd projects/xzf-octopus && pnpm dev`

auto_answers:
  - pattern: ".*"
    answer: "proceed"

# ── Notify 子系统 ──
providers:
  hermes-cli:
    type: hermes
    timeout: 30
    min_severity: info

channels:
  default:
    provider: hermes-cli
    target: "telegram:xzf_hermes"

hooks:
  on_workflow_failure:
    - id: notify-failure
      type: notify
      channel: default
      template:
        severity: error
        title: "❌ $vars.display_name — 工作流失败"
        body: "📂 项目: $vars.projects | 🌿 $vars.branch\n🔴 失败节点: ${hook.failed_node_id | default:软失败（节点退出 0但 e2e 未达标）}\n⏱️ 已运行: ${hook.total_duration_ms | duration}\n\n💡 原因: ${vars.failed_reason | default:${hook.error | default:未提供}}"

  on_interrupt:
    - id: notify-interrupt
      type: bash
      timeout: 30
      bash: |
        DISPLAY_NAME="${vars.display_name:-PRD Impl Flow}"
        hermes send -t "$vars.notify_target" -q "⚠️ $DISPLAY_NAME — 工作流被中断
        📂 项目: ${vars.projects:-unknown} | 🌿 ${vars.branch:-unknown}
        🔧 原因: ${hook.interrupt_reason:-unknown}" 2>&1 || echo "WARN: hermes send failed"

  on_cancel:
    - id: notify-cancel
      type: bash
      timeout: 30
      bash: |
        hermes send -t "$vars.notify_target" -q "🛑 ${vars.display_name:-PRD Impl Flow} — 工作流已取消" 2>&1 || echo "WARN: hermes send failed"

  on_complete:
    - id: notify-complete
      type: notify
      channel: default
      template:
        severity: info
        title: "🏁 $vars.display_name — 工作流完成"
        body: "状态: $hook.final_status\n✅ 完成: $hook.completed_count / ⏭️ 跳过: $hook.skipped_count / ❌ 失败: $hook.failed_count / 📊 总计: $hook.total_count\n⏱️ 总耗时: ${hook.total_duration_ms | duration}"

  on_node_success:
    - id: notify-setup
      type: notify
      nodes: [setup]
      channel: default
      template:
        severity: info
        title: "🚀 $vars.display_name 启动"
        body: "📂 项目: $vars.projects\n📖 PRD: $inputs.prd_dir"

    - id: notify-plan-skeleton
      type: notify
      nodes: [plan-skeleton]
      channel: default
      template:
        severity: info
        title: "🧮 $vars.display_name — Plan Skeleton 完成"
        body: "🏷️ 交付物类型: $vars.impl_type\n📄 骨架: $vars.plan_skeleton_file\n\n💡 $vars.conclusion"

    - id: notify-plan-deepen
      type: notify
      nodes: [plan-deepen]
      channel: default
      template:
        severity: info
        title: "📋 $vars.display_name — Plan Deepen 完成"
        body: "📄 计划: $vars.plan_file\n\n💡 $vars.conclusion"

    - id: notify-plan-balance
      type: notify
      nodes: [plan-balance-check]
      channel: default
      template:
        severity: info
        title: "⚖️ $vars.display_name — Plan Balance 检查完成"
        body: "均衡通过: $vars.plan_balance_passed\n\n💡 $vars.conclusion"

    - id: notify-refine-plan
      type: notify
      nodes: [refine-plan]
      channel: default
      condition: '$inputs.enable_adversarial == "true" || $vars.plan_balance_passed == "false"'
      template:
        severity: info
        title: "😈✏️ $vars.display_name — Refine Plan 完成（合并后）"
        body: "📝 计划已审查与裁决\n⚖️ 均衡状态: $vars.plan_balance_passed\n\n💡 裁决结论: $vars.conclusion"

    - id: notify-implement
      type: notify
      nodes: [implement]
      channel: default
      template:
        severity: info
        title: "⚙️ $vars.display_name — Implement 完成"
        body: "🏷️ 类型: $vars.impl_type\n📂 项目: $vars.projects\n\n💡 $vars.conclusion"

    - id: notify-contract
      type: notify
      nodes: [contract]
      channel: default
      template:
        severity: info
        title: "📜 $vars.display_name — API 契约完成"
        body: "📄 $vars.contract_file\n\n💡 $vars.conclusion"

    - id: notify-backend
      type: notify
      nodes: [backend]
      channel: default
      template:
        severity: info
        title: "🏗️ $vars.display_name — Backend 完成"
        body: "💡 $vars.conclusion"

    - id: notify-frontend
      type: notify
      nodes: [frontend]
      channel: default
      template:
        severity: info
        title: "🎨 $vars.display_name — Frontend 完成"
        body: "💡 $vars.conclusion"

    - id: notify-integrate
      type: notify
      nodes: [integrate]
      channel: default
      template:
        severity: info
        title: "🔗 $vars.display_name — 集成验证通过"
        body: "💡 $vars.conclusion"

    - id: notify-review
      type: notify
      nodes: [review]
      channel: default
      template:
        severity: info
        title: "🔍 $vars.display_name — Review 完成"
        body: "🚫 Blockers: $vars.review_blockers\n📊 完整度: $vars.completeness_score%\n\n💡 $vars.conclusion"

    - id: notify-e2e-cases
      type: notify
      nodes: [e2e-case-bind]
      channel: default
      template:
        severity: info
        title: "🧪 $vars.display_name — E2E 用例绑定完成"
        body: "📊 总计: $vars.e2e_total (P0: $vars.e2e_p0_count)"

    - id: notify-e2e-pass
      type: notify
      nodes: [e2e-teardown]
      channel: default
      condition: '$vars.e2e_passed == "true"'
      template:
        severity: info
        title: "✅ $vars.display_name — E2E 通过"
        body: "📊 $vars.e2e_summary"

    - id: notify-e2e-fail
      type: notify
      nodes: [e2e-teardown]
      channel: default
      condition: '$vars.e2e_passed == "false"'
      template:
        severity: warn
        title: "🚫 $vars.display_name — E2E 未通过"
        body: "📊 $vars.e2e_summary\n⚠️ 代码仍会提交，请查看 PR 中的失败详情"

    - id: notify-ship
      type: notify
      nodes: [ship]
      channel: default
      template:
        severity: info
        title: "🚀 $vars.display_name — PR 已创建"
        body: "📊 PR 数量: $vars.pr_count\n🔗 $vars.pr_urls"

nodes:
  # ═══════════════════════════════════════════════════════════════
  # Phase 0: Setup — 环境准备 + PRD 验证
  # ═══════════════════════════════════════════════════════════════
  - id: setup
    type: agent
    timeout: 900
    prompt: |
      你正在执行 PRD Implementation Flow 的环境准备阶段。

      $vars.workspace_rules

      ## 输入
      - PRD 目录: $inputs.prd_dir

      ## 你的任务

      ### 1. 安装 superpowers-zh 技能
      ```bash
      npx superpowers-zh@latest --tool claude --force 2>&1 | head -5
      ```

      ### 2. 安装 agency-agents-zh 代理
      ```bash
      AGENTS_TARGET="$(pwd)/.claude/agents"
      mkdir -p "$AGENTS_TARGET"
      NEED_CLONE=false
      for agent in engineering-backend-architect engineering-frontend-developer engineering-code-reviewer engineering-security-engineer engineering-software-architect engineering-database-optimizer design-ui-designer testing-api-tester testing-accessibility-auditor testing-performance-benchmarker testing-evidence-collector testing-reality-checker; do
        [ ! -f "$AGENTS_TARGET/$agent.md" ] && NEED_CLONE=true && break
      done
      if [ "$NEED_CLONE" = "true" ]; then
        DEPS_DIR="$(pwd)/dependencies"
        mkdir -p "$DEPS_DIR"
        [ ! -d "$DEPS_DIR/agency-agents-zh" ] && git clone --depth 1 https://github.com/jnMetaCode/agency-agents-zh.git "$DEPS_DIR/agency-agents-zh" 2>&1
        REPO="$DEPS_DIR/agency-agents-zh"
        for f in backend-architect frontend-developer code-reviewer security-engineer software-architect database-optimizer; do
          [ -f "$REPO/engineering/engineering-$f.md" ] && cp "$REPO/engineering/engineering-$f.md" "$AGENTS_TARGET/"
        done
        [ -f "$REPO/design/design-ui-designer.md" ] && cp "$REPO/design/design-ui-designer.md" "$AGENTS_TARGET/"
        for f in api-tester accessibility-auditor performance-benchmarker evidence-collector reality-checker; do
          [ -f "$REPO/testing/testing-$f.md" ] && cp "$REPO/testing/testing-$f.md" "$AGENTS_TARGET/"
        done
      fi
      # testing-qa-engineer: 由 octopus setup 从 core-pack/agents/ 安装，此处仅做兜底检查
      [ ! -f "$AGENTS_TARGET/testing-qa-engineer.md" ] && echo "WARN: testing-qa-engineer.md 缺失，请运行 octopus setup"
      ```

      ### 3. 自动检测 PRD 目录（独立运行时）
      ```bash
      PRD_DIR="$inputs.prd_dir"
      if [ -z "$PRD_DIR" ] || echo "$PRD_DIR" | grep -q '^\$parent'; then
        PRD_DIR=$(ls -d ./docs/prd-forge/prd-*/ 2>/dev/null | sort -V | tail -1)
        [ -z "$PRD_DIR" ] && echo "ERROR: 未找到 PRD 目录" && exit 1
        PRD_DIR="${PRD_DIR%/}"
      fi
      ```

      ### 4. 验证 PRD 目录完整性
      检查必须文件: PRD-FINAL.md, 02-requirements.md, 03-solution.md, 00-clarify.md
      检查 v2 分层文档（允许不存在，供向后兼容旧 PRD）:
        - 06-acceptance-cases.md → 填充 acceptance_cases_file（不存在时会警告，e2e-case-bind 退化为从 requirements 推导）
        - 07-ui.md → 填充 ui_file（infrastructure 项目可为空）
        - 08-ux.md → 填充 ux_file（infrastructure 项目可为空）
      检查 v3 范围契约（允许不存在，供向后兼容）:
        - 02-scope.md → 填充 scope_file + scope_mode（从文件顶部提取 "模式: <strict/creative>"）。不存在时 scope_file 为空串，scope_mode 默认 "strict"。

      ### 5. 读取项目类型
      从 `00-clarify.md` 提取 (product/infrastructure/hybrid)

      ### 6. 检测项目环境
      遍历 `./projects/` 检测项目列表、包管理器、当前分支

      ### 7. 计算文档目录
      ```bash
      DOCS_ROOT="./docs"
      mkdir -p "$DOCS_ROOT"
      MAX_INDEX=0
      for dir in "$DOCS_ROOT"/prd-impl-*/; do
        [ -d "$dir" ] && INDEX=$(basename "$dir" | sed 's/prd-impl-0*//' | sed 's/^$/0/') && [ "$INDEX" -gt "$MAX_INDEX" ] 2>/dev/null && MAX_INDEX=$INDEX
      done
      OUTPUT_DIR="$DOCS_ROOT/prd-impl-$(printf "%03d" $((MAX_INDEX + 1)))"
      mkdir -p "$OUTPUT_DIR"
      ```

      ### 8. 计算 display_name

      ## 输出
      {"vars_update":{"prd_dir":"$PRD_DIR","prd_final_file":"$PRD_DIR/PRD-FINAL.md","requirements_file":"$PRD_DIR/02-requirements.md","solution_file":"$PRD_DIR/03-solution.md","clarify_file":"$PRD_DIR/00-clarify.md","completeness_file":"$PRD_DIR/05-completeness-review.md","acceptance_cases_file":"<$PRD_DIR/06-acceptance-cases.md 如存在，否则空串>","ui_file":"<$PRD_DIR/07-ui.md 如存在，否则空串>","ux_file":"<$PRD_DIR/08-ux.md 如存在，否则空串>","scope_file":"<$PRD_DIR/02-scope.md 如存在，否则空串>","scope_mode":"<从 02-scope.md 提取 strict/creative，不存在默认 strict>","project_type":"<type>","projects":"<项目名>","pkg_manager":"<包管理器>","branch":"<分支>","display_name":"<名称>","output_dir":"<文档目录>","project_path":"<主项目路径，例如 ./projects/xzf-octopus>","conclusion":"PRD 验证通过"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 0.5: Host Audit — 宿主项目契约扫描
  # 产出 host-contract.md，后续所有实现节点必读。
  # 违反走 review-fix 循环修复，不阻断主流程。
  # ═══════════════════════════════════════════════════════════════
  - id: host-audit
    type: agent
    depends_on: [setup]
    timeout: 900
    agents:
      architecture-explorer:
        description: "架构勘探员 — 定向提取后端架构信息"
        agent_file: ".claude/agents/architecture-explorer.md"
        model: sonnet
        tools: ["Read", "Write", "Grep", "Glob"]
      ui-system-auditor:
        description: "UI 系统审计员 — 定向提取前端约定"
        agent_file: ".claude/agents/engineering-frontend-developer.md"
        model: sonnet
        tools: ["Read", "Write", "Grep", "Glob"]
    prompt: |
      你是宿主项目契约生成器。后续所有实现节点必须遵守 host-contract.md。
      本节点防止 LLM 不看现有代码就凭空创造组件、另起炉灶。

      $vars.workspace_rules

      ## 项目路径
      $vars.project_path（如为空，默认扫 ./projects/ 下首个项目）

      ## 输出目录
      $vars.output_dir/host-contract/

      ## ⚡ 短路检查（最先执行）
      如果 `$vars.output_dir/host-contract.md` 已存在：
      1. Read 该文件前 10 行，提取 "是否含 UI" 和 "扫描时间"
      2. 扫描时间在 24h 内 → 直接输出 vars_update 并结束，不做任何扫描：
         {"vars_update":{"host_contract_file":"$vars.output_dir/host-contract.md","host_has_ui":"<从文件提取>","conclusion":"host-contract.md 已存在且在 24h 内，跳过扫描"}}
      3. 超过 24h → 读取旧文件作为 baseline，继续下方扫描

      ## ⛔ 扫描预算（你和子 Agent 都必须遵守）
      - **Glob 优先于 Read**：先 Glob 列文件名，从中挑选关键文件再 Read
      - **Read 预算**: 单个 Agent（含你自己和每个子 Agent）最多 Read 20 个文件
      - **Grep 定位法**：先 Grep 找到匹配文件，只 Read 匹配的
      - **入口优先**：只读 entry points（index.ts / main.go / app.py / lib.rs 等）
      - **禁止递归展开**：不要 `Glob **/*`，用 `Glob *` 看一级目录
      - **禁止读**：`node_modules/` `dist/` `build/` `.git/` `__tests__/` `*.test.*` `*.spec.*`

      ## Phase 1: 探针（你亲自做，不委派，目标 2 分钟内）

      用 Glob + Grep 快速建立项目地图：

      ### 1.1 识别项目结构
      Glob 各语言的清单文件：`package.json` / `pyproject.toml` / `Cargo.toml` / `go.mod` / `pom.xml` / `Gemfile`
      → 确定语言 / 包管理器 / 模块划分

      ### 1.2 识别入口文件
      Glob: `*/src/{index,main,app,lib}.{ts,js,py,go,rs,java}` 及类似模式
      → 确定各模块入口点

      ### 1.3 定位关键层
      Grep 关键模式（每种最多看 5 个匹配）：
      - `"router|Router|route|handler|controller"` → 路由/API 层
      - `"middleware|Middleware|interceptor"` → 中间件层
      - `"store|Store|repository|Repository"` → 数据层
      - `"tailwind|styled|css.*module|theme"` → 样式方案（判断是否有前端）

      ### 1.4 Read 关键文件（≤8 个）
      从以上结果中选最关键的文件 Read，提取：
      - 技术栈（框架/ORM/CSS 方案）
      - 构建/测试/启动命令
      - API 路径命名和错误格式

      ### 1.5 新项目快速通道
      如果 Phase 1 发现项目入口文件 < 5 个且无现有组件库/路由层：
      → 这是新项目，直接产出最小契约，跳过 Phase 2
      → 写 `$vars.output_dir/host-contract.md`（必须包含以下完整结构，空 sections 保留表头）：

      ```markdown
      # Host Project Contract
      项目: <项目名与路径>
      扫描时间: <ISO 时间>
      是否含 UI: false

      ## 必须复用的现有资产
      | 资产类别 | 路径 | 用法 |
      |----------|------|------|
      （新项目暂无现有资产）

      ## 路由 / API / 目录约定
      - <从 Phase 1 提取，如无则为空>

      ## 构建与启动命令
      - <从 Phase 1 提取>

      ## 强烈不建议
      - 不要引入与现有项目不一致的技术方案
      ```

      → 输出 vars_update 并结束

      ## Phase 2: 定向委派（子 Agent 直接写文件）

      ⚠️ 子 Agent 必须用 Write 工具将结果直接写入目标文件，然后只返回一行摘要。
      不要返回扫描全文——主 Agent 不需要读完整扫描结果。

      ### 2.1 委派 architecture-explorer
      给出精确目标（从 Phase 1 探针结果中选取具体文件路径）：

      "Read 以下文件并提取架构信息，用 Write 写入 $vars.output_dir/host-contract/01-architecture.md：
       - 路由文件: <从 Phase 1 Grep 结果中选取的具体路径，最多 5 个>
       - 中间件: <具体路径，最多 3 个>
       - 数据模型/Schema: <具体路径，最多 3 个>
       - 构建配置: package.json / Makefile 等
       提取: API 路径命名规则 / 错误响应格式 / 鉴权机制 / 数据库方案
       ⛔ Read 预算: 最多 15 个文件。
       写完后只返回一行: '已写入 01-architecture.md: <技术栈> / <N 个 API 端点> / <鉴权方式>'"

      ### 2.2 委派 ui-system-auditor（仅当 Phase 1 发现有前端项目时）
      "Read 以下文件并提取 UI 约定，用 Write 写入 $vars.output_dir/host-contract/02-ui-system.md：
       - 样式配置: tailwind.config / postcss.config 等
       - 组件清单: Glob components/ 目录列文件名（不读实现）
       - API 客户端: lib/api.* 或等价文件
       - 路由/页面: Glob pages/ 或 app/ 列文件名
       - 状态管理: Glob stores/ 或 store/ 列文件名 + Read 1 个 store 的导出签名
       提取: CSS 方案 / 组件库路径 / 状态管理方案 / HTTP 客户端封装
       ⛔ Read 预算: 最多 10 个文件。禁止读组件实现细节。
       写完后只返回一行: '已写入 02-ui-system.md: <CSS 方案> / <N 个组件> / <状态管理>'"

      ## Phase 3: 合成

      读两份子代理产物文件（Read 文件，不是从子 Agent 返回值读），
      结合 Phase 1 项目地图，合成 `$vars.output_dir/host-contract.md`：

      ```markdown
      # Host Project Contract

      项目: <项目名与路径>
      扫描时间: <ISO 时间>
      是否含 UI: <true / false>

      ## 必须复用的现有资产
      | 资产类别 | 路径 | 用法 |
      |----------|------|------|
      | 组件 | <从 02-ui-system.md 提取> | <用途> |
      | Hook | <从 02-ui-system.md 提取> | <用途> |
      | API 客户端 | <从 02-ui-system.md 提取> | 所有 HTTP |
      | Store | <从 02-ui-system.md 提取> | <用途> |

      ## 路由 / API / 目录约定
      - <从 01-architecture.md 提取>

      ## 构建与启动命令
      - <从 Phase 1 提取>

      ## 强烈不建议（违反会进 review_blockers）
      - 不要新建 packages/（如需新能力，在现有包内补充）
      - 不要引入新的 CSS 方案（与现有一致）
      - 不要绕过现有 API 客户端自己 fetch
      - 不要创建与现有组件功能重复的新组件
      - 不要重写现有错误中间件 / 鉴权机制
      ```

      ## 失败容忍
      子代理扫描失败不要退出：
      - architecture-explorer 失败 → 合成时标记"架构未扫描"，实现节点需自探索
      - ui-system-auditor 失败 → host_has_ui 标记为 unknown

      ## 输出
      {"vars_update":{"host_contract_file":"$vars.output_dir/host-contract.md","host_has_ui":"<true/false/unknown>","conclusion":"<3 句话总结宿主技术栈：后端框架 / 前端框架 / 核心复用资产个数>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 1: Plan — 两遍式规划（skeleton → deepen → balance-check）
  # 为什么拆三节点：避免 LLM context attention degradation 导致的
  # "前面阶段写详、后面阶段写略"问题。
  # ═══════════════════════════════════════════════════════════════
  - id: plan-skeleton
    type: agent
    depends_on: [host-audit]
    timeout: 7200
    prompt: |
      你是实现架构师。本节点只输出「阶段骨架」，不写任何阶段内部细节。

      $vars.workspace_rules

      ## 宿主项目契约（强制阅读）
      $vars.host_contract_file
      ⛔ 任何与契约冲突的实现会被下游 review 节点标记为 BLOCKER由 review-fix 循环修
      ⛔ 不要自创契约已列出可复用项。骨架阶段必须不带入与契约冲突的交付物

      ## 设计哲学
      LLM 在单轮输出中对"前面阶段"有 attention 偏差，导致后面阶段逐渐变浅。
      拆成「skeleton + deepen」两遍：骨架轮只判断阶段划分，深化轮逐阶段展开。

      ## PRD 输入（按优先级读取）
      1. 技术方案: $vars.solution_file
      2. 需求定义: $vars.requirements_file
      3. 验收用例: $vars.acceptance_cases_file（如为空则跳过）
      4. UI 规范: $vars.ui_file（如非空，必须 Read 前 50 行再决定 impl_type）
      5. UX 交互: $vars.ux_file（如非空，必须 Read 前 50 行再决定 impl_type）
      6. Idea 分析: $vars.clarify_file

      ## 你的任务

      ### 1. 判断 impl_type

      **⚠️ 这是本节点最关键的决策，必须基于证据判断，不要凭直觉。**

      | 类型 | 特征 |
      |------|------|
      | yaml-workflow | 交付物是工作流 YAML（无代码产出） |
      | monolith-code | 单体库/工具/CLI，无独立前端 |
      | split-code | 有独立前端（页面/UI）+ 后端（API/服务），需要并行开发 |
      | docs-config | 纯文档或配置文件 |

      如 $inputs.impl_type != "auto" 则使用该值，跳过以下判断。

      **split-code 判断信号（满足 ≥2 个应选 split-code）：**
      1. `$vars.ui_file` 非空且定义了 ≥3 个页面/组件
      2. `$vars.ux_file` 非空且包含用户旅程/页面状态机
      3. `$vars.project_type` 为 "hybrid" 或 "product"
      4. `$vars.solution_file` 中有独立的前端章节（页面/路由/UI）和后端章节（API/服务/数据模型）
      5. 项目中有独立的前端包（如 `packages/web-app/`、`src/pages/`、`src/components/`）和后端包（如 `packages/server/`、`src/api/`）

      **常见误判场景：**
      - Monorepo ≠ Monolith。pnpm workspace monorepo 中有 server + web-app 就是 split-code
      - "有 Web UI 组件" ≠ Monolith。如果 UI 是独立可交付的前端应用，就是 split-code
      - 如果 PRD 同时有 ui_file 和 solution_file 且 solution 包含 API 设计，几乎一定是 split-code

      **强制行为：** 如果 `$vars.ui_file` 或 `$vars.ux_file` 非空，你必须 Read 它们的前 50 行后再做判断。不要跳过。

      ### 2. 根据需求复杂度决定阶段数
      - **MVP/小型需求（<10 个 Story）**: 2-3 个阶段
      - **中型需求**: 3-4 个阶段
      - **复杂需求（>20 Story）**: 4-6 个阶段。超过 6 个阶段要重新评估是否拆 PRD。

      ### 3. 输出骨架（每阶段只写 6 个字段）
      以 markdown 表格保存到 `$vars.output_dir/plan.skeleton.md`：

      ```markdown
      # Implementation Plan Skeleton

      交付物类型: <impl_type>
      阶段总数: N
      预计交付: M Stories

      ## 阶段表

      | 阶段ID | 名称 | 目标 | 交付物 | 依赖 | 关联 Story |
      |--------|------|------|--------|------|--------------|
      | P1 | xxx | <一句话> | <文件清单> | - | STORY-1, STORY-3 |
      | P2 | xxx | <一句话> | <文件清单> | P1 | STORY-2 |
      | ... | ... | ... | ... | ... | ... |

      ## 每阶段预期体量
      | 阶段ID | 预计任务数 | 预计文件改动数 | 复杂度 |
      |--------|------------|----------------|--------|
      | P1 | 5-8 | 8-12 | low |
      ```

      ## 规则
      - 不要写任何阶段内部任务、文件路径、验收标准
      - 交付物只列出骨干よ（"API 路由、数据模型、首页 UI"）不需具体名称
      - 阶段之间依赖必须明确（后一阶段依赖上一阶段交付物）
      - 阶段体量预期要均衡：任务数上下限不能相差 2 倍以上

      ## 输出
      {"vars_update":{"plan_skeleton_file":"$vars.output_dir/plan.skeleton.md","impl_type":"<类型>","project_structure":"<split-code时必填>","conclusion":"<骨架阶段数与交付物类型总结>"}}

  - id: plan-deepen
    type: agent
    depends_on: [plan-skeleton]
    timeout: 86400
    skills:
      - writing-plans
    prompt: |
      使用 writing-plans 技能，基于骨架逐阶段展开完整计划。

      $vars.workspace_rules

      ## 宿主项目契约（强制阅读）
      $vars.host_contract_file
      ⛔ 交付物路径必须遵守契约中的目录约定
      ⛔ 任务必须复用契约中列出的现有资产，不要重复创建同名组件/服务/Hook

      ## 设计哲学
      本节点以「骨架」为输入，逐阶段充填详细任务。每个阶段必须达到相同深度，
      绝对不允许"前面阶段任务详细、后面阶段只写一句话"。

      ## 输入
      - 骨架: $vars.plan_skeleton_file（必读）
      - 技术方案: $vars.solution_file
      - 需求定义: $vars.requirements_file
      - 验收用例: $vars.acceptance_cases_file
      - UI 规范: $vars.ui_file
      - UX 交互: $vars.ux_file
      - Idea: $vars.clarify_file

      ## 深化要求

      ### 1. 逐阶段独立充填
      重要：**一个阶段写完再写下一个**，不要从头到尾一次过。
      每个阶段必须包含以下完整信息：

      ```markdown
      ## P{N}: <阶段名称>

      **目标**: ...
      **交付物**: 明确文件清单
      **依赖**: P{N-1} 的具体产出
      **关联 Story**: STORY-X (验收用例 TC-Y)

      ### 任务清单（不能少于 5 个，不多于 12 个）

      #### Task P{N}.1: <动词开头的任务名>
      - **文件**: 明确路径（多个文件列出）
      - **操作**: create / modify / delete
      - **输入依赖**: 哪个上游交付物
      - **验收标准**: 包含 TC-Y 验证点
      - **估算复杂度**: low / medium / high

      #### Task P{N}.2: ...
      ```

      ### 2. 体量均衡约束
      - 每个阶段任务数要贴近骨架中的预期。
      - 任务详细程度（用以下 4 项衡量）不能为不同阶段出现明显偏差：
        - 文件路径完整性
        - 验收标准可测量性
        - 依赖明确性
        - 输入/输出说明试

      ### 3. 项目类型适配
      - **yaml-workflow**：明确每个 YAML 输出路径。
      - **split-code**：任务分为 Backend/Frontend/Shared 三组，描述项目结构。
      - **monolith-code**：按模块拆分。
      - **docs-config**：按文档/配置文件拆分。

      ## 输出
      保存完整计划到 `$vars.output_dir/plan.md`。

      {"vars_update":{"plan_file":"$vars.output_dir/plan.md","conclusion":"<深化后总任务数 + 最重表阶段任务数 + 是否需要 balance 检核>"}}

  - id: plan-balance-check
    type: agent
    depends_on: [plan-deepen]
    timeout: 1800
    prompt: |
      你是计划均衡性审查员，检查 plan.md 是否存在「前详后略」问题。

      ## 检查项
      读取 $vars.plan_file，对每个阶段计算以下指标：
      | 指标 | 说明 |
      |------|------|
      | task_count | 该阶段 Task P{N}.X 总数 |
      | total_chars | 该阶段从 "## P{N}:" 到下一个 "## P" 之间的字符数 |
      | files_referenced | 该阶段提及的独立文件路径数 |
      | acceptance_count | 该阶段"验收标准"出现次数 |

      ## 判定规则
      - 任一指标的 max/min > 3.0 → fail
      - 任一阶段的 task_count < 3 → fail
      - 任一阶段的 acceptance_count == 0 → fail
      - 全部估算同一阶段不能都是 low → warn

      ## 你的任务
      1. 计算指标，输出表格报告到 `$vars.output_dir/plan.balance.md`。
      2. 如果不均衡阶段 <= 1 且可以就地修补，直接封装 plan.md。
      3. 如果不均衡阶段 >= 2，记录「需要 challenge-plan」。

      ## 输出
      {"vars_update":{"plan_balance_report":"$vars.output_dir/plan.balance.md","plan_balance_passed":"<true/false>","conclusion":"<不均衡阶段数 + 详情>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 1.5: Refine Plan （合并后：审查 + 裁决，可选）
  # ═══════════════════════════════════════════════════════════════
  - id: refine-plan
    type: agent
    depends_on: [plan-balance-check]
    timeout: 5400
    execute_when: '$inputs.enable_adversarial == "true" || $vars.plan_balance_passed == "false"'
    agents:
      feasibility-reviewer:
        description: "可行性审查者 — 审查计划的 PRD 覆盖度与技术可行性"
        agent_file: ".claude/agents/engineering-software-architect.md"
        model: opus[1m]
        tools: ["Read", "Write", "Edit", "Grep", "Glob"]
        prompt: |
          ## 本次审查目标
          审查实现计划 $vars.plan_file

          ## 输入
          - 计划文档: $vars.plan_file
          - PRD 最终版: $vars.prd_final_file
          - 技术方案: $vars.solution_file
          - 需求定义: $vars.requirements_file
          - 均衡报告: $vars.plan_balance_report
          - 交付物类型: $vars.impl_type

          ## 审查重点（按交付物类型）
          - **yaml-workflow**: YAML 节点设计是否合理？DAG 依赖是否正确？inputs/outputs 是否完整？
          - **split-code**: 前后端任务拆分是否清晰？API 契约是否充分？
          - **monolith-code**: 模块划分是否合理？依赖关系是否清晰？

          ## 通用审查维度
          - 🔴 CRITICAL: 计划是否覆盖所有 PRD User Story？是否有关键交付物遗漏？
          - 🔴 CRITICAL: 阶段依赖是否可行？是否存在循环依赖？
          - 🟡 RISK: 任务拆分粒度是否合理？是否有过于庞大的任务？
          - 🟡 RISK: 验收标准是否可测？
          - 🔵 IMPROVEMENT: 有没有可以并行化的阶段？

          ## 输出方式（必须直接 Write，不要返回正文）
          使用 Write 工具将审查结果写入 $vars.output_dir/plan.review.md，格式：

          # 实现计划 — 可行性审查报告

          ## 摘要
          <2-3 句话总结主要问题与优先修复项>

          ## 问题清单（共 N 条，按 CRITICAL/RISK/IMPROVEMENT 分级）
          ### #1 [🔴 CRITICAL] <一句话标题>
          - **问题位置**: <plan.md 中的阶段/任务 ID>
          - **问题**: ...
          - **影响**: ...
          - **修正建议**: ...

          （按 CRITICAL → RISK → IMPROVEMENT 顺序排列）

          Write 完成后只需返回 1 行确认: "已写入 N 条问题到 plan.review.md"
    prompt: |
      你是计划审查的双角色协调者：先收集问题，再独立裁决与修正。

      ## ⚠️ 阶段切换原则（必读）
      - **Phase A（收集）**: 委派 feasibility-reviewer 子代理产出独立的审查报告，子代理直接 Write 到 plan.review.md
      - **Phase B（裁决与修正）**: 你切换为"独立修订者"角色，对每条问题给出明确决策——不可因"刚才已讨论过"而默认接受；拒绝是可选项，不是失败

      ## 工作流

      ### Phase A: 收集问题
      委派 feasibility-reviewer: "审查实现计划 $vars.plan_file，使用 Write 工具将问题报告直接落盘到 $vars.output_dir/plan.review.md。PRD: $vars.prd_final_file，技术方案: $vars.solution_file，需求: $vars.requirements_file，交付物类型: $vars.impl_type。均衡报告: $vars.plan_balance_report。"

      ### Phase B: 独立裁决与修正
      1. 读取 $vars.plan_file（原计划）
      2. 读取 $vars.output_dir/plan.review.md（问题清单）
      3. 读取 $vars.plan_balance_report（均衡报告）
      4. 对每条问题独立判断:
         - 🔴 CRITICAL: 原则上必须修正；如拒绝须在计划中明写理由
         - 🟡 RISK: 评估后修正或记录缓解措施
         - 🔵 IMPROVEMENT: 酌情采纳
      5. **如果 plan_balance_passed=false**: 重点平衡不足量阶段的任务深度（拆任务或合并任务）
      6. 在 $vars.plan_file 末尾追加 "## 审查裁决记录" section，逐条记录采纳/拒绝决策
      7. 对采纳的问题，**直接修改 plan.md 对应章节**
      8. 保存更新后的 $vars.plan_file

      ## 规则
      - 保持无人值守模式
      - **角色切换纪律**：你既是收集方又是裁决方，必须保持独立判断

      ## 输出
      直接输出纯 JSON 行（不要用代码块包裹）:
      {"vars_update":{"plan_review_file":"$vars.output_dir/plan.review.md","plan_balance_passed":"true","conclusion":"<2-3句话: 审查出 N 条问题/采纳 X 拒绝 Y/是否重平衡>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 2: Implement — 通用实现节点（处理所有非 split-code 类型）
  # ═══════════════════════════════════════════════════════════════
  - id: implement
    type: agent
    depends_on: [refine-plan]
    timeout: 86400
    execute_when: '$vars.impl_type != "split-code"'
    skills:
      - subagent-driven-development
    agents:
      code-quality-advisor:
        description: "代码质量顾问 — 实时质量、安全和性能建议"
        agent_file: ".claude/agents/engineering-code-reviewer.md"
        model: sonnet
        tools: ["Read", "Grep", "Glob"]
    prompt: |
      使用 subagent-driven-development 按实现计划生成所有交付物。

      $vars.workspace_rules

      ## 宿主项目契约（强制阅读）
      $vars.host_contract_file
      ⛔ 不要创建与契约重复的组件/服务/中间件
      ⛔ 不要新建 packages/不要引入新 CSS 方案不要绕过 lib/api.ts
      ✅ 必须复用契约中列出的现有资产违反走 review-fix 循环修

      ## 交付物类型: $vars.impl_type
      ## 实现计划: $vars.plan_file
      ## PRD 技术方案: $vars.solution_file
      ## PRD 需求定义: $vars.requirements_file

      ## 按类型执行

      ### 如果 impl_type == "yaml-workflow":
      你的任务是生成工作流 YAML 文件。
      - 读取 plan.md 中每个 YAML 文件的规划
      - 读取 03-solution.md 中的架构设计和节点设计
      - 读取 02-requirements.md 中的 inputs/variables 定义
      - 按 plan 中的输出路径，逐个创建 YAML 文件
      - 每个 YAML 必须符合 Octopus workflow schema (apiVersion, kind, name, nodes)
      - 用 `octopus workflow validate <file>` 验证每个文件
      - 如有辅助文件（scripts/, tests/），一并生成

      ### 如果 impl_type == "monolith-code":
      按 plan 实现代码，使用 subagent-driven-development。
      实现完成后 pnpm build + pnpm test 验证。

      ### 如果 impl_type == "docs-config":
      按 plan 生成文档/配置文件。

      ## ⚠️ 关键规则 — 按 Phase 粒度执行、提交、通知（强制）

      **subagent-driven-development 按 Task 逐个执行，但你必须按 Plan 中的 Phase（P1, P2, P3...）粒度管理提交和通知。**

      ### 执行流程（每个 Phase）
      1. 读取 $vars.plan_file，提取所有阶段（P1, P2, P3...）及其任务清单
      2. 创建 TodoWrite 条目跟踪进度
      3. **逐 Phase 执行**:
         - 在当前 Phase 内，使用 subagent-driven-development 逐 Task 执行
         - 每个 Task 走完 implementer → spec review → quality review 流程
         - **整个 Phase 的所有 Task 完成后，立即执行 Phase 收尾**：
           a. `pnpm build` + `pnpm test`（如果是代码类交付物）验证本 Phase 产出
           b. **git commit**:
              ```bash
              cd <项目目录>
              git add -A
              git commit -m "feat(P{N}): <Phase 名称> — <简要描述>"
              ```
           c. **octopus notify**（⚠️ 必须发送，不可跳过）:
              ```bash
              octopus notify --ignore-failure \
                --title "⚙️ $vars.display_name — Phase P{N}/P{TOTAL} 完成: <Phase 名称>" \
                --body "已完成: P{N} — <具体完成的任务摘要>\n剩余: <未完成 Phase 列表>\n📊 进度: {N}/{TOTAL} Phases"
              ```
         - 然后进入下一个 Phase

      ### 其他规则
      - 无人值守模式
      - 发现问题直接修复
      - 可委派 code-quality-advisor 检查质量
      - **严禁**"全部做完再一次性提交" — 每个 Phase 必须有独立 commit 和通知
      - 如果某个 Phase 执行时间很长，中途每完成一个 Task 也可以先发一条进度通知

      ## 输出
      {"vars_update":{"conclusion":"<2-3句话总结生成的交付物，包含每个 Phase 的 commit SHA>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 2 (split-code only): Contract → Backend ∥ Frontend → Integrate
  # ═══════════════════════════════════════════════════════════════
  - id: contract
    type: agent
    depends_on: [refine-plan]
    timeout: 1800
    execute_when: '$vars.impl_type == "split-code"'
    agents:
      backend-architect:
        description: "后端架构师 — 定义 API 契约和共享类型"
        agent_file: ".claude/agents/engineering-backend-architect.md"
        model: opus[1m]
        tools: ["Read", "Write", "Grep", "Glob"]
    prompt: |
      你是 API 契约工程师，将 03-solution.md 的架构级 API 描述展开为工程实现可用的完整契约。

      $vars.workspace_rules

      ## 设计哲学（重要）
      03-solution.md 里的 API 小节是架构级描述（清单 + 数据流），不含请求/响应体完整字段。
      本节点以它为唯一权威源，在项目代码中探索现有类型/中间件/路由体系后，补齐工程细节。
      输出必须与 03-solution.md 双向可追溯。

      ## 项目结构
      $vars.project_structure

      ## 输入
      1. 架构级 API 描述: $vars.solution_file（必读，提取"API 设计"小节）
      2. 需求定义: $vars.requirements_file
      3. 实现计划: $vars.plan_file（只看 Backend/Shared 任务）
      4. 验收用例: $vars.acceptance_cases_file（可选，有则取 binding_hints 补足错误码/路由详情）

      ## 你的任务

      ### Step 1: 从 03-solution.md 提取 API 清单
      使用 Read/Grep 读出架构级 API 表，列出端点、用途、Story ID。

      ### Step 2: 探索现有类型/中间件
      - 后端路由、错误中间件、鉴权提供者
      - 现有请求/响应类型定义位置
      - shared 包是否已有兑现契约的类型语义

      ### Step 3: 为每个端点补齐工程细节
      每个端点必须补齐：
      - HTTP method + path（与 03-solution.md 一致，如不一致需记录 conflict）
      - 请求体字段与类型定义
      - 响应体字段与类型定义
      - 错误码列表（状态码 + 应用错误码）
      - 鉴权要求
      - 幂等性（适用场景）

      ### Step 4: 补齐共享类型与前端客户端接口
      - shared 包中的 schema/types
      - 前端 API client 的函数签名

      ### Step 5: 双向追溯表
      生成 traceability：
      | API | 03-solution 位置 | 需求 Story | 验收用例 | 冲突/偏移 |
      |-----|------------------|-------------|-------------|----------|
      | POST /api/xxx | L120-L135 | STORY-3 | TC-007, TC-008 | 无 |

      如发现与 03-solution.md 冲突，必须以"Conflict"小节记录反馈给上游 PRD。

      ## 输出
      保存到 `$vars.output_dir/api-contract.md`，结构：
      ```markdown
      # API Contract

      ## 信息来源
      - 架构级描述: $vars.solution_file (API 设计小节)
      - 需求 Story: $vars.requirements_file

      ## API 列表
      ### POST /api/xxx
      【Story】 STORY-3 | 【验收】 TC-007, TC-008
      请求:
      响应:
      错误码:
      ...

      ## 共享类型

      ## 前端 Client 接口

      ## 错误码总表

      ## 双向追溯表

      ## 与 03-solution.md 的冲突/补充记录
      ```

      ## 输出
      {"vars_update":{"contract_file":"$vars.output_dir/api-contract.md","conclusion":"<端点数 + 如有冲突说明>"}}

  - id: backend
    type: agent
    depends_on: [contract]
    timeout: 86400
    context: new
    execute_when: '$vars.impl_type == "split-code"'
    agents:
      backend-architect:
        description: "后端架构师 — 实现 API、数据库、服务层"
        agent_file: ".claude/agents/engineering-backend-architect.md"
        model: opus[1m]
        tools: ["Read", "Write", "Edit", "Bash", "Grep", "Glob"]
      database-optimizer:
        description: "数据库优化师 — Schema 设计、查询优化"
        agent_file: ".claude/agents/engineering-database-optimizer.md"
        model: sonnet
        tools: ["Read", "Write", "Edit", "Bash", "Grep", "Glob"]
    prompt: |
      你是后端实现协调者。你有 2 个子代理。

      $vars.workspace_rules

      ## 宿主项目契约（强制阅读）
      $vars.host_contract_file
      ⛔ API 路由、错误响应格式、服务层位置必须遵守契约
      ⛔ 不要重写现有错误中间件 / 鉴权机制复用现有的
      ⛔ 不要新建 packages/在现有后端包内补充
      ✅ 违反走 review-fix 循环修复

      ## 项目结构
      $vars.project_structure

      ## API 契约: $vars.contract_file
      ## 实现计划: $vars.plan_file（Backend 任务）

      ## 你有 2 个子代理（通过 Agent 工具调用）
      - **backend-architect**: 实现 API 路由、服务层、数据校验、错误处理
      - **database-optimizer**: Schema 设计、Migration、查询优化

      调用方式: `Agent(subagent_type="backend-architect", prompt="...")` 或 `Agent(subagent_type="database-optimizer", prompt="...")`

      ## ⚠️ 工作流 — 按 Phase 粒度执行、提交、通知（强制）

      读取 $vars.plan_file，提取所有 Backend 相关阶段（P1, P2, P3...）及其任务。

      ### Step 1: 探索项目（仅一次）
      先自行探索项目结构，确认：
      - 后端代码在哪些目录？使用什么语言/框架？
      - 构建命令是什么？测试命令是什么？
      - 数据库 ORM/迁移工具是什么？
      - 配置文件在哪里？（package.json/pyproject.toml/go.mod/pom.xml/Cargo.toml）

      ### Step 2: 逐 Phase 实现
      **逐 Phase 执行**（当前 Phase 内所有 Backend 任务完成后，再做收尾）：

      1. 委派 **database-optimizer**: 本 Phase 涉及的 Schema/Migration 设计和实现
      2. 委派 **backend-architect**: 本 Phase 涉及的 API 路由、服务层、类型定义
      3. 使用项目自身的构建和测试命令验证
      4. **git commit**:
         ```bash
         cd <后端项目目录>
         git add -A
         git commit -m "feat(backend/P{N}): <Phase 名称> — <简要描述>"
         ```
      5. **octopus notify**（⚠️ 必须发送，不可跳过）:
         ```bash
         octopus notify --ignore-failure \
           --title "🏗️ $vars.display_name — Backend P{N}/P{TOTAL} 完成: <Phase 名称>" \
           --body "已完成: <本 Phase 实现的后端模块摘要>\n剩余: <未完成 Phase 列表>\n📊 进度: {N}/{TOTAL} Phases"
         ```
      6. 然后进入下一个 Phase

      ### 文件所有权
      只修改后端相关目录（Step 1 探索确定的目录）。
      不修改前端代码目录。

      ### 红线
      - **严禁**全部 Phase 做完再一次性提交 — 每个 Phase 必须有独立 commit 和通知
      - 如果某个 Phase 实现时间很长，中途也可以先发一条进度通知

      ## 输出
      {"vars_update":{"conclusion":"<2-3句话总结后端实现内容，含每个 Phase 的 commit SHA>"}}

  - id: frontend
    type: agent
    depends_on: [contract]
    timeout: 86400
    context: new
    execute_when: '$vars.impl_type == "split-code"'
    agents:
      frontend-developer:
        description: "前端开发者 — UI 实现"
        agent_file: ".claude/agents/engineering-frontend-developer.md"
        model: opus[1m]
        tools: ["Read", "Write", "Edit", "Bash", "Grep", "Glob"]
      ui-designer:
        description: "UI 设计师 — 设计系统、组件库"
        agent_file: ".claude/agents/design-ui-designer.md"
        model: sonnet
        tools: ["Read", "Write", "Edit", "Grep", "Glob"]
    prompt: |
      你是前端实现协调者。你有 2 个子代理。

      $vars.workspace_rules

      ## 宿主项目契约（⭐ 最高优先级，强制阅读）
      $vars.host_contract_file
      ⛔ 必须复用契约中列出的所有现有组件（Button / Input / Toast 等）
      ⛔ 必须使用契约中的 design tokens（colors / spacing / typography）不要引入新 CSS 方案
      ⛔ 必须使用 lib/api.ts不要直接 fetch
      ⛔ 页面路由、项目目录约定必须与契约一致
      ⛔ 不要创建与现有组件功能重复的新组件
      ✅ 违反以上任一项会被 review 标记 BLOCKER走 review-fix 循环修复

      ## 项目结构
      $vars.project_structure

      ## API 契约: $vars.contract_file
      ## 实现计划: $vars.plan_file（Frontend 任务）
      ## UI 规范: $vars.ui_file（⭐ 必读，design tokens / 页面全谱 / 组件清单的唯一权威源）
      ## UX 交互: $vars.ux_file（⭐ 必读，页面状态机 / 交互序列 / 错误恢复路径的唯一权威源）
      ## 验收用例: $vars.acceptance_cases_file（可选，取 ui_state 类用例验证 UI 完整性）

      ## 如果 $vars.ui_file 或 $vars.ux_file 为空
      警告并退化为从 $vars.solution_file 推导（同时记录到 conclusion 里提醒 PRD 上游补齐）。

      ## 你有2 个子代理（通过 Agent 工具调用）
      - **frontend-developer**: 实现页面、组件、API client、状态管理
      - **ui-designer**: 设计 tokens、组件样式、响应式布局

      调用方式: `Agent(subagent_type="frontend-developer", prompt="...")` 或 `Agent(subagent_type="ui-designer", prompt="...")`

      ## ⚠️ 工作流 — 按 Phase 粒度执行、提交、通知（强制）

      读取 $vars.plan_file，提取所有 Frontend 相关阶段（P1, P2, P3...）及其任务。

      ### Step 1: 探索项目（仅一次）
      先自行探索项目结构，确认：
      - 前端代码在哪些目录？使用什么框架？（React/Vue/Svelte/Angular/其他）
      - 构建命令是什么？CSS 方案是什么？
      - 状态管理方案？路由方案？
      - 配置文件在哪里？（package.json/vite.config/next.config 等）

      ### Step 2: 对齐 UI/UX 设计系统（仅一次）
      1. 读取 $vars.ui_file，提取 design tokens / 页面全谱 / 组件清单
      2. 读取 $vars.ux_file，提取页面状态机与交互序列
      3. 委派 **ui-designer**: 将 ui.md 中的 tokens 落实为代码（补齐/调整现有代码中的主题/变量）

      ### Step 3: 逐 Phase 实现页面
      **逐 Phase 执行**（当前 Phase 内所有 Frontend 任务完成后，再做收尾）：

      1. 委派 **frontend-developer**: 本 Phase 涉及的页面、组件、API client、状态管理
         - 按 ui_file 页面全谱 × ux_file 状态机 × contract_file API 实现
         - 每个页面需实现 ux_file 指定的 5 种状态（空/加载/成功/错误/部分数据）
      2. 使用项目自身的构建命令验证（编译/类型检查通过）
      3. **git commit**:
         ```bash
         cd <前端项目目录>
         git add -A
         git commit -m "feat(frontend/P{N}): <Phase 名称> — <简要描述>"
         ```
      4. **octopus notify**（⚠️ 必须发送，不可跳过）:
         ```bash
         octopus notify --ignore-failure \
           --title "🎨 $vars.display_name — Frontend P{N}/P{TOTAL} 完成: <Phase 名称>" \
           --body "已完成: <本 Phase 实现的页面/组件摘要>\n剩余: <未完成 Phase 列表>\n📊 进度: {N}/{TOTAL} Phases"
         ```
      5. 然后进入下一个 Phase

      ### Step 4: 可追溯性（所有 Phase 完成后执行）
      在代码注释或 PR 描述中标记「页面ID × STORY-X × TC-Y」以便到 e2e-case-bind 快速绑定。

      ### 文件所有权
      只修改前端相关目录（Step 1 探索确定的目录）。
      不修改后端代码目录。

      ### 红线
      - **严禁**全部 Phase 做完再一次性提交 — 每个 Phase 必须有独立 commit 和通知
      - 如果某个 Phase 实现时间很长，中途也可以先发一条进度通知

      ## 输出
      {"vars_update":{"conclusion":"<2-3句话: 实现页面数 + 是否出现 ui/ux 规范偏离，含每个 Phase 的 commit SHA>"}}

  - id: integrate
    type: agent
    depends_on: [backend, frontend]
    timeout: 3600
    execute_when: '$vars.impl_type == "split-code"'
    agents:
      software-architect:
        description: "软件架构师 — 验证前后端集成完整性"
        agent_file: ".claude/agents/engineering-software-architect.md"
        model: opus[1m]
        tools: ["Bash", "Read", "Write", "Edit", "Grep", "Glob"]
    prompt: |
      前后端并行实现已完成。你是集成验证协调者。你有 1 个子代理。

      $vars.workspace_rules

      ## 项目结构
      $vars.project_structure

      ## API 契约: $vars.contract_file

      ## 你有 1 个子代理（通过 Agent 工具调用）
      - **software-architect**: 验证前后端集成完整性、API 签名一致性、架构合规

      调用方式: `Agent(subagent_type="software-architect", prompt="...")`

      ## 工作流

      ### Step 1: 探索项目
      确认项目的构建命令和测试命令（从配置文件读取）。

      **了解 frontend/backend 做了什么**（⚠️ 它们已 commit，不要用 `git diff HEAD`）：
      ```bash
      git log --oneline -20                    # 最近 20 个 commits，找到 frontend/backend 的提交
      git diff main --name-only 2>/dev/null    # 相对 main 分支的所有变更文件
      git diff main --stat 2>/dev/null         # 变更统计（新增/修改行数）
      ```

      ### Step 2: 验证
      1. 委派 **software-architect**: "对照 $vars.contract_file 验证前后端集成完整性。检查 API 签名、共享类型/模型、架构边界。"
      2. 使用项目自身的构建和测试命令验证
      3. 发现不一致 → 分类 → 直接修复 → 重新验证

      ## ⚠️ 关键: 状态传播
      验证全部通过:
      {"vars_update":{"integration_passed":"true","conclusion":"集成验证通过"}}

      验证失败且无法修复:
      {"vars_update":{"integration_passed":"false","__status":"failed","conclusion":"集成验证失败: <原因>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 3: Review + Fix
  # ═══════════════════════════════════════════════════════════════
  - id: review
    type: agent
    depends_on: [implement, integrate]
    timeout: 7200
    agents:
      code-reviewer:
        description: "独立代码审查员"
        agent_file: ".claude/agents/engineering-code-reviewer.md"
        model: opus[1m]
        tools: ["Bash", "Read", "Grep", "Glob"]
      security-engineer:
        description: "安全工程师"
        agent_file: ".claude/agents/engineering-security-engineer.md"
        model: opus[1m]
        tools: ["Bash", "Read", "Grep", "Glob"]
      product-completeness-assessor:
        description: "产品完整度评估员 — 对照 PRD 必需功能评估实现完整度"
        prompt: |
          ## 产品完整度评估

          对照 PRD 需求文档 $vars.requirements_file 中的功能评估实现完整度。
          **P0（核心）和 P1（增强）都必须 100% 实现。P0 要求深度测试，P1 要求基本功能验证通过。**

          ⛔ **规则：用户输入的所有功能都是"必需"，如果某个用户提出的功能未实现，必须列为缺失项。**

          ## 评估维度（4 个，加权计分）

          ### 1. 全部功能覆盖（权重 40%）
          - 逐个检查所有 PRD 列出的功能（P0 核心 + P1 增强，不含 Won't Have），每个是否有对应实现？
          - 实现是否可运行？（不是空壳或 TODO）
          - 评分: 已实现数 / 全部功能总数 × 100%

          ### 2. UI/UX 操作闭环（权重 30%，仅当功能涉及 UI 时评估）
          对每个涉及用户界面的必需功能:
          - **入口**: 用户从哪里进入？（菜单/路由/按钮）
          - **操作**: 用户怎么执行？（表单/交互序列）
          - **反馈**: 用户怎么知道成功了？（toast/状态变化/列表刷新）
          - **恢复**: 失败后用户怎么修正？（错误提示/重试）
          - 4 项都有 → 该功能 UI 闭环完整
          - **如果只有 API/后端实现但没有 UI 操作路径 → 该功能 UI 闭环缺失**

          ### 3. 验收标准通过率（权重 20%）
          - 提取必需故事的 Given/When/Then 验收标准
          - 逐条检查: 实现是否能通过该验收标准？
          - 评分: 可通过的验收标准数 / 总验收标准数 × 100%

          ### 4. Non-Goals 遵守（权重 10%）
          - 检查 Won't Have 列表
          - 是否误实现了明确不做的功能？
          - 无误实现 → 100%，有误实现 → 0%

          ## 总分计算
          总分 = 维度1×0.4 + 维度2×0.3 + 维度3×0.2 + 维度4×0.1

          ## 输出格式

          ### 评分明细
          | 维度 | 权重 | 评分 | 详情 |
          |------|------|------|------|
          | 全部功能覆盖 | 40% | N% | X/Y 个功能已实现 |
          | UI/UX 操作闭环 | 30% | N% | X/Y 个 UI 功能闭环完整 |
          | 验收标准通过率 | 20% | N% | X/Y 条标准可通过 |
          | Non-Goals 遵守 | 10% | N% | 有/无误实现 |
          | **总分** | **100%** | **N%** | |

          ### 缺失项清单（按优先级排序）
          每个缺失项:
          - **具体描述**: 缺什么（具体到文件/组件/页面）
          - **涉及文件**: 应该在哪个文件中补充
          - **修复方式**: 具体怎么补
          - **优先级**: 高/中/低
          - **预期分值**: 修复后预计提升多少分
        model: opus[1m]
        tools: ["Bash", "Read", "Grep", "Glob"]
    prompt: |
      你是审查协调者。你有 3 个子代理。

      $vars.workspace_rules

      ## 审查基准
      - 实现计划: $vars.plan_file
      - PRD: $vars.prd_final_file
      - 交付物类型: $vars.impl_type
      - 宿主契约: $vars.host_contract_file ⚠️ 必读，作为一致性判据依据

      ## 工作流
      1. 委派 code-reviewer: "审查代码/YAML 变更，对照 $vars.plan_file"
      2. 委派 security-engineer: "安全审查"（yaml-workflow 类型可跳过）
      3. 委派 product-completeness-assessor: "对照 $vars.requirements_file 评估产品完整度"
      4. **宿主契约一致性检查（新增）**：
         - 读取 $vars.host_contract_file 的 "必须复用的现有资产" 与 "强烈不建议" 清单
         - 扫描本次变更的 git diff，逐项检查：
           - 是否创建了与契约中同名现有组件重复的新组件？
           - 是否绕过了 lib/api.ts 直接 fetch？
           - 是否新建了 packages/？
           - 是否引入了新的 CSS 方案与现有不一致？
           - 是否重写了现有错误中间件/鉴权机制？
         - 每项违反都计为 1 个 BLOCKER，并在 review_issues 里详述 "违反了契约的哪一项"
      5. 汇总报告。host_contract_violations 计入 review_blockers未走完会由 review-fix 循环驱动修复。

      ## 输出
      {"vars_update":{"review_blockers":"<数量，含 host 契约违反>","review_issues":"<汇总，独立列出 host 契约违反项>","host_contract_violations":"<仅 host 契约违反数量>","completeness_score":"<0-100>","completeness_passed":"<score == 100>","conclusion":"<2-3句话，必须提及 host 契约一致性结论>"}}

  - id: review-fix
    type: agent
    depends_on: [review]
    timeout: 7200
    context: new
    execute_when: '$vars.review_blockers != "0"'
    prompt: |
      审查发现了 BLOCKER 问题，需要修复。

      $vars.workspace_rules

      ## 审查发现: $vars.review_issues
      ## BLOCKER 数量: $vars.review_blockers

      ## 自循环（最多 3 轮）
      1. 分析根因 → 修复 → pnpm build/test 验证
      2. 仍有 BLOCKER → 继续（最多 3 轮）

      ## 输出
      {"vars_update":{"review_blockers":"<剩余>","conclusion":"<2-3句话>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 4-5: E2E
  # 设计：上游 prd-forge 负责抽象验收用例（acceptance-cases），
  # 本处 e2e-case-bind 负责绑定到可执行路径（selector / API / workflow）。
  # 上游不提供验收用例时退化为从 needs-derived。
  # ═══════════════════════════════════════════════════════════════
  - id: e2e-case-bind
    type: agent
    depends_on: [review-fix, integrate, implement]
    timeout: 3600
    execute_when: '$inputs.run_e2e == "true"'
    agents:
      api-tester:
        description: "API 测试架构师 — 将抽象验收用例绑定到可执行脚本"
        agent_file: ".claude/agents/testing-api-tester.md"
        model: sonnet
        tools: ["Read", "Write", "Edit", "Grep", "Glob"]
    prompt: |
      你是 E2E 用例绑定工程师。将上游 prd-forge 产出的抽象验收用例绑定到可执行脚本。

      ## ⚡ 短路检查（最先执行）
      如果 `$inputs.e2e_regenerate` 不是 `"e2e-cases"` 也不是 `"all"`：
      1. 检查 `$vars.output_dir/e2e-cases.md` 是否存在
      2. **存在** → 读取文件，提取用例总数，直接输出 vars_update 并结束，不做其他工作：
         ```
         {"vars_update":{"e2e_cases_file":"$vars.output_dir/e2e-cases.md","e2e_total":"<从文件提取>","e2e_p0_count":"<从文件提取>","e2e_p1_count":"<从文件提取>","conclusion":"e2e-cases.md 已存在，跳过生成"}}
         ```
      3. **不存在** → 继续下方完整流程

      ## 设计哲学（重要）
      分层 BDD：acceptance-cases.md 是需求层 Given/When/Then（不含实现细节），
      本节点负责从有效路由/selector/workflow 绑定点生成可执行用例。
      ⚠️ **P0/P1 是质量分级，不是排除机制**——两者都必须 100% 实现和测试。P0 需深度测试（边界/并发/异常/安全），P1 验证基本功能通过即可。

      ## 输入
      1. 抽象验收用例: $vars.acceptance_cases_file（⭐ 首选输入，如为空退化到需求书推导）
      2. 需求定义: $vars.requirements_file (User Stories + Given/When/Then)
      3. API 契约: $vars.contract_file（split-code 时必读，获取可执行路由/错误码）
      4. UI 规范: $vars.ui_file（获取页面ID/selector 提示）
      5. UX 交互: $vars.ux_file（获取页面状态机与交互序列）
      6. 实现计划: $vars.plan_file

      ## ⛔ 前置过滤：排除基准/性能测试
      在生成用例前，先过滤掉以下类型的用例（不生成可执行 case）：
      - evidence_type 为 benchmark / performance 的用例
      - scenario 中包含"基准测试""性能测试""压力测试""压测""benchmark""performance"关键词的用例
      - 纯测量性质（吞吐量、延迟、QPS 等）的用例
      被过滤的用例在 conclusion 中记录为"已排除（基准/性能测试）"，不计入 e2e_total。
      本工作流聚焦功能验收，性能基准由专门工具处理。

      ## 你的任务

      ### 分支 A：acceptance_cases_file 非空（首选路径）
      1. 读取抽象用例（TC-001 起）。
      2. **先执行前置过滤**（排除基准/性能测试）。
      3. 对每条剩余用例依据 evidence_type 进行绑定：
         | evidence_type | 绑定目标 |
         |---------------|----------|
         | api_response | HTTP method+path+状态码+响应字段断言 |
         | ui_state | 页面ID+selector+UI 状态转换断言 |
         | file_content | 文件路径+内容模式 |
         | cli_output | 命令行+输出模式+退出码 |
         | workflow_execution | YAML 路径+入参+产出验证 |
      4. 使用 binding_hints 快速定位。不要从 TC 中街接 binding_hints 原文，要加上架构取证。
      5. ⛔ **禁止标记 N/A** — 如果某条 TC 的 evidence_type 在当前 impl_type 中不适用（如 yaml-workflow 下出现 ui_state），**必须重新绑定到兼容的 evidence_type**（如降级为 file_content 或 cli_output），不允许以「N/A」记录。每个用例都必须有可执行的验证步骤。
      6. 对任何 binding_hints 中提及但在 contract/ui/ux 中找不到的 API/页面要记录到 conclusion。

      ### 分支 B：acceptance_cases_file 为空（向后兼容退化）
      1. 从需求书 User Stories 推导 Given/When/Then。
      2. 使用同一抽象用例模板（本地生成 acceptance_cases）。
      3. 委派 api-tester 补充边界与安全测试。
      4. 后续同分支 A 的绑定步骤。

      ## 完整性检查
      - **覆盖门** · 每个 acceptance case 必须生成 1 以上可执行 case，否则记录为缺失。
      - **一致性门** · 可执行 case 不能出现抽象用例中未提及的全新断言。
      - yaml-workflow 类型主要生成 workflow_execution / file_content / cli_output 类 case。
      - ⛔ **无 N/A** · 所有用例必须有可执行步骤，不允许跳过或标记为不适用。

      ## 输出: $vars.output_dir/e2e-cases.md
      结构：
      ```markdown
      # E2E Cases (Bound)

      ## 信息源
      - 抽象用例: $vars.acceptance_cases_file (或退化为 needs-derived)
      - API 契约: $vars.contract_file
      - UI/UX: $vars.ui_file / $vars.ux_file
      - 已排除: 基准/性能测试 N 条

      ## TC-001 · 对应 抽象TC-001
      - **Story**: STORY-X
      - **Priority**: P0
      - **Evidence**: api_response
      - **可执行步骤**:
        1. POST /api/xxx body={...}
        2. assert status == 200
        3. assert response.json["id"] != null
      - **双向可追溯**: 抽象TC-001 / contract POST /api/xxx / ui_file: 页面Dashboard
      ```

      ## 输出
      {"vars_update":{"e2e_cases_file":"$vars.output_dir/e2e-cases.md","e2e_total":"<可执行 case 总数>","e2e_p0_count":"<P0 数>","e2e_p1_count":"<P1 数>","conclusion":"<覆盖抽象用例比例 + 排除的基准/性能用例数 + 未能绑定项与原因>"}}

  - id: completeness-bind
    type: agent
    depends_on: [e2e-case-bind]
    execute_when: '$inputs.run_e2e == "true"'
    timeout: 1800
    prompt: |
      你是完整度检查清单生成器。从 PRD 全套文档中提取所有必需（Required / Must Have）Story，
      交叉引用技术方案、UI、UX、测试用例，生成多维度的结构化检查清单。

      ## ⚡ 短路检查（最先执行）
      如果 `$inputs.e2e_regenerate` 不是 `"completeness-checklist"` 也不是 `"all"`：
      1. 检查 `$vars.output_dir/completeness-checklist.md` 是否存在
      2. **存在** → 直接输出 vars_update 并结束，不做其他工作：
         ```
         {"vars_update":{"completeness_checklist_file":"$vars.output_dir/completeness-checklist.md","conclusion":"completeness-checklist.md 已存在，跳过生成"}}
         ```
      3. **不存在** → 继续下方完整流程

      $vars.workspace_rules

      ## 输入（按优先级）
      1. PRD 需求文档: $vars.requirements_file — Story 列表 + MoSCoW 优先级 + 验收标准
      2. 技术方案: $vars.solution_file — API 端点、数据模型、组件列表、架构决策
      3. UI 设计: $vars.ui_file — 页面列表、组件清单、设计 Tokens（如为空跳过 UI 维度）
      4. UX 交互: $vars.ux_file — 用户旅程、页面状态机、交互序列（如为空跳过 UX 维度）
      5. 验收用例: $vars.acceptance_cases_file — BDD 用例 ID（如为空则从 requirements 推导）
      6. E2E 测试用例: $vars.e2e_cases_file — 可执行 TC-NNN ID
      7. 实现计划: $vars.plan_file — 预期文件路径和交付物

      ## 步骤

      ### 1. 提取必需 Story
      从 $vars.requirements_file 的 MoSCoW 部分提取所有 Must Have 项。
      每个 Story 提取: ID、标题、功能描述、验收标准（Given/When/Then）、技术领域。

      ### 2. 交叉引用技术规格（从 $vars.solution_file）
      对每个 Story，查找对应的:
      - API 端点（method + path + 状态码）
      - 数据库表/字段
      - 服务类/函数名
      - 架构约束（如延迟目标、token 预算）

      ### 3. 交叉引用 UI/UX 规格
      如果 Story 涉及 UI（从验收标准中的"UI 入口"/"页面状态"判断）:
      - 从 $vars.ui_file 查找: 页面名称、组件清单
      - 从 $vars.ux_file 查找: 状态机、交互序列
      - 标记 UI 闭环检查项: 入口 → 操作 → 反馈 → 恢复

      ### 4. 交叉引用测试用例
      - 从 $vars.e2e_cases_file 查找关联的 TC-NNN ID
      - 从 $vars.acceptance_cases_file 查找抽象 TC ID（如有）

      ### 5. 生成检查项
      每个必需 Story 生成一个多维度检查项:

      ```markdown
      ### STORY-XXX: <标题>
      - **描述**: <一句话>
      - **验收标准**: <Given/When/Then>
      - **技术规格**: <API 端点 / DB 表 / 服务类 from 03-solution>
      - **UI 组件**: <页面 + 组件列表 from 07-ui>（如适用）
      - **UX 状态**: <状态机 / 交互序列 from 08-ux>（如适用）
      - **测试用例**: TC-001, TC-002 (from e2e-cases)
      - **计划文件**: <文件路径 from plan.md>
      - **验证方法**: <代码检查 | 单元测试 | API 测试 | UI 测试>
      - status: pending
      ```

      ## 输出文件
      保存到 `$vars.output_dir/completeness-checklist.md`

      格式:
      ```markdown
      # 完整度检查清单

      ## 概览
      - 必需 Story 总数: N
      - 生成时间: <timestamp>
      - 输入文档: requirements / solution / ui / ux / acceptance-cases / e2e-cases

      ## 检查项

      ### STORY-A1: ...
      ...
      ```

      ## 输出
      {"vars_update":{"completeness_checklist_file":"$vars.output_dir/completeness-checklist.md","conclusion":"生成 N 个必需 Story 的多维度检查清单（交叉引用 solution/ui/ux/test-cases）"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 4-5: E2E (refactored — loop 节点由引擎驱动，不再依赖 LLM 自循环)
  # ═══════════════════════════════════════════════════════════════
  - id: e2e-setup
    type: agent
    depends_on: [completeness-bind, integrate, implement]
    execute_when: '$inputs.run_e2e == "true"'
    timeout: 1800
    prompt: |
      执行 E2E 环境准备。

      $vars.workspace_rules

      ## 环境
      - 交付物类型: $vars.impl_type
      - 项目列表: $vars.projects
      - ⛔ 保护端口: $inputs.protected_ports（绝对不能杀死这些端口上的进程）

      $inputs.e2e_project_rules

      ## 步骤

      ### 1. 检测运行上下文
      ```bash
      WORKSPACE_ROOT="$(pwd)"
      if [ -d "projects" ]; then
        OCTOPUS_DIR=$(ls -d projects/*octopus* 2>/dev/null | head -1)
        echo "模式: Workspace | 项目: $OCTOPUS_DIR"
      elif [ -d "packages/server" ]; then
        OCTOPUS_DIR="$WORKSPACE_ROOT"
        echo "模式: 源码 | 项目: $OCTOPUS_DIR"
      fi
      ```

      ### 1.5 创建 E2E 沙箱目录（所有 E2E 产物隔离，不污染交付）
      ```bash
      SANDBOX_ROOT="$WORKSPACE_ROOT/.e2e-sandbox/run-$(date +%s)"
      mkdir -p "$SANDBOX_ROOT/screenshots" "$SANDBOX_ROOT/leaked" "$SANDBOX_ROOT/workspace"
      echo "E2E 沙箱: $SANDBOX_ROOT"

      # 确保 .gitignore 包含 .e2e-sandbox/防止产物进 PR
      if [ -f "$WORKSPACE_ROOT/.gitignore" ]; then
        if ! grep -qE '^\.e2e-sandbox/' "$WORKSPACE_ROOT/.gitignore"; then
          echo ".e2e-sandbox/" >> "$WORKSPACE_ROOT/.gitignore"
          echo "已将 .e2e-sandbox/ 添加到 .gitignore"
        fi
      else
        echo ".e2e-sandbox/" > "$WORKSPACE_ROOT/.gitignore"
      fi

      # 同时足宿主项目路径如果与 WORKSPACE_ROOT 不同
      if [ -n "$OCTOPUS_DIR" ] && [ "$OCTOPUS_DIR" != "$WORKSPACE_ROOT" ] && [ -d "$OCTOPUS_DIR" ]; then
        if [ -f "$OCTOPUS_DIR/.gitignore" ] && ! grep -qE '^\.e2e-sandbox/' "$OCTOPUS_DIR/.gitignore"; then
          echo ".e2e-sandbox/" >> "$OCTOPUS_DIR/.gitignore"
        fi
      fi
      ```

      ### 1.6 确保 agent-browser 可用
      ```bash
      npx agent-browser --version 2>&1 || echo "WARN: agent-browser install failed, real-e2e-ui will fall back"
      ```

      ### 2. 构建项目
      按 `$inputs.e2e_project_rules` 中的构建命令执行。
      构建失败 → 分析修复 → 重试（最多 2 轮）。

      ### 3. 启动隔离服务
      ⛔ **端口保护**:
      - 按 `$inputs.e2e_project_rules` 中的启动命令启动服务
      - 启动命令必须分配隔离端口，不能触碰 $inputs.protected_ports
      - 构建可能需要数分钟（取决于项目大小），**耐心等待**，不要因超时而中断或尝试其他方式启动
      - 使用 `nohup ... &` + `disown` 确保进程在节点结束后存活

      ### 4. 等待构建 + 健康检查
      ⚠️ 不同项目构建时间差异大（30 秒 ~ 10 分钟），使用轮询而非固定等待。
      ```bash
      # 轮询等待端口出现（最多 600 秒 = 10 分钟）
      for i in $(seq 1 120); do
        SERVER_PORT=$(grep -oP 'server[=: ]+\K[0-9]+' /tmp/e2e-dev.log | head -1)
        [ -n "$SERVER_PORT" ] && break
        sleep 5
      done
      WEB_PORT=$(grep -oP 'web[=: ]+\K[0-9]+' /tmp/e2e-dev.log | head -1)
      echo "Server: $SERVER_PORT | Web: $WEB_PORT | PID: $DEV_PID"
      ```

      然后按 `$inputs.e2e_project_rules` 中的健康检查路径轮询确认可用（最多 120 秒）。
      超时 → 报错退出（**不要**尝试用其他方式启动 server）。

      ### 5. 创建测试工作空间（yaml-workflow 类型）
      ```bash
      if [ "$vars.impl_type" = "yaml-workflow" ]; then
        # 尝试重用已存在的临时 e2e workspace
        WS_ID=$(curl -s "http://localhost:$SERVER_PORT/api/workspaces" \
          | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{
              const ws=JSON.parse(d);
              const m=ws.find(w=>w.name&&w.name.startsWith('e2e-test-'));
              console.log(m?m.id:'');
            })")
        if [ -z "$WS_ID" ]; then
          # 创建新 workspace，base_path 显式指向沙箱目录（需项目调整）
          WS_NAME="e2e-test-$(date +%s | tail -c 5)"
          WS_BODY=$(node -e "console.log(JSON.stringify({name:'$WS_NAME',base_path:'$SANDBOX_ROOT/workspace'}))")
          WS_ID=$(curl -s -X POST "http://localhost:$SERVER_PORT/api/workspaces" \
            -H "Content-Type: application/json" \
            -d "$WS_BODY" \
            | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).id||''))")
          # 如果服务不支持 base_path，则重试不传 base_path但本节点仍记录 SANDBOX_ROOT供 teardown 使用
          if [ -z "$WS_ID" ]; then
            WS_ID=$(curl -s -X POST "http://localhost:$SERVER_PORT/api/workspaces" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"$WS_NAME\"}" \
              | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).id||''))")
          fi
        fi
        echo "Workspace: $WS_ID | base_path: $SANDBOX_ROOT/workspace"
      fi
      ```

      ### 6. 发送通知
      ```bash
      octopus notify --ignore-failure \
        --title "🚀 $vars.display_name — [Step 1] E2E 环境就绪" \
        --body "Server: $SERVER_PORT | Web: $WEB_PORT | PID: $DEV_PID"
      ```

      ## 输出
      {"vars_update":{"e2e_octopus_dir":"$OCTOPUS_DIR","e2e_server_port":"$SERVER_PORT","e2e_web_port":"$WEB_PORT","e2e_dev_pid":"$DEV_PID","e2e_workspace_id":"$WS_ID","e2e_sandbox_dir":"$SANDBOX_ROOT","conclusion":"E2E 环境就绪，沙箱: $SANDBOX_ROOT"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 4.5: Real E2E UI — 浏览器真实点击 + 截图 + DOM 断言
  # 与 e2e-completeness-loop 并行；仅 host_has_ui == "true" 执行
  # 输出作为 e2e-completeness-round 的硬证据输入。
  # ═══════════════════════════════════════════════════════════════
  - id: real-e2e-ui
    type: agent
    depends_on: [e2e-setup, completeness-bind]
    execute_when: '$inputs.run_e2e == "true" && $vars.host_has_ui == "true"'
    timeout: 7200
    agents:
      browser-tester:
        description: "浏览器 E2E 测试员 — 用 agent-browser 真实点击与断言"
        agent_file: ".claude/agents/testing-qa-engineer.md"
        model: sonnet
        tools: ["Read", "Grep", "Glob", "Bash"]
        prompt: |
          你是浏览器 E2E 测试执行者。测试分配给你的 ui_state 类用例。

          ## 每条用例必须完成
          1. 使用 agent-browser 打开页面（不要 Mock）
          2. 按用例中的交互序列点击 / 输入 / 导航
          3. **截图**保存到指定路径
          4. 提取关键 DOM selector 的状态文本作为证据
          5. 只有同时有【截图】+【DOM 断言通过】才算 passed

          ⛔ 禁止"代码看上去应该能用"类型的报告。没有截图证据 = failed。
          ⛔ 不跳过、不排除。环境问题标记为 failed。

          ## 输出
          每条用例测完后输出 JSON 行:
          {"tc":"TC-NNN","status":"passed/failed","screenshot":"截图路径","dom_evidence":"selector + 实际文本","fail_reason":"失败原因或空"}
    prompt: |
      你是浏览器 E2E 测试编排器。你**不做**任何浏览器操作、不读截图、不分析 DOM。
      所有测试工作委派给 **browser-tester** 子代理执行。

      $vars.workspace_rules

      ## 环境
      - Server: http://localhost:$vars.e2e_server_port
      - Web: http://localhost:$vars.e2e_web_port
      - 沙箱: $vars.e2e_sandbox_dir
      - 用例文件: $vars.e2e_cases_file

      ## 编排策略
      1. 读取 `$vars.e2e_cases_file`，提取所有 `ui_state` 类 P0/P1 用例
      2. 按用例独立性分组，**可并行的用例同时委派多个 browser-tester**：
         - 独立页面/无共享状态的用例 → 并行（同时发起多个 Agent 调用）
         - 有依赖关系的用例（如同一页面的不同交互序列）→ 串行
      3. 每个 browser-tester 的委派 prompt 包含：
         "测试用例 TC-NNN：<用例内容>。
         Server: http://localhost:$vars.e2e_server_port
         Web: http://localhost:$vars.e2e_web_port
         截图保存到 $vars.e2e_sandbox_dir/screenshots/TC-NNN.png
         测试完成后输出 JSON: {tc, status, screenshot, dom_evidence, fail_reason}"
      4. ⛔ 你不读截图、不分析图片。只从 browser-tester 返回的 JSON 提取结果

      ## 收集与报告
      所有 browser-tester 返回后，汇总结果写入 `$vars.output_dir/real-e2e-ui-report.md`:

      ```markdown
      # Real E2E UI Report

      运行时间: <ISO>
      总用例数: N
      通过数: M
      失败数: K

      ## 逐用例详情

      | TC | Priority | 状态 | 截图证据 | DOM 证据 | 失败原因 |
      |----|----------|------|----------|----------|----------|
      | TC-001 | P0 | passed | screenshots/TC-001.png | div.workflow-list>li | - |
      | TC-018 | P1 | failed | screenshots/TC-018.png | - | selector 没找到 |
      ```

      ## 同步到 e2e-fix-progress.json
      读取 `$vars.output_dir/e2e-fix-progress.json`（如存在），将所有 UI 用例结果合并进去：
      - 每个 ui_state 用例写入 `"type":"ui"` 字段
      - 已存在的 case 更新 status/last_tested_round
      - 不存在的 case 新增
      - ⛔ 不覆盖 `type:"api"` 的已有用例
      用 Write 工具写回文件。这确保 e2e-fix-round 能在统一数据流中看到 UI 失败用例。

      ⚠️ 本节点输出不阻断主流程——real_e2e_ui_passed=false 会驱动 e2e-fix-loop 修复。

      ## 输出
      {"vars_update":{"real_e2e_ui_passed":"<true 仅当全部 ui_state TC 都 passed>","real_e2e_ui_total":"<总数>","real_e2e_ui_failed_list":"<逗号分隔失败 TC ID，空串=全过>","real_e2e_ui_report":"$vars.output_dir/real-e2e-ui-report.md","conclusion":"<2 句话：通过率 + 失败主因>"}}

  - id: e2e-completeness-loop
    type: loop
    depends_on: [e2e-setup, completeness-bind]
    execute_when: '$inputs.run_e2e == "true"'
    max_iterations: 30
    break_when: '$vars.completeness_exit_code != "" || $iteration >= $inputs.completeness_max_rounds'
    nodes:
      - id: e2e-completeness-round
        type: agent
        timeout: 3600
        context: new
        agents:
          product-completeness-assessor:
            description: "产品完整度评估员 — 对照 PRD 必需功能评估实现覆盖度"
            prompt: |
              ## 产品完整度评估（硬证据驱动 — v3）

              对照 PRD 需求文档评估实现的完整度。
              **P0（核心）和 P1（增强）都必须 100% 实现。P0 要求深度测试，P1 要求基本功能验证通过。**

              ⛔ **规则：用户输入的所有功能都是"必需"，如果某个用户提出的功能未实现，必须列为缺失项。**
              ⛔ **硬证据规则：不允许"代码看上去应该能用"类型的抨告。每个 Story 打分必须有对应证据。**

              ## 证据输入（必读）
              - **有 UI 的 Story** → $vars.real_e2e_ui_report（只有 passed 的 TC 才能算有证据）
              - **无 UI 的 Story** → $vars.output_dir/e2e-fix-progress.json（只有 status=="passed" 的 api_response/cli_output/file_content 类 TC 才能算有证据）
              - **补充依据** → $vars.completeness_checklist_file（仅用于查询 Story 与 TC 的映射关系）

              ## 评分硬规则（取代原 4 维加权估算）

              ### 逐 Story 评分
              对 $vars.requirements_file 中的每个 Story：
              1. **判断 Story 是否涉及 UI**（看验收标准中是否提及页面/点击/交互，或 ui_file 存在对应页面）
              2. **证据查找**：
                 - UI Story → 在 real_e2e_ui_report 找对应 TC 的 passed 记录与截图路径
                 - 非 UI Story → 在 e2e-fix-progress.json 找对应 TC 的 status=="passed"
              3. **评分**：
                 - 有证据 → 该 Story 1 分
                 - 无证据 → 该 Story **0 分**（不是降分，是直接 0，即使代码看上去实现了）
                 - **严禁 LLM 凭"代码读了试响该能过"给分**

              ### 总分与出口判定
              - completeness_score = 起分 Story 数 / 总 Story 数 × 100
              - **completeness_score == 100 仅在以下同时成立时**：
                - real_e2e_ui_passed == "true"（如 host_has_ui == "true"）
                - 所有 api_response 类 TC 在 e2e-fix-progress.json status == "passed"
                - 所有 cli_output / file_content 类 TC 有实际证据
                - 任一条不满足 → score 不允许 == 100
              - 如该轮评估证据不齐 → 不要填 max_iterations 上限，让引擎驱动下一轮 e2e-fix-loop

              ## 输出要求

              ### 1. 评分明细表（逐 Story）
              | Story | UI? | TC | 证据 | 得分 |
              |-------|-----|----|----- |------|
              | STORY-001 | 是 | TC-001 | screenshots/TC-001.png | 1 |
              | STORY-002 | 否 | TC-005 | e2e-fix-progress.json: passed | 1 |
              | STORY-003 | 是 | TC-007 | 无截图证据 | 0 |
              | **总计** | | | | **N/M = X%** |

              ### 2. 缺失项清单（供 e2e-fix-loop 下轮优先修复）
              - **具体描述**：缺什么证据（存在实现但无 E2E 证据仍计缺失）
              - **所需 TC**：该 Story 应由哪个 TC 覆盖
              - **优先级**：高/中/低
              - **修复方向**：是补 TC、补截图、还是实际补功能代码

              ### 3. 轮次对比（round > 1 时）
              - 上一轮的哪些缺失项本轮拿到证据了？
              - 评分变化: <上轮>% → <本轮>% (±<delta>)
            model: sonnet
            tools: ["Bash", "Read", "Grep", "Glob"]

          api-tester:
            description: "API 测试员 — 重测修复后的用例"
            agent_file: ".claude/agents/testing-api-tester.md"
            prompt: |
              ## API 重测任务
              重测与本轮修复相关的 API 端点，验证修复是否生效。
              每个断言必须有 HTTP 响应证据。
            model: sonnet
            tools: ["Bash", "Read", "Write", "Edit", "Grep", "Glob"]
        prompt: |
          你是产品完整度修复工程师。这是第 $iteration 轮（上限 $inputs.completeness_max_rounds 轮）。

          $vars.workspace_rules

          $inputs.e2e_project_rules

          ## 评估维度与阈值
          - ⚠️ **固定 100% strict 模式** — 所有 4 个维度必须 100% 覆盖，不接受部分完成
          - P0（核心）和 P1（增强）都必须 100% 实现和通过；P0 要求深度测试，P1 要求基本验证通过
          - 完整度检查清单: $vars.completeness_checklist_file（⚠️ 必须使用）
          - PRD 需求: $vars.requirements_file
          - 实现计划: $vars.plan_file
          - Server: http://localhost:$vars.e2e_server_port
          - 项目目录: $vars.e2e_octopus_dir

          ## 上一轮状态
          - 总分: $vars.completeness_score%
          - 必需: $vars.completeness_must_have_score%
          - 上轮评分: $vars.completeness_score_n1（格式 "总分:必需"，"-:-" 表示无历史）
          - 上上轮评分: $vars.completeness_score_n2
          - 缺失项: $vars.completeness_missing

          ## 进度文件（⚠️ 必须使用，支持暂停续跑和失败重试）
          文件路径: `$vars.output_dir/completeness-progress.json`

          ### 每轮开始时（先读后做）
          1. 尝试读取进度文件（Read 工具）
          2. **文件存在且有 `summary`**:
             - 检查 `summary.exit_code`: 如果是 "R1" 或 "R3"，**直接输出 `vars_update` 设置 `completeness_exit_code` 为相同值并结束本轮**（不重复评估）
             - 检查 `summary.score_n1` 和 `score_n2`: 如果与当前 `$vars.completeness_score_n1` 不同（说明 vars 被重置了），**输出 `vars_update` 将 `completeness_score_n1` 和 `completeness_score_n2` 恢复为文件中的值**
             - 将 `rounds` 数组传给 assessor 用于轮次对比
          3. **文件不存在**: 初始化空结构，使用当前 `$vars.completeness_score_n1` 和 `n2`（默认 "-:-"）

          ### 每轮结束时（做完再写，⚠️ 必须在 vars_update 之前写文件）
          1. 追加本轮到 `rounds` 数组: `{round, total_score, must_have_score, missing_count, missing_high, fixed_items, files_changed, commit}`
          2. 更新 `summary`: `{latest_score, latest_must_have, score_n1, score_n2, exit_code}`
          3. **先用 Write 工具写回进度文件**
          4. **然后**才发送通知和输出 vars_update（vars_update 中的 `completeness_score_n1/n2` 必须与进度文件一致）

          进度文件格式:
          ```json
          {
            "rounds": [
              {"round":1,"total_score":14,"must_have_score":16,
               "missing_count":25,"missing_high":["AgentService","Memory CRUD"],
               "fixed_items":["InitService"],"files_changed":["..."],"commit":"abc123"}
            ],
            "summary": {
              "latest_score":14,"latest_must_have":16,
              "score_n1":"14:16","score_n2":"-:-","exit_code":""
            }
          }
          ```

          ## 本轮任务（⚠️ 只做一轮，引擎会自动循环）

          ### A. 评估（基于检查清单，非从零评估）
          1. 读取 `$vars.completeness_checklist_file`
          2. **只验证 `status: pending` 的项**（`status: passed` 的跳过）
          3. 对每个 pending 项，委派 **product-completeness-assessor** 验证:
             - 代码文件是否存在且非空壳
             - 验收标准是否满足
             - 关联测试用例是否通过
          4. 更新检查清单: passed 的标记 `status: passed`，失败的记录原因
          5. **用 Write 工具写回更新后的检查清单文件**
          6. 计算: total_score = passed 数 / 总数 × 100%
          产出: total_score, must_have_score, 缺失项清单。

          评估完成后发通知:
          ```bash
          octopus notify --ignore-failure \
            --title "📊 $vars.display_name — [完整度 $iteration] 评估完成" \
            --body "总分: <total>% | 必需: <mh>% | 缺失: <N> 项 (高: X, 中: Y, 低: Z)"
          ```

          ### B. 退出判定（严格按顺序，命中即停）

          **R1 达标**:
          - total_score == 100（所有 4 个维度均 100%）→ completeness_exit_code="R1"
          - ⚠️ 99% 不算达标，任何维度未 100% 覆盖都必须继续修复

          **R3 卡死**: 当前评分 == n1 且 n1 == n2（连续 3 轮无变化）→ completeness_exit_code="R3"
          - 格式: "总分:必需"，如 "40:38"
          - "-:-" 是初始值，不会与真实评分匹配，前 2 轮不会误触发

          **均未命中** → 进入 C 修复

          ⚠️ R2（轮数耗尽）由引擎自动处理（$iteration >= $inputs.completeness_max_rounds 时循环结束），你不需要判断。

          如果 R1 或 R3 触发，发退出通知:
          ```bash
          octopus notify --ignore-failure \
            --title "🏁 $vars.display_name — [完整度 $iteration] 退出: <R1/R3>" \
            --body "总分: <total>% | 必需: <mh>% | 原因: <达标/卡死>"
          ```

          ### C. 修复（仅在未触发 R1/R3 时执行）
          1. 从缺失项选取所有高优先级项
          2. 按 assessor 指定的文件实施修复
          3. `pnpm build` 验证
          4. `cd $vars.e2e_octopus_dir && git add -A && git commit -m "feat: 完整度第 $iteration 轮修复"`
          5. 委派 **api-tester** 重测相关用例

          修复完成后发通知:
          ```bash
          octopus notify --ignore-failure \
            --title "🛠️ $vars.display_name — [完整度 $iteration] 修复完成" \
            --body "修复: <具体改了哪些功能/文件> | build: <通过/失败> | 下一轮将重新评估"
          ```

          ## ⛔ 规则
          - 只执行一轮，引擎自动循环
          - 严禁"心理满意退出"（"差不多够了"不是退出理由）
          - R2 由引擎处理，你只管 R1 和 R3
          - 退出码为空串时，引擎自动进入下一轮

          ## 输出
          {"vars_update":{"completeness_score":"<总分 0-100>","completeness_must_have_score":"<必需功能分 0-100>","completeness_exit_code":"<R1/R3 或空串>","completeness_rounds":"$iteration","completeness_score_n1":"<本轮 总分:必需，供下轮比较>","completeness_score_n2":"$vars.completeness_score_n1","completeness_missing":"<缺失项摘要>","completeness_passed":"<true 仅 R1，否则 false>","conclusion":"第 $iteration 轮: <摘要>"}}

  - id: e2e-fix-loop
    type: loop
    depends_on: [e2e-completeness-loop, real-e2e-ui]
    execute_when: '$inputs.run_e2e == "true"'
    max_iterations: 30
    break_when: '($vars.e2e_reality_issues == "0" && $vars.e2e_fix_all_passed == "true") || $iteration >= $inputs.e2e_fix_rounds'
    nodes:
      - id: e2e-fix-round
        type: agent
        timeout: 3600
        context: new
        agents:
          diagnostician:
            description: "深度诊断分析员 — 分析测试失败根因（7 种分类）"
            agent_file: ".claude/agents/engineering-software-architect.md"
            prompt: |
              ## 诊断任务
              分析测试失败原因，判断根因类型:
              YAML_ERROR / CODE_BUG / FEATURE_NOT_IMPL / AGENT_TIMEOUT / PORT_CONFLICT /
              ENVIRONMENT_CORRUPT / TEST_FLAKY / ASSERTION_ERROR

              对每种根因给出:
              1. 具体错误位置和原因
              2. 修复方案（改哪个文件、改什么内容）
              3. 是否需要 workspace rebuild
            model: sonnet
            tools: ["Bash", "Read", "Grep", "Glob"]

          code-reviewer:
            description: "代码审查员 — 验证修复代码质量，防止修复引入新问题"
            agent_file: ".claude/agents/engineering-code-reviewer.md"
            prompt: |
              ## 修复代码审查
              审查本轮修复的代码变更:
              1. 修复是否正确解决了原问题？
              2. 修复是否引入新问题？
              3. 代码质量是否达标（错误处理、命名、结构）？
              严重级别: 🔴 BLOCKER / 🟡 SUGGESTION / 🔵 MINOR
            model: sonnet
            tools: ["Bash", "Read", "Grep", "Glob"]

          api-tester:
            description: "API 测试员 — 重测修复后的 API 端点"
            agent_file: ".claude/agents/testing-api-tester.md"
            prompt: |
              ## API 重测任务
              重测之前失败的 API 端点，验证修复是否生效。
              每个断言必须有 HTTP 响应证据。
            model: sonnet
            tools: ["Bash", "Read", "Write", "Edit", "Grep", "Glob"]

          browser-tester:
            description: "浏览器 E2E 测试员 — 重测上轮失败的 UI 用例"
            agent_file: ".claude/agents/testing-qa-engineer.md"
            prompt: |
              你是浏览器 E2E 测试执行者。只重测上轮失败的 ui_state 类用例。

              ## 每条用例必须完成
              1. 使用 agent-browser 打开页面（不要 Mock）
              2. 按用例中的交互序列点击 / 输入 / 导航
              3. **截图**保存到指定路径
              4. 提取关键 DOM selector 的状态文本作为证据
              5. 只有同时有【截图】+【DOM 断言通过】才算 passed

              ⛔ 禁止"代码看上去应该能用"类型的报告。没有截图证据 = failed。

              ## 输出
              每条用例测完后输出 JSON 行:
              {"tc":"TC-NNN","status":"passed/failed","screenshot":"截图路径","dom_evidence":"selector + 实际文本","fail_reason":"失败原因或空"}
            model: sonnet
            tools: ["Bash", "Read", "Grep", "Glob"]
        prompt: |
          你是 E2E 修复工程师。这是第 $iteration 轮修复（上限 $inputs.e2e_fix_rounds 轮）。

          $vars.workspace_rules

          $inputs.e2e_project_rules

          ## 当前状态
          - Server: http://localhost:$vars.e2e_server_port
          - Web: http://localhost:$vars.e2e_web_port
          - P0: $vars.e2e_p0_passed/$vars.e2e_p0_count
          - P1: $vars.e2e_p1_passed/$vars.e2e_p1_count
          - 项目目录: $vars.e2e_octopus_dir
          - ⛔ 保护端口: $inputs.protected_ports
          - ⚠️ P0（核心）和 P1（增强）都存在，两者都必须 100% 通过

          ## 裁判批注（最高优先级，最先读取）
          文件路径: `$vars.output_dir/e2e-reality-notes.json`

          ### 每轮开始时（先读批注再做其他）
          1. 尝试读取批注文件（Read 工具），文件不存在则跳过
          2. 如果存在：
             - 提取所有 `verdict == "fake_pass"` 的用例及其 `must_fix` 内容
             - 读取 `global_notes`（如有）— 本轮所有修复必须遵守
          3. **修复优先级**:
             - 🔴 最高：`fake_pass` 用例 → 必须按 `must_fix` 要求重做，禁止用相同方式再次提交
             - 🟡 次高：`failed` 用例 → 正常修复
             - 🔵 普通：`pending` 用例 → 正常测试
          4. 如果 `global_notes` 指出系统性问题（如"多个用例用 mock 绕过"），本轮所有修复都必须避免该模式

          ## 进度文件（⚠️ 必须使用，支持暂停续跑和失败重试）
          文件路径: `$vars.output_dir/e2e-fix-progress.json`

          ### 每轮开始时（先读后做）
          1. 尝试读取进度文件（Read 工具）
          2. **文件不存在**: 初始化空进度。从 `$vars.e2e_cases_file` 用 Grep 提取所有 `### TC-NNN` 或 `## TC-NNN` 开头的行获取 case ID 列表，全部标记 `"status":"pending"`
          3. **文件存在**: 解析 JSON，统计 passed / failed / pending 数量
          4. **重测 `status == "failed"` 或 `status == "pending"` 的用例**
          5. `status == "passed"` 的用例跳过
          6. ⛔ **不存在 skipped/excluded 状态** — 所有用例要么 passed 要么 failed

          ### 每轮结束时（做完再写，⚠️ 必须在 vars_update 之前写文件）
          1. 更新每个重测 case 的 `status`（passed/failed）和 `last_tested_round`
          2. ⛔ **禁止跳过、禁止排除** — 所有用例必须实际执行并断言。如因环境问题无法执行，标记为 `failed` 并记录 `root_cause`，而非 `skipped`。
          3. 本轮修复的 case 记录 `root_cause`、`fix_summary`、`fix_files`
          4. 追加本轮到 `rounds` 数组: `{round, p0, fixed, root_causes, files_changed, commit}`
          5. 更新 `summary`: `{total_rounds, all_passed}`
          6. **先用 Write 工具写回进度文件**
          7. **然后**才发送通知和输出 vars_update

          进度文件格式:
          ```json
          {
            "cases": {
              "TC-001": {"type":"api","priority":"P0","status":"passed","last_tested_round":1},
              "TC-015": {"type":"api","priority":"P0","status":"failed","last_tested_round":2,
                         "root_cause":"CODE_BUG","fix_summary":"...","fix_files":["..."]},
              "TC-018": {"type":"ui","priority":"P1","status":"failed","last_tested_round":1,
                         "root_cause":"ASSERTION_ERROR","fix_summary":"selector 错误","fix_files":["..."]},
              "TC-048": {"type":"api","priority":"P1","status":"failed","last_tested_round":1,
                         "root_cause":"FEATURE_NOT_IMPL","fix_summary":"...","fix_files":["..."]}
            },
            "rounds": [
              {"round":1,"p0":"25/40","p1":"3/9","fixed":5,
               "root_causes":{"CODE_BUG":3},"files_changed":["..."],"commit":"abc123"}
            ],
            "summary": {"total_rounds":2,"all_passed":false}
          }
          ```
          `type` 字段: `api`（API/CLI/文件类用例）或 `ui`（ui_state 类用例）。
          初始化时从 `$vars.e2e_cases_file` 的 evidence_type 推断: `ui_state` → `ui`，其余 → `api`。

          ## 本轮任务（⚠️ 只做一轮，引擎会自动循环）

          ### 1. 诊断
          委派 **diagnostician** 分析所有**失败和待测**用例的根因（跳过已 passed 的）。
          根因分类: YAML_ERROR / CODE_BUG / FEATURE_NOT_IMPL / AGENT_TIMEOUT / PORT_CONFLICT /
                   ENVIRONMENT_CORRUPT / TEST_FLAKY / ASSERTION_ERROR

          诊断完成后发通知:
          ```bash
          octopus notify --ignore-failure \
            --title "🔍 $vars.display_name — [修复 $iteration] 诊断完成" \
            --body "失败用例: N 个 | 根因: <分类汇总>"
          ```

          ### 2. 修复
          按根因类型处理:
          - **CODE_BUG**: 修源码 → `pnpm build` 验证
          - **FEATURE_NOT_IMPL**: 功能未实现 → 按 PRD 需求实现缺失功能 → `pnpm build` 验证
          - **ASSERTION_ERROR**: 修正测试预期值
          - **PORT_CONFLICT**: 按下方 Server 重启协议处理
          - **YAML_ERROR**: 修 YAML → `octopus workflow validate`
          - **AGENT_TIMEOUT**: 调大 timeout
          - **ENVIRONMENT_CORRUPT**: rebuild worktree
          - **TEST_FLAKY**: 重跑 3 次取多数结果

          ### 2b. Server 重启协议（修复涉及 server 代码时必须执行）
          ⛔ **硬性约束 — 只允许按 PID 杀进程**:
          ```bash
          # 1. 只杀 e2e-setup 记录的 PID（绝不能杀其他进程）
          kill $vars.e2e_dev_pid 2>/dev/null
          sleep 2

          # 2. 按 $inputs.e2e_project_rules 中的启动命令重启
          cd "$vars.e2e_octopus_dir"
          nohup <启动命令> > /tmp/e2e-dev-restart.log 2>&1 &
          NEW_PID=$!
          disown

          # 3. 轮询等待端口出现（最多 600 秒，构建时间因项目而异）
          for i in $(seq 1 120); do
            NEW_SERVER_PORT=$(grep -oP 'server[=: ]+\K[0-9]+' /tmp/e2e-dev-restart.log | head -1)
            [ -n "$NEW_SERVER_PORT" ] && break
            sleep 5
          done
          NEW_WEB_PORT=$(grep -oP 'web[=: ]+\K[0-9]+' /tmp/e2e-dev-restart.log | head -1)

          # 4. 按 $inputs.e2e_project_rules 中的健康检查路径轮询（最多 120 秒）
          ```
          然后在 vars_update 中输出新的端口和 PID（`e2e_dev_pid` 更新为 `NEW_PID`）。

          **⛔ 绝对禁止的杀进程方式（会导致用户进程被杀）**:
          - `pgrep` / `pkill`（匹配所有同类进程）
          - `lsof -ti :port | kill`（可能杀到保护端口上的进程）
          - `kill-port` / `fuser -k`（同上）
          - `kill $(...)` — 任何形式的进程替换展开
          - 除 `kill $vars.e2e_dev_pid` 以外的任何 kill 命令

          修复完成后发通知:
          ```bash
          octopus notify --ignore-failure \
            --title "🛠️ $vars.display_name — [修复 $iteration] 代码已修复" \
            --body "修复: <具体改了哪些文件/功能> | build: <通过/失败>"
          ```

          ### 3. 重测（按 type 分发）
          从 `e2e-fix-progress.json` 提取所有 `status == "failed"` 的用例，按 `type` 分发：

          **type == "api"** → 委派 **api-tester** 重测。逐用例记录结果。
          **type == "ui"** → 委派 **browser-tester** 重测（如有失败 UI 用例）：
          "以下 UI 用例上轮失败，需要重测：<失败用例列表>。
          Server: http://localhost:$vars.e2e_server_port
          Web: http://localhost:$vars.e2e_web_port
          截图保存到 $vars.e2e_sandbox_dir/screenshots/TC-NNN.png
          逐条测试，输出 JSON 结果。"

          所有重测结果统一写回 `e2e-fix-progress.json` 的对应 case。

          重测完成后发通知:
          ```bash
          octopus notify --ignore-failure \
            --title "🔄 $vars.display_name — [修复 $iteration] 重测完成" \
            --body "API P0: <passed>/<total> | API P1: <passed>/<total> | UI: <passed>/<total> | 全部通过: <是/否>"
          ```

          **无失败用例** → 跳过此步骤，直接设 `e2e_fix_all_passed="true"`。

          ### 4. 审查
          委派 **code-reviewer** 审查修复代码。
          ```bash
          cd "$vars.e2e_octopus_dir"
          git add -A && git commit -m "fix: e2e 修复第 $iteration 轮"
          ```

          ## ⛔ 规则
          - 只执行一轮修复，不要自行循
          - **禁止跳过、禁止排除** — 所有用例必须实际执行并断言。环境问题导致的无法执行标记为 `failed`，而非 `skipped`。
          - `e2e_p0_passed` 只计实际执行并断言通过的用例
          - 全部用例实际通过（passed == total，零失败）→ `e2e_fix_all_passed="true"`
          - 仍有失败 → `e2e_fix_all_passed="false"`（引擎会驱动下一轮）
          - 零失败进入本轮 → 发"无需修复"通知 → 设 `e2e_fix_all_passed="true"`
          - ⚠️ **强化完成** — 每轮必须尽可能多的修复失败用例，不允许"心理满意退出"。每轮至少修复所有 failed 用例或明确记录无法修复的原因。

          ## 输出
          {"vars_update":{"e2e_p0_passed":"<实际通过数>","e2e_p1_passed":"<实际通过数>","e2e_skipped":"0","e2e_excluded":"0","e2e_fix_all_passed":"<true/false>","e2e_fix_rounds":"$iteration","conclusion":"第 $iteration 轮修复: <摘要>"}}

      - id: e2e-reality-check
        type: agent
        depends_on: [e2e-fix-round]
        timeout: 1800
        context: new
        model: sonnet
        agents:
          reality-checker:
            description: "反假跑裁判 — 默认 NEEDS WORK，要求压倒性证据"
            agent_file: ".claude/agents/testing-reality-checker.md"
            model: sonnet
            tools: ["Bash", "Read", "Grep"]
        prompt: |
          你是 E2E 反假跑裁判。这是第 $iteration 轮验证。
          每轮完全独立评估，不读取上轮批注，不依赖历史结论。

          $vars.workspace_rules

          $inputs.e2e_project_rules

          ## 输入
          - 进度文件: $vars.output_dir/e2e-fix-progress.json
          - E2E 用例: $vars.e2e_cases_file
          - Server: http://localhost:$vars.e2e_server_port
          - Web: http://localhost:$vars.e2e_web_port

          ## 任务

          ### 1. 确定验证范围
          从 e2e-fix-progress.json 提取所有 `status == "passed"` 的用例。
          这些是 fix-round 声称已修复的用例，你需要逐一验真。

          ### 2. 逐用例验真
          委派 **reality-checker** 对每个 passed 用例检查：

          **自动 fake_pass 触发（任一即判定）**:
          - 测试代码使用 mock/stub 绕过真实调用
          - 断言检查的是常量而非运行时值
          - HTTP 测试无实际响应文本证据
          - UI 测试无截图证据
          - 测试 duration < 1 秒（空跑）
          - Agent 0 token 使用
          - 修复文件与测试文件无关（改了 A 但测 B）

          **判定**:
          - 无上述触发 → `verified`
          - 有任一触发 → `fake_pass`，写 `must_fix` 指导

          ### 3. 写入发现文件（覆盖）
          用 Write 工具写入 `$vars.output_dir/e2e-reality-findings.json`:
          ```json
          {
            "round": $iteration,
            "global_notes": "<本轮发现的系统性问题，给下轮 fix-round 的总体指导>",
            "cases": {
              "TC-001": { "verdict": "verified" },
              "TC-023": { "verdict": "fake_pass", "must_fix": "<具体指导>" }
            }
          }
          ```
          - 每个 passed 用例必须有 verdict
          - e2e-fix-progress.json 中 `failed` 的用例不写入
          - ⛔ 不读取 e2e-reality-notes.json — 每轮独立评估，合并由 merge 节点负责

          ## 输出
          {"vars_update":{"conclusion":"第 $iteration 轮裁判发现: <verified N / fake_pass M>"}}

          ## 规则
          - 不修改代码，不修改 e2e-fix-progress.json
          - 只读 e2e-fix-progress.json 和测试源码
          - global_notes 要具体：指出系统性问题（如"本轮多个用例用 mock 绕过"）
          - must_fix 要可执行：指明改哪个文件、用什么方式
          - ⛔ 每轮独立，不读上轮批注，防止自我确认偏差

      - id: e2e-reality-merge
        type: agent
        depends_on: [e2e-reality-check]
        timeout: 600
        context: new
        prompt: |
          你是裁判批注合并器。将本轮发现与累积批注合并，输出确定性结果。

          ## 输入
          - 本轮发现: `$vars.output_dir/e2e-reality-findings.json`（e2e-reality-check 产出）
          - 累积批注: `$vars.output_dir/e2e-reality-notes.json`（上轮合并结果，可能不存在）
          - 进度文件: `$vars.output_dir/e2e-fix-progress.json`（当前 case 状态）

          ## 任务

          ### 1. 读取文件
          用 Read 工具读取三个文件。e2e-reality-notes.json 不存在时视为空 `{cases:{}}`。

          ### 2. 合并规则（确定性，不靠 LLM 判断）
          对每个 case 按以下优先级决策：

          | 累积 notes | 本轮 findings | fix-progress | → 结果 |
          |-----------|--------------|-------------|--------|
          | verified  | 未提及        | passed      | verified（保留） |
          | verified  | fake_pass    | passed      | fake_pass（本轮发现覆盖） |
          | —         | verified     | passed      | verified（新增） |
          | —         | fake_pass    | passed      | fake_pass（新增） |
          | fake_pass | 未提及        | failed      | 丢弃（fix-round 还没修好） |
          | fake_pass | 未提及        | passed      | 保留 fake_pass（fix-round 声称修好但本轮未验） |

          `global_notes`: 取本轮 findings 的 global_notes（覆盖上轮）。

          ### 3. 写入累积批注
          用 Write 工具写入 `$vars.output_dir/e2e-reality-notes.json`:
          ```json
          {
            "round": $iteration,
            "global_notes": "<本轮 findings 的 global_notes>",
            "cases": {
              "TC-001": { "verdict": "verified" },
              "TC-002": { "verdict": "verified" },
              "TC-023": { "verdict": "fake_pass", "must_fix": "..." }
            }
          }
          ```

          ### 4. 统计并发送通知
          ```bash
          FAKE_COUNT=$(grep -c '"fake_pass"' "$vars.output_dir/e2e-reality-notes.json" 2>/dev/null || echo 0)
          VERIFIED_COUNT=$(grep -c '"verified"' "$vars.output_dir/e2e-reality-notes.json" 2>/dev/null || echo 0)
          TOTAL=$(grep -c '"verdict"' "$vars.output_dir/e2e-reality-notes.json" 2>/dev/null || echo 0)

          if [ "$FAKE_COUNT" -gt 0 ]; then
            octopus notify --ignore-failure \
              --title "⚠️ $vars.display_name — [修复 $iteration] 合并: $FAKE_COUNT 个假跑 / $VERIFIED_COUNT 已验证" \
              --body "累积: verified=$VERIFIED_COUNT fake_pass=$FAKE_COUNT total=$TOTAL"
          fi
          ```

          ## 输出
          {"vars_update":{"e2e_reality_issues":"<合并后 fake_pass 总数>","e2e_reality_verified":"<合并后 verified 总数>","conclusion":"第 $iteration 轮合并: verified=$VERIFIED_COUNT fake_pass=$FAKE_COUNT"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 5.5: E2E Teardown — 清理运行时产物 + 最终判定（不阻断）
  # ═══════════════════════════════════════════════════════════════
  - id: e2e-teardown
    type: agent
    depends_on: [e2e-fix-loop]
    execute_when: '$inputs.run_e2e == "true"'
    timeout: 600
    prompt: |
      E2E 收尾：最终判定 + 环境清理。**不阻断**，单项失败也继续。

      $vars.workspace_rules

      ## 1. 最终判定
      ```
      e2e_passed = (e2e_fix_all_passed == "true")
                   && (e2e_reality_issues == "0")
                   && (completeness_passed == "true")
      ```
      ⛔ 三个条件必须全部满足。任一不满足 → e2e_passed = "false"。

      ## 2. 发送最终通知
      ```bash
      if [ "$vars.e2e_fix_all_passed" = "true" ] && [ "$vars.e2e_reality_issues" = "0" ] && [ "$vars.completeness_passed" = "true" ]; then
        RESULT_ICON="✅"
        RESULT_TEXT="E2E 质量保证通过"
      else
        RESULT_ICON="🚫"
        RESULT_TEXT="E2E 质量保证未通过"
      fi

      octopus notify --ignore-failure \
        --title "$RESULT_ICON $vars.display_name — $RESULT_TEXT" \
        --body "P0: $vars.e2e_p0_passed/$vars.e2e_p0_count | P1: $vars.e2e_p1_passed/$vars.e2e_p1_count
      完整度: $vars.completeness_score% | 必需: $vars.completeness_must_have_score%
      裁判: verified=$vars.e2e_reality_verified fake_pass=$vars.e2e_reality_issues
      修复: $vars.e2e_fix_rounds 轮 | 完整度: $vars.completeness_rounds 轮"
      ```

      ## 3. 环境清理（按顺序，单项失败不影响后续）
      ```bash
      # 关闭浏览器会话
      agent-browser --session e2e close 2>/dev/null || true

      # 删除测试工作空间（yaml-workflow 类型才有）
      if [ -n "$vars.e2e_workspace_id" ] && [ -n "$vars.e2e_server_port" ]; then
        curl -s -X DELETE "http://localhost:$vars.e2e_server_port/api/workspaces/$vars.e2e_workspace_id" || true
      fi

      # 杀临时服务进程（仅按 PID，绝不广杀）
      if [ -n "$vars.e2e_dev_pid" ]; then
        kill $vars.e2e_dev_pid 2>/dev/null || true
      fi

      echo "沙箱保留: $vars.e2e_sandbox_dir"
      echo "报告保留: $vars.output_dir"
      ```

      ## 输出
      {"vars_update":{"e2e_passed":"<$vars.e2e_fix_all_passed && $vars.e2e_reality_issues==0 && $vars.completeness_passed>","e2e_summary":"P0: $vars.e2e_p0_passed/$vars.e2e_p0_count | P1: $vars.e2e_p1_passed/$vars.e2e_p1_count | 修复: $vars.e2e_fix_rounds 轮 | 裁判: verified=$vars.e2e_reality_verified fake=$vars.e2e_reality_issues","e2e_torn_down":"true","conclusion":"E2E 收尾完成: e2e_passed=<true/false>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 5.6: Pre-PR Cleanup — 自动修补不阻断 PR。
  # 发现问题只记录到审计报告，不会反转所有代码，不会中断流程。
  # ═══════════════════════════════════════════════════════════════
  - id: pre-pr-cleanup
    type: agent
    depends_on: [e2e-teardown]
    timeout: 1200
    prompt: |
      PR 提交前的自动清理。**不会失败，只会修补和记录**。

      $vars.workspace_rules

      ## 项目路径: $vars.e2e_octopus_dir（主项目、代码变更所在处）

      ```bash
      cd "$vars.e2e_octopus_dir" || cd "$vars.project_path" || true
      ```

      ## 修补 1：沙箱泄漏
      ```bash
      # 检查是否有 .e2e-sandbox/ 被误加入暂存
      if git diff --cached --name-only | grep -qE '^\.e2e-sandbox/'; then
        git reset HEAD -- .e2e-sandbox/ 2>/dev/null || true
        echo "已 unstage .e2e-sandbox/ 内容"
      fi
      # 同时从工作区仓库里移走 .e2e-sandbox/避免后续 git add -A 重新加上
      git rm -rf --cached .e2e-sandbox/ 2>/dev/null || true
      ```

      ## 修补 2：测试 workflow 污染
      ```bash
      # 识别起名似 "e2e-test-*" 、"test-*" 位于 workflows/ 跟目录下且不在 tests/ 下的 YAML
      POLLUTED=$(git diff --cached --name-only | grep -E '^workflows/(.*test|e2e-)' | grep -v '^tests/' || true)
      if [ -n "$POLLUTED" ]; then
        # 1) 从暂存区退出
        echo "$POLLUTED" | xargs -r -I{} git reset HEAD -- {}
        # 2) 移动到沙箱联调 leaked/ 下，不删文件以便人工检验
        mkdir -p "$vars.e2e_sandbox_dir/leaked"
        echo "$POLLUTED" | while read -r f; do
          [ -n "$f" ] && [ -f "$f" ] && mv "$f" "$vars.e2e_sandbox_dir/leaked/" 2>/dev/null || true
        done
        echo "已隔离测试 workflow 文件到 $vars.e2e_sandbox_dir/leaked/"
      fi
      ```

      ## 记录 3：范围越界（仅记录，不删除代码）
      读取 $vars.scope_file（如存在）的 OUT-OF-SCOPE 列表。
      扫描 git diff --cached --name-only，查看是否有文件路径明显对应 OUT-OF-SCOPE 项（如包含 auth/login/oauth）。
      如有，写入 `$vars.output_dir/scope-leak-report.md`：
      ```markdown
      # Scope Leak Report
      检测时间: <ISO>
      越界项数: N
      越界详情:
      | OUT-OF-SCOPE 项 | 可能对应的文件 |
      |---------------|------------------|
      | X-001 用户认证 | src/auth/login.ts, src/components/LoginPage.tsx |
      ```
      ⚠️ 不删除代码（completeness-fix 循环本该在需求层处理越界问题），仅记录到审计。

      ## 记录 4：宿主契约违反（仅记录）
      读取 $vars.host_contract_file 的 "强烈不建议" 清单。
      扫描 git diff --cached --stat 检查：
      - 是否创建了 packages/<新包>/
      - 是否引入了新 CSS 方案（package.json 的 dependencies 变化）
      - 是否在某些页面中出现了裸 fetch( 调用
      如有，写入 `$vars.output_dir/host-contract-violations.md`。

      ## 输出
      {"vars_update":{"pr_cleaned":"true","scope_leak_count":"<越界项数>","host_contract_violations":"<违反项数>","conclusion":"自动修补完成 + 违反项已记录到审计报告"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 5.7: Delivery Audit — 生成交付审计报告（PR 描述源文件）
  # ═══════════════════════════════════════════════════════════════
  - id: delivery-audit
    type: agent
    depends_on: [pre-pr-cleanup]
    timeout: 600
    prompt: |
      生成交付审计报告。ship 节点会把本报告追加到 PR 描述里。
      诚实，不夸大。即使未达 100% 也要如实报告。

      $vars.workspace_rules

      ## 输出文件路径
      $vars.output_dir/delivery-audit.md

      ## 报告结构（逐部分按下列填充）

      ```markdown
      # 交付审计报告

      产品: <PRD 名称> | 生成时间: <ISO> | 工作流: prd-impl

      ## 总体结论
      - 完整度总分: $vars.completeness_score / 100
      - 达标轮次: $vars.completeness_rounds / $inputs.completeness_max_rounds
      - 质量判定: <e2e_passed 从 e2e-teardown>
      - 推荐动作: <merge / 继续迭代 / 放弃>

      ## E2E 验收证据
      - **有 UI** (host_has_ui = $vars.host_has_ui):
        - real_e2e_ui_passed: $vars.real_e2e_ui_passed
        - 总用例: $vars.real_e2e_ui_total | 失败: $vars.real_e2e_ui_failed_list
        - 报告: $vars.real_e2e_ui_report
        - 截图证据: $vars.e2e_sandbox_dir/screenshots/（仅审计，不进 PR）
      - **API / CLI / file**:
        - e2e P0: $vars.e2e_p0_passed/$vars.e2e_p0_count
        - e2e P1: $vars.e2e_p1_passed/$vars.e2e_p1_count
        - HTTP 证据: e2e-fix-progress.json
        - 修复轮数: $vars.e2e_fix_rounds

      ## 范围一致性
      - 模式: $vars.scope_mode
      - IN-SCOPE 实现情况: <逐项 ✅/❌，从 completeness-checklist 提取>
      - OUT-OF-SCOPE 越界: $vars.scope_leak_count 项（详见 scope-leak-report.md）
      - EXTENSION-CANDIDATE（creative 模式才有）: <列出实现的扩展项>

      ## 宿主契约一致性
      - 违反项: $vars.host_contract_violations
      - 详见: host-contract-violations.md

      ## 未达项 / 已知问题
      <逐项列出 failed TC 与未实现 IN-SCOPE Story以及建议的后续动作>

      ## 证据链
      - delivery-audit.md（本报告）
      - real-e2e-ui-report.md（浏览器验收）
      - e2e-fix-progress.json（API 证据）
      - completeness-progress.json（完整度轮次记录）
      - scope-leak-report.md / host-contract-violations.md（可选）
      ```

      ## ready_to_merge 判定规则（仅为建议，不阻止 PR）
      ready_to_merge = "true" 仅在以下同时成立：
      - completeness_score == 100
      - real_e2e_ui_passed == "true" 或 host_has_ui != "true"
      - scope_leak_count == "0"
      - host_contract_violations == "0"
      - e2e_reality_issues == "0" && e2e_fix_all_passed == "true"
      任一不满足 → ready_to_merge = "false"，但必须在报告里说明原因。

      ## 输出
      {"vars_update":{"audit_file":"$vars.output_dir/delivery-audit.md","ready_to_merge":"<true/false 仅建议>","conclusion":"完整度 $vars.completeness_score% / ready_to_merge=<true|false>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 6: Ship — 始终创建 PR，并附带审计报告
  # ═══════════════════════════════════════════════════════════════
  - id: ship
    type: agent
    depends_on: [delivery-audit]
    timeout: 86400
    prompt: |
      遍历所有项目，提交、推送并创建 PR。
      ⚠️ Always-Deliver 原则：无论完整度是否达 100%，都必须提交 PR，描述中包含完整的 delivery-audit.md。
      资产营造代价很高，不能因为完整度未达就跳过 PR。

      $vars.workspace_rules

      ## 环境
      - 项目: $vars.projects
      - 分支: $vars.branch
      - 目标: $inputs.base_branch
      - 完整度: $vars.completeness_score%
      - ready_to_merge: $vars.ready_to_merge（仅建议）

      ## 对每个有变更的项目

      1. **进入项目目录**: cd projects/<项目名>
      2. **检查变更**: git status --porcelain（无变更 → 跳过）
      3. **提交**:
         ```bash
         git add -A
         git commit -m "feat: implement PRD $(basename $inputs.prd_dir) (完整度 $vars.completeness_score%)"
         ```
      4. **推送**: git push -u origin $vars.branch
      5. **创建或更新 PR**:
         - 检查是否已有 PR: `EXISTING_PR=$(gh pr list --head "$vars.branch" --json url --jq '.[0].url' 2>/dev/null)`
         - **描述主体**使用 delivery-audit.md 全文：`PR_BODY=$(cat "$vars.audit_file" 2>/dev/null || echo "审计报告生成失败，请查看 $vars.output_dir")`
         - **标题根据 ready_to_merge 描述状态**（但 PR 始终创建）：
           - ready_to_merge=true → "feat: PRD implementation (完整度 $vars.completeness_score%)"
           - ready_to_merge=false → "feat: PRD implementation (完整度 $vars.completeness_score% — 详见审计报告)"
         - **创建**：
           ```bash
           if [ -n "$EXISTING_PR" ]; then
             gh pr comment "$EXISTING_PR" --body "$PR_BODY"
             gh pr edit "$EXISTING_PR" --title "<根据上面规则填入>"
             PR_URL="$EXISTING_PR"
           else
             PR_URL=$(gh pr create \
               --title "<根据上面规则填入>" \
               --body "$PR_BODY" \
               --base "$inputs.base_branch")
           fi
           ```
      6. **收集 PR URL**

      ## ⛔ 绝对不能做的事
      - 不要因为 completeness_score < 100 跳过 PR 创建
      - 不要因为 real_e2e_ui_passed != true 跳过 PR
      - 不要因为 ready_to_merge=false 跳过 PR——那只是给用户看的建议
      - 不要因为某个子步骤失败跳过后面项目的 PR

      ## 输出
      {"vars_update":{"pr_urls":"<JSON Map>","pr_count":"<数量>","conclusion":"创建/更新 N 个 PR 完成 (完整度 $vars.completeness_score%)"}}

  - id: done
    type: bash
    depends_on: [ship]
    timeout: 10
    bash: |
      echo "=== PRD Impl Flow 完成 ==="
      echo "类型: $vars.impl_type | PRs: $vars.pr_count | 完整度: $vars.completeness_score% | E2E: $vars.e2e_passed"
      echo "审计报告: $vars.audit_file"
      echo "ready_to_merge: $vars.ready_to_merge（仅作为人工判断建议，不表示工作流失败）"

      # Always-Deliver：不再写 __status=failed。
      # PR 已创建即表示工作流完成交付即使完整度低。
      # 未达 100% 时画由用户基于审计报告决定后续动作（merge / 迭代 / 放弃）。
      # 如仍需"低完整度"通知，由 hook 根据 ready_to_merge=false 发送"建议人工查看"通知。
      if [ "$vars.ready_to_merge" != "true" ] && [ "$inputs.run_e2e" = "true" ]; then
        REASON="完整度未达 100% 但 PR 已交付｜E2E: $vars.e2e_summary｜完整度: $vars.completeness_score% (退出 $vars.completeness_exit_code)｜必需: $vars.completeness_must_have_score%｜修复: $vars.e2e_fix_rounds 轮｜完整度: $vars.completeness_rounds/$inputs.completeness_max_rounds 轮"
        echo "⚠️ $REASON"
        printf '{"vars_update":{"failed_reason":"%s"}}\n' "$REASON"
      fi
