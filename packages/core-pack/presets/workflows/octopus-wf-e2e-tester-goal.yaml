# yaml-language-server: $schema=./doc/workflow-schema.json
apiVersion: octopus/v1
kind: Workflow
name: octopus-wf-e2e-tester-goal
description: >
  通用 E2E 工作流链测试器（Goal 模式）。
  在 isolated Octopus 环境中创建新工作空间，运行任意目标工作流链（execution tree），
  监控执行直到全部完成。失败时自主诊断根因、修复代码/YAML、重建重测，迭代直到通过。
  环境损坏时支持废弃工作空间并重建新环境。
  编排策略: goal + constraints + agents 子代理，自主规划执行路径。
  注意: goal 模式支持 sub-agents（engine agent.ts resolveAgents() 与模式无关）。

model: opus[1m]
engine: claude
execution_mode: serial
timeout: 86400

inputs:
  target_workflows:
    description: >
      目标工作流。支持两种格式:
      1) 工作流名称，多个逗号分隔:
         "octopus-dev-flow,octopus-pr-review-fix-flow"
         Agent 从当前工作空间的 config.json 找到 octopus 项目的 worktree_path，
         然后在 {worktree_path}/packages/core-pack/presets/workflows/ 中查找对应 YAML
      2) JSON 数组（向后兼容）:
         [{"ref":"octopus-dev-flow","inputs":{"requirement":"xxx"}}]
      第一个为 root execution，后续为 children。
      Agent 会自动分析每个工作流的 inputs 定义，结合 test_requirement 智能生成输入值。
    required: true
  test_requirement:
    description: >
      测试目标描述（自然语言）。优先级高于 target_workflows 中指定的 inputs。
      Agent 会基于此描述 + 工作流 inputs 定义 + 环境信息，智能生成每个工作流的输入。
      留空时 Agent 基于工作流描述自行推断。
    required: false
    default: ""
  org:
    description: "组织名。留空时从当前工作空间自动推断。"
    required: false
    default: ""
  repos:
    description: "项目 repos JSON 数组。留空时从工作空间 config.json 自动推断。"
    required: false
    default: ""
  workspace_name:
    description: "测试工作空间名。留空时 Agent 按前缀+序号自动生成（如 e2e-test-001）。"
    required: false
    default: ""
  protected_ports:
    description: "不可杀死的端口（逗号分隔）"
    required: false
    default: "3000,3001,3098,3099"
  max_fix_rounds:
    description: "最大修复-重测轮数"
    required: false
    default: "5"
  max_workspace_rebuilds:
    description: "最大工作空间重建次数"
    required: false
    default: "2"
  keep_on_failure:
    description: "测试失败时保留环境供手动检查"
    required: false
    default: "true"

variables:
  # ── 前 20 位（Goal Mode 变量快照可见区，按字母排序后取前 20）──
  # WARNING: Goal mode 仅注入前 20 个变量（agent.ts:286-314），值截断到 100 字符
  all_passed: "false"
  build_ok: "false"
  conclusion: ""
  display_name: ""
  evidence_snapshot: ""
  failed_details: ""
  fix_log: ""
  notify_target: "telegram:xzf_hermes"
  per_execution_status: ""
  rebuild_count: "0"
  rebuild_log: ""
  root_execution_id: ""
  server_pid: ""
  server_port: ""
  tested_execution_ids: ""
  total_rounds: "0"
  verification_details: ""
  verification_status: ""
  web_port: ""
  workspace_id: ""
  # ── 20 位之后（仅 Prompt Mode 可见，Goal Mode 截断）──
  resolved_workspace_name: ""
  resolved_org: ""
  resolved_repos: ""
  resolved_inputs: ""
  pr_url: ""
  ship_summary: ""
  last_diagnosis: ""
  max_workspace_rebuilds_val: ""

auto_answers:
  - pattern: ".*"
    answer: "proceed"

# ── Notify 子系统配置 ──
providers:
  hermes-cli:
    type: hermes
    timeout: 30
    min_severity: info

channels:
  default:
    provider: hermes-cli
    target: "telegram:xzf_hermes"

hooks:
  on_workflow_failure:
    - id: notify-failure
      type: notify
      channel: default
      template:
        severity: error
        title: "❌ $vars.display_name (Goal) — 工作流失败"
        body: "🆔 Workspace: ${vars.resolved_workspace_name | default:${vars.workspace_id | default:unknown}}\n🔴 失败节点: ${hook.failed_node_id | default:unknown}\n⏱️ 已运行: ${hook.total_duration_ms | duration}\n📊 修复轮数: ${vars.total_rounds | default:0} | 重建次数: ${vars.rebuild_count | default:0}\n\n💡 *错误信息*:\n${hook.error | default:Unknown error}"

  on_interrupt:
    - id: notify-interrupt
      type: bash
      timeout: 30
      bash: |
        DISPLAY="${vars.display_name:-Octopus E2E Tester}"
        WORKSPACE="${vars.resolved_workspace_name:-${vars.workspace_id:-unknown}}"
        WEB_URL=""
        [ -n "$vars.workspace_id" ] && [ -n "$vars.web_port" ] && WEB_URL="http://localhost:$vars.web_port/workspaces/$vars.workspace_id"

        hermes send -t "${vars.notify_target:-telegram:xzf_hermes}" -q "⚠️ ${DISPLAY} (Goal) — 工作流被中断
        🆔 Workspace: ${WORKSPACE}
        🔧 原因: ${hook.interrupt_reason:-unknown}
        📊 修复轮数: ${vars.total_rounds:-0}
        ${WEB_URL:+🔗 ${WEB_URL}}" 2>&1 || echo "WARN: hermes send failed"

  on_cancel:
    - id: notify-cancel
      type: bash
      timeout: 30
      bash: |
        DISPLAY="${vars.display_name:-Octopus E2E Tester}"
        WORKSPACE="${vars.resolved_workspace_name:-${vars.workspace_id:-unknown}}"

        hermes send -t "${vars.notify_target:-telegram:xzf_hermes}" -q "🛑 ${DISPLAY} (Goal) — 工作流已取消
        🆔 Workspace: ${WORKSPACE}
        📊 修复轮数: ${vars.total_rounds:-0}" 2>&1 || echo "WARN: hermes send failed"

  on_complete:
    - id: notify-complete
      type: bash
      timeout: 30
      bash: |
        DISPLAY="${vars.display_name:-Octopus E2E Tester}"
        WORKSPACE="${vars.resolved_workspace_name:-${vars.workspace_id:-unknown}}"
        STATUS_ICON="✅"
        [ "$vars.all_passed" != "true" ] && STATUS_ICON="❌"
        PR_INFO=""
        [ -n "$vars.pr_url" ] && PR_INFO="🔗 PR: $vars.pr_url"
        WEB_URL=""
        [ -n "$vars.workspace_id" ] && [ -n "$vars.web_port" ] && [ -n "$vars.root_execution_id" ] && WEB_URL="http://localhost:$vars.web_port/workspaces/$vars.workspace_id?tab=detail&execId=$vars.root_execution_id"

        octopus notify --ignore-failure \
          --title "${STATUS_ICON} ${DISPLAY} (Goal) — 测试完成" \
          --body "🆔 Workspace: ${WORKSPACE}
        📊 修复轮数: ${vars.total_rounds:-0} | 重建次数: ${vars.rebuild_count:-0}
        🔍 验证: ${vars.verification_status:-unknown}
        ${PR_INFO}
        ${WEB_URL:+🔗 ${WEB_URL}}

        💡 *结论*:
        ${vars.conclusion:-无}"

  # ⑤ 节点级通知 — 使用新 notify 特性
  on_node_success:
    - id: notify-setup
      type: notify
      nodes: [setup-env]
      channel: default
      template:
        severity: info
        title: "🚀 $vars.display_name (Goal) 启动"
        body: "🖥️ Server: http://localhost:$vars.server_port\n🌐 Web: http://localhost:$vars.web_port\n📦 构建: $vars.build_ok\n🔒 保护端口: $inputs.protected_ports\n📋 目标工作流: $inputs.target_workflows\n🎯 测试需求: ${inputs.test_requirement | default:(自动推断)}"

    - id: notify-final-verify
      type: notify
      nodes: [final-verify]
      channel: default
      template:
        severity: info
        title: "🔍 $vars.display_name — 证据验证: $vars.verification_status"
        body: "📋 $vars.verification_details"

nodes:
  # ═══════════════════════════════════════════════════════════════
  # Phase 0: Setup Environment — 构建 + 启动 isolated server + 安装依赖
  # ═══════════════════════════════════════════════════════════════
  - id: setup-env
    type: agent
    timeout: 900
    context: new
    skills: [verification-before-completion]
    goal: |
      在当前工作空间中完成以下环境搭建:
      1. 首先保存工作空间根目录: WORKSPACE_ROOT="$(pwd)"
      2. 安装 superpowers-zh 技能到工作空间根目录
      3. 安装 agency-agents-zh 代理到 $WORKSPACE_ROOT/.claude/agents/（不是 octopus 项目目录！）
      4. 进入 octopus 项目目录执行 pnpm build 构建
      5. 以 isolated 模式启动 Octopus server + web-app
      6. 等待健康检查通过
      报告 server_port、web_port、server_pid。
      如果构建失败，分析编译错误并尝试修复后重试构建（最多2轮）。
    constraints:
      - "绝不能杀死端口 $inputs.protected_ports"
      - "pnpm build 失败时先诊断根因再修复"
      - "必须验证 server_port 健康检查 (/api/health) 返回 200"
      - "必须验证 web_port 可访问 (HTTP 200)，web_port 通常是 server_port + 1"
      - "报告的端口必须是实际捕获并验证的端口，不能猜测"
      - "必须安装 superpowers-zh: cd $WORKSPACE_ROOT && npx superpowers-zh@latest --tool claude --force"
      - "agency-agents-zh 必须安装到 $WORKSPACE_ROOT/.claude/agents/，不是 octopus 项目目录"
      - "WORKSPACE_ROOT 是工作空间根目录，不是 octopus 源码目录"
    planning:
      tools: [Bash, Read, Grep, Glob]
      verify: true

  # ═══════════════════════════════════════════════════════════════
  # Phase 1: Orchestrator — goal 模式自主规划 + workspace-manager + sub-agents
  # ═══════════════════════════════════════════════════════════════
  - id: orchestrator
    type: agent
    depends_on: [setup-env]
    timeout: 86400
    context: new
    skills: [systematic-debugging, verification-before-completion, dispatching-parallel-agents]
    goal: |
      管理测试工作空间并运行目标工作流链。**严格按 Step 1→6 顺序线性执行，不回头重做已完成的步骤。**
      1. 委派 workspace-manager 校验 octopus 项目 → 创建工作空间 → 验证项目完整性 → 拷贝工作流 → 创建执行树
         **如果 workspace_id 已有值且正常运行，跳过此步**
      2. 启动执行树 → 监控到终态
         **如果 execution 已在运行，跳过 start，直接监控**
      3. 失败时委派 diagnostician 分析根因，修复 octopus worktree_path 中的代码
      4. 环境损坏时委派 workspace-manager 清理旧环境并重建工作空间（最多 max_workspace_rebuilds 次）
      5. 最终委派 evidence-collector + reality-checker 验证真实性
      6. 验证通过且有修复时，委派 shipper 提交代码并创建 PR
      7. 每完成一个大步骤通过 Bash 发送 octopus notify 通知（**每种通知只发一次，不重复**）

      test_requirement 是最高优先级输入，覆盖 org/repos/workspace_name 等所有推断。
      octopus 项目的实际目录名从 config.json 的 repos[].name=="octopus" 取 worktree_path。
    constraints:
      - "绝不能杀死端口 $inputs.protected_ports"
      - "修复代码在 config.json 中 octopus 项目的 worktree_path 目录操作，不是固定的 projects/octopus/"
      - "每轮修复必须记录具体修改了哪些文件和修改内容"
      - "如果连续 2 轮修复同一个问题没有进展，必须换一种修复策略"
      - "ENVIRONMENT_CORRUPT 或 WORKSPACE_CONFIG_ERROR 根因触发 workspace 重建"
      - "重建前必须先清理旧环境: 杀旧进程 → DELETE workspace → 确认干净 → 再创建新的"
      - "workspace-manager 子代理失败时，分析错误修正参数后重试（最多 2 次），不要直接放弃"
      - "workspace-manager 必须先检查已有工作空间，存在且正常则复用，不重复创建"
      - "子代理调用超时或错误时，降级处理（如直接读 API 替代 diagnostician）"
      - "修复轮数和重建次数必须显式计数，达到上限时停止并标记失败"
      - "最终输出必须包含 all_passed (true/false) 和修复/重建摘要"
      - "禁止跳过/模拟任何执行步骤，必须通过 API 获取真实状态"
      - "禁止使用 TodoWrite 或创建计划文件 — 直接按步骤执行，不规划不回头"
      - "严格按 Step 1→2→3→4→5→6 线性执行，每步只做一次（Step 4 修复循环除外）"
      - "通知每种类型只发一次: 📦工作空间创建、▶️执行树启动 各一次，不重复"
      - "如果 workspace_id 已有值且 workspace 正常运行，不要再次调用 workspace-manager"
      - "如果 execution 已在运行，不要再次 start，直接进入监控"
      - "每个 Bash 命令必须在 120 秒内完成 — 引擎有 300 秒 idle timeout，Bash 期间无 LLM 事件，sleep > 120s 会被 abort"
      - "轮询监控时用 sleep 60 + curl 循环（每次 < 120s），绝不用 sleep 300 或更长"
      - "每完成大步骤必须发送通知: octopus notify --ignore-failure --title ... --body ..."
      - "涉及工作空间的通知必须包含 Web UI 链接: http://localhost:{web_port}/workspaces/{workspace_id}?tab=detail&execId={root_execution_id}"
    planning:
      tools: [Bash, Read, Write, Edit, Grep, Glob]
      verify: true
    agents:
      workspace-manager:
        description: "工作空间管理员 — 校验环境、创建/重建工作空间、验证项目完整性、拷贝工作流、创建执行树、按需清理"
        prompt: |
          ## 工作空间管理任务

          严格按以下步骤执行。**每步必须验证成功后才能进入下一步。失败必须报错停止。**

          ### Step 1: 校验当前环境
          ```bash
          ls projects/ | grep -i octopus
          cat config.json
          cd <worktree_path> && git status && git log --oneline -1
          ```
          **门控**: octopus 项目不存在或 git 无效 → 报错停止。

          ### Step 2: 解析 target_workflows
          - 格式 A: 逗号分隔名称 → config.json 找 worktree_path → 验证 YAML 文件存在
          - 格式 B: JSON 数组 → 直接使用
          **门控**: 任一 YAML 不存在 → 报错停止。

          ### Step 3: 智能推断 (test_requirement 最高优先级)
          - org/repos/workspace_name 空时自动推断

          ### Step 4: 清理旧环境（仅重建场景）
          有旧 workspace_id 时:
          - 查找并杀死旧 server/web-app 进程（不杀 protected_ports!）
          - DELETE /api/workspaces/<old_id>
          **门控**: 旧进程未清理 → 不创建新工作空间。

          ### Step 5: 创建新工作空间（或复用已有）
          先查询是否有已存在的 e2e-test 工作空间:
          - 有且正常 → 复用，返回已有 workspace_id
          - 没有 → POST /api/workspaces 创建
          **验证**: GET 返回 200

          ### Step 6: 验证项目完整性（关键！）
          ```bash
          WS_PATH=$(curl -s .../api/workspaces/<id> | jq -r .path)
          ls "$WS_PATH/projects/"
          for dir in "$WS_PATH/projects/"/*/; do git -C "$dir" status; done
          ls "$WS_PATH/projects/" | grep -i octopus
          ```
          **门控**: 任一 worktree 无效 → 报错停止。

          ### Step 7: 拷贝工作流 + 验证
          cp YAML → ls 验证

          ### Step 8: 生成 input_values + 创建执行树 + 验证
          GET /api/workspaces/<id>/executions/tree 确认完整

          ## 输出
          直接输出纯 JSON 行:
          {"vars_update":{"workspace_id":"...","root_execution_id":"...","resolved_workspace_name":"...","resolved_org":"...","resolved_repos":"...","resolved_inputs":"..."}}
        model: sonnet
        tools: [Bash, Read, Write, Grep, Glob]

      diagnostician:
        description: "深度诊断分析员 — 分析失败 execution 的完整日志，定位根因并给出修复方案"
        agent_file: ".claude/agents/engineering-software-architect.md"
        prompt: |
          ## 诊断任务
          分析 execution 失败原因。

          1. GET /api/workspaces/<workspace_id>/executions/<id> 获取详情
          2. 对每个 failed 节点，提取错误信息
          3. 判断根因类型:
             YAML_ERROR / REF_RESOLVE_ERROR / ENGINE_BUG / AGENT_TIMEOUT /
             PORT_CONFLICT / ENVIRONMENT_CORRUPT / WORKSPACE_CONFIG_ERROR / OTHER
          4. 给出具体修复方案（改哪个文件、改什么内容）
          5. 判断是否需要 workspace 重建

          ## 输出
          ```json
          {"root_cause":"<类型>","details":"<描述>","fix_plan":"<修复方案>","needs_workspace_rebuild":"<true/false>"}
          ```
        model: sonnet
        tools: [Bash, Read, Grep, Glob]

      evidence-collector:
        description: "证据收集者 — 确保每个 execution 有实质证据支撑"
        agent_file: ".claude/agents/testing-evidence-collector.md"
        prompt: |
          收集所有 execution 的执行证据链。
          输出: `{"evidence":[{execution_id, node_id, type, duration, tokens, has_real_output}]}`
        model: sonnet
        tools: [Bash, Read, Grep]

      reality-checker:
        description: "现实检验者 — 默认 NEEDS WORK，要求压倒性证据"
        agent_file: ".claude/agents/testing-reality-checker.md"
        prompt: |
          基于证据判定工作流是否真实执行。
          输出判定: PASSED / NEEDS WORK / FAILED
        model: opus[1m]
        tools: [Bash, Read, Grep]

      shipper:
        description: "提交推送员 — 将 octopus 项目中的修复提交并创建 PR"
        prompt: |
          ## Ship 任务

          将 octopus 项目中的修复代码提交、推送并创建 Pull Request。

          ### 步骤 1：检查是否有变更
          ```bash
          cd projects/<octopus_worktree_dir>
          git status --porcelain
          ```
          如果没有变更，输出 `{"vars_update":{"pr_url":"","ship_summary":"无代码变更"}}` 并结束。

          ### 步骤 2：提交
          ```bash
          git add -A
          git commit -m "fix: e2e-tester auto-fix from workflow testing"
          ```

          ### 步骤 3：推送
          ```bash
          git push -u origin HEAD
          ```

          ### 步骤 4：创建 PR
          ```bash
          gh pr create --base "main" --title "fix: e2e-tester 自动修复" --body "<fix_log + 测试情况>"
          ```

          ## 输出
          直接输出纯 JSON 行:
          {"vars_update":{"pr_url":"<PR URL>","ship_summary":"<总结>"}}
        model: sonnet
        tools: [Bash, Read, Grep]

  - id: notify-orchestrator
    type: bash
    depends_on: [orchestrator]
    timeout: 15
    bash: |
      WEB_URL="http://localhost:$vars.web_port/workspaces/$vars.workspace_id?tab=detail&execId=$vars.root_execution_id"
      if [ "$vars.all_passed" = "true" ]; then
        octopus notify --ignore-failure \
          --title "✅ $vars.display_name — Orchestrator 完成 (Goal)" \
          --body "📊 修复轮数: $vars.total_rounds | 重建次数: $vars.rebuild_count
        🎯 全部 execution 通过
        🔗 $WEB_URL

        💡 *结论*:
        $vars.conclusion"
      else
        octopus notify --ignore-failure --severity warn \
          --title "❌ $vars.display_name — Orchestrator 未通过 (Goal)" \
          --body "📊 修复轮数: $vars.total_rounds | 重建次数: $vars.rebuild_count
        🔗 $WEB_URL
        📝 $vars.failed_details"
      fi

  # ═══════════════════════════════════════════════════════════════
  # Phase 3: Final Verification — 证据完整性检查 (Goal 模式)
  # ═══════════════════════════════════════════════════════════════
  - id: final-verify
    type: agent
    depends_on: [notify-orchestrator]
    timeout: 600
    context: new
    skills: [verification-before-completion]
    goal: |
      验证测试证据完整性。检查所有 execution 都有状态记录，
      fix_log 结构完整，all_passed 与 per_execution_status 一致，
      evidence_snapshot 包含实质证据，rebuild_count 与 rebuild_log 条目数一致。
      输出 verification_status (passed/failed) 和 verification_details。
    constraints:
      - "all_passed=true 时必须验证 per_execution_status 全部 completed"
      - "all_passed=false 时 failed_details 必须非空"
      - "evidence_snapshot 不能为空字符串"
      - "不做任何修复操作，只做验证"
    planning:
      tools: [Bash, Read, Grep]
      verify: true

  # ═══════════════════════════════════════════════════════════════
  # Phase 4: Gate + Cleanup / Preserve
  # ═══════════════════════════════════════════════════════════════
  - id: verify-gate
    type: condition
    depends_on: [final-verify]
    cases:
      - when: '$vars.all_passed == "true"'
        then: cleanup
      - when: default
        then: preserve-for-debug

  - id: cleanup
    type: bash
    timeout: 60
    execute_when: '$vars.all_passed == "true"'
    bash: |
      echo "=== 测试通过，清理 isolated 环境 ==="
      if [ -n "$vars.server_pid" ]; then
        if command -v taskkill &>/dev/null; then
          taskkill /PID "$vars.server_pid" /T /F 2>/dev/null || true
        else
          kill "$vars.server_pid" 2>/dev/null || true
        fi
      fi
      echo "Workspace $vars.workspace_id 保留（可通过 API 手动删除）"
      printf '{"vars_update":{"cleanup_done":"true"}}\n'

  - id: preserve-for-debug
    type: bash
    timeout: 30
    execute_when: '$vars.all_passed != "true"'
    bash: |
      echo "=== 测试失败，保留环境供手动检查 ==="
      echo "Workspace ID: $vars.workspace_id"
      echo "Server: http://localhost:$vars.server_port"
      echo "Web: http://localhost:$vars.web_port"
      echo "Server PID: $vars.server_pid"
      echo "Rebuild count: $vars.rebuild_count"
      printf '{"vars_update":{"preserved_for_debug":"true"}}\n'

  # ═══════════════════════════════════════════════════════════════
  # Phase 5: Final Summary
  # ═══════════════════════════════════════════════════════════════
  - id: final-notify
    type: bash
    depends_on: [cleanup, preserve-for-debug]
    timeout: 60
    bash: |
      echo "=== Octopus E2E Tester (Goal) 最终报告 ==="
      echo "Workspace:    $vars.workspace_id"
      echo "All Passed:   $vars.all_passed"
      echo "Fix Rounds:   $vars.total_rounds"
      echo "Rebuilds:     $vars.rebuild_count"
      echo "Verification: $vars.verification_status"
      echo "Conclusion:   $vars.conclusion"
      echo "================================"

      if [ "$vars.all_passed" != "true" ]; then
        printf '{"vars_update":{"__status":"failed"}}\n'
      fi
