# yaml-language-server: $schema=./doc/workflow-schema.json
#
# ⚠️ prd-impl-swarm.yaml — Swarm 增强版
# 基于 prd-impl.yaml 改造，将 3 个核心审查阶段升级为 Swarm 节点：
#   Host-Audit → swarm (dispatch) | Refine-Plan → swarm (debate)
#   Review → swarm (review, dynamic) | Integrate → swarm (review)
# 其余节点（Setup/Plan/Implement/E2E/Ship）保持不变。
#
apiVersion: octopus/v1
kind: Workflow
name: prd-impl-swarm
description: >
  PRD Implementation Flow (Swarm Edition) — 消费 PRD Forge 产出，多智能体协作实现。
  流程: Setup → Host-Audit(Swarm) → Plan → Refine-Plan(Swarm) → Route
  → Implement → Review(Swarm) + Fix → E2E → Ship。
  Swarm 增强点: Host-Audit(dispatch并行扫描), Refine-Plan(debate多视角审查),
  Review(review动态路由选专家), Integrate(review集成验证)。

model: opus[1m]
engine: claude
execution_mode: auto
max_concurrent: 3
timeout: 86400

inputs:
  prd_dir:
    description: "PRD Forge 产出目录路径"
    required: false
    default: "$parent.var_pool.output_dir"
  base_branch:
    description: "PR 目标分支"
    required: false
    default: "main"
  enable_adversarial:
    description: "开启 Plan 阶段对抗审查（Swarm debate 模式自动包含）"
    required: false
    default: "true"
  run_e2e:
    description: "是否运行 PRD 驱动的 E2E 验收测试"
    required: false
    default: "true"
  completeness_max_rounds:
    description: "产品完整度验证最大轮数"
    required: false
    default: "10"
  e2e_fix_rounds:
    description: "E2E 测试失败后的最大修复轮数"
    required: false
    default: "10"
  protected_ports:
    description: "E2E 期间不能杀死的端口列表"
    required: false
    default: "3000,3001,3098,3099"
  impl_type:
    description: "交付物类型覆盖。auto=由 Plan 自动检测"
    required: false
    default: "auto"
  e2e_regenerate:
    description: "控制 e2e-case-bind 和 completeness-bind 的重新生成行为"
    required: false
    default: "auto"
  e2e_project_rules:
    description: "E2E 项目特定规则"
    required: false
    default: |
      ## E2E 项目规则
      - 构建命令: `pnpm build`
      - 启动隔离服务: `pnpm dev --isolated`
      - 健康检查: `GET /api/health`
      - 禁止直接运行子包 dev/start 脚本
      - 重启规则: 只允许 `kill $vars.e2e_dev_pid`
      - ⛔ 保护端口: 3000, 3001, 3098, 3099
  swarm_budget:
    description: "Swarm 节点 token 总预算"
    required: false
    default: "500000"

variables:
  # ── PRD 文件路径 ──
  prd_final_file: ""
  requirements_file: ""
  solution_file: ""
  clarify_file: ""
  completeness_file: ""
  project_type: ""
  acceptance_cases_file: ""
  ui_file: ""
  ux_file: ""
  scope_file: ""
  scope_mode: "strict"

  # ── 宿主项目契约 ──
  host_contract_file: ""
  host_has_ui: "false"
  project_path: ""

  # ── 交付物路由 ──
  impl_type: "auto"
  project_structure: ""

  # ── 环境 ──
  projects: ""
  pkg_manager: ""
  branch: ""
  display_name: ""
  notify_target: "telegram:xzf_hermes"

  # ── 产出文件 ──
  plan_file: ""
  plan_skeleton_file: ""
  plan_balance_report: ""
  plan_balance_passed: "false"
  plan_review_file: ""
  contract_file: ""
  conclusion: ""

  # ── Review ──
  review_blockers: "0"
  review_issues: ""
  completeness_score: "0"
  completeness_must_have_score: "0"
  completeness_passed: "false"
  completeness_exit_code: ""
  integration_passed: "false"

  # ── 失败原因 ──
  failed_reason: ""

  # ── E2E ──
  e2e_cases_file: ""
  completeness_checklist_file: ""
  e2e_worktree: ""
  e2e_port: ""
  e2e_passed: "false"
  e2e_summary: ""
  e2e_results: ""
  e2e_total: "0"
  e2e_p0_count: "0"
  e2e_p1_count: "0"
  e2e_fail_count: "0"
  e2e_skipped: "0"
  e2e_excluded: "0"
  e2e_fix_rounds: "0"
  completeness_rounds: "0"
  completeness_missing: ""
  e2e_server_port: ""
  e2e_web_port: ""
  e2e_dev_pid: ""
  e2e_octopus_dir: ""
  e2e_workspace_id: ""
  e2e_sandbox_dir: ""
  real_e2e_ui_passed: "false"
  real_e2e_ui_total: "0"
  real_e2e_ui_failed_list: ""
  real_e2e_ui_report: ""

  # ── 交付审计 ──
  audit_file: ""
  ready_to_merge: "false"
  scope_leak_count: "0"
  host_contract_violations: "0"
  pr_cleaned: "false"

  # ── E2E 测试结果 ──
  e2e_p0_passed: "0"
  e2e_p1_passed: "0"
  e2e_fix_all_passed: "false"
  e2e_reality_issues: "0"
  e2e_reality_verified: "0"
  completeness_score_n1: "-:-"
  completeness_score_n2: "-:-"

  # ── Ship ──
  pr_urls: ""
  pr_count: "0"
  output_dir: ""

  # ── Swarm 统计 ──
  host_audit_swarm_experts: "0"
  refine_plan_swarm_rounds: "0"
  review_swarm_experts: "0"

  # ── 全局规则 ──
  workspace_rules: |
    ## 工作空间规范
    - 当前 cwd 是 octopus 聚合工作空间
    - 项目在 ./projects/ 目录下，每个是独立的 git worktree
    - 所有项目级命令必须在对应项目目录内执行

auto_answers:
  - pattern: ".*"
    answer: "proceed"

providers:
  hermes-cli:
    type: hermes
    timeout: 30
    min_severity: info

channels:
  default:
    provider: hermes-cli
    target: "telegram:xzf_hermes"

hooks:
  on_workflow_failure:
    - id: notify-failure
      type: notify
      channel: default
      template:
        severity: error
        title: "❌ $vars.display_name — 工作流失败"
        body: "📂 项目: $vars.projects | 🌿 $vars.branch\n🔴 失败节点: ${hook.failed_node_id | default:unknown}\n⏱️ 已运行: ${hook.total_duration_ms | duration}\n\n💡 原因: ${vars.failed_reason | default:${hook.error | default:未提供}}"

  on_complete:
    - id: notify-complete
      type: notify
      channel: default
      template:
        severity: info
        title: "🏁 $vars.display_name — 工作流完成"
        body: "状态: $hook.final_status\n✅ 完成: $hook.completed_count / ⏭️ 跳过: $hook.skipped_count / ❌ 失败: $hook.failed_count / 📊 总计: $hook.total_count\n⏱️ 总耗时: ${hook.total_duration_ms | duration}"

  on_node_success:
    - id: notify-setup
      type: notify
      nodes: [setup]
      channel: default
      template:
        severity: info
        title: "🚀 $vars.display_name 启动"
        body: "📂 项目: $vars.projects\n📖 PRD: $inputs.prd_dir"

    - id: notify-host-audit-swarm
      type: notify
      nodes: [host-audit-swarm]
      channel: default
      template:
        severity: info
        title: "🏠 $vars.display_name — Host Audit Swarm 完成"
        body: "👥 扫描专家: $vars.host_audit_swarm_experts\n📄 契约: $vars.host_contract_file\n\n💡 $vars.conclusion"

    - id: notify-plan-skeleton
      type: notify
      nodes: [plan-skeleton]
      channel: default
      template:
        severity: info
        title: "🧮 $vars.display_name — Plan Skeleton 完成"
        body: "🏷️ 交付物类型: $vars.impl_type\n\n💡 $vars.conclusion"

    - id: notify-refine-plan-swarm
      type: notify
      nodes: [refine-plan-swarm]
      channel: default
      template:
        severity: info
        title: "😈 $vars.display_name — Refine Plan Swarm 完成"
        body: "🔄 辩论轮次: $vars.refine_plan_swarm_rounds\n📄 计划已审查与修正\n\n💡 $vars.conclusion"

    - id: notify-implement
      type: notify
      nodes: [implement]
      channel: default
      template:
        severity: info
        title: "⚙️ $vars.display_name — Implement 完成"
        body: "🏷️ 类型: $vars.impl_type\n📂 项目: $vars.projects\n\n💡 $vars.conclusion"

    - id: notify-review-swarm
      type: notify
      nodes: [review-swarm]
      channel: default
      template:
        severity: info
        title: "🔍 $vars.display_name — Review Swarm 完成"
        body: "🚫 Blockers: $vars.review_blockers\n👥 审查专家: $vars.review_swarm_experts\n📊 完整度: $vars.completeness_score%\n\n💡 $vars.conclusion"

    - id: notify-e2e-cases
      type: notify
      nodes: [e2e-case-bind]
      channel: default
      template:
        severity: info
        title: "🧪 $vars.display_name — E2E 用例绑定完成"
        body: "📊 总计: $vars.e2e_total (P0: $vars.e2e_p0_count)"

    - id: notify-e2e-pass
      type: notify
      nodes: [e2e-teardown]
      channel: default
      condition: '$vars.e2e_passed == "true"'
      template:
        severity: info
        title: "✅ $vars.display_name — E2E 通过"
        body: "📊 $vars.e2e_summary"

    - id: notify-e2e-fail
      type: notify
      nodes: [e2e-teardown]
      channel: default
      condition: '$vars.e2e_passed == "false"'
      template:
        severity: warn
        title: "🚫 $vars.display_name — E2E 未通过"
        body: "📊 $vars.e2e_summary\n⚠️ 代码仍会提交，请查看 PR 中的失败详情"

    - id: notify-delivery-audit
      type: notify
      nodes: [delivery-audit]
      channel: default
      template:
        severity: info
        title: "📋 $vars.display_name — 交付审计完成"
        body: "📊 完整度: $vars.completeness_score%\n🏁 ready_to_merge: $vars.ready_to_merge\n\n💡 $vars.conclusion"

    - id: notify-ship
      type: notify
      nodes: [ship]
      channel: default
      template:
        severity: info
        title: "🚀 $vars.display_name — PR 已创建"
        body: "📊 PR 数量: $vars.pr_count\n🔗 $vars.pr_urls"

nodes:
  # ═══════════════════════════════════════════════════════════════
  # Phase 0: Setup — 环境准备 + PRD 验证
  # （与 prd-impl 一致）
  # ═══════════════════════════════════════════════════════════════
  - id: setup
    type: agent
    timeout: 900
    prompt: |
      你正在执行 PRD Implementation Flow (Swarm Edition) 的环境准备阶段。

      $vars.workspace_rules

      ## 输入
      - PRD 目录: $inputs.prd_dir

      ## 你的任务

      ### 1. 安装 superpowers-zh 技能
      ```bash
      npx superpowers-zh@latest --tool claude --force 2>&1 | head -5
      ```

      ### 2. 安装 agency-agents-zh 代理
      ```bash
      AGENTS_TARGET="$(pwd)/.claude/agents"
      mkdir -p "$AGENTS_TARGET"
      NEED_CLONE=false
      for agent in engineering-backend-architect engineering-frontend-developer engineering-code-reviewer engineering-security-engineer engineering-software-architect engineering-database-optimizer design-ui-designer testing-api-tester testing-accessibility-auditor testing-performance-benchmarker testing-evidence-collector testing-reality-checker; do
        [ ! -f "$AGENTS_TARGET/$agent.md" ] && NEED_CLONE=true && break
      done
      if [ "$NEED_CLONE" = "true" ]; then
        DEPS_DIR="$(pwd)/dependencies"
        mkdir -p "$DEPS_DIR"
        [ ! -d "$DEPS_DIR/agency-agents-zh" ] && git clone --depth 1 https://github.com/jnMetaCode/agency-agents-zh.git "$DEPS_DIR/agency-agents-zh" 2>&1
        REPO="$DEPS_DIR/agency-agents-zh"
        for f in backend-architect frontend-developer code-reviewer security-engineer software-architect database-optimizer; do
          [ -f "$REPO/engineering/engineering-$f.md" ] && cp "$REPO/engineering/engineering-$f.md" "$AGENTS_TARGET/"
        done
        [ -f "$REPO/design/design-ui-designer.md" ] && cp "$REPO/design/design-ui-designer.md" "$AGENTS_TARGET/"
        for f in api-tester accessibility-auditor performance-benchmarker evidence-collector reality-checker; do
          [ -f "$REPO/testing/testing-$f.md" ] && cp "$REPO/testing/testing-$f.md" "$AGENTS_TARGET/"
        done
      fi
      ```

      ### 3. 安装 core-pack agents
      ```bash
      AGENTS_TARGET="$(pwd)/.claude/agents"
      COREPACK_AGENTS=""
      for d in \
        "$(pwd)/.octopus/core-pack/agents" \
        "$(pwd)/packages/core-pack/agents" \
        "$(pwd)/../core-pack/agents"; do
        if [ -f "$d/architecture-explorer.md" ]; then
          COREPACK_AGENTS="$d"
          break
        fi
      done
      if [ -n "$COREPACK_AGENTS" ]; then
        cp "$COREPACK_AGENTS/architecture-explorer.md" "$AGENTS_TARGET/"
        [ -f "$COREPACK_AGENTS/devil-advocate.md" ] && cp "$COREPACK_AGENTS/devil-advocate.md" "$AGENTS_TARGET/"
      fi
      ```

      ### 4. 自动检测 PRD 目录
      ```bash
      PRD_DIR="$inputs.prd_dir"
      if [ -z "$PRD_DIR" ] || echo "$PRD_DIR" | grep -q '^\$parent'; then
        PRD_DIR=$(ls -d ./docs/prd-forge/prd-*/ 2>/dev/null | sort -V | tail -1)
        [ -z "$PRD_DIR" ] && echo "ERROR: 未找到 PRD 目录" && exit 1
        PRD_DIR="${PRD_DIR%/}"
      fi
      ```

      ### 5. 验证 PRD 完整性 + 读取项目类型 + 检测项目环境
      检查: PRD-FINAL.md, 02-requirements.md, 03-solution.md, 00-clarify.md
      检查 v2: 06-acceptance-cases.md, 07-ui.md, 08-ux.md（允许不存在）
      检查 v3: 02-scope.md（允许不存在）
      从 00-clarify.md 提取 project_type
      遍历 projects/ 检测项目列表、包管理器、当前分支

      ### 6. 计算文档目录
      ```bash
      DOCS_ROOT="./docs"
      mkdir -p "$DOCS_ROOT"
      MAX_INDEX=0
      for dir in "$DOCS_ROOT"/prd-impl-*/; do
        [ -d "$dir" ] && INDEX=$(basename "$dir" | sed 's/prd-impl-0*//' | sed 's/^$/0/') && [ "$INDEX" -gt "$MAX_INDEX" ] 2>/dev/null && MAX_INDEX=$INDEX
      done
      OUTPUT_DIR="$DOCS_ROOT/prd-impl-$(printf "%03d" $((MAX_INDEX + 1)))"
      mkdir -p "$OUTPUT_DIR"
      ```

      ## 输出
      {"vars_update":{"prd_dir":"$PRD_DIR","prd_final_file":"$PRD_DIR/PRD-FINAL.md","requirements_file":"$PRD_DIR/02-requirements.md","solution_file":"$PRD_DIR/03-solution.md","clarify_file":"$PRD_DIR/00-clarify.md","completeness_file":"$PRD_DIR/05-completeness-review.md","acceptance_cases_file":"<$PRD_DIR/06-acceptance-cases.md>","ui_file":"<$PRD_DIR/07-ui.md>","ux_file":"<$PRD_DIR/08-ux.md>","scope_file":"<$PRD_DIR/02-scope.md>","scope_mode":"<strict/creative>","project_type":"<type>","projects":"<项目名>","pkg_manager":"<包管理器>","branch":"<分支>","display_name":"<名称>","output_dir":"<文档目录>","project_path":"<主项目路径>","conclusion":"PRD 验证通过"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 0.5: Host Audit Swarm — 宿主项目契约扫描
  # （替代原 host-audit，使用 swarm dispatch 并行扫描）
  # ═══════════════════════════════════════════════════════════════
  - id: host-audit-swarm
    type: swarm
    depends_on: [setup]
    timeout: 3600
    topic: |
      扫描宿主项目的实际架构、技术栈、现有资产，产出约束文档 host-contract.md。
      后续所有实现节点必须遵守此契约，防止"干净藏主义实现"。

      ## 项目路径
      $vars.project_path

      ## 输出目录
      $vars.output_dir/host-contract/
    mode: dispatch
    failure_policy: continue_partial
    budget: 500000
    context_tier: "200k"

    expert_defaults:
      model: opus[1m]
      tools: ["Read", "Grep", "Glob", "Bash"]

    experts:
      - role: architecture-explorer
        agent_file: ".claude/agents/architecture-explorer.md"
        task: |
          扫描宿主项目的架构和技术栈。

          输出到 $vars.output_dir/host-contract/01-architecture.md：
          - monorepo 结构（packages/ / apps/ / projects/ 各包职责）
          - 后端框架 / 数据库 / ORM / 路由约定 / 错误中间件 / 鉴权
          - 构建命令 / 测试命令 / 启动命令
          - 现有的 API 模式（REST / GraphQL / SSE / RPC）及路径命名规则
          - 现有的文件组织惯例

      - role: ui-system-auditor
        agent_file: ".claude/agents/engineering-frontend-developer.md"
        task: |
          扫描宿主项目的 UI 系统（仅在有前端项目时执行）。

          输出到 $vars.output_dir/host-contract/02-ui-system.md：
          - 设计 tokens 位置（tailwind.config / theme.ts / CSS 变量）
          - 现有组件库清单（路径 + 导出名）
          - 路由方案 + 现有页面清单
          - 状态管理方案 + 现有 stores
          - 错误展示/loading/empty 状态的现有约定
          - HTTP 客户端封装

      - role: contract-synthesizer
        perspective: "契约综合者 — 将架构扫描和 UI 扫描合并为统一约束文档"
        depends_on: [architecture-explorer, ui-system-auditor]
        task: |
          读取两份扫描报告，合成最终约束文档 host-contract.md。

          读取：
          - $vars.output_dir/host-contract/01-architecture.md
          - $vars.output_dir/host-contract/02-ui-system.md（如存在）

          输出到 $vars.output_dir/host-contract.md：
          ```markdown
          # Host Project Contract
          项目: <项目名与路径>
          是否含 UI: <true / false>

          ## 必须复用的现有资产
          | 资产类别 | 路径 | 用法 |

          ## 路由 / API / 目录约定
          ## 构建与启动命令
          ## 强烈不建议（违反会进 review_blockers）
          - 不要新建 packages/
          - 不要引入新的 CSS 方案
          - 不要绕过 lib/api.ts
          - 不要创建与现有组件功能重复的新组件
          ```

    host:
      role: audit-host
      model: sonnet
      prompt: |
        综合 contract-synthesizer 的输出，确认 host-contract.md 已生成。
        简要总结宿主项目技术栈。

  # ── host-audit-swarm 输出处理 ──
  - id: host-audit-write
    type: agent
    depends_on: [host-audit-swarm]
    timeout: 300
    prompt: |
      确认 host-contract.md 已生成并设置变量。

      ## 任务
      1. 检查 $vars.output_dir/host-contract.md 是否存在
      2. 从文件提取 host_has_ui
      3. 如果文件不存在，从 $vars.host-audit-swarm_synthesis 提取内容并写入

      ## 输出
      {"vars_update":{"host_contract_file":"$vars.output_dir/host-contract.md","host_has_ui":"<true/false/unknown>","host_audit_swarm_experts":"$vars.host-audit-swarm_expert_count","conclusion":"<3句话总结宿主技术栈>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 1: Plan — 两遍式规划（与 prd-impl 一致）
  # ═══════════════════════════════════════════════════════════════
  - id: plan-skeleton
    type: agent
    depends_on: [host-audit-write]
    timeout: 7200
    prompt: |
      你是实现架构师。本节点只输出「阶段骨架」，不写任何阶段内部细节。

      $vars.workspace_rules

      ## 宿主项目契约（强制阅读）
      $vars.host_contract_file

      ## PRD 输入
      1. 技术方案: $vars.solution_file
      2. 需求定义: $vars.requirements_file
      3. 验收用例: $vars.acceptance_cases_file
      4. UI 规范: $vars.ui_file（如非空必须 Read 前 50 行再决定 impl_type）
      5. UX 交互: $vars.ux_file
      6. Idea 分析: $vars.clarify_file

      ## 你的任务
      1. 判断 impl_type（yaml-workflow / monolith-code / split-code / docs-config）
      2. 决定阶段数（小型 2-3，中型 3-4，复杂 4-6）
      3. 输出骨架到 `$vars.output_dir/plan.skeleton.md`

      {"vars_update":{"plan_skeleton_file":"$vars.output_dir/plan.skeleton.md","impl_type":"<类型>","project_structure":"<split-code时必填>","conclusion":"<骨架总结>"}}

  - id: plan-deepen
    type: agent
    depends_on: [plan-skeleton]
    timeout: 86400
    skills:
      - writing-plans
    prompt: |
      使用 writing-plans 技能，基于骨架逐阶段展开完整计划。

      $vars.workspace_rules

      ## 宿主项目契约
      $vars.host_contract_file

      ## 输入
      - 骨架: $vars.plan_skeleton_file
      - 技术方案: $vars.solution_file
      - 需求定义: $vars.requirements_file
      - 验收用例: $vars.acceptance_cases_file
      - UI 规范: $vars.ui_file
      - UX 交互: $vars.ux_file

      ## 深化要求
      逐阶段独立充填，每个阶段包含完整信息（任务清单 5-12 个、文件路径、验收标准、复杂度估算）。
      体量均衡：不同阶段的任务数不能相差 2 倍以上。

      ## 输出
      保存到 `$vars.output_dir/plan.md`

      {"vars_update":{"plan_file":"$vars.output_dir/plan.md","conclusion":"<深化后总结>"}}

  - id: plan-balance-check
    type: agent
    depends_on: [plan-deepen]
    timeout: 1800
    prompt: |
      你是计划均衡性审查员，检查 plan.md 是否存在「前详后略」问题。

      ## 检查项
      | 指标 | 说明 |
      |------|------|
      | task_count | 该阶段 Task 总数 |
      | total_chars | 该阶段字符数 |
      | files_referenced | 提及文件路径数 |
      | acceptance_count | 验收标准出现次数 |

      ## 判定规则
      - 任一指标 max/min > 3.0 → fail
      - 任一阶段 task_count < 3 → fail
      - 任一阶段 acceptance_count == 0 → fail

      ## 输出
      报告到 `$vars.output_dir/plan.balance.md`

      {"vars_update":{"plan_balance_report":"$vars.output_dir/plan.balance.md","plan_balance_passed":"<true/false>","conclusion":"<均衡性结论>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 1.5: Refine Plan Swarm — 多视角计划审查
  # （替代原 refine-plan，使用 swarm debate 多专家辩论）
  # ═══════════════════════════════════════════════════════════════
  - id: refine-plan-swarm
    type: swarm
    depends_on: [plan-balance-check]
    timeout: 5400
    execute_when: '$inputs.enable_adversarial == "true" || $vars.plan_balance_passed == "false"'
    topic: |
      审查实现计划的 PRD 覆盖度、技术可行性和安全性。

      ## 实现计划: $vars.plan_file
      ## PRD 最终版: $vars.prd_final_file
      ## 技术方案: $vars.solution_file
      ## 需求定义: $vars.requirements_file
      ## 均衡报告: $vars.plan_balance_report
      ## 交付物类型: $vars.impl_type
      ## 宿主契约: $vars.host_contract_file
    mode: debate
    rounds: 2
    consensus_threshold: 0.7
    budget: 500000
    context_tier: "200k"

    expert_defaults:
      model: opus[1m]
      tools: ["Read", "Grep", "Glob"]

    experts:
      - role: feasibility-reviewer
        agent_file: ".claude/agents/engineering-software-architect.md"
        perspective: "可行性审查者 — 审查计划的 PRD 覆盖度与技术可行性"
        task: |
          审查实现计划：
          - 🔴 CRITICAL: 计划是否覆盖所有 PRD User Story？
          - 🔴 CRITICAL: 阶段依赖是否可行？是否存在循环依赖？
          - 🟡 RISK: 任务拆分粒度是否合理？
          - 🟡 RISK: 验收标准是否可测？
          - 🔵 IMPROVEMENT: 有没有可以并行化的阶段？

          按交付物类型侧重：
          - yaml-workflow: YAML 节点设计、DAG 依赖、inputs/outputs
          - split-code: 前后端任务拆分、API 契约
          - monolith-code: 模块划分、依赖关系

      - role: security-architect
        agent_file: ".claude/agents/engineering-security-engineer.md"
        perspective: "安全架构师 — 审查计划中的安全设计"
        task: |
          审查计划中的安全设计：
          - 🔴 CRITICAL: 是否有认证/授权设计？
          - 🔴 CRITICAL: 数据保护措施是否充分？
          - 🟡 RISK: 是否有输入验证设计？
          - 🟡 RISK: API 是否有限速设计？

      - role: software-architect
        agent_file: ".claude/agents/engineering-software-architect.md"
        perspective: "软件架构师 — 审查架构一致性和宿主契约遵守"
        task: |
          审查架构一致性：
          - 🔴 CRITICAL: 计划是否与宿主契约冲突？
          - 🟡 RISK: 是否复用了契约中的现有资产？
          - 🟡 RISK: 模块划分是否与现有架构一致？
          - 🔵 IMPROVEMENT: 如果 plan_balance_passed=false，指出不均衡阶段

    host:
      role: plan-review-host
      model: opus[1m]
      prompt: |
        综合所有专家对实现计划的审查意见，产出修正后的计划审查报告。

        ## 综合原则
        1. CRITICAL 问题原则上必须修正
        2. 如果 plan_balance_passed=false，重点平衡不足阶段的任务深度
        3. 专家间的分歧需要你的判断

        ## 输出要求
        1. 问题清单（按 CRITICAL/RISK/IMPROVEMENT 分级）
        2. 每条问题的修正建议
        3. 修正后对计划的具体改动指令（修改哪个阶段、哪个任务、怎么改）
        保持 2000 字以内。

  # ── refine-plan-swarm 输出处理 ──
  - id: refine-plan-write
    type: agent
    depends_on: [refine-plan-swarm]
    timeout: 3600
    execute_when: '$inputs.enable_adversarial == "true" || $vars.plan_balance_passed == "false"'
    prompt: |
      根据 refine-plan-swarm 的审查报告，修正实现计划。

      ## 审查报告
      $vars.refine-plan-swarm_synthesis

      ## 你的任务
      1. 读取 $vars.plan_file
      2. 按审查报告的修正建议，直接修改 plan.md 对应章节
      3. 在 plan.md 末尾追加 "## Swarm 审查裁决记录"
      4. 保存更新后的 $vars.plan_file

      ## 输出
      {"vars_update":{"plan_review_file":"$vars.output_dir/plan.review.md","plan_balance_passed":"true","refine_plan_swarm_rounds":"$vars.refine-plan-swarm_rounds_used","conclusion":"<2-3句话: 修正了什么>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 2: Implement（与 prd-impl 一致 — 保持原样）
  # 注意：实际 prd-impl 中此处有 implement / contract / backend /
  # frontend / integrate 等节点，此处简化展示核心结构。
  # 完整版本请复制 prd-impl.yaml 中对应节点。
  # ═══════════════════════════════════════════════════════════════
  - id: implement
    type: agent
    depends_on: [refine-plan-write, plan-balance-check]
    timeout: 86400
    execute_when: '$vars.impl_type != "split-code"'
    skills:
      - subagent-driven-development
    agents:
      code-quality-advisor:
        description: "代码质量顾问"
        agent_file: ".claude/agents/engineering-code-reviewer.md"
        model: sonnet
        tools: ["Read", "Grep", "Glob"]
    prompt: |
      使用 subagent-driven-development 按实现计划生成所有交付物。

      $vars.workspace_rules

      ## 宿主项目契约
      $vars.host_contract_file
      ⛔ 不要创建与契约重复的组件/服务/中间件
      ✅ 必须复用契约中列出的现有资产

      ## 交付物类型: $vars.impl_type
      ## 实现计划: $vars.plan_file

      ## 按类型执行
      - yaml-workflow: 生成工作流 YAML + validate
      - monolith-code: 按 plan 实现代码 + build/test
      - docs-config: 按 plan 生成文档/配置

      ## ⚠️ 按 Phase 粒度执行、提交、通知

      ## 输出
      {"vars_update":{"conclusion":"<2-3句话总结>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 2 (split-code): Contract → Backend ∥ Frontend → Integrate
  # （与 prd-impl 一致 — 完整版本请复制原文件节点）
  # 此处展示 contract/backend/frontend，integrate 替换为 swarm
  # ═══════════════════════════════════════════════════════════════
  - id: contract
    type: agent
    depends_on: [refine-plan-write, plan-balance-check]
    timeout: 1800
    execute_when: '$vars.impl_type == "split-code"'
    prompt: |
      你是 API 契约工程师，将 03-solution.md 的架构级 API 描述展开为完整契约。
      （完整 prompt 同 prd-impl.yaml contract 节点）
      {"vars_update":{"contract_file":"$vars.output_dir/api-contract.md","conclusion":"<端点数>"}}

  - id: backend
    type: agent
    depends_on: [contract]
    timeout: 86400
    context: new
    execute_when: '$vars.impl_type == "split-code"'
    prompt: |
      你是后端实现协调者。按 Phase 粒度实现 Backend 任务。
      （完整 prompt 同 prd-impl.yaml backend 节点）
      {"vars_update":{"conclusion":"<后端实现总结>"}}

  - id: frontend
    type: agent
    depends_on: [contract]
    timeout: 86400
    context: new
    execute_when: '$vars.impl_type == "split-code"'
    prompt: |
      你是前端实现协调者。按 Phase 粒度实现 Frontend 任务。
      （完整 prompt 同 prd-impl.yaml frontend 节点）
      {"vars_update":{"conclusion":"<前端实现总结>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 2.5: Integrate Swarm — 集成验证（替代原 integrate agent）
  # ═══════════════════════════════════════════════════════════════
  - id: integrate-swarm
    type: swarm
    depends_on: [backend, frontend]
    timeout: 3600
    execute_when: '$vars.impl_type == "split-code"'
    topic: |
      前后端并行实现已完成，验证集成完整性。

      ## API 契约: $vars.contract_file
      ## 实现计划: $vars.plan_file
      ## 宿主契约: $vars.host_contract_file

      检查 git diff 获取变更概览：
      ```
      git log --oneline -20
      git diff main --name-only 2>/dev/null
      git diff main --stat 2>/dev/null
      ```
    mode: review
    budget: 500000
    context_tier: "200k"

    expert_defaults:
      model: opus[1m]
      tools: ["Bash", "Read", "Grep", "Glob"]

    experts:
      - role: backend-architect
        agent_file: ".claude/agents/engineering-backend-architect.md"
        perspective: "后端架构师 — 验证 API 实现与契约一致性"
        task: |
          对照 API 契约验证后端实现：
          1. API 签名是否与契约一致？
          2. 请求/响应类型是否匹配？
          3. 错误码是否完整？
          4. 是否有遗漏的端点？

      - role: frontend-developer
        agent_file: ".claude/agents/engineering-frontend-developer.md"
        perspective: "前端开发者 — 验证前端 API 调用与契约一致性"
        task: |
          对照 API 契约验证前端实现：
          1. API client 调用是否与契约签名一致？
          2. 类型定义是否匹配？
          3. 错误处理是否覆盖所有错误码？
          4. 页面是否覆盖所有 UI Story？

      - role: software-architect
        agent_file: ".claude/agents/engineering-software-architect.md"
        perspective: "软件架构师 — 验证架构边界和宿主契约遵守"
        task: |
          验证架构一致性：
          1. 是否遵守宿主契约？
          2. 架构边界是否清晰（前后端职责分离）？
          3. 共享类型是否在 shared 包中？
          4. 是否有循环依赖？

    host:
      role: integrate-host
      model: opus[1m]
      prompt: |
        综合三位专家的集成验证结果。
        1. 列出所有不一致项
        2. 对每个不一致项给出修复指令
        3. 判断集成是否通过

        如果全部通过：integration_passed=true
        如果有不一致：列出具体修复指令

  # ── integrate-swarm 输出处理 ──
  - id: integrate-write
    type: agent
    depends_on: [integrate-swarm]
    timeout: 3600
    execute_when: '$vars.impl_type == "split-code"'
    prompt: |
      根据 integrate-swarm 结果，修复集成问题。

      ## Swarm 综合
      $vars.integrate-swarm_synthesis

      ## 你的任务
      1. 如果有不一致项 → 修复 → build/test 验证
      2. 全部通过 → 设 integration_passed=true
      3. 无法修复 → 设 integration_passed=false

      ## 输出
      {"vars_update":{"integration_passed":"<true/false>","conclusion":"<集成验证结论>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 3: Review Swarm — 多专家代码审查
  # （替代原 review agent，使用 swarm review + dynamic 路由）
  # ═══════════════════════════════════════════════════════════════
  - id: review-swarm
    type: swarm
    depends_on: [implement, integrate-swarm]
    timeout: 7200
    topic: |
      审查本次所有代码/YAML 变更。

      ## 审查基准
      - 实现计划: $vars.plan_file
      - PRD: $vars.prd_final_file
      - 交付物类型: $vars.impl_type
      - 宿主契约: $vars.host_contract_file
      - 需求定义: $vars.requirements_file

      变更概览：
      ```bash
      git diff main --name-only 2>/dev/null
      git diff main --stat 2>/dev/null
      ```
    mode: review
    dynamic: true
    max_experts: 5
    budget: 500000
    context_tier: "200k"

    expert_defaults:
      model: opus[1m]

    experts:
      - role: code-reviewer
        agent_file: ".claude/agents/engineering-code-reviewer.md"
        task: |
          独立代码审查：
          - 代码质量（命名、结构、错误处理）
          - 测试覆盖
          - 与实现计划的一致性
          按 🔴 BLOCKER / 🟡 SUGGESTION / 🔵 MINOR 分级。

      - role: security-engineer
        agent_file: ".claude/agents/engineering-security-engineer.md"
        task: |
          安全审查：
          - 认证/授权实现
          - 输入验证
          - 数据保护
          - OWASP Top 10
          按 🔴 BLOCKER / 🟡 SUGGESTION 分级。

      - role: product-completeness-assessor
        perspective: "产品完整度评估员"
        task: |
          对照 PRD 需求评估实现完整度：
          1. 全部功能覆盖（40%）— 每个功能是否有实现？
          2. UI/UX 操作闭环（30%）— 入口→操作→反馈→恢复
          3. 验收标准通过率（20%）
          4. Non-Goals 遵守（10%）

          P0 和 P1 都必须 100% 实现。

    host:
      role: review-host
      model: opus[1m]
      prompt: |
        综合所有专家的审查意见，产出最终审查报告。

        ## 综合原则
        1. 汇总所有 BLOCKER（含宿主契约违反）
        2. 计算 completeness_score
        3. 列出具体修复指令（文件 + 行号 + 修复方式）

        ## 输出要求
        1. BLOCKER 数量
        2. completeness_score（0-100）
        3. 问题清单（按严重度排序）
        4. 宿主契约违反项

        在报告末尾输出评估 JSON:
        ```json
        {"blockers": N, "completeness_score": N, "host_violations": N}
        ```

  # ── review-swarm 输出处理 ──
  - id: review-write
    type: agent
    depends_on: [review-swarm]
    timeout: 300
    prompt: |
      解析 review-swarm 结果并设置审查变量。

      ## Swarm 综合
      $vars.review-swarm_synthesis

      ## 任务
      1. 从 synthesis 中提取 blockers 数量和 completeness_score
      2. 检查宿主契约违反

      ## 输出
      {"vars_update":{"review_blockers":"<BLOCKER数量>","review_issues":"<汇总>","host_contract_violations":"<宿主契约违反数>","completeness_score":"<0-100>","completeness_passed":"<score==100>","review_swarm_experts":"$vars.review-swarm_expert_count","conclusion":"<2-3句话>"}}

  - id: review-fix-loop
    type: loop
    depends_on: [review-write]
    max_iterations: 3
    break_when: '$vars.review_blockers == "0"'
    nodes:
      - id: review-fix-round
        type: agent
        timeout: 7200
        context: new
        execute_when: '$vars.review_blockers != "0"'
        prompt: |
          审查 BLOCKER 修复，第 $iteration 轮（最多 3 轮）。

          $vars.workspace_rules

          ## 审查发现
          $vars.review_issues

          ## 当前 BLOCKER 数量: $vars.review_blockers

          ## 本轮任务（只做一轮，引擎自动循环）
          1. 分析每个 BLOCKER 的根因
          2. 按类型修复：
             - 代码质量 → 重构代码
             - 安全漏洞 → 补安全校验/鉴权
             - 宿主契约违反 → 改用契约中的现有组件/模式
             - 完整度缺失 → 补充缺失功能
          3. pnpm build + pnpm test 验证
          4. git add -A && git commit -m "fix: review 第 $iteration 轮修复"
          5. 重新统计剩余 BLOCKER 数量

          ## 输出
          {"vars_update":{"review_blockers":"<剩余BLOCKER数>","conclusion":"第 $iteration 轮: 修复 N 个 BLOCKER，剩余 M 个"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 4-5: E2E（完整节点链，从 prd-impl.yaml 同步）
  # ═══════════════════════════════════════════════════════════════
  - id: e2e-case-bind
    type: agent
    depends_on: [review-fix-loop, integrate-swarm, implement]
    timeout: 3600
    execute_when: '$inputs.run_e2e == "true"'
    agents:
      api-tester:
        description: "API 测试架构师 — 将抽象验收用例绑定到可执行脚本"
        agent_file: ".claude/agents/testing-api-tester.md"
        model: sonnet
        tools: ["Read", "Write", "Edit", "Grep", "Glob"]
    prompt: |
      你是 E2E 用例绑定工程师。将上游 prd-forge 产出的抽象验收用例绑定到可执行脚本。

      ## ⚡ 短路检查（最先执行）
      如果 `$inputs.e2e_regenerate` 不是 `"e2e-cases"` 也不是 `"all"`：
      1. 检查 `$vars.output_dir/e2e-cases.md` 是否存在
      2. **存在** → 读取文件，提取用例总数，直接输出 vars_update 并结束
      3. **不存在** → 继续下方完整流程

      ## 设计哲学
      分层 BDD：acceptance-cases.md 是需求层 Given/When/Then（不含实现细节），
      本节点负责从有效路由/selector/workflow 绑定点生成可执行用例。

      ## 输入
      1. 抽象验收用例: $vars.acceptance_cases_file（首选输入，如为空退化到需求书推导）
      2. 需求定义: $vars.requirements_file
      3. API 契约: $vars.contract_file（split-code 时必读）
      4. UI 规范: $vars.ui_file
      5. UX 交互: $vars.ux_file
      6. 实现计划: $vars.plan_file

      ## ⛔ 前置过滤：排除基准/性能测试
      过滤 evidence_type 为 benchmark/performance 的用例。

      ## 绑定规则
      | evidence_type | 绑定目标 |
      |---------------|----------|
      | api_response | HTTP method+path+状态码+响应字段断言 |
      | ui_state | 页面ID+selector+UI 状态转换断言 |
      | file_content | 文件路径+内容模式 |
      | cli_output | 命令行+输出模式+退出码 |
      | workflow_execution | YAML 路径+入参+产出验证 |

      ⛔ 禁止标记 N/A，必须重新绑定到兼容的 evidence_type。

      ## 输出: $vars.output_dir/e2e-cases.md
      {"vars_update":{"e2e_cases_file":"$vars.output_dir/e2e-cases.md","e2e_total":"<总数>","e2e_p0_count":"<P0>","e2e_p1_count":"<P1>","conclusion":"<覆盖比例>"}}

  - id: completeness-bind
    type: agent
    depends_on: [e2e-case-bind]
    execute_when: '$inputs.run_e2e == "true"'
    timeout: 1800
    prompt: |
      你是完整度检查清单生成器。从 PRD 全套文档中提取所有必需 Story，
      交叉引用技术方案、UI、UX、测试用例，生成多维度的结构化检查清单。

      ## ⚡ 短路检查
      如果 `$inputs.e2e_regenerate` 不是 `"completeness-checklist"` 也不是 `"all"`：
      检查 `$vars.output_dir/completeness-checklist.md` 是否存在，存在则跳过。

      $vars.workspace_rules

      ## 输入
      1. PRD 需求: $vars.requirements_file
      2. 技术方案: $vars.solution_file
      3. UI 设计: $vars.ui_file
      4. UX 交互: $vars.ux_file
      5. 验收用例: $vars.acceptance_cases_file
      6. E2E 测试用例: $vars.e2e_cases_file
      7. 实现计划: $vars.plan_file

      ## 输出
      保存到 `$vars.output_dir/completeness-checklist.md`
      {"vars_update":{"completeness_checklist_file":"$vars.output_dir/completeness-checklist.md","conclusion":"生成 N 个必需 Story 的检查清单"}}

  - id: e2e-setup
    type: agent
    depends_on: [completeness-bind, integrate-swarm, implement]
    execute_when: '$inputs.run_e2e == "true"'
    timeout: 1800
    prompt: |
      执行 E2E 环境准备。

      $vars.workspace_rules

      ## 环境
      - 交付物类型: $vars.impl_type
      - 项目列表: $vars.projects
      - ⛔ 保护端口: $inputs.protected_ports

      $inputs.e2e_project_rules

      ## 步骤
      1. 检测运行上下文（Workspace / 源码模式）
      2. 创建 E2E 沙箱目录（.e2e-sandbox/）
      3. 确保 agent-browser 可用
      4. 构建项目（按 e2e_project_rules）
      5. 启动隔离服务（隔离端口，不碰保护端口）
      6. 等待构建 + 健康检查（轮询最多 600 秒）
      7. 创建测试工作空间（yaml-workflow 类型）
      8. 发送通知

      ## 输出
      {"vars_update":{"e2e_octopus_dir":"$OCTOPUS_DIR","e2e_server_port":"$SERVER_PORT","e2e_web_port":"$WEB_PORT","e2e_dev_pid":"$DEV_PID","e2e_workspace_id":"$WS_ID","e2e_sandbox_dir":"$SANDBOX_ROOT","conclusion":"E2E 环境就绪"}}

  - id: real-e2e-ui
    type: agent
    depends_on: [e2e-setup, completeness-bind]
    execute_when: '$inputs.run_e2e == "true" && $vars.host_has_ui == "true"'
    timeout: 7200
    agents:
      browser-tester:
        description: "浏览器 E2E 测试员"
        agent_file: ".claude/agents/testing-qa-engineer.md"
        model: sonnet
        tools: ["Read", "Grep", "Glob", "Bash"]
        prompt: |
          你是浏览器 E2E 测试执行者。测试分配给你的 ui_state 类用例。
          使用 agent-browser 打开页面，按交互序列操作，截图 + DOM 断言。
          ⛔ 没有截图证据 = failed。
    prompt: |
      你是浏览器 E2E 测试编排器。委派 browser-tester 子代理执行所有测试。
      ⛔ 你不读截图、不分析图片。只从返回的 JSON 提取结果。

      汇总结果写入 `$vars.output_dir/real-e2e-ui-report.md`。
      同步到 e2e-fix-progress.json。

      {"vars_update":{"real_e2e_ui_passed":"<true/false>","real_e2e_ui_total":"<总数>","real_e2e_ui_failed_list":"<失败 TC>","real_e2e_ui_report":"$vars.output_dir/real-e2e-ui-report.md","conclusion":"<通过率>"}}

  - id: e2e-completeness-loop
    type: loop
    depends_on: [e2e-setup, completeness-bind]
    execute_when: '$inputs.run_e2e == "true"'
    max_iterations: 30
    break_when: '$vars.completeness_exit_code != "" || $iteration >= $inputs.completeness_max_rounds'
    nodes:
      - id: e2e-completeness-round
        type: agent
        timeout: 3600
        context: new
        agents:
          product-completeness-assessor:
            description: "产品完整度评估员 — 硬证据驱动"
            prompt: |
              ## 产品完整度评估（硬证据驱动）
              ⛔ 不允许"代码看上去应该能用"。每个 Story 打分必须有对应证据。
              - UI Story → real_e2e_ui_report 中的 passed 记录 + 截图
              - 非 UI Story → e2e-fix-progress.json 中的 status=="passed"
              - 无证据 → 0 分
            model: sonnet
            tools: ["Bash", "Read", "Grep", "Glob"]

          api-tester:
            description: "API 测试员 — 重测修复后的用例"
            agent_file: ".claude/agents/testing-api-tester.md"
            model: sonnet
            tools: ["Bash", "Read", "Write", "Edit", "Grep", "Glob"]
        prompt: |
          你是产品完整度修复工程师。这是第 $iteration 轮（上限 $inputs.completeness_max_rounds）。

          $vars.workspace_rules
          $inputs.e2e_project_rules

          ## 进度文件: $vars.output_dir/completeness-progress.json
          （先读后做，做完先写文件再 vars_update）

          ## 本轮任务
          A. 评估 — 委派 assessor 逐 Story 验证
          B. 退出判定: R1 达标(100%) / R3 卡死(连续3轮无变化)
          C. 修复 — 选取高优先级缺失项修复 → build → commit → 重测

          ## 输出
          {"vars_update":{"completeness_score":"<总分>","completeness_must_have_score":"<必需分>","completeness_exit_code":"<R1/R3/空>","completeness_rounds":"$iteration","completeness_score_n1":"<本轮分>","completeness_score_n2":"$vars.completeness_score_n1","completeness_missing":"<缺失>","completeness_passed":"<true仅R1>","conclusion":"第 $iteration 轮"}}

  - id: e2e-fix-loop
    type: loop
    depends_on: [e2e-completeness-loop, real-e2e-ui]
    execute_when: '$inputs.run_e2e == "true"'
    max_iterations: 30
    break_when: '($vars.e2e_reality_issues == "0" && $vars.e2e_fix_all_passed == "true") || $iteration >= $inputs.e2e_fix_rounds'
    nodes:
      - id: e2e-fix-round
        type: agent
        timeout: 3600
        context: new
        agents:
          diagnostician:
            description: "深度诊断分析员"
            agent_file: ".claude/agents/engineering-software-architect.md"
            model: sonnet
            tools: ["Bash", "Read", "Grep", "Glob"]
          code-reviewer:
            description: "代码审查员 — 验证修复质量"
            agent_file: ".claude/agents/engineering-code-reviewer.md"
            model: sonnet
            tools: ["Bash", "Read", "Grep", "Glob"]
          api-tester:
            description: "API 测试员 — 重测"
            agent_file: ".claude/agents/testing-api-tester.md"
            model: sonnet
            tools: ["Bash", "Read", "Write", "Edit", "Grep", "Glob"]
          browser-tester:
            description: "浏览器测试员 — 重测 UI"
            agent_file: ".claude/agents/testing-qa-engineer.md"
            model: sonnet
            tools: ["Bash", "Read", "Grep", "Glob"]
        prompt: |
          你是 E2E 修复工程师。第 $iteration 轮（上限 $inputs.e2e_fix_rounds）。

          $vars.workspace_rules
          $inputs.e2e_project_rules

          ## 进度文件: $vars.output_dir/e2e-fix-progress.json
          ## 裁判批注: $vars.output_dir/e2e-reality-notes.json

          ## 本轮任务
          1. 诊断 — 委派 diagnostician 分析失败根因
          2. 修复 — 按根因类型处理（CODE_BUG/FEATURE_NOT_IMPL/ASSERTION_ERROR/...）
          3. 重测 — 按 type 分发（api→api-tester, ui→browser-tester）
          4. 审查 — 委派 code-reviewer → commit

          ⛔ Server 重启只允许 kill $vars.e2e_dev_pid
          ⛔ 禁止跳过/排除用例

          ## 输出
          {"vars_update":{"e2e_p0_passed":"<通过数>","e2e_p1_passed":"<通过数>","e2e_skipped":"0","e2e_excluded":"0","e2e_fix_all_passed":"<true/false>","e2e_fix_rounds":"$iteration","conclusion":"第 $iteration 轮"}}

      - id: e2e-reality-check
        type: agent
        depends_on: [e2e-fix-round]
        timeout: 1800
        context: new
        model: sonnet
        agents:
          reality-checker:
            description: "反假跑裁判 — 默认 NEEDS WORK"
            agent_file: ".claude/agents/testing-reality-checker.md"
            model: sonnet
            tools: ["Bash", "Read", "Grep"]
        prompt: |
          你是 E2E 反假跑裁判。第 $iteration 轮。每轮独立评估。
          检查所有 passed 用例是否有真实证据（非 mock/stub/空跑）。
          写入 $vars.output_dir/e2e-reality-findings.json。

          ## 输出
          {"vars_update":{"conclusion":"第 $iteration 轮: verified N / fake_pass M"}}

      - id: e2e-reality-merge
        type: agent
        depends_on: [e2e-reality-check]
        timeout: 600
        context: new
        prompt: |
          你是裁判批注合并器。将本轮 findings 与累积 notes 合并。
          写入 $vars.output_dir/e2e-reality-notes.json。

          ## 输出
          {"vars_update":{"e2e_reality_issues":"<fake_pass总数>","e2e_reality_verified":"<verified总数>","conclusion":"合并: verified=$VERIFIED fake=$FAKE"}}

  - id: e2e-teardown
    type: agent
    depends_on: [e2e-fix-loop]
    execute_when: '$inputs.run_e2e == "true"'
    timeout: 600
    prompt: |
      E2E 收尾：最终判定 + 环境清理。不阻断。

      $vars.workspace_rules

      ## 最终判定
      e2e_passed = e2e_fix_all_passed && e2e_reality_issues==0 && completeness_passed

      ## 环境清理
      1. 关闭浏览器
      2. 删除测试工作空间
      3. 杀临时服务进程（仅 kill $vars.e2e_dev_pid）

      ## 输出
      {"vars_update":{"e2e_passed":"<true/false>","e2e_summary":"<摘要>","e2e_torn_down":"true","conclusion":"E2E 收尾完成"}}

  - id: pre-pr-cleanup
    type: agent
    depends_on: [e2e-teardown]
    timeout: 1200
    prompt: |
      PR 提交前自动清理。不会失败，只修补和记录。

      $vars.workspace_rules

      ## 修补
      1. 沙箱泄漏 — unstage .e2e-sandbox/
      2. 测试 workflow 污染 — 隔离到 leaked/

      ## 记录（仅记录不删除）
      3. 范围越界 — scope-leak-report.md
      4. 宿主契约违反 — host-contract-violations.md

      ## 输出
      {"vars_update":{"pr_cleaned":"true","scope_leak_count":"<N>","host_contract_violations":"<N>","conclusion":"自动修补完成"}}

  - id: delivery-audit
    type: agent
    depends_on: [pre-pr-cleanup]
    timeout: 600
    prompt: |
      生成交付审计报告。ship 节点追加到 PR 描述。
      诚实，不夸大。即使未达 100% 也如实报告。

      $vars.workspace_rules

      ## 报告结构
      - 总体结论（完整度/质量判定/推荐动作）
      - E2E 验收证据（UI 截图 + API HTTP 证据）
      - 范围一致性
      - 宿主契约一致性
      - 未达项/已知问题
      - 证据链

      ## ready_to_merge 判定（仅建议，不阻止 PR）
      全部满足才 true：completeness==100, UI passed, 无越界, 无违反, 无 fake_pass

      ## 输出
      保存到 $vars.output_dir/delivery-audit.md
      {"vars_update":{"audit_file":"$vars.output_dir/delivery-audit.md","ready_to_merge":"<true/false>","conclusion":"完整度 $vars.completeness_score%"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 6: Ship（与 prd-impl 一致）
  # ═══════════════════════════════════════════════════════════════
  - id: ship
    type: agent
    depends_on: [delivery-audit]
    timeout: 86400
    prompt: |
      遍历所有项目，提交、推送并创建 PR。

      ## ⚠️ Always-Deliver 原则（最高优先级）
      无论完整度、E2E、审查结果如何，都必须创建 PR。
      资产营造代价很高，不能因为任何指标未达标就跳过 PR。
      PR 描述中如实附带审计报告和完整度状态。

      $vars.workspace_rules

      ## 环境
      - 项目: $vars.projects
      - 分支: $vars.branch
      - 目标: $inputs.base_branch
      - 完整度: $vars.completeness_score%
      - E2E: $vars.e2e_passed
      - ready_to_merge: $vars.ready_to_merge（仅为建议，不阻止 PR）

      ## 对每个有变更的项目
      1. cd projects/<项目名>
      2. git status --porcelain（无变更 → 跳过该项目）
      3. git add -A
      4. git commit -m "feat: implement PRD (完整度 $vars.completeness_score%)"
      5. git push -u origin $vars.branch
      6. 创建或更新 PR：
         - 检查已有 PR: `gh pr list --head "$vars.branch" --json url --jq '.[0].url'`
         - PR 主体使用审计报告（如有）
         - 标题根据状态描述（但 PR 始终创建）：
           - ready_to_merge=true → "feat: PRD implementation (完整度 N%)"
           - ready_to_merge=false → "feat: PRD implementation (完整度 N% — 详见审计报告)"
         - 已有 PR → comment + edit title
         - 无 PR → gh pr create

      ## ⛔ 绝对不能做的事
      - 不要因为 completeness_score < 100 跳过 PR
      - 不要因为 e2e_passed != true 跳过 PR
      - 不要因为 ready_to_merge=false 跳过 PR
      - 不要因为某个子步骤失败跳过后面项目的 PR
      - 不要因为审查有 BLOCKER 跳过 PR

      ## 输出
      {"vars_update":{"pr_urls":"<PR URL>","pr_count":"<数量>","conclusion":"创建 N 个 PR (完整度 $vars.completeness_score%)"}}

  - id: done
    type: bash
    depends_on: [ship]
    timeout: 10
    bash: |
      echo "═══════════════════════════════════════"
      echo "  ✅ PRD Impl (Swarm Edition) 完成"
      echo "═══════════════════════════════════════"
      echo "📂 类型: $vars.impl_type"
      echo "📊 完整度: $vars.completeness_score%"
      echo "🧪 E2E: $vars.e2e_passed"
      echo "🔗 PRs: $vars.pr_count"
      echo "🏁 ready_to_merge: $vars.ready_to_merge (仅建议)"
      echo "═══════════════════════════════════════"

      # Always-Deliver：PR 已创建即工作流完成。
      # 未达 100% 时记录原因供用户决策（merge / 迭代 / 放弃）。
      if [ "$vars.ready_to_merge" != "true" ] && [ "$inputs.run_e2e" = "true" ]; then
        REASON="完整度未达 100% 但 PR 已交付｜完整度: $vars.completeness_score%｜E2E: $vars.e2e_passed"
        echo "⚠️ $REASON"
      fi
