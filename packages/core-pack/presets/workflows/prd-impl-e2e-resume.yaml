# yaml-language-server: $schema=./doc/workflow-schema.json
#
# ⚠️ 节点同步约定（v3 Always-Deliver / Harness 设计）
# 以下节点在 prd-impl.yaml 和 prd-impl-e2e-resume.yaml 之间必须保持一致：
#   host-audit / e2e-setup / real-e2e-ui / e2e-completeness-round /
#   e2e-teardown / pre-pr-cleanup / delivery-audit
# 修改任一文件中的这些节点时，必须同步另一份。
# 引擎未提供节点级 import/include，靠本注释纪律维护。
#
apiVersion: octopus/v1
kind: Workflow
name: prd-impl-e2e-resume
description: >
  E2E Resume Flow — 从 prd-impl 的 e2e 失败处继续执行。
  读取上次运行的 prd-impl 产出物（plan.md、e2e-cases.md），
  重建上下文后直接进入 E2E 管线（fix-loop + completeness-loop）。
  不重复 Plan/Implement 阶段。

model: opus[1m]
engine: claude
execution_mode: auto
max_concurrent: 3
timeout: 86400

inputs:
  prd_dir:
    description: "PRD 目录路径（prd-forge 产出，如 docs/prd-forge/prd-001）"
    required: true
  base_branch:
    description: "PR 目标分支"
    required: false
    default: "main"
  impl_dir:
    description: "prd-impl 产出目录（如 docs/prd-impl-001）。不指定则自动检测最新。"
    required: false
    default: ""
  e2e_fix_rounds:
    description: "E2E 测试失败后的最大修复轮数"
    required: false
    default: "10"
  completeness_max_rounds:
    description: "产品完整度验证最大轮数"
    required: false
    default: "10"
  # 完整度固定为 100% strict 模式（所有维度必须 100% 覆盖），不再接受外部配置。
  # P0/P1 是质量分级：P0=核心功能(深度测试)，P1=增强功能(基本验证)。两者都必须 100% 实现和测试。
  protected_ports:
    description: "E2E 期间不能杀死的端口列表（逗号分隔）"
    required: false
    default: "3000,3001,3098,3099"
  run_e2e:
    description: "是否运行 E2E（始终 true，保留以兼容 hook 条件）"
    required: false
    default: "true"
  e2e_regenerate:
    description: "控制 e2e-case-bind 和 completeness-bind 的重新生成行为。auto=文件存在则跳过；e2e-cases=强制重新生成测试用例；completeness-checklist=强制重新生成检查清单；all=全部重新生成。"
    required: false
    default: "auto"
  e2e_project_rules:
    description: "E2E 项目特定规则。描述构建、启动、健康检查等命令。默认值适用于 Octopus 项目，其他项目请自定义。"
    required: false
    default: |
      ## E2E 项目规则
      - 构建命令: `pnpm build`
      - 启动隔离服务: `pnpm dev --isolated`（自动分配 hash 端口，不碰保护端口）
      - 健康检查: `GET /api/health`
      - 禁止直接运行子包 dev/start 脚本（pre-hooks 可能杀保护端口）
      - **重启规则**: 只允许 `kill $vars.e2e_dev_pid` 杀 e2e 隔离服务进程。禁止 `pgrep`/`pkill`/`lsof -ti :port | kill`/`kill-port`/`fuser -k`/`kill $(...)` 等广杀模式。重启后用 `nohup + disown` 启动，并在 vars_update 中更新 `e2e_dev_pid` 为新 PID。
      - ⛔ **保护端口**: 绝对不能触碰 3000, 3001, 3098, 3099。这些是用户自身的开发环境，任何杀进程操作都必须确认目标 PID 不在这些端口上。

variables:
  # ── PRD 文件路径 (resume-setup 填充) ──
  prd_final_file: ""
  requirements_file: ""
  solution_file: ""
  clarify_file: ""
  completeness_file: ""
  project_type: ""
  acceptance_cases_file: ""
  ui_file: ""
  ux_file: ""

  # ── PRD v3 范围契约 (resume-setup 填充，如存在) ──
  scope_file: ""
  scope_mode: "strict"

  # ── 宿主项目契约 (host-audit 填充，如已存在则复用) ──
  host_contract_file: ""
  host_has_ui: "false"
  project_path: ""

  # ── Resume 柔性回退状态 (resume-setup 填充) ──
  resume_fallback: ""

  # ── 项目环境 ──
  impl_type: ""
  projects: ""
  pkg_manager: ""
  branch: ""
  display_name: ""
  notify_target: "telegram:xzf_hermes"

  # ── 上游产出物 ──
  plan_file: ""
  e2e_cases_file: ""
  completeness_checklist_file: ""
  output_dir: ""
  conclusion: ""

  # ── Resume 进度恢复 ──
  e2e_resume_fix_progress: ""
  e2e_resume_completeness_progress: ""

  # ── Review (上次运行结果，供参考) ──
  review_blockers: "0"
  review_issues: ""
  completeness_score: "0"
  completeness_must_have_score: "0"
  completeness_passed: "false"
  completeness_exit_code: ""
  integration_passed: "false"

  # ── 失败原因 ──
  failed_reason: ""

  # ── E2E ──
  e2e_cases_file_runtime: ""
  e2e_worktree: ""
  e2e_port: ""
  e2e_passed: "false"
  e2e_summary: ""
  e2e_results: ""
  e2e_total: "0"
  e2e_p0_count: "0"
  e2e_p1_count: "0"
  e2e_fail_count: "0"
  e2e_skipped: "0"
  e2e_excluded: "0"
  e2e_fix_rounds: "0"
  completeness_rounds: "0"
  completeness_missing: ""

  # ── E2E 环境 ──
  e2e_server_port: ""
  e2e_web_port: ""
  e2e_dev_pid: ""
  e2e_octopus_dir: ""
  e2e_workspace_id: ""
  e2e_sandbox_dir: ""

  # ── Real E2E UI（real-e2e-ui 写入） ──
  real_e2e_ui_passed: "false"
  real_e2e_ui_total: "0"
  real_e2e_ui_failed_list: ""
  real_e2e_ui_report: ""

  # ── 交付审计 ──
  audit_file: ""
  ready_to_merge: "false"
  scope_leak_count: "0"
  host_contract_violations: "0"
  pr_cleaned: "false"
  e2e_torn_down: "false"

  # ── E2E 测试结果 ──
  e2e_p0_passed: "0"
  e2e_p1_passed: "0"
  e2e_fix_all_passed: "false"

  # ── Reality Check ──
  e2e_reality_issues: "0"
  e2e_reality_verified: "0"

  # ── E2E 完整度 R3 卡死检测 ──
  completeness_score_n1: "-:-"
  completeness_score_n2: "-:-"

  # ── Ship ──
  pr_urls: ""
  pr_count: "0"
  existing_pr_url: ""

  # ── 全局规则 ──
  workspace_rules: |
    ## 工作空间规范
    - 当前 cwd 是 octopus 聚合工作空间，不是单个 git 仓库
    - 项目在 ./projects/ 目录下，每个是独立的 git worktree
    - git 命令必须在具体项目目录内执行
    - **所有项目级命令必须在对应项目目录内执行**:
      - 构建/测试/启动/安装依赖等命令必须 cd 到 ./projects/{项目名}/ 再执行
      - 禁止在 workspace 根目录执行 pnpm dev / pnpm build 等项目命令
      - 示例: `cd projects/xzf-octopus && pnpm dev`

auto_answers:
  - pattern: ".*"
    answer: "proceed"

# ── Notify 子系统 ──
providers:
  hermes-cli:
    type: hermes
    timeout: 30
    min_severity: info

channels:
  default:
    provider: hermes-cli
    target: "telegram:xzf_hermes"

hooks:
  on_workflow_failure:
    - id: notify-failure
      type: notify
      channel: default
      template:
        severity: error
        title: "❌ $vars.display_name — E2E Resume 失败"
        body: "📂 项目: $vars.projects | 🌿 $vars.branch\n🔴 失败节点: ${hook.failed_node_id | default:软失败}\n⏱️ 已运行: ${hook.total_duration_ms | duration}\n\n💡 原因: ${vars.failed_reason | default:${hook.error | default:未提供}}"

  on_complete:
    - id: notify-complete
      type: notify
      channel: default
      template:
        severity: info
        title: "🏁 $vars.display_name — E2E Resume 完成"
        body: "状态: $hook.final_status\n✅ 完成: $hook.completed_count / ⏭️ 跳过: $hook.skipped_count / ❌ 失败: $hook.failed_count / 📊 总计: $hook.total_count\n⏱️ 总耗时: ${hook.total_duration_ms | duration}"

  on_node_success:
    - id: notify-resume-setup
      type: notify
      nodes: [resume-setup]
      channel: default
      template:
        severity: info
        title: "🔄 $vars.display_name — E2E Resume 启动"
        body: "📂 项目: $vars.projects\n🌿 分支: $vars.branch\n📋 Plan: $vars.plan_file\n🧪 Cases: $vars.e2e_cases_file"

    - id: notify-e2e-pass
      type: notify
      nodes: [e2e-teardown]
      channel: default
      condition: '$vars.e2e_passed == "true"'
      template:
        severity: info
        title: "✅ $vars.display_name — E2E 通过"
        body: "📊 $vars.e2e_summary"

    - id: notify-e2e-fail
      type: notify
      nodes: [e2e-teardown]
      channel: default
      condition: '$vars.e2e_passed == "false"'
      template:
        severity: warn
        title: "🚫 $vars.display_name — E2E 仍未通过"
        body: "📊 $vars.e2e_summary\n⚠️ 代码仍会提交，请查看 PR 中的失败详情"

    - id: notify-ship
      type: notify
      nodes: [ship]
      channel: default
      template:
        severity: info
        title: "🚀 $vars.display_name — PR 已更新"
        body: "📊 PR: $vars.pr_urls\n📊 E2E: $vars.e2e_passed"

nodes:
  # ═══════════════════════════════════════════════════════════════
  # Phase 0: Resume Setup — 重建上下文
  # ═══════════════════════════════════════════════════════════════
  - id: resume-setup
    type: agent
    timeout: 900
    prompt: |
      你正在执行 E2E Resume Flow 的上下文重建阶段。

      $vars.workspace_rules

      ## 输入
      - PRD 目录: $inputs.prd_dir
      - prd-impl 目录: $inputs.impl_dir（如为空则自动检测）

      ## 你的任务

      ### 1. 验证 PRD 目录
      检查必须文件: PRD-FINAL.md, 02-requirements.md, 03-solution.md, 00-clarify.md
      可选文件: 06-acceptance-cases.md, 07-ui.md, 08-ux.md

      ### 2. 检测 prd-impl 产出目录
      ```bash
      IMPL_DIR="$inputs.impl_dir"
      if [ -z "$IMPL_DIR" ]; then
        IMPL_DIR=$(ls -d ./docs/prd-impl-*/ 2>/dev/null | sort -V | tail -1)
        [ -z "$IMPL_DIR" ] && echo "ERROR: 未找到 prd-impl 产出目录" && exit 1
        IMPL_DIR="${IMPL_DIR%/}"
      fi
      echo "prd-impl 目录: $IMPL_DIR"
      ```

      ### 3. 验证产出物完整性（柔性回退，不要资产丢失）

      ⛔ 任何情况下**不要 exit 1**。资产损失大于流程美感。

      - **plan.md 不存在** → 设 vars_update `resume_fallback="need_plan"`、`conclusion="plan.md 缺失，建议改用 prd-impl 主流程从 plan 阶段开始"`。合成报告后让下游节点自行决定如何处理。
      - **e2e-cases.md 不存在** → 设 `resume_fallback="need_e2e_cases"`。不退出，让 e2e-case-bind 节点重新生成（其本身就有此能力）。
      - **都存在** → `resume_fallback=""` 正常恢复。

      可选产出物（允许不存在，下游节点会处理）：
      - host-contract.md（host-audit 产出）
      - 02-scope.md（prd-forge 产出）
      - real-e2e-ui-report.md / e2e-fix-progress.json / completeness-progress.json（上轮产出）

      ### 3.5 检测宿主契约与范围契约复用机会
      ```bash
      # 如果 $IMPL_DIR/host-contract.md 存在 → 设 host_contract_file，host-audit 节点会短路跳过重生
      # 如果 $PRD_DIR/02-scope.md 存在 → 设 scope_file + scope_mode
      ```

      请在 vars_update 中一并输出上述路径字段。

      ### 4. 读取 impl_type
      从 `plan.md` 首行提取 `交付物类型: xxx`。
      如果提取不到，从 `00-clarify.md` 读取项目类型推断。

      ### 5. 检测项目环境
      遍历 `./projects/` 检测项目列表、包管理器、当前分支。

      ### 6. 计算 display_name
      从 PRD 名称和项目名拼接，如 "Octopus Agent — E2E Resume"。

      ### 7. 读取上次 E2E 进度（关键！用于跳过已完成工作）

      使用 **Read 工具**直接读取进度文件（不要用 Bash + python，直接读 JSON 并在推理中解析）：

      **读取 `$IMPL_DIR/e2e-fix-progress.json`**（如文件存在）:
      - 统计 cases 中 passed / failed / pending 数量
      - ⚠️ 如旧进度文件中 case 对象缺少 `priority` 字段，从 `$IMPL_DIR/e2e-cases.md` 中提取对应 TC 的 Priority 补充
      - 提取 `summary.total_rounds` 和 `summary.all_passed`
      - 生成摘要文本，如 "Fix 进度: 31/98 passed, 0 failed, 67 pending | 2 轮 | 全部通过: false"

      **读取 `$IMPL_DIR/completeness-progress.json`**（如文件存在）:
      - 提取 `summary.latest_score`、`summary.latest_must_have`
      - 提取 `summary.score_n1`、`summary.score_n2`（⚠️ 这两个值必须写入 vars_update 恢复 R3 状态）
      - 提取 `summary.exit_code`
      - 提取最后一轮的 `missing_high` 列表
      - 生成摘要文本，如 "完整度: 2 轮 | 总分: 40% | 必需: 38% | n1: 40:38 | n2: 14:16"

      **⚠️ 关键：将提取的值填入下方 vars_update 的对应字段。**
      如果进度文件不存在，这些字段保持默认值（空串或 "-:-"）。

      ### 8. 确保 agent 文件存在
      ```bash
      AGENTS_TARGET="$(pwd)/.claude/agents"
      mkdir -p "$AGENTS_TARGET"
      if [ ! -f "$AGENTS_TARGET/testing-qa-engineer.md" ]; then
        cat > "$AGENTS_TARGET/testing-qa-engineer.md" << 'QA_EOF'
---
name: QA 测试工程师
description: 专注于浏览器端到端测试、UI 验证和交互测试的 QA 工程师，使用 agent-browser 进行真实浏览器操作
emoji: 🧪
color: teal
---

# QA 测试工程师 Agent 人格

你是 **QA 测试工程师**，一位专注于浏览器端到端测试和 UI 验证的专家。你通过真实浏览器操作确保用户界面功能正确、交互流畅、视觉符合规范。

## 你的身份与记忆
- **角色**：浏览器 E2E 测试与 UI 验证专家
- **性格**：细致、怀疑、证据驱动、用户视角
- **记忆**：你记得每一个 UI bug 是如何在用户面前暴露的，也记得哪些回归是通过截图证据发现的
- **经验**：你见过"代码看上去没问题"但 UI 实际渲染错误的情况，所以只相信截图和 DOM 证据

## 你的核心使命

### 真实浏览器 E2E 测试
- 使用 agent-browser 打开页面、点击元素、输入文本、导航
- 每个测试用例必须有截图证据（保存到指定路径）
- 提取关键 DOM selector 的状态文本作为断言依据
- **没有截图 = failed**，不允许"代码看上去对"类型的通过

### 交互序列验证
- 按照用例定义的交互序列逐步执行（点击 / 输入 / 等待 / 导航）
- 每个步骤都要验证前一步的结果（页面加载完成、元素可见）
- 验证响应式布局在不同视口下的表现

### 证据链完整性
- 截图文件名格式：`TC-NNN-{step}.png`
- DOM 断言记录：selector + expected + actual + pass/fail
- 失败用例必须包含：截图路径 + 实际 DOM 状态 + 期望状态

## 你的工作原则
- **截图是唯一的通过证据**：没有截图的断言不算数
- **用户视角优先**：测试的是用户能看到和操作的内容，不是内部状态
- **失败要具体**：不只说"failed"，要说"按钮文本期望'保存'实际为'Save'"
- **不跳过、不排除**：每条用例必须执行，环境问题标记为 failed 而非 skipped
QA_EOF
      fi
      ```

      ## 输出
      {"vars_update":{"prd_dir":"$inputs.prd_dir","prd_final_file":"$inputs.prd_dir/PRD-FINAL.md","requirements_file":"$inputs.prd_dir/02-requirements.md","solution_file":"$inputs.prd_dir/03-solution.md","clarify_file":"$inputs.prd_dir/00-clarify.md","completeness_file":"$inputs.prd_dir/05-completeness-review.md","acceptance_cases_file":"<如有>","ui_file":"<如有>","ux_file":"<如有>","scope_file":"<$PRD_DIR/02-scope.md 如存在>","scope_mode":"<从 02-scope.md 提取或 strict>","impl_type":"<类型>","projects":"<项目名>","pkg_manager":"<包管理器>","branch":"<分支>","display_name":"<名称>","plan_file":"$IMPL_DIR/plan.md","e2e_cases_file":"$IMPL_DIR/e2e-cases.md","output_dir":"$IMPL_DIR","project_path":"<主项目路径，如 ./projects/xzf-octopus>","host_contract_file":"<$IMPL_DIR/host-contract.md 如存在，否则空串>","host_has_ui":"<从 host-contract 提取或 unknown>","e2e_resume_fix_progress":"<fix进度摘要或空>","e2e_resume_completeness_progress":"<completeness进度摘要或空>","completeness_score_n1":"<从进度文件恢复或 -:- >","completeness_score_n2":"<从进度文件恢复或 -:- >","resume_fallback":"<need_plan / need_e2e_cases / 空>","conclusion":"E2E Resume 上下文重建完成 (resume_fallback=<值>)"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 0.5: Host Audit — 宿主契约检测与生成（与 prd-impl.yaml 同步）
  # 如 host_contract_file 已存在则短路跳过重生。
  # ═══════════════════════════════════════════════════════════════
  - id: host-audit
    type: agent
    depends_on: [resume-setup]
    timeout: 3600
    agents:
      architecture-explorer:
        description: "架构勘探员 — 扫描宿主项目实际架构、技术栈、启动命令"
        agent_file: ".claude/agents/architecture-explorer.md"
        model: opus[1m]
        tools: ["Read", "Grep", "Glob", "Bash"]
      ui-system-auditor:
        description: "UI 系统审计员 — 扫描设计 tokens、现有组件、路由、状态管理"
        agent_file: ".claude/agents/engineering-frontend-developer.md"
        model: opus[1m]
        tools: ["Read", "Grep", "Glob"]
    prompt: |
      你是宿主项目契约生成器。本节点与 prd-impl.yaml 同名节点一致。

      $vars.workspace_rules

      ## ✨ 短路检查（最先执行）
      如果 $vars.host_contract_file 非空且文件存在，直接输出，不重生：
      ```
      {"vars_update":{"host_contract_file":"$vars.host_contract_file","host_has_ui":"$vars.host_has_ui","conclusion":"复用上轮 host-contract.md"}}
      ```

      ## 项目路径
      $vars.project_path

      ## 输出目录
      $vars.output_dir/host-contract/

      ## 委派任务
      与 prd-impl.yaml 中 host-audit 节点一致：
      1. architecture-explorer：扫描 monorepo / 后端框架 / API 模式 / 启动命令 / 错误中间件 → host-contract/01-architecture.md
      2. ui-system-auditor：扫描设计 tokens / 现有组件 / 路由 / 状态管理 / HTTP 客户端 → host-contract/02-ui-system.md并截 5 个典型页面到 host-contract/screenshots/

      合成 `$vars.output_dir/host-contract.md`详细结构参考 prd-impl.yaml host-audit 节点。
      子代理失败不退出。

      ## 输出
      {"vars_update":{"host_contract_file":"$vars.output_dir/host-contract.md","host_has_ui":"<true/false/unknown>","conclusion":"<3 句话总结宿主技术栈>"}}
  - id: e2e-case-bind
    type: agent
    depends_on: [host-audit]
    timeout: 3600
    execute_when: '$inputs.run_e2e == "true"'
    agents:
      api-tester:
        description: "API 测试架构师 — 将抽象验收用例绑定到可执行脚本"
        agent_file: ".claude/agents/testing-api-tester.md"
        model: sonnet
        tools: ["Read", "Write", "Edit", "Grep", "Glob"]
    prompt: |
      你是 E2E 用例绑定工程师。将上游 prd-forge 产出的抽象验收用例绑定到可执行脚本。

      ## ⚡ 短路检查（最先执行）
      如果 `$inputs.e2e_regenerate` 不是 `"e2e-cases"` 也不是 `"all"`：
      1. 检查 `$vars.output_dir/e2e-cases.md` 是否存在
      2. **存在** → 读取文件，提取用例总数，直接输出 vars_update 并结束，不做其他工作：
         ```
         {"vars_update":{"e2e_cases_file":"$vars.output_dir/e2e-cases.md","e2e_total":"<从文件提取>","e2e_p0_count":"<从文件提取>","e2e_p1_count":"<从文件提取>","conclusion":"e2e-cases.md 已存在，跳过生成"}}
         ```
      3. **不存在** → 继续下方完整流程

      ## 设计哲学（重要）
      分层 BDD：acceptance-cases.md 是需求层 Given/When/Then（不含实现细节），
      本节点负责从有效路由/selector/workflow 绑定点生成可执行用例。
      ⚠️ **P0/P1 是质量分级，不是排除机制**——两者都必须 100% 实现和测试。P0 需深度测试（边界/并发/异常/安全），P1 验证基本功能通过即可。

      ## 输入
      1. 抽象验收用例: $vars.acceptance_cases_file（⭐ 首选输入，如为空退化到需求书推导）
      2. 需求定义: $vars.requirements_file (User Stories + Given/When/Then)
      3. API 契约: $vars.contract_file（split-code 时必读，获取可执行路由/错误码）
      4. UI 规范: $vars.ui_file（获取页面ID/selector 提示）
      5. UX 交互: $vars.ux_file（获取页面状态机与交互序列）
      6. 实现计划: $vars.plan_file

      ## ⛔ 前置过滤：排除基准/性能测试
      在生成用例前，先过滤掉以下类型的用例（不生成可执行 case）：
      - evidence_type 为 benchmark / performance 的用例
      - scenario 中包含“基准测试”“性能测试”“压力测试”“压测”“benchmark”“performance”关键词的用例
      - 纯测量性质（吞吐量、延迟、QPS 等）的用例
      被过滤的用例在 conclusion 中记录为“已排除（基准/性能测试）”，不计入 e2e_total。
      本工作流聚焦功能验收，性能基准由专门工具处理。

      ## 你的任务

      ### 分支 A：acceptance_cases_file 非空（首选路径）
      1. 读取抽象用例（TC-001 起）。
      2. **先执行前置过滤**（排除基准/性能测试）。
      3. 对每条剩余用例依据 evidence_type 进行绑定：
         | evidence_type | 绑定目标 |
         |---------------|----------|
         | api_response | HTTP method+path+状态码+响应字段断言 |
         | ui_state | 页面ID+selector+UI 状态转换断言 |
         | file_content | 文件路径+内容模式 |
         | cli_output | 命令行+输出模式+退出码 |
         | workflow_execution | YAML 路径+入参+产出验证 |
      4. 使用 binding_hints 快速定位。不要从 TC 中街接 binding_hints 原文，要加上架构取证。
      5. ⛔ **禁止标记 N/A** — 如果某条 TC 的 evidence_type 在当前 impl_type 中不适用（如 yaml-workflow 下出现 ui_state），**必须重新绑定到兼容的 evidence_type**（如降级为 file_content 或 cli_output），不允许以「N/A」记录。每个用例都必须有可执行的验证步骤。
      6. 对任何 binding_hints 中提及但在 contract/ui/ux 中找不到的 API/页面要记录到 conclusion。

      ### 分支 B：acceptance_cases_file 为空（向后兼容退化）
      1. 从需求书 User Stories 推导 Given/When/Then。
      2. 使用同一抽象用例模板（本地生成 acceptance_cases）。
      3. 委派 api-tester 补充边界与安全测试。
      4. 后续同分支 A 的绑定步骤。

      ## 完整性检查
      - **覆盖门** · 每个 acceptance case 必须生成 1 以上可执行 case，否则记录为缺失。
      - **一致性门** · 可执行 case 不能出现抽象用例中未提及的全新断言。
      - yaml-workflow 类型主要生成 workflow_execution / file_content / cli_output 类 case。
      - ⛔ **无 N/A** · 所有用例必须有可执行步骤，不允许跳过或标记为不适用。

      ## 输出: $vars.output_dir/e2e-cases.md
      结构：
      ```markdown
      # E2E Cases (Bound)

      ## 信息源
      - 抽象用例: $vars.acceptance_cases_file (或退化为 needs-derived)
      - API 契约: $vars.contract_file
      - UI/UX: $vars.ui_file / $vars.ux_file
      - 已排除: 基准/性能测试 N 条

      ## TC-001 · 对应 抽象TC-001
      - **Story**: STORY-X
      - **Priority**: P0
      - **Evidence**: api_response
      - **可执行步骤**:
        1. POST /api/xxx body={...}
        2. assert status == 200
        3. assert response.json["id"] != null
      - **双向可追溯**: 抽象TC-001 / contract POST /api/xxx / ui_file: 页面Dashboard
      ```

      ## 输出
      {"vars_update":{"e2e_cases_file":"$vars.output_dir/e2e-cases.md","e2e_total":"<可执行 case 总数>","e2e_p0_count":"<P0 数>","e2e_p1_count":"<P1 数>","conclusion":"<覆盖抽象用例比例 + 排除的基准/性能用例数 + 未能绑定项与原因>"}}

  - id: completeness-bind
    type: agent
    depends_on: [e2e-case-bind]
    execute_when: '$inputs.run_e2e == "true"'
    timeout: 1800
    prompt: |
      你是完整度检查清单生成器。从 PRD 全套文档中提取所有必需（Required / Must Have）Story，
      交叉引用技术方案、UI、UX、测试用例，生成多维度的结构化检查清单。

      ## ⚡ 短路检查（最先执行）
      如果 `$inputs.e2e_regenerate` 不是 `"completeness-checklist"` 也不是 `"all"`：
      1. 检查 `$vars.output_dir/completeness-checklist.md` 是否存在
      2. **存在** → 直接输出 vars_update 并结束，不做其他工作：
         ```
         {"vars_update":{"completeness_checklist_file":"$vars.output_dir/completeness-checklist.md","conclusion":"completeness-checklist.md 已存在，跳过生成"}}
         ```
      3. **不存在** → 继续下方完整流程

      $vars.workspace_rules

      ## 输入（按优先级）
      1. PRD 需求文档: $vars.requirements_file — Story 列表 + MoSCoW 优先级 + 验收标准
      2. 技术方案: $vars.solution_file — API 端点、数据模型、组件列表、架构决策
      3. UI 设计: $vars.ui_file — 页面列表、组件清单、设计 Tokens（如为空跳过 UI 维度）
      4. UX 交互: $vars.ux_file — 用户旅程、页面状态机、交互序列（如为空跳过 UX 维度）
      5. 验收用例: $vars.acceptance_cases_file — BDD 用例 ID（如为空则从 requirements 推导）
      6. E2E 测试用例: $vars.e2e_cases_file — 可执行 TC-NNN ID
      7. 实现计划: $vars.plan_file — 预期文件路径和交付物

      ## 步骤

      ### 1. 提取必需 Story
      从 $vars.requirements_file 的 MoSCoW 部分提取所有 Must Have 项。
      每个 Story 提取: ID、标题、功能描述、验收标准（Given/When/Then）、技术领域。

      ### 2. 交叉引用技术规格（从 $vars.solution_file）
      对每个 Story，查找对应的:
      - API 端点（method + path + 状态码）
      - 数据库表/字段
      - 服务类/函数名
      - 架构约束（如延迟目标、token 预算）

      ### 3. 交叉引用 UI/UX 规格
      如果 Story 涉及 UI（从验收标准中的"UI 入口"/"页面状态"判断）:
      - 从 $vars.ui_file 查找: 页面名称、组件清单
      - 从 $vars.ux_file 查找: 状态机、交互序列
      - 标记 UI 闭环检查项: 入口 → 操作 → 反馈 → 恢复

      ### 4. 交叉引用测试用例
      - 从 $vars.e2e_cases_file 查找关联的 TC-NNN ID
      - 从 $vars.acceptance_cases_file 查找抽象 TC ID（如有）

      ### 5. 生成检查项
      每个必需 Story 生成一个多维度检查项:

      ```markdown
      ### STORY-XXX: <标题>
      - **描述**: <一句话>
      - **验收标准**: <Given/When/Then>
      - **技术规格**: <API 端点 / DB 表 / 服务类 from 03-solution>
      - **UI 组件**: <页面 + 组件列表 from 07-ui>（如适用）
      - **UX 状态**: <状态机 / 交互序列 from 08-ux>（如适用）
      - **测试用例**: TC-001, TC-002 (from e2e-cases)
      - **计划文件**: <文件路径 from plan.md>
      - **验证方法**: <代码检查 | 单元测试 | API 测试 | UI 测试>
      - status: pending
      ```

      ## 输出文件
      保存到 `$vars.output_dir/completeness-checklist.md`

      ## 输出
      {"vars_update":{"completeness_checklist_file":"$vars.output_dir/completeness-checklist.md","conclusion":"生成 N 个必需 Story 的多维度检查清单（交叉引用 solution/ui/ux/test-cases）"}}

  - id: e2e-setup
    type: agent
    depends_on: [completeness-bind]
    execute_when: '$inputs.run_e2e == "true"'
    timeout: 1800
    prompt: |
      执行 E2E 环境准备。

      $vars.workspace_rules

      ## 环境
      - 交付物类型: $vars.impl_type
      - 项目列表: $vars.projects
      - ⛔ 保护端口: $inputs.protected_ports（绝对不能杀死这些端口上的进程）

      $inputs.e2e_project_rules

      ## 步骤

      ### 1. 检测运行上下文
      ```bash
      WORKSPACE_ROOT="$(pwd)"
      if [ -d "projects" ]; then
        OCTOPUS_DIR=$(ls -d projects/*octopus* 2>/dev/null | head -1)
        echo "模式: Workspace | 项目: $OCTOPUS_DIR"
      elif [ -d "packages/server" ]; then
        OCTOPUS_DIR="$WORKSPACE_ROOT"
        echo "模式: 源码 | 项目: $OCTOPUS_DIR"
      fi
      ```

      ### 1.5 创建 E2E 沙箱目录（与 prd-impl.yaml 同步，resume- 前缀）
      ```bash
      SANDBOX_ROOT="$WORKSPACE_ROOT/.e2e-sandbox/resume-$(date +%s)"
      mkdir -p "$SANDBOX_ROOT/screenshots" "$SANDBOX_ROOT/leaked" "$SANDBOX_ROOT/workspace"
      echo "E2E 沙箱: $SANDBOX_ROOT"

      if [ -f "$WORKSPACE_ROOT/.gitignore" ]; then
        if ! grep -qE '^\.e2e-sandbox/' "$WORKSPACE_ROOT/.gitignore"; then
          echo ".e2e-sandbox/" >> "$WORKSPACE_ROOT/.gitignore"
        fi
      else
        echo ".e2e-sandbox/" > "$WORKSPACE_ROOT/.gitignore"
      fi

      if [ -n "$OCTOPUS_DIR" ] && [ "$OCTOPUS_DIR" != "$WORKSPACE_ROOT" ] && [ -d "$OCTOPUS_DIR" ]; then
        if [ -f "$OCTOPUS_DIR/.gitignore" ] && ! grep -qE '^\.e2e-sandbox/' "$OCTOPUS_DIR/.gitignore"; then
          echo ".e2e-sandbox/" >> "$OCTOPUS_DIR/.gitignore"
        fi
      fi
      ```

      ### 1.6 确保 agent-browser 可用
      ```bash
      npx agent-browser --version 2>&1 || echo "WARN: agent-browser install failed, real-e2e-ui will fall back"
      ```

      ### 2. 构建项目
      ```bash
      cd "$OCTOPUS_DIR" && <按 e2e_project_rules 构建命令>
      ```
      构建失败 → 分析修复 → 重试（最多 2 轮）。

      ### 3. 启动 Isolated Server
      ⛔ 端口保护: 启动服务必须使用 `--isolated`，禁止 kill-port 清理保护端口。
      ```bash
      cd "$OCTOPUS_DIR"
      nohup <按 e2e_project_rules 启动命令> > /tmp/e2e-dev.log 2>&1 &
      DEV_PID=$!
      disown  # 关键：确保进程在节点结束后存活
      sleep 10
      SERVER_PORT=$(grep -oP 'server[=: ]+\K[0-9]+' /tmp/e2e-dev.log | head -1)
      WEB_PORT=$(grep -oP 'web[=: ]+\K[0-9]+' /tmp/e2e-dev.log | head -1)
      echo "Server: $SERVER_PORT | Web: $WEB_PORT | PID: $DEV_PID"
      ```

      ### 4. 健康检查
      ```bash
      for i in $(seq 1 24); do
        curl -sf "http://localhost:$SERVER_PORT/api/health" && break
        sleep 5
      done
      ```
      超时 → 报错退出。

      ### 5. 创建测试工作空间（yaml-workflow 类型）
      ```bash
      if [ "$vars.impl_type" = "yaml-workflow" ]; then
        WS_ID=$(curl -s "http://localhost:$SERVER_PORT/api/workspaces" \
          | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{
              const ws=JSON.parse(d);
              const m=ws.find(w=>w.name&&w.name.startsWith('e2e-test-'));
              console.log(m?m.id:'');
            })")
        if [ -z "$WS_ID" ]; then
          WS_NAME="e2e-test-$(date +%s | tail -c 5)"
          WS_BODY=$(node -e "console.log(JSON.stringify({name:'$WS_NAME',base_path:'$SANDBOX_ROOT/workspace'}))")
          WS_ID=$(curl -s -X POST "http://localhost:$SERVER_PORT/api/workspaces" \
            -H "Content-Type: application/json" \
            -d "$WS_BODY" \
            | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).id||''))")
          if [ -z "$WS_ID" ]; then
            WS_ID=$(curl -s -X POST "http://localhost:$SERVER_PORT/api/workspaces" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"$WS_NAME\"}" \
              | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).id||''))")
          fi
        fi
        echo "Workspace: $WS_ID | base_path: $SANDBOX_ROOT/workspace"
      fi
      ```

      ### 6. 发送通知
      ```bash
      octopus notify --ignore-failure \
        --title "🚀 $vars.display_name — [Step 1] E2E 环境就绪" \
        --body "Server: $SERVER_PORT | Web: $WEB_PORT | PID: $DEV_PID"
      ```

      ## 输出
      {"vars_update":{"e2e_octopus_dir":"$OCTOPUS_DIR","e2e_server_port":"$SERVER_PORT","e2e_web_port":"$WEB_PORT","e2e_dev_pid":"$DEV_PID","e2e_workspace_id":"$WS_ID","e2e_sandbox_dir":"$SANDBOX_ROOT","conclusion":"E2E Resume 环境就绪，沙箱: $SANDBOX_ROOT"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 4.5: Real E2E UI — 浏览器真实点击 + 截图 + DOM 断言（与 prd-impl.yaml 同步）
  # ═══════════════════════════════════════════════════════════════
  - id: real-e2e-ui
    type: agent
    depends_on: [e2e-setup, completeness-bind]
    execute_when: '$inputs.run_e2e == "true" && $vars.host_has_ui == "true"'
    timeout: 7200
    agents:
      browser-tester:
        description: "浏览器 E2E 测试员 — 用 agent-browser 真实点击与断言"
        agent_file: ".claude/agents/testing-qa-engineer.md"
        model: opus[1m]
        tools: ["Read", "Grep", "Glob", "Bash"]
    prompt: |
      你是真实浏览器 E2E 测试员。本节点作为 e2e-completeness-round 的硬证据输入。

      $vars.workspace_rules

      ## 环境
      - Server: http://localhost:$vars.e2e_server_port
      - Web: http://localhost:$vars.e2e_web_port
      - 沙箱目录: $vars.e2e_sandbox_dir
      - E2E 用例: $vars.e2e_cases_file

      ## 你的任务
      委派 **browser-tester** 逐个测 ui_state 类 P0/P1 用例。每条必须走完以下步骤：
      1. 使用 agent-browser 打开页面
      2. 按用例交互序列点击 / 输入 / 导航
      3. 截图保存到 `$vars.e2e_sandbox_dir/screenshots/TC-NNN.png`
      4. 提取关键 DOM selector 的状态文本作为证据
      5. 有【截图】+【DOM 断言通过】才算 passed

      ⛔ 没有截图证据 = failed。本节点输出不阻断主流程。

      ## 输出报告
      保存到 `$vars.output_dir/real-e2e-ui-report.md`。与 prd-impl.yaml 同步。

      ## 输出
      {"vars_update":{"real_e2e_ui_passed":"<true 仅在所有 ui_state 类 TC 都 passed 时>","real_e2e_ui_total":"<总数>","real_e2e_ui_failed_list":"<逗号分隔的 TC ID 列表，空串 = 全过>","real_e2e_ui_report":"$vars.output_dir/real-e2e-ui-report.md","conclusion":"<2 句话总结：通过率 + 失败主因分类>"}}

  - id: e2e-completeness-loop
    type: loop
    depends_on: [e2e-setup, completeness-bind]
    execute_when: '$inputs.run_e2e == "true"'
    max_iterations: 30
    break_when: '$vars.completeness_exit_code != "" || $iteration >= $inputs.completeness_max_rounds'
    nodes:
      - id: e2e-completeness-round
        type: agent
        timeout: 3600
        context: new
        agents:
          product-completeness-assessor:
            description: "产品完整度评估员 — 对照 PRD 必需功能评估实现覆盖度"
            prompt: |
              ## 产品完整度评估（硬证据驱动 — v3，与 prd-impl.yaml 同步）

              对照 PRD 需求文档评估实现的完整度。
              **P0（核心）和 P1（增强）都必须 100% 实现。P0 要求深度测试，P1 要求基本功能验证通过。**

              ⛔ **规则：用户输入的所有功能都是"必需"，如果某个用户提出的功能未实现，必须列为缺失项。**
              ⛔ **硬证据规则：不允许"代码看上去应该能用"类型的抨告。每个 Story 打分必须有对应证据。**

              ## 证据输入（必读）
              - **有 UI 的 Story** → $vars.real_e2e_ui_report（只有 passed 的 TC 才能算有证据）
              - **无 UI 的 Story** → $vars.output_dir/e2e-fix-progress.json（只有 status=="passed" 的 api_response/cli_output/file_content 类 TC 才能算有证据）
              - **补充依据** → $vars.completeness_checklist_file（仅用于查询 Story 与 TC 的映射关系）

              ## 评分硬规则

              ### 逐 Story 评分
              对 $vars.requirements_file 中的每个 Story：
              1. 判断是否涉及 UI（验收标准中是否提及页面/点击/交互 或 ui_file 存在对应页面）
              2. 证据查找：
                 - UI Story → 在 real_e2e_ui_report 找对应 TC 的 passed 记录与截图路径
                 - 非 UI Story → 在 e2e-fix-progress.json 找对应 TC 的 status=="passed"
              3. 评分：有证据→ 1 分；无证据→ 0 分（不是降分，是直接 0，即使代码看上去实现了）
              ⛔ 严禁 LLM 凭"代码读了试响该能过"给分。

              ### 总分与出口判定
              - completeness_score = 起分 Story 数 / 总 Story 数 × 100
              - **completeness_score == 100 仅在以下同时成立时**：
                - real_e2e_ui_passed == "true"（如 host_has_ui == "true"）
                - 所有 api_response 类 TC 在 e2e-fix-progress.json status == "passed"
                - 所有 cli_output / file_content 类 TC 有实际证据
                - 任一不满足 → score 不允许 == 100

              ## 输出要求

              ### 1. 评分明细表（逐 Story）
              | Story | UI? | TC | 证据 | 得分 |
              |-------|-----|----|----- |------|
              | STORY-001 | 是 | TC-001 | screenshots/TC-001.png | 1 |
              | STORY-002 | 否 | TC-005 | e2e-fix-progress.json: passed | 1 |
              | STORY-003 | 是 | TC-007 | 无截图证据 | 0 |
              | **总计** | | | | **N/M = X%** |

              ### 2. 缺失项清单（供 e2e-fix-loop 下轮优先修复）
              - 具体描述：缺什么证据（存在实现但无 E2E 证据仍计缺失）
              - 所需 TC：该 Story 应由哪个 TC 覆盖
              - 优先级：高/中/低
              - 修复方向：是补 TC、补截图、还是实际补功能代码

              ### 3. 轮次对比（round > 1 时）
              - 上一轮的哪些缺失项本轮拿到证据了？
              - 评分变化: <上轮>% → <本轮>% (±<delta>)
            model: opus[1m]
            tools: ["Bash", "Read", "Grep", "Glob"]

          api-tester:
            description: "API 测试员 — 重测修复后的用例"
            agent_file: ".claude/agents/testing-api-tester.md"
            prompt: |
              ## API 重测任务
              重测与本轮修复相关的 API 端点，验证修复是否生效。
              每个断言必须有 HTTP 响应证据。
            model: sonnet
            tools: ["Bash", "Read", "Write", "Edit", "Grep", "Glob"]
        prompt: |
          你是产品完整度修复工程师。这是第 $iteration 轮（上限 $inputs.completeness_max_rounds 轮）。

          $vars.workspace_rules

          $inputs.e2e_project_rules

          ## 评估维度与阈值
          - ⚠️ **固定 100% strict 模式** — 所有 4 个维度必须 100% 覆盖，不接受部分完成
          - P0（核心）和 P1（增强）都必须 100% 实现和通过；P0 要求深度测试，P1 要求基本验证通过
          - 完整度检查清单: $vars.completeness_checklist_file（⚠️ 必须使用）
          - PRD 需求: $vars.requirements_file
          - 实现计划: $vars.plan_file
          - Server: http://localhost:$vars.e2e_server_port
          - 项目目录: $vars.e2e_octopus_dir

          ## 上一轮状态
          - 总分: $vars.completeness_score%
          - 必需: $vars.completeness_must_have_score%
          - 上轮评分: $vars.completeness_score_n1（格式 "总分:必需"，"-:-" 表示无历史）
          - 上上轮评分: $vars.completeness_score_n2
          - 缺失项: $vars.completeness_missing

          ## 进度文件（⚠️ 必须使用，支持暂停续跑和失败重试）
          文件路径: `$vars.output_dir/completeness-progress.json`

          ### 每轮开始时（先读后做）
          1. 尝试读取进度文件（Read 工具）
          2. **文件存在且有 `summary`**:
             - 检查 `summary.exit_code`: 如果是 "R1" 或 "R3"，**直接输出 `vars_update` 设置 `completeness_exit_code` 为相同值并结束本轮**（不重复评估）
             - 检查 `summary.score_n1` 和 `score_n2`: 如果与当前 `$vars.completeness_score_n1` 不同（说明 vars 被重置了），**输出 `vars_update` 将 `completeness_score_n1` 和 `completeness_score_n2` 恢复为文件中的值**
             - 将 `rounds` 数组传给 assessor 用于轮次对比
          3. **文件不存在**: 初始化空结构，使用当前 `$vars.completeness_score_n1` 和 `n2`（默认 "-:-"）

          ### 每轮结束时（做完再写，⚠️ 必须在 vars_update 之前写文件）
          1. 追加本轮到 `rounds` 数组: `{round, total_score, must_have_score, missing_count, missing_high, fixed_items, files_changed, commit}`
          2. 更新 `summary`: `{latest_score, latest_must_have, score_n1, score_n2, exit_code}`
          3. **先用 Write 工具写回进度文件**
          4. **然后**才发送通知和输出 vars_update（vars_update 中的 `completeness_score_n1/n2` 必须与进度文件一致）

          进度文件格式:
          ```json
          {
            "rounds": [
              {"round":1,"total_score":14,"must_have_score":16,
               "missing_count":25,"missing_high":["AgentService","Memory CRUD"],
               "fixed_items":["InitService"],"files_changed":["..."],"commit":"abc123"}
            ],
            "summary": {
              "latest_score":14,"latest_must_have":16,
              "score_n1":"14:16","score_n2":"-:-","exit_code":""
            }
          }
          ```

          ## 本轮任务（⚠️ 只做一轮，引擎会自动循环）

          ### A. 评估（基于检查清单，非从零评估）
          1. 读取 `$vars.completeness_checklist_file`
          2. **只验证 `status: pending` 的项**（`status: passed` 的跳过）
          3. 对每个 pending 项，委派 **product-completeness-assessor** 验证:
             - 代码文件是否存在且非空壳
             - 验收标准是否满足
             - 关联测试用例是否通过
          4. 更新检查清单: passed 的标记 `status: passed`，失败的记录原因
          5. **用 Write 工具写回更新后的检查清单文件**
          6. 计算: total_score = passed 数 / 总数 × 100%
          产出: total_score, must_have_score, 缺失项清单。

          评估完成后发通知:
          ```bash
          octopus notify --ignore-failure \
            --title "📊 $vars.display_name — [完整度 $iteration] 评估完成" \
            --body "总分: <total>% | 必需: <mh>% | 缺失: <N> 项 (高: X, 中: Y, 低: Z)"
          ```

          ### B. 退出判定（严格按顺序，命中即停）

          **R1 达标**:
          - total_score == 100（所有 4 个维度均 100%）→ completeness_exit_code="R1"
          - ⚠️ 99% 不算达标，任何维度未 100% 覆盖都必须继续修复

          **R3 卡死**: 当前评分 == n1 且 n1 == n2（连续 3 轮无变化）→ completeness_exit_code="R3"
          - 格式: "总分:必需"，如 "40:38"
          - "-:-" 是初始值，不会与真实评分匹配，前 2 轮不会误触发

          **均未命中** → 进入 C 修复

          ⚠️ R2（轮数耗尽）由引擎自动处理（$iteration >= $inputs.completeness_max_rounds 时循环结束），你不需要判断。

          如果 R1 或 R3 触发，发退出通知:
          ```bash
          octopus notify --ignore-failure \
            --title "🏁 $vars.display_name — [完整度 $iteration] 退出: <R1/R3>" \
            --body "总分: <total>% | 必需: <mh>% | 原因: <达标/卡死>"
          ```

          ### C. 修复（仅在未触发 R1/R3 时执行）
          1. 从缺失项选取所有高优先级项
          2. 按 assessor 指定的文件实施修复
          3. `<按 e2e_project_rules 构建命令>` 验证
          4. `cd $vars.e2e_octopus_dir && git add -A && git commit -m "feat: 完整度第 $iteration 轮修复"`
          5. 委派 **api-tester** 重测相关用例

          修复完成后发通知:
          ```bash
          octopus notify --ignore-failure \
            --title "🛠️ $vars.display_name — [完整度 $iteration] 修复完成" \
            --body "修复: <具体改了哪些功能/文件> | build: <通过/失败> | 下一轮将重新评估"
          ```

          ## ⛔ 规则
          - 只执行一轮，引擎自动循环
          - 严禁"心理满意退出"（"差不多够了"不是退出理由）
          - R2 由引擎处理，你只管 R1 和 R3
          - 退出码为空串时，引擎自动进入下一轮

          ## 输出
          {"vars_update":{"completeness_score":"<总分 0-100>","completeness_must_have_score":"<必需功能分 0-100>","completeness_exit_code":"<R1/R3 或空串>","completeness_rounds":"$iteration","completeness_score_n1":"<本轮 总分:必需，供下轮比较>","completeness_score_n2":"$vars.completeness_score_n1","completeness_missing":"<缺失项摘要>","completeness_passed":"<true 仅 R1，否则 false>","conclusion":"第 $iteration 轮: <摘要>"}}

  - id: e2e-fix-loop
    type: loop
    depends_on: [e2e-completeness-loop]
    execute_when: '$inputs.run_e2e == "true"'
    max_iterations: 30
    break_when: '($vars.e2e_reality_issues == "0" && $vars.e2e_fix_all_passed == "true") || $iteration >= $inputs.e2e_fix_rounds'
    nodes:
      - id: e2e-fix-round
        type: agent
        timeout: 3600
        context: new
        agents:
          diagnostician:
            description: "深度诊断分析员 — 分析测试失败根因（7 种分类）"
            agent_file: ".claude/agents/engineering-software-architect.md"
            prompt: |
              ## 诊断任务
              分析测试失败原因，判断根因类型:
              YAML_ERROR / CODE_BUG / FEATURE_NOT_IMPL / AGENT_TIMEOUT / PORT_CONFLICT /
              ENVIRONMENT_CORRUPT / TEST_FLAKY / ASSERTION_ERROR

              对每种根因给出:
              1. 具体错误位置和原因
              2. 修复方案（改哪个文件、改什么内容）
              3. 是否需要 workspace rebuild
            model: sonnet
            tools: ["Bash", "Read", "Grep", "Glob"]

          code-reviewer:
            description: "代码审查员 — 验证修复代码质量，防止修复引入新问题"
            agent_file: ".claude/agents/engineering-code-reviewer.md"
            prompt: |
              ## 修复代码审查
              审查本轮修复的代码变更:
              1. 修复是否正确解决了原问题？
              2. 修复是否引入新问题？
              3. 代码质量是否达标（错误处理、命名、结构）？
              严重级别: 🔴 BLOCKER / 🟡 SUGGESTION / 🔵 MINOR
            model: sonnet
            tools: ["Bash", "Read", "Grep", "Glob"]

          api-tester:
            description: "API 测试员 — 重测修复后的 API 端点"
            agent_file: ".claude/agents/testing-api-tester.md"
            prompt: |
              ## API 重测任务
              重测之前失败的 API 端点，验证修复是否生效。
              每个断言必须有 HTTP 响应证据。
            model: sonnet
            tools: ["Bash", "Read", "Write", "Edit", "Grep", "Glob"]
        prompt: |
          你是 E2E 修复工程师。这是第 $iteration 轮修复（上限 $inputs.e2e_fix_rounds 轮）。

          $vars.workspace_rules

          $inputs.e2e_project_rules

          ## 当前状态
          - Server: http://localhost:$vars.e2e_server_port
          - Web: http://localhost:$vars.e2e_web_port
          - P0: $vars.e2e_p0_passed/$vars.e2e_p0_count
          - P1: $vars.e2e_p1_passed/$vars.e2e_p1_count
          - 项目目录: $vars.e2e_octopus_dir
          - ⛔ 保护端口: $inputs.protected_ports
          - ⚠️ P0（核心）和 P1（增强）都存在，两者都必须 100% 通过

          ## 裁判批注（最高优先级，最先读取）
          文件路径: `$vars.output_dir/e2e-reality-notes.json`

          ### 每轮开始时（先读批注再做其他）
          1. 尝试读取批注文件（Read 工具），文件不存在则跳过
          2. 如果存在：
             - 提取所有 `verdict == "fake_pass"` 的用例及其 `must_fix` 内容
             - 读取 `global_notes`（如有）— 本轮所有修复必须遵守
          3. **修复优先级**:
             - 🔴 最高：`fake_pass` 用例 → 必须按 `must_fix` 要求重做，禁止用相同方式再次提交
             - 🟡 次高：`failed` 用例 → 正常修复
             - 🔵 普通：`pending` 用例 → 正常测试
          4. 如果 `global_notes` 指出系统性问题（如"多个用例用 mock 绕过"），本轮所有修复都必须避免该模式

          ## 进度文件（⚠️ 必须使用，支持暂停续跑和失败重试）
          文件路径: `$vars.output_dir/e2e-fix-progress.json`

          ### 每轮开始时（先读后做）
          1. 尝试读取进度文件（Read 工具）
          2. **文件不存在**: 初始化空进度。从 `$vars.e2e_cases_file` 用 Grep 提取所有 `### TC-NNN` 或 `## TC-NNN` 开头的行获取 case ID 列表，全部标记 `"status":"pending"`
          3. **文件存在**: 解析 JSON，统计 passed / failed / pending 数量
          4. **重测 `status == "failed"` 或 `status == "pending"` 的用例**
          5. `status == "passed"` 的用例跳过
          6. ⛔ **不存在 skipped/excluded 状态** — 所有用例要么 passed 要么 failed

          ### 每轮结束时（做完再写，⚠️ 必须在 vars_update 之前写文件）
          1. 更新每个重测 case 的 `status`（passed/failed）和 `last_tested_round`
          2. ⛔ **禁止跳过、禁止排除** — 所有用例必须实际执行并断言。如因环境问题无法执行，标记为 `failed` 并记录 `root_cause`，而非 `skipped`。
          3. 本轮修复的 case 记录 `root_cause`、`fix_summary`、`fix_files`
          4. 追加本轮到 `rounds` 数组: `{round, p0, fixed, root_causes, files_changed, commit}`
          5. 更新 `summary`: `{total_rounds, all_passed}`
          6. **先用 Write 工具写回进度文件**
          7. **然后**才发送通知和输出 vars_update

          进度文件格式:
          ```json
          {
            "cases": {
              "TC-001": {"priority":"P0","status":"passed","last_tested_round":1},
              "TC-015": {"priority":"P0","status":"failed","last_tested_round":2,
                         "root_cause":"CODE_BUG","fix_summary":"...","fix_files":["..."]},
              "TC-048": {"priority":"P1","status":"failed","last_tested_round":1,
                         "root_cause":"FEATURE_NOT_IMPL","fix_summary":"...","fix_files":["..."]}
            },
            "rounds": [
              {"round":1,"p0":"25/40","p1":"3/9","fixed":5,
               "root_causes":{"CODE_BUG":3},"files_changed":["..."],"commit":"abc123"}
            ],
            "summary": {"total_rounds":2,"all_passed":false}
          }
          ```

          ## 本轮任务（⚠️ 只做一轮，引擎会自动循环）

          ### 1. 诊断
          委派 **diagnostician** 分析所有**失败和待测**用例的根因（跳过已 passed 的）。
          根因分类: YAML_ERROR / CODE_BUG / FEATURE_NOT_IMPL / AGENT_TIMEOUT / PORT_CONFLICT /
                   ENVIRONMENT_CORRUPT / TEST_FLAKY / ASSERTION_ERROR

          诊断完成后发通知:
          ```bash
          octopus notify --ignore-failure \
            --title "🔍 $vars.display_name — [修复 $iteration] 诊断完成" \
            --body "失败用例: N 个 | 根因: <分类汇总>"
          ```

          ### 2. 修复
          按根因类型处理:
          - **CODE_BUG**: 修源码 → `<按 e2e_project_rules 构建命令>` 验证
          - **FEATURE_NOT_IMPL**: 功能未实现 → 按 PRD 需求实现缺失功能 → `<按 e2e_project_rules 构建命令>` 验证
          - **ASSERTION_ERROR**: 修正测试预期值
          - **PORT_CONFLICT**: 按下方 Server 重启协议处理
          - **YAML_ERROR**: 修 YAML → `octopus workflow validate`
          - **AGENT_TIMEOUT**: 调大 timeout
          - **ENVIRONMENT_CORRUPT**: rebuild worktree
          - **TEST_FLAKY**: 重跑 3 次取多数结果

          ### 2b. Server 重启协议（修复涉及 server 代码时必须执行）
          ⛔ **硬性约束 — 只允许按 PID 杀进程**:
          ```bash
          # 1. 只杀 e2e-setup 记录的 PID（绝不能杀其他进程）
          kill $vars.e2e_dev_pid 2>/dev/null
          sleep 2

          # 2. 必须用 --isolated（自动分配 hash 端口，不会碰 $inputs.protected_ports）
          cd "$vars.e2e_octopus_dir"
          nohup <按 e2e_project_rules 启动命令> > /tmp/e2e-dev-restart.log 2>&1 &
          NEW_PID=$!
          disown
          sleep 10

          # 3. 从新日志获取端口
          NEW_SERVER_PORT=$(grep -oP 'server[=: ]+\K[0-9]+' /tmp/e2e-dev-restart.log | head -1)
          NEW_WEB_PORT=$(grep -oP 'web[=: ]+\K[0-9]+' /tmp/e2e-dev-restart.log | head -1)

          # 4. 健康检查
          for i in $(seq 1 12); do
            curl -sf "http://localhost:$NEW_SERVER_PORT/api/health" && break
            sleep 5
          done
          ```
          然后在 vars_update 中输出新的端口和 PID。

          **绝对禁止的命令（会导致用户进程被杀）**:
          - `pnpm dev` / `pnpm dev:server` / `pnpm dev:web`（不带 --isolated）
          - `PORT=xxx pnpm dev:server`（手动指定端口仍可能冲突）
          - `kill-port` / `fuser -k` / `lsof | xargs kill`（可能杀到保护端口）

          修复完成后发通知:
          ```bash
          octopus notify --ignore-failure \
            --title "🛠️ $vars.display_name — [修复 $iteration] 代码已修复" \
            --body "修复: <具体改了哪些文件/功能> | build: <通过/失败>"
          ```

          ### 3. 重测
          委派 **api-tester** 重测失败用例。
          逐用例记录结果，更新 P0/P1 通过数。

          重测完成后发通知:
          ```bash
          octopus notify --ignore-failure \
            --title "🔄 $vars.display_name — [修复 $iteration] 重测完成" \
            --body "P0: <passed>/<total> | P1: <passed>/<total> | 全部通过: <是/否>"
          ```

          ### 4. 审查
          委派 **code-reviewer** 审查修复代码。
          ```bash
          cd "$vars.e2e_octopus_dir"
          git add -A && git commit -m "fix: e2e 修复第 $iteration 轮"
          ```

          ## ⛔ 规则
          - 只执行一轮修复，不要自行循环
          - **禁止跳过、禁止排除** — 所有用例必须实际执行并断言。环境问题导致的无法执行标记为 `failed`，而非 `skipped`。
          - `e2e_p0_passed` 只计实际执行并断言通过的用例
          - 全部用例实际通过（passed == total，零失败）→ `e2e_fix_all_passed="true"`
          - 仍有失败 → `e2e_fix_all_passed="false"`（引擎会驱动下一轮）
          - 零失败进入本轮 → 发"无需修复"通知 → 设 `e2e_fix_all_passed="true"`
          - ⚠️ **强化完成** — 每轮必须尽可能多的修复失败用例，不允许“心理满意退出”。每轮至少修复所有 failed 用例或明确记录无法修复的原因。

          ## 输出
          {"vars_update":{"e2e_p0_passed":"<实际通过数>","e2e_p1_passed":"<实际通过数>","e2e_skipped":"0","e2e_excluded":"0","e2e_fix_all_passed":"<true/false>","e2e_fix_rounds":"$iteration","conclusion":"第 $iteration 轮修复: <摘要>"}}

      - id: e2e-reality-check
        type: agent
        timeout: 1800
        context: new
        agents:
          reality-checker:
            description: "反假跑裁判 — 默认 NEEDS WORK，要求压倒性证据"
            agent_file: ".claude/agents/testing-reality-checker.md"
            model: opus[1m]
            tools: ["Bash", "Read", "Grep"]
        prompt: |
          你是 E2E 反假跑裁判。这是第 $iteration 轮验证。
          每轮完全独立评估，不读取上轮批注，不依赖历史结论。

          $vars.workspace_rules

          $inputs.e2e_project_rules

          ## 输入
          - 进度文件: $vars.output_dir/e2e-fix-progress.json
          - E2E 用例: $vars.e2e_cases_file
          - Server: http://localhost:$vars.e2e_server_port
          - Web: http://localhost:$vars.e2e_web_port

          ## 任务

          ### 1. 确定验证范围
          从 fix-progress.json 提取所有 `status == "passed"` 的用例。
          这些是 fix-round 声称已修复的用例，你需要逐一验真。

          ### 2. 逐用例验真
          委派 **reality-checker** 对每个 passed 用例检查：

          **自动 fake_pass 触发（任一即判定）**:
          - 测试代码使用 mock/stub 绕过真实调用
          - 断言检查的是常量而非运行时值
          - HTTP 测试无实际响应文本证据
          - UI 测试无截图证据
          - 测试 duration < 1 秒（空跑）
          - Agent 0 token 使用
          - 修复文件与测试文件无关（改了 A 但测 B）

          **判定**:
          - 无上述触发 → `verified`
          - 有任一触发 → `fake_pass`，写 `must_fix` 指导

          ### 3. 写入批注文件（覆盖）
          用 Write 工具写入 `$vars.output_dir/e2e-reality-notes.json`:
          ```json
          {
            "round": $iteration,
            "global_notes": "<本轮发现的系统性问题，给下轮 fix-round 的总体指导>",
            "cases": {
              "TC-001": { "verdict": "verified" },
              "TC-023": { "verdict": "fake_pass", "must_fix": "<具体指导>" }
            }
          }
          ```
          - 每个 passed 用例必须有 verdict
          - fix-progress 中 `failed` 的用例不写入
          - ⛔ 不读取上轮 e2e-reality-notes.json — 每轮独立评估

          ### 4. 发送通知
          ```bash
          FAKE_COUNT=$(grep -c '"fake_pass"' "$vars.output_dir/e2e-reality-notes.json" 2>/dev/null || echo 0)
          VERIFIED_COUNT=$(grep -c '"verified"' "$vars.output_dir/e2e-reality-notes.json" 2>/dev/null || echo 0)

          if [ "$FAKE_COUNT" -gt 0 ]; then
            octopus notify --ignore-failure \
              --title "⚠️ $vars.display_name — [修复 $iteration] 裁判: $FAKE_COUNT 个假跑" \
              --body "verified: $VERIFIED_COUNT | fake_pass: $FAKE_COUNT"
          fi
          ```

          ## 输出
          {"vars_update":{"e2e_reality_issues":"<fake_pass 数量>","e2e_reality_verified":"<verified 数量>","conclusion":"第 $iteration 轮裁判: verified N, fake_pass M"}}

          ## 规则
          - 不修改代码，不修改 fix-progress.json
          - 只读 fix-progress.json 和测试源码
          - global_notes 要具体：指出系统性问题（如"本轮多个用例用 mock 绕过"）
          - must_fix 要可执行：指明改哪个文件、用什么方式
          - ⛔ 每轮独立，不读上轮批注，防止自我确认偏差

  # ═══════════════════════════════════════════════════════════════
  # Phase 5.5: E2E Teardown — 清理运行时产物 + 最终判定（与 prd-impl.yaml 同步）
  # ═══════════════════════════════════════════════════════════════
  - id: e2e-teardown
    type: agent
    depends_on: [e2e-fix-loop]
    execute_when: '$inputs.run_e2e == "true"'
    timeout: 600
    prompt: |
      E2E 收尾：最终判定 + 环境清理。**不阻断**，单项失败也继续。

      $vars.workspace_rules

      ## 1. 最终判定
      ```
      e2e_passed = (e2e_fix_all_passed == "true")
                   && (e2e_reality_issues == "0")
                   && (completeness_passed == "true")
      ```
      ⛔ 三个条件必须全部满足。任一不满足 → e2e_passed = "false"。

      ## 2. 发送最终通知
      ```bash
      if [ "$vars.e2e_fix_all_passed" = "true" ] && [ "$vars.e2e_reality_issues" = "0" ] && [ "$vars.completeness_passed" = "true" ]; then
        RESULT_ICON="✅"
        RESULT_TEXT="E2E 质量保证通过"
      else
        RESULT_ICON="🚫"
        RESULT_TEXT="E2E 质量保证未通过"
      fi

      octopus notify --ignore-failure \
        --title "$RESULT_ICON $vars.display_name — $RESULT_TEXT" \
        --body "P0: $vars.e2e_p0_passed/$vars.e2e_p0_count | P1: $vars.e2e_p1_passed/$vars.e2e_p1_count
      完整度: $vars.completeness_score% | 必需: $vars.completeness_must_have_score%
      裁判: verified=$vars.e2e_reality_verified fake_pass=$vars.e2e_reality_issues
      修复: $vars.e2e_fix_rounds 轮 | 完整度: $vars.completeness_rounds 轮"
      ```

      ## 3. 环境清理（按顺序，单项失败不影响后续）
      ```bash
      # 关闭浏览器会话
      agent-browser --session e2e close 2>/dev/null || true

      # 删除测试工作空间（yaml-workflow 类型才有）
      if [ -n "$vars.e2e_workspace_id" ] && [ -n "$vars.e2e_server_port" ]; then
        curl -s -X DELETE "http://localhost:$vars.e2e_server_port/api/workspaces/$vars.e2e_workspace_id" || true
      fi

      # 杀临时服务进程（仅按 PID，绝不广杀）
      if [ -n "$vars.e2e_dev_pid" ]; then
        kill $vars.e2e_dev_pid 2>/dev/null || true
      fi

      echo "沙箱保留: $vars.e2e_sandbox_dir"
      echo "报告保留: $vars.output_dir"
      ```

      ## 输出
      {"vars_update":{"e2e_passed":"<$vars.e2e_fix_all_passed && $vars.e2e_reality_issues==0 && $vars.completeness_passed>","e2e_summary":"P0: $vars.e2e_p0_passed/$vars.e2e_p0_count | P1: $vars.e2e_p1_passed/$vars.e2e_p1_count | 修复: $vars.e2e_fix_rounds 轮 | 裁判: verified=$vars.e2e_reality_verified fake=$vars.e2e_reality_issues","e2e_torn_down":"true","conclusion":"E2E 收尾完成: e2e_passed=<true/false>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 6: Ship — 更新已有 PR 或创建新 PR
  # ═══════════════════════════════════════════════════════════════
    timeout: 600
    prompt: |
      清理 E2E 运行时产物。**不阻断**，单项失败也继续。

      $vars.workspace_rules

      ## 必做（按顺序，单项失败不影响后续）
      ```bash
      if [ -n "$vars.e2e_workspace_id" ] && [ -n "$vars.e2e_server_port" ]; then
        curl -s -X DELETE "http://localhost:$vars.e2e_server_port/api/workspaces/$vars.e2e_workspace_id" || true
        echo "Workspace $vars.e2e_workspace_id 删除请求已发出"
      fi
      if [ -n "$vars.e2e_dev_pid" ]; then
        kill $vars.e2e_dev_pid 2>/dev/null || true
        echo "PID $vars.e2e_dev_pid 已发 SIGTERM"
      fi
      echo "沙箱保留: $vars.e2e_sandbox_dir"
      echo "报告保留: $vars.output_dir"
      ```

      ## 输出
      {"vars_update":{"e2e_torn_down":"true","conclusion":"清理完成：workspace + PID + 产物隔离"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 5.6: Pre-PR Cleanup — 自动修补不阻断 PR（与 prd-impl.yaml 同步）
  # ═══════════════════════════════════════════════════════════════
  - id: pre-pr-cleanup
    type: agent
    depends_on: [e2e-teardown]
    timeout: 1200
    prompt: |
      PR 提交前的自动清理。**不会失败，只会修补和记录**。

      $vars.workspace_rules

      ## 项目路径: $vars.e2e_octopus_dir
      ```bash
      cd "$vars.e2e_octopus_dir" || cd "$vars.project_path" || true
      ```

      ## 修补 1：沙箱泄漏
      ```bash
      if git diff --cached --name-only | grep -qE '^\.e2e-sandbox/'; then
        git reset HEAD -- .e2e-sandbox/ 2>/dev/null || true
        echo "已 unstage .e2e-sandbox/ 内容"
      fi
      git rm -rf --cached .e2e-sandbox/ 2>/dev/null || true
      ```

      ## 修补 2：测试 workflow 污染
      ```bash
      POLLUTED=$(git diff --cached --name-only | grep -E '^workflows/(.*test|e2e-)' | grep -v '^tests/' || true)
      if [ -n "$POLLUTED" ]; then
        echo "$POLLUTED" | xargs -r -I{} git reset HEAD -- {}
        mkdir -p "$vars.e2e_sandbox_dir/leaked"
        echo "$POLLUTED" | while read -r f; do
          [ -n "$f" ] && [ -f "$f" ] && mv "$f" "$vars.e2e_sandbox_dir/leaked/" 2>/dev/null || true
        done
        echo "已隔离测试 workflow 文件到 $vars.e2e_sandbox_dir/leaked/"
      fi
      ```

      ## 记录 3：范围越界（仅记录）
      读取 $vars.scope_file（如存在）的 OUT-OF-SCOPE 列表。扫描 git diff 检测越界项，写入到 `$vars.output_dir/scope-leak-report.md`。不删除代码。

      ## 记录 4：宿主契约违反（仅记录）
      读取 $vars.host_contract_file 的强烈不建议清单。扫描 git diff 检测违反项，写入到 `$vars.output_dir/host-contract-violations.md`。

      ## 输出
      {"vars_update":{"pr_cleaned":"true","scope_leak_count":"<越界项数>","host_contract_violations":"<违反项数>","conclusion":"自动修补完成 + 违反项已记录"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 5.7: Delivery Audit — 生成交付审计报告（与 prd-impl.yaml 同步）
  # ═══════════════════════════════════════════════════════════════
  - id: delivery-audit
    type: agent
    depends_on: [pre-pr-cleanup]
    timeout: 600
    prompt: |
      生成交付审计报告。ship 节点会把本报告追加到 PR 描述/评论里。
      诚实，不夸大。即使未达 100% 也要如实报告。

      $vars.workspace_rules

      ## 输出文件路径
      $vars.output_dir/delivery-audit.md

      ## 报告结构（逐部分按下列填充）
      ```markdown
      # 交付审计报告（Resume）

      产品: <PRD 名称> | 生成时间: <ISO> | 工作流: prd-impl-e2e-resume

      ## 总体结论
      - 完整度总分: $vars.completeness_score / 100
      - 达标轮次: $vars.completeness_rounds / $inputs.completeness_max_rounds
      - 质量判定: <从 e2e-reality-check>
      - 推荐动作: <merge / 继续迭代 / 放弃>

      ## E2E 验收证据
      - 有 UI (host_has_ui = $vars.host_has_ui):
        - real_e2e_ui_passed: $vars.real_e2e_ui_passed
        - 总用例: $vars.real_e2e_ui_total | 失败: $vars.real_e2e_ui_failed_list
        - 报告: $vars.real_e2e_ui_report
        - 截图证据: $vars.e2e_sandbox_dir/screenshots/（仅审计）
      - API / CLI / file:
        - e2e P0: $vars.e2e_p0_passed/$vars.e2e_p0_count
        - e2e P1: $vars.e2e_p1_passed/$vars.e2e_p1_count
        - HTTP 证据: e2e-fix-progress.json
        - 修复轮数: $vars.e2e_fix_rounds

      ## 范围一致性
      - 模式: $vars.scope_mode
      - OUT-OF-SCOPE 越界: $vars.scope_leak_count
      - 详见: scope-leak-report.md

      ## 宿主契约一致性
      - 违反项: $vars.host_contract_violations
      - 详见: host-contract-violations.md

      ## 未达项 / 已知问题
      <逐项列出 failed TC 与未实现 IN-SCOPE Story以及建议的后续动作>

      ## 证据链
      - delivery-audit.md
      - real-e2e-ui-report.md
      - e2e-fix-progress.json
      - completeness-progress.json
      - scope-leak-report.md / host-contract-violations.md（可选）
      ```

      ## ready_to_merge 判定规则（仅为建议，不阻止 PR）
      ready_to_merge = "true" 仅在以下同时成立：
      - completeness_score == 100
      - real_e2e_ui_passed == "true" 或 host_has_ui != "true"
      - scope_leak_count == "0"
      - host_contract_violations == "0"
      - reality-check 判定 == "PASSED"

      ## 输出
      {"vars_update":{"audit_file":"$vars.output_dir/delivery-audit.md","ready_to_merge":"<true/false 仅建议>","conclusion":"完整度 $vars.completeness_score% / ready_to_merge=<true|false>"}}

  # ═══════════════════════════════════════════════════════════════
  - id: ship
    type: agent
    depends_on: [delivery-audit]
    timeout: 86400
    prompt: |
      遍历所有项目，提交 E2E 修复代码并更新已有 PR（或创建新 PR）。
      ⚠️ Always-Deliver 原则：无论完整度是否达 100%，都必须提交 PR，描述/评论里携带完整的 delivery-audit.md。

      $vars.workspace_rules

      ## 环境
      - 项目: $vars.projects
      - 分支: $vars.branch
      - 目标: $inputs.base_branch
      - 完整度: $vars.completeness_score%
      - ready_to_merge: $vars.ready_to_merge（仅建议）

      ## 对每个有变更的项目

      ### 1. 提交代码
      ```bash
      cd projects/<项目名>
      git status --porcelain  # 无变更跳过
      git add -A && git commit -m "fix: E2E resume — $(basename $inputs.prd_dir) (完整度 $vars.completeness_score%)"
      ```

      ### 2. 推送
      ```bash
      git push origin $vars.branch
      ```

      ### 3. 检测已有 PR
      ```bash
      EXISTING_PR=$(gh pr list --head "$vars.branch" --json url --jq '.[0].url' 2>/dev/null)
      ```

      ### 4. 生成描述主体（始终使用 delivery-audit.md 全文，不再按 e2e_passed 分叉）
      ```bash
      PR_BODY=$(cat "$vars.audit_file" 2>/dev/null || echo "审计报告生成失败，请查看 $vars.output_dir")
      if [ "$vars.ready_to_merge" = "true" ]; then
        PR_TITLE="feat: PRD implementation (完整度 $vars.completeness_score%)"
      else
        PR_TITLE="feat: PRD implementation (完整度 $vars.completeness_score% — 详见审计报告)"
      fi
      ```

      ### 5. 已有 PR → 评论追加审计报告；无 PR → 创建新 PR
      ```bash
      if [ -n "$EXISTING_PR" ]; then
        gh pr comment "$EXISTING_PR" --body "$PR_BODY"
        gh pr edit "$EXISTING_PR" --title "$PR_TITLE"
        PR_URL="$EXISTING_PR"
      else
        PR_URL=$(gh pr create --title "$PR_TITLE" --body "$PR_BODY" --base "$inputs.base_branch")
      fi
      ```

      ## ⛔ 绝对不能做的事
      - 不要因为 completeness_score < 100 跳过 PR
      - 不要因为 real_e2e_ui_passed != true 跳过 PR
      - 不要因为 ready_to_merge=false 跳过 PR——那只是给用户看的建议

      ## 输出
      {"vars_update":{"pr_urls":"<JSON Map 或 URL>","pr_count":"<数量>","existing_pr_url":"$EXISTING_PR","conclusion":"创建/更新 N 个 PR（完整度 $vars.completeness_score%）"}}

  - id: done
    type: bash
    depends_on: [ship]
    timeout: 10
    bash: |
      echo "=== PRD Impl E2E Resume Flow 完成 ==="
      echo "类型: $vars.impl_type | PRs: $vars.pr_count | 完整度: $vars.completeness_score% | E2E: $vars.e2e_passed"
      echo "审计报告: $vars.audit_file"
      echo "ready_to_merge: $vars.ready_to_merge（仅为人工判断建议，不表示工作流失败）"

      # Always-Deliver：PR 已创建即表示工作流完成交付，不再写 __status=failed。
      # 未达 100% 时画由用户基于审计报告决定后续动作（merge / 迭代 / 放弃）。
      if [ "$vars.ready_to_merge" != "true" ] && [ "$inputs.run_e2e" = "true" ]; then
        REASON="完整度未达 100% 但 PR 已交付｜E2E: $vars.e2e_summary｜完整度: $vars.completeness_score% (退出 $vars.completeness_exit_code)｜必需: $vars.completeness_must_have_score%｜修复: $vars.e2e_fix_rounds 轮｜完整度: $vars.completeness_rounds/$inputs.completeness_max_rounds 轮"
        echo "⚠️ $REASON"
        printf '{"vars_update":{"failed_reason":"%s"}}\n' "$REASON"
      fi
