# yaml-language-server: $schema=./doc/workflow-schema.json
apiVersion: octopus/v1
kind: Workflow
name: bug-scanner
description: >
  AI 辅助 BUG 检测与证据验证工作流。
  在隔离工作空间中真实运行 Octopus 系统，通过代码分析 + 分级运行时验证
  发现潜在 BUG，输出结构化证据报告到 ~/.octopus/bug-report/。
  支持 fingerprint 去重、动态验证升级、BUG 模式库学习。

model: opus[1m]
engine: claude
execution_mode: auto
max_concurrent: 3
timeout: 28800

inputs:
  scan_scope:
    description: "扫描范围: 'all' 或 'packages:<list>'（逗号分隔包名）"
    required: false
    default: "all"
  min_severity:
    description: "最低报告严重级别: P0/P1/P2/P3/P4"
    required: false
    default: "P3"
  skip_e2e:
    description: "跳过 E2E 复现，仅做代码级分析"
    required: false
    default: "false"
  max_token_budget:
    description: "单次运行 token 预算上限"
    required: false
    default: "500000"
  notify_target:
    description: "Hermes 通知目标"
    required: false
    default: "telegram:xzf_hermes"
  keep_on_failure:
    description: "失败时保留工作空间供调试"
    required: false
    default: "true"

variables:
  conclusion: ""
  bug_report_dir: ""
  bug_count_total: "0"
  bug_count_p0p1: "0"
  bug_count_p2: "0"
  bug_count_p3p4: "0"
  summary_report: ""
  token_usage: "0"
  scan_duration_ms: "0"
  scan_start_time: ""
  workspace_id: ""
  server_port: ""
  web_port: ""
  server_pid: ""
  display_name: "BUG Scanner"
  scan_progress: ""
  current_package: ""
  dedup_count: "0"
  upgraded_count: "0"
  notify_target: "telegram:xzf_hermes"

auto_answers:
  - pattern: ".*"
    answer: "proceed"

# ── Notify 子系统配置 ──
providers:
  hermes-cli:
    type: hermes
    timeout: 30
    min_severity: info

channels:
  default:
    provider: hermes-cli
    target: "telegram:xzf_hermes"

hooks:
  on_workflow_failure:
    - id: notify-failure
      type: bash
      timeout: 30
      bash: |
        octopus notify --ignore-failure --severity error \
          --title "❌ $vars.display_name — 工作流失败" \
          --body "🔴 失败节点: $hook.failed_node_id
        ⏱️ 已运行: ${hook.total_duration_ms | duration}
        📊 已发现 BUG: $vars.bug_count_total
        💡 错误: $hook.error"

  on_complete:
    - id: notify-complete
      type: bash
      timeout: 30
      bash: |
        if [ "$vars.bug_count_total" = "0" ]; then STATUS_ICON="🎉"; else STATUS_ICON="✅"; fi
        octopus notify --ignore-failure \
          --title "${STATUS_ICON} $vars.display_name — 扫描完成" \
          --body "📊 发现 BUG: $vars.bug_count_total（P0-P1: $vars.bug_count_p0p1 / P2: $vars.bug_count_p2 / P3-P4: $vars.bug_count_p3p4）
        🔄 去重: $vars.dedup_count | 升级: $vars.upgraded_count
        📁 报告目录: $vars.bug_report_dir
        💡 $vars.conclusion"

nodes:
  # ═══════════════════════════════════════════════════════════════
  # Phase 0: Setup Environment — 依赖检查 + 构建 + 启动 isolated server
  # ═══════════════════════════════════════════════════════════════
  - id: setup-env
    type: agent
    timeout: 900
    context: new
    skills: [verification-before-completion, using-git-worktrees]
    agents:
      workspace-manager:
        description: "工作空间生命周期管理"
        model: sonnet
        prompt: |
          ## 工作空间管理任务

          你是一个工作空间生命周期管理员，负责以下任务：

          ### 1. Worktree 创建与验证
          检查当前工作空间的 projects/ 目录下是否有 octopus 项目的 worktree：
          ```bash
          ls projects/ | grep -i octopus
          cd projects/<octopus_worktree_dir> && git status && git log --oneline -1
          ```
          如果 worktree 不存在或无效，报错停止。

          ### 2. 端口分配（3100-3598 范围）
          从可用端口池中分配未被占用的端口：
          ```bash
          # 扫描 3100-3598 范围找到可用端口
          for port in $(seq 3100 2 3598); do
            if ! ss -tlnp 2>/dev/null | grep -q ":$port " && ! netstat -tlnp 2>/dev/null | grep -q ":$port "; then
              echo "AVAILABLE:$port"
              break
            fi
          done
          ```
          server_port 和 web_port 需要两个连续可用端口（web = server + 1）。

          ### 3. 安装依赖与构建
          ```bash
          cd projects/<octopus_worktree_dir>
          pnpm install 2>&1 | tail -5
          pnpm build 2>&1 | tail -10
          ```
          构建失败时诊断根因并修复，最多重试 2 轮。

          ### 4. 启动开发服务器
          ```bash
          cd projects/<octopus_worktree_dir>
          PORT=<server_port> pnpm dev > /tmp/octopus-bug-scan-dev.log 2>&1 &
          echo "PID: $!"
          ```

          ### 5. 健康检查
          ```bash
          sleep 10
          # 从日志中确认实际端口
          grep -oP 'server=\K[0-9]+' /tmp/octopus-bug-scan-dev.log
          grep -oP 'web:\s+\K[0-9]+' /tmp/octopus-bug-scan-dev.log

          # HTTP 验证
          curl -sf http://localhost:<server_port>/api/health
          curl -sf -o /dev/null -w "%{http_code}" http://localhost:<web_port>/
          ```
          两个端点都必须返回 200 才算成功。

          ### 输出
          在回复末尾直接输出 JSON:
          {"vars_update":{"server_port":"<端口>","web_port":"<端口>","server_pid":"<PID>"}}
    prompt: |
      你正在执行 BUG Scanner 工作流的环境搭建阶段。

      ## 安装测试代理（必须首先执行）
      ```bash
      AGENTS_TARGET="$(pwd)/.claude/agents"
      mkdir -p "$AGENTS_TARGET"
      COREPACK_AGENTS=""
      for d in "$(pwd)/packages/core-pack/agents" "$(pwd)/.octopus/core-pack/agents" "$(pwd)/../core-pack/agents"; do
        if [ -d "$d" ]; then COREPACK_AGENTS="$d"; break; fi
      done
      if [ -n "$COREPACK_AGENTS" ]; then
        for f in testing-engineering-software-architect testing-evidence-collector testing-reality-checker; do
          [ -f "$COREPACK_AGENTS/$f.md" ] && cp "$COREPACK_AGENTS/$f.md" "$AGENTS_TARGET/"
        done
        echo "Installed testing agents from $COREPACK_AGENTS"
      else
        echo "WARN: core-pack/agents not found"
      fi
      ```

      ## 依赖检查（按优先级依次验证）

      ### 1. 核心依赖
      ```bash
      node --version        # 必须 >= 18
      pnpm --version        # 必须 >= 8
      git --version         # 必须可用
      ```

      ### 2. 可选依赖
      ```bash
      gh --version          # GitHub CLI（用于 PR 操作）
      npx playwright --version  # E2E 测试（如果 skip_e2e=false）
      python3 --version     # Python 脚本（证据分析）
      hermes --version      # Hermes 通知（通知阶段）
      ```
      可选依赖缺失时记录警告但不阻塞。

      ### 3. 创建/验证工作空间
      委托 workspace-manager 子代理完成以下任务：
      - 验证 octopus 项目 worktree 存在且有效
      - 分配 3100-3598 范围内的可用端口对（server_port, web_port=server_port+1）
      - 执行 pnpm install && pnpm build
      - 启动 pnpm dev 并验证健康检查

      ### 4. 记录启动时间
      ```bash
      echo "SCAN_START=$(date +%s%3N)"
      ```

      ### 5. 通知启动
      ```bash
      octopus notify --ignore-failure \
        --title "🚀 $vars.display_name 启动" \
        --body "📦 扫描范围: $inputs.scan_scope
      📊 最低严重级别: $inputs.min_severity
      🔬 跳过 E2E: $inputs.skip_e2e
      💰 Token 预算: $inputs.max_token_budget"
      ```

      ## 输出
      在回复末尾直接输出 JSON（不要用 ```json 包裹）:
      {"vars_update":{"scan_start_time":"<毫秒时间戳>","notify_target":"<通知目标>","display_name":"BUG Scanner"}}

      ## 规则
      - 无人值守模式，直接执行
      - pnpm build 失败时先诊断根因再修复，最多 2 轮
      - 健康检查必须 server 和 web 两个端点都返回 200 才算成功
      - 端口必须从实际运行进程获取，不能猜测
      - JSON 输出前不要有 ```json 标记，直接输出纯 JSON 行

  # ═══════════════════════════════════════════════════════════════
  # Phase 1: Dependency Check — 构建产物 + 健康检查 + 报告目录初始化
  # ═══════════════════════════════════════════════════════════════
  - id: dep-check
    type: bash
    depends_on: [setup-env]
    timeout: 120
    bash: |
      set -e
      echo "=== Phase 1: Dependency Check ==="

      # 1. 验证 packages/shared/dist 构建产物
      OCTOPUS_DIR=$(ls -d projects/*octopus* 2>/dev/null | head -1)
      if [ -z "$OCTOPUS_DIR" ]; then
        echo "ERROR: octopus project not found in projects/"
        exit 1
      fi
      echo "Octopus dir: $OCTOPUS_DIR"

      if [ -d "$OCTOPUS_DIR/packages/shared/dist" ]; then
        echo "✅ packages/shared/dist exists"
        ls "$OCTOPUS_DIR/packages/shared/dist/" | head -5
      else
        echo "❌ packages/shared/dist missing — build may have failed"
        exit 1
      fi

      # 2. HTTP 健康检查
      echo "Checking server health..."
      HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "http://localhost:$vars.server_port/api/health" 2>/dev/null || echo "000")
      if [ "$HTTP_CODE" = "200" ]; then
        echo "✅ Server health check passed (HTTP $HTTP_CODE)"
      else
        echo "❌ Server health check failed (HTTP $HTTP_CODE)"
        exit 1
      fi

      # 3. 创建报告目录
      REPORT_DIR="$HOME/.octopus/bug-report/$(date +%Y-%m-%d)"
      mkdir -p "$REPORT_DIR"
      echo "📁 Report directory: $REPORT_DIR"

      # 4. 初始化 index.json（根级全局索引）
      GLOBAL_INDEX="$HOME/.octopus/bug-report/index.json"
      if [ ! -f "$GLOBAL_INDEX" ]; then
        echo '{"version":"1.0","generated_at":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'","reports":[],"stats":{"total":0,"p0p1":0,"p2":0,"p3p4":0,"dedup":0,"upgraded":0}}' > "$GLOBAL_INDEX"
        echo "✅ Global index.json initialized at $GLOBAL_INDEX"
      fi

      # 5. 验证 bug-patterns 目录
      PATTERNS_DIR="$HOME/.octopus/bug-report/bug-patterns"
      mkdir -p "$PATTERNS_DIR/confirmed" "$PATTERNS_DIR/false-positives"
      if [ -d "$PATTERNS_DIR/confirmed" ]; then
        CONFIRMED_COUNT=$(ls "$PATTERNS_DIR/confirmed/" 2>/dev/null | wc -l)
        FP_COUNT=$(ls "$PATTERNS_DIR/false-positives/" 2>/dev/null | wc -l)
        echo "✅ bug-patterns loaded: $CONFIRMED_COUNT confirmed, $FP_COUNT false-positives"
      else
        echo "✅ bug-patterns directory created (empty)"
      fi

      # 6. 输出结果
      echo ""
      echo "=== Dependency Check Complete ==="
      echo "REPORT_DIR=$REPORT_DIR"
      echo "PATTERNS_DIR=$PATTERNS_DIR"

  # ═══════════════════════════════════════════════════════════════
  # Phase 2: Scan Orchestrator — 代码分析 + 分级验证 + 报告生成
  # ═══════════════════════════════════════════════════════════════
  - id: scan-orchestrator
    type: agent
    depends_on: [dep-check]
    timeout: 21600
    context: new
    skills: [systematic-debugging, octo-bug-investigation]
    agents:
      code-analyzer:
        description: "代码静态分析"
        model: sonnet
        agent_file: .claude/agents/testing-engineering-software-architect.md
        prompt: |
          ## 代码静态分析任务

          你是一个专注于 BUG 检测的代码静态分析专家。你需要对 Octopus 代码库执行 4 类语义 BUG 模式分析：

          ### Pattern 1: data-flow-break（数据流断裂）
          检测数据在传递链路中丢失或损坏的情况：
          - 函数返回值未被检查
          - Promise 未正确处理 rejection
          - 可选链操作符滥用导致 undefined 静默传递
          - 序列化/反序列化类型不匹配

          ### Pattern 2: process-lifecycle（进程生命周期）
          检测进程管理相关的 BUG：
          - 子进程未正确清理（zombie process）
          - 信号处理遗漏（SIGTERM/SIGINT）
          - 资源泄漏（文件句柄、端口占用、内存泄漏）
          - 超时未设置或设置不合理

          ### Pattern 3: api-contract（API 契约违反）
          检测接口契约不一致：
          - 请求参数与接口定义不匹配
          - 响应状态码与文档不一致
          - 错误格式不符合 API 响应信封规范
          - 版本间 breaking change 未迁移

          ### Pattern 4: state-race（状态竞争）
          检测并发和状态管理问题：
          - 共享可变状态未加锁
          - 异步操作的执行顺序假设
          - 事件处理器的注册/注销不匹配
          - 文件系统操作的竞态条件

          ### 输出格式
          对于每个发现的潜在 BUG，输出以下结构：
          ```
          BUG-<severity> <title>
          severity: P0|P1|P2|P3|P4
          package: <包名>
          file: <文件路径>
          line: <行号范围>
          fingerprint: <sha256(package:file:pattern:line_range)>
          pattern: data-flow-break|process-lifecycle|api-contract|state-race
          evidence: <具体代码片段和解释>
          suggested_reproduction: <复现建议>
          ```

          ### 规则
          - 每个包独立分析，不跳过任何文件
          - 重点关注 packages/engine/ 和 packages/server/ 的核心逻辑
          - 测试文件（*.test.ts）不分析
          - node_modules/ 和 dist/ 不分析
          - 误报率目标 < 30%

      diagnostician:
        description: "深度根因分析 + 动态升级评估"
        model: opus[1m]
        agent_file: .claude/agents/testing-engineering-software-architect.md
        prompt: |
          ## 深度根因分析 + 动态升级评估

          你是一个资深 BUG 诊断专家，负责对 code-analyzer 发现的候选 BUG 进行深度分析。

          ### 5 Whys 分析法
          对每个候选 BUG 执行 5 Whys 根因追溯：
          1. Why: 为什么这个 BUG 会发生？（直接原因）
          2. Why: 为什么直接原因会出现？（间接原因）
          3. Why: 为什么间接原因会出现？（深层原因）
          4. Why: 为什么深层原因存在？（系统原因）
          5. Why: 为什么系统允许这种情况？（根因）

          ### 动态升级规则
          根据分析结果，可能将 BUG 严重级别升级：

          **P3→P2 升级条件**:
          - 影响链路跨模块 > 2 层（A→B→C 三模块级联）
          - 涉及用户可见数据不一致
          - 导致业务流程中断但可手动恢复

          **P2→P1 升级条件**:
          - 5xx 错误导致核心功能不可用
          - 数据损坏或丢失风险
          - 安全漏洞（注入、越权、信息泄露）

          **P3-P4→P1 升级条件**:
          - 共享可变状态 + 异步操作组合（并发风险极高）
          - fingerprint 匹配历史 P0-P1 BUG（已知高危模式复发）
          - 涉及支付/认证/加密等安全关键路径

          ### 输出格式
          ```
          DIAGNOSIS: <fingerprint>
          original_severity: <原始>
          final_severity: <最终>
          upgrade_applied: true|false
          upgrade_reason: <升级原因，如适用>
          root_cause: <根因描述>
          impact_chain: <影响链路>
          confidence: 0-100
          ```

      evidence-collector:
        description: "运行时证据收集"
        model: sonnet
        agent_file: .claude/agents/testing-evidence-collector.md
        prompt: |
          ## 运行时证据收集

          你是一个测试证据收集专家，负责为确认的 BUG 收集完整的运行时证据链。

          ### 证据收集清单

          #### 1. API 级证据
          - 构造触发 BUG 的 HTTP 请求
          - 记录完整的 request/response（headers + body）
          - 捕获异常状态码和错误响应
          - 记录响应时间（与正常请求对比）

          #### 2. 日志证据
          - 服务端日志中的错误堆栈
          - 请求链追踪 ID
          - 相关的前置日志（触发条件）

          #### 3. 环境证据
          - Node.js 版本、操作系统信息
          - 相关环境变量（脱敏后）
          - 数据库状态快照（如适用）

          #### 4. 复现脚本
          为每个 BUG 编写最小复现脚本：
          ```bash
          # reproduction/<fingerprint>.sh
          curl -X POST http://localhost:<port>/api/... \
            -H 'Content-Type: application/json' \
            -d '{...}'
          ```

          ### 输出格式
          ```
          EVIDENCE: <fingerprint>
          type: api|e2e|code-only
          reproduction_script: <路径>
          evidence_files: [<文件列表>]
          reproducibility: deterministic|intermittent|unreproducible
          ```

      reality-checker:
        description: "Anti-fake-run 验证"
        model: opus[1m]
        agent_file: .claude/agents/testing-reality-checker.md
        prompt: |
          ## Anti-Fake-Run 验证

          你是一个反幻想验证专家，你的职责是确保所有 BUG 报告都有真实的运行时证据支撑。

          ### 验证清单

          #### 1. 证据真实性检查
          - 复现脚本是否真正执行过（不是伪造的输出）
          - 截图/日志是否来自实际运行（不是模板化的）
          - HTTP 响应是否来自真实服务器（不是模拟的）

          #### 2. 交叉验证
          - 用不同方法复现同一 BUG，结果是否一致
          - 修改触发条件，BUG 是否消失（确认因果关系）
          - 在干净环境中复现，排除环境干扰

          #### 3. 误报排除
          - 代码分析认为是 BUG 但实际运行时正常的情况
          - 设计如此（by design）的行为被误判为 BUG
          - 测试环境特有的问题（不影响生产）

          ### 判定标准
          - CONFIRMED: 有真实运行时证据，可稳定复现
          - LIKELY: 有强间接证据，但未能完全复现
          - SUSPECTED: 代码分析显示有问题，但缺乏运行时证据
          - FALSE_POSITIVE: 经验证不是 BUG

          ### 输出格式
          ```
          VERDICT: <fingerprint>
          status: CONFIRMED|LIKELY|SUSPECTED|FALSE_POSITIVE
          confidence: 0-100
          verification_method: <使用了什么验证方法>
          fake_run_detected: true|false
          notes: <详细说明>
          ```

      vision-analyzer:
        description: "截图视觉分析"
        model: haiku
        agent_file: .claude/agents/vision-analyzer.md
        prompt: |
          ## 截图视觉分析

          你是一个视觉分析专家，负责分析 E2E 测试和运行时截图中的异常。

          ### 分析任务
          - 识别 UI 异常（布局错乱、元素缺失、样式异常）
          - 检测控制台错误信息
          - 识别加载状态卡死
          - 对比正常截图和异常截图的差异

          ### 输出格式
          ```
          VISION: <fingerprint>
          anomaly_detected: true|false
          description: <异常描述>
          screenshot_path: <截图路径>
          confidence: 0-100
          ```

          ### 规则
          - 仅处理截图数据，不自行生成或修改截图
          - 分析结果必须有具体的视觉证据支撑
          - 不确定时标记 confidence 低于 50

      report-generator:
        description: "生成 .md 报告 + index.json + bug-patterns"
        model: sonnet
        prompt: |
          ## BUG 报告生成

          你是一个报告生成专家，负责为每个确认的 BUG 生成结构化的 Markdown 报告。

          ### 报告模板
          为每个 BUG 生成独立的 .md 文件，使用以下模板：

          ```markdown
          # BUG-<seq>: <title>

          ## 基本信息
          | 字段 | 值 |
          |------|-----|
          | Fingerprint | `<fingerprint>` |
          | Severity | <P0-P4> |
          | Package | <package> |
          | File | `<file>:<line>` |
          | Pattern | <pattern> |
          | Discovery Source | <AI-scan / manual / regression> |
          | Status | <CONFIRMED / LIKELY / SUSPECTED> |
          | Confidence | <0-100> |
          | Fix Attempt Count | <0> |
          | Last Updated | <ISO timestamp> |

          ## 问题描述
          <详细的 BUG 描述>

          ## 根因分析
          <5 Whys 分析结果>

          ## 影响链路
          <受影响的模块和功能>

          ## 复现步骤
          1. <步骤>
          2. <步骤>
          3. <步骤>

          ## 证据
          <运行时证据列表>

          ## 修复建议
          <建议的修复方案>
          ```

          ### index.json 更新
          每个 BUG 添加到 index.json 的 bugs 数组：
          ```json
          {
            "id": "<seq>",
            "fingerprint": "<hash>",
            "severity": "<P0-P4>",
            "status": "<status>",
            "title": "<title>",
            "package": "<pkg>",
            "file": "<path>",
            "report_file": "<md_path>",
            "discovered_at": "<ISO>",
            "confidence": <0-100>
          }
          ```

          ### bug-patterns 更新
          - CONFIRMED 的 BUG → 复制到 confirmed/<fingerprint>.yaml
          - FALSE_POSITIVE → 复制到 false-positives/<fingerprint>.yaml
          - pattern 文件格式: fingerprint, severity, pattern, file, description

          ### summary.md 生成
          扫描完成后生成 summary.md：
          ```markdown
          # BUG Scanner Report Summary

          ## 概览
          - 扫描时间: <start> - <end>
          - 扫描范围: <scope>
          - 发现 BUG: <total>（P0-P1: <n> / P2: <n> / P3-P4: <n>）
          - 去重: <dedup_count> | 升级: <upgraded_count>

          ## 严重 BUG (P0-P1)
          <列表>

          ## 中等 BUG (P2)
          <列表>

          ## 低危 BUG (P3-P4)
          <列表>

          ## 模式统计
          | Pattern | Count |
          |---------|-------|
          | data-flow-break | <n> |
          | process-lifecycle | <n> |
          | api-contract | <n> |
          | state-race | <n> |
          ```

    prompt: |
      你正在执行 BUG Scanner 工作流的核心扫描阶段。

      ## 当前环境
      - Octopus 项目目录: $(ls -d projects/*octopus* 2>/dev/null | head -1)
      - Server: http://localhost:$vars.server_port
      - Web: http://localhost:$vars.web_port
      - 扫描范围: $inputs.scan_scope
      - 最低严重级别: $inputs.min_severity
      - 跳过 E2E: $inputs.skip_e2e
      - Token 预算: $inputs.max_token_budget

      ## 7 步扫描流程

      ### Step 1: 解析范围 + 加载 BUG 模式库
      ```bash
      # 解析 scan_scope
      # "all" → 扫描 packages/ 下所有子包
      # "packages:cli,engine" → 仅扫描指定包

      # 加载已确认的 BUG 模式
      PATTERNS_DIR="$HOME/.octopus/bug-report/bug-patterns"
      CONFIRMED=$(ls "$PATTERNS_DIR/confirmed/" 2>/dev/null | wc -l)
      FP=$(ls "$PATTERNS_DIR/false-positives/" 2>/dev/null | wc -l)

      # 读取 false-positives 排除列表
      # 这些 fingerprint 不会被报告为 BUG
      ```
      - 确定要扫描的包列表
      - 读取 $PATTERNS_DIR/confirmed/ 中所有已确认模式
      - 读取 $PATTERNS_DIR/false-positives/ 中的排除列表
      - false-positive fingerprint 匹配到的候选直接跳过

      ### Step 2: Layer 1（工具级）+ Layer 2（AI 语义分析）

      **Layer 1 — 静态工具检查**:
      ```bash
      cd projects/<octopus_dir>
      # ESLint 检查
      pnpm lint 2>&1 | grep -E "error|warning" | head -20
      # TypeScript 类型检查
      pnpm tsc --noEmit 2>&1 | head -30
      ```
      - 收集 lint errors 和 type errors
      - 这些作为候选 BUG 的补充信号

      **Layer 2 — AI 语义分析**:
      委托 code-analyzer 子代理执行 4 类语义 BUG 模式分析：
      - data-flow-break（数据流断裂）
      - process-lifecycle（进程生命周期）
      - api-contract（API 契约违反）
      - state-race（状态竞争）

      **模式注入**: 将已确认的 bug-patterns 注入到 code-analyzer 的分析上下文中，
      让分析器关注已知高危模式。

      ### Step 3: 分级路由
      根据 code-analyzer 输出的 severity 进行路由：
      - **P0-P1** → 进入 Step 4a（完整 E2E 验证）
      - **P2** → 进入 Step 4b（API 级验证）
      - **P3-P4** → 进入 Step 4c（仅代码级分析）

      ### Step 4a: 完整 E2E 验证（P0-P1）
      如果 $inputs.skip_e2e = "false":
      1. 委托 evidence-collector 构造复现脚本并执行
      2. 委托 vision-analyzer 分析截图中的异常
      3. 委托 reality-checker 验证证据真实性
      如果 $inputs.skip_e2e = "true":
      - 降级为 Step 4b（API 级验证）

      ### Step 4b: API 级验证（P2 + 降级的 P0-P1）
      1. 委托 evidence-collector 构造 API 请求复现
      2. 委托 reality-checker 验证 API 响应真实性

      **升级检查点**:
      - 如果 API 返回 5xx → 升级到 P1，重新路由到 Step 4a
      - 记录升级日志

      ### Step 4c: 仅代码级分析（P3-P4）
      1. 委托 diagnostician 执行 5 Whys 分析
      2. 委托 reality-checker 做代码级验证

      **升级检查点**:
      - 跨模块影响链路 > 2 层 → 升级到 P2
      - 共享可变状态 + 异步操作 → 升级到 P1
      - fingerprint 匹配历史 P0-P1 → 升级到 P1
      - 记录所有升级操作

      ### Step 5: Fingerprint 去重（含跨运行历史匹配）
      ```bash
      # 读取全局 index.json（跨运行历史记录）中的 fingerprints
      GLOBAL_INDEX="$HOME/.octopus/bug-report/index.json"
      if [ -f "$GLOBAL_INDEX" ]; then
        HISTORICAL=$(cat "$GLOBAL_INDEX" | jq -r '.reports[].fingerprint // empty')
      else
        HISTORICAL=""
      fi

      # 读取当前运行 index.json 中的 fingerprints（本次运行内去重）
      EXISTING=$(cat "$GLOBAL_INDEX" | jq -r '.reports[].fingerprint // empty')

      # 对每个新发现的 BUG:
      # - 如果 fingerprint 匹配历史记录（跨运行或本次运行） → 标记 status: duplicate，跳过
      # - 如果是新模式 → 分配序号
      # - 记录去重来源: dup_source: "cross_run" 或 "same_run"
      ```
      - 使用 Node.js 原子文件锁（O_EXCL）分配序号，避免并发冲突:
      ```javascript
      // allocate-seq.js
      const fs = require('fs');
      const seqFile = process.argv[1] + '/.seq';
      const fd = fs.openSync(seqFile, 'a+');
      const buf = Buffer.alloc(4);
      fs.readSync(fd, buf, 0, 4, 0);
      let seq = parseInt(buf.toString().trim() || '0', 10) + 1;
      fs.ftruncateSync(fd, 0);
      fs.writeSync(fd, String(seq).padStart(4, '0'));
      fs.closeSync(fd);
      console.log(seq);
      ```

      ### Step 6: 生成报告
      委托 report-generator 子代理：
      1. 为每个确认的 BUG 生成独立 .md 文件（使用完整模板）
      2. 更新 index.json（添加新 BUG 到 bugs 数组，更新 stats）
      3. 更新 bug-patterns（confirmed/ 和 false-positives/）
      4. 生成 summary.md（总体统计和分类列表）

      ### Step 7: 模式学习
      ```bash
      # 将本次新确认的 BUG 模式保存到 confirmed/
      for bug in <confirmed_bugs>; do
        cp <pattern_file> "$PATTERNS_DIR/confirmed/<fingerprint>.yaml"
      done

      # 将误报保存到 false-positives/
      for fp in <false_positives>; do
        cp <pattern_file> "$PATTERNS_DIR/false-positives/<fingerprint>.yaml"
      done
      ```

      ## 输出
      在回复末尾直接输出 JSON（不要用 ```json 包裹）:
      {"vars_update":{
        "bug_count_total":"<总数>",
        "bug_count_p0p1":"<P0-P1数>",
        "bug_count_p2":"<P2数>",
        "bug_count_p3p4":"<P3-P4数>",
        "dedup_count":"<去重数>",
        "upgraded_count":"<升级数>",
        "bug_report_dir":"<报告目录路径>",
        "summary_report":"<summary.md路径>",
        "conclusion":"<2-3句话总结扫描结果>",
        "scan_progress":"completed"
      }}

      ## 规则
      - 无人值守模式，直接执行所有步骤
      - 每个包独立分析，记录 current_package 变量
      - 升级操作必须记录到 upgraded_count
      - 去重操作必须记录到 dedup_count
      - 所有 BUG 报告使用完整模板，不简化
      - 严格遵守 token 预算 $inputs.max_token_budget
      - JSON 输出前不要有 ```json 标记，直接输出纯 JSON 行

  # ═══════════════════════════════════════════════════════════════
  # Phase 3: Notify — 发送扫描结果通知
  # ═══════════════════════════════════════════════════════════════
  - id: notify-bugs-found
    type: bash
    depends_on: [scan-orchestrator]
    timeout: 30
    bash: |
      echo "=== Phase 3: Notify ==="

      TOTAL="$vars.bug_count_total"
      P0P1="$vars.bug_count_p0p1"
      P2="$vars.bug_count_p2"
      P3P4="$vars.bug_count_p3p4"
      DEDUP="$vars.dedup_count"
      UPGRADED="$vars.upgraded_count"
      REPORT="$vars.bug_report_dir"
      SUMMARY="$vars.summary_report"

      if [ "$TOTAL" = "0" ]; then
        ICON="🎉"
        MSG="未发现 BUG！代码质量良好。"
      elif [ "$P0P1" != "0" ]; then
        ICON="🚨"
        MSG="发现 $P0P1 个高危 BUG，需要立即关注！"
      elif [ "$P2" != "0" ]; then
        ICON="⚠️"
        MSG="发现 $P2 个中危 BUG，建议尽快修复。"
      else
        ICON="ℹ️"
        MSG="发现 $P3P4 个低危 BUG，可择机修复。"
      fi

      octopus notify --ignore-failure \
        --title "${ICON} $vars.display_name — 扫描结果" \
        --body "📊 BUG 总数: $TOTAL（P0-P1: $P0P1 / P2: $P2 / P3-P4: $P3P4）
      🔄 去重: $DEDUP | 动态升级: $UPGRADED
      📁 报告: $REPORT
      📄 摘要: $SUMMARY

      💡 $vars.conclusion"

      echo "=== Notification sent ==="

  # ═══════════════════════════════════════════════════════════════
  # Phase 4: Cleanup — 终止进程 + 清理端口 + 移除 worktree
  # ═══════════════════════════════════════════════════════════════
  - id: cleanup
    type: agent
    depends_on: [notify-bugs-found]
    timeout: 300
    context: new
    agents:
      workspace-manager:
        description: "工作空间清理"
        model: sonnet
        prompt: |
          ## 工作空间清理任务

          你是工作空间清理专家，负责在扫描完成后清理环境。

          ### 1. 终止进程
          ```bash
          # 终止 scan-orchestrator 启动的 dev server
          if [ -n "$vars.server_pid" ]; then
            kill $vars.server_pid 2>/dev/null && echo "Killed server PID: $vars.server_pid" || echo "Server PID already dead"
          fi

          # 查找并终止残留的 octopus dev 进程
          pkill -f "pnpm dev" 2>/dev/null || true
          pkill -f "next dev" 2>/dev/null || true
          pkill -f "tsx.*server" 2>/dev/null || true
          ```

          ### 2. 清理端口
          ```bash
          # 检查 server_port 和 web_port 是否已释放
          if [ -n "$vars.server_port" ]; then
            PORT_PID=$(lsof -ti:$vars.server_port 2>/dev/null || ss -tlnp | grep ":$vars.server_port " | grep -oP 'pid=\K[0-9]+' || echo "")
            if [ -n "$PORT_PID" ]; then
              kill $PORT_PID 2>/dev/null && echo "Killed process on port $vars.server_port (PID: $PORT_PID)"
            else
              echo "Port $vars.server_port already free"
            fi
          fi

          if [ -n "$vars.web_port" ]; then
            PORT_PID=$(lsof -ti:$vars.web_port 2>/dev/null || ss -tlnp | grep ":$vars.web_port " | grep -oP 'pid=\K[0-9]+' || echo "")
            if [ -n "$PORT_PID" ]; then
              kill $PORT_PID 2>/dev/null && echo "Killed process on port $vars.web_port (PID: $PORT_PID)"
            else
              echo "Port $vars.web_port already free"
            fi
          fi
          ```

          ### 3. 清理临时文件
          ```bash
          # 清理 /tmp 下的 octopus 相关文件
          rm -f /tmp/octopus-bug-scan-dev.log 2>/dev/null
          rm -f /tmp/octopus-bug-scan-*.tmp 2>/dev/null

          # 清理 .lock 文件
          find /tmp -name "*.lock" -mmin +60 -delete 2>/dev/null || true
          ```

          ### 4. 计算扫描耗时
          ```bash
          if [ -n "$vars.scan_start_time" ]; then
            END_TIME=$(date +%s%3N)
            DURATION=$((END_TIME - $vars.scan_start_time))
            echo "Scan duration: ${DURATION}ms"
          fi
          ```

          ### 5. 验证清理结果
          ```bash
          # 确认端口已释放
          ss -tlnp 2>/dev/null | grep -E ":($vars.server_port|$vars.web_port) " && echo "WARN: ports still occupied" || echo "✅ All ports freed"

          # 确认进程已终止
          ps aux | grep -E "(pnpm dev|next dev)" | grep -v grep && echo "WARN: processes still running" || echo "✅ All processes terminated"
          ```

          ### 输出
          在回复末尾直接输出 JSON:
          {"vars_update":{"scan_duration_ms":"<耗时毫秒>","conclusion":"<最终结论>"}}
    prompt: |
      你正在执行 BUG Scanner 工作流的清理阶段。

      ## 当前环境
      - Server PID: $vars.server_pid
      - Server Port: $vars.server_port
      - Web Port: $vars.web_port
      - 扫描开始时间: $vars.scan_start_time
      - 保留失败环境: $inputs.keep_on_failure

      ## 清理任务

      ### 1. 检查是否需要保留环境
      如果 $inputs.keep_on_failure = "true" 且扫描有失败：
      - 保留工作空间不删除
      - 仅终止 dev server 进程
      - 输出保留原因

      ### 2. 委托 workspace-manager 清理
      - 终止 server_pid 和相关进程
      - 释放 server_port 和 web_port
      - 清理 ${TEMP:-/tmp} 下的临时文件
      - 清理 .lock 文件
      - 计算扫描总耗时

      ### 3. 验证清理完成
      - 端口已释放
      - 进程已终止
      - 临时文件已清理

      ## 输出
      在回复末尾直接输出 JSON（不要用 ```json 包裹）:
      {"vars_update":{
        "scan_duration_ms":"<耗时>",
        "conclusion":"<最终总结：扫描了多少 BUG，各严重级别分布，清理状态>"
      }}

      ## 规则
      - 无人值守模式，直接执行
      - 不要杀死 3000,3001,3098,3099 等受保护端口
      - keep_on_failure=true 时仅终止进程，不删除工作空间
      - JSON 输出前不要有 ```json 标记
