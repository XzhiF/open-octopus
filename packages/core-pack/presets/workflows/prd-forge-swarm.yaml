# yaml-language-server: $schema=./doc/workflow-schema.json
apiVersion: octopus/v1
kind: Workflow
name: prd-forge-swarm
description: >
  PRD Forge (Swarm Edition) — 多智能体辩论式 PRD 锻造工作流。
  基于 prd-forge 改造，将 5 个核心阶段升级为 Swarm 节点：
    Discover (debate) → Define (debate) → Design (debate)
    → UI/UX (review) → Completeness (review)。
  原对抗审查（refine-discover/define、challenge-design、synthesis-design）
  合并进 Swarm 辩论轮次，专家与 Host 物理隔离，消除"角色切换纪律靠 prompt"问题。
  Setup → Clarify → Locked-Scope → Discover-Swarm → Define-Swarm
  → Acceptance-Cases → Design-Swarm → UI/UX-Swarm → Completeness-Swarm → Output。

model: pro-max
engine: claude
execution_mode: serial
timeout: 86400

inputs:
  idea:
    description: "产品 Idea 描述（自然语言，越详细越好）"
    required: true
  output_format:
    description: "输出格式：markdown（默认）或 pdf"
    required: false
    default: "markdown"
  enable_adversarial:
    description: "开启对抗审查（在 Swarm 辩论中自动包含 devil-advocate 专家）"
    required: false
    default: "true"
  completeness_threshold:
    description: "完整性审查允许的最大缺失维度数（超过则打回）"
    required: false
    default: "3"
  scope_mode:
    description: |
      范围控制模式。
      - strict（默认）：强制 LOCKED_SCOPE，只把用户明确提出的功能视为需求。
      - creative：允许 LLM 在 idea 基础上发散补全相关功能，标记为 EXTENSION-CANDIDATE。
    required: false
    default: "strict"
  swarm_rounds:
    description: "Swarm debate 最大轮数（Design 阶段使用 2 轮，其余 1 轮）"
    required: false
    default: "2"
  swarm_budget:
    description: "Swarm 节点 token 总预算（每个 swarm 节点独立计算）"
    required: false
    default: "500000"

variables:
  # ── 文档目录 ──
  output_root: "./docs/prd-forge"
  output_dir: ""
  prd_index: ""
  prd_name: ""
  display_name: "PRD Forge Swarm"
  conclusion: ""
  discovery_file: ""
  requirements_file: ""
  solution_file: ""
  completeness_file: ""
  final_prd_file: ""
  completeness_score: "0"
  completeness_missing: ""
  completeness_passed: "false"

  # ── 分层文档（v2 拆分） ──
  acceptance_cases_file: ""
  ui_file: ""
  ux_file: ""
  acceptance_cases_count: "0"
  acceptance_p0_count: "0"
  ui_pages_count: "0"
  personas_count: "0"
  user_stories_count: "0"
  entities_count: "0"
  api_count: "0"
  prd_word_count: "0"

  # ── Clarify 阶段 ──
  project_type: ""
  design_focus: ""
  key_decisions: ""
  user_emphasis: ""
  clarify_file: ""

  # ── Locked Scope 阶段 ──
  scope_file: ""
  in_scope_count: "0"
  out_of_scope_count: "0"
  example_only_count: "0"
  extension_candidate_count: "0"

  # ── Swarm 统计 ──
  discover_swarm_rounds: "0"
  discover_swarm_consensus: ""
  define_swarm_rounds: "0"
  define_swarm_consensus: ""
  design_swarm_rounds: "0"
  design_swarm_consensus: ""
  uiux_swarm_experts: "0"
  completeness_swarm_score: ""

auto_answers:
  - pattern: ".*"
    answer: "proceed"

# ── Notify 子系统配置 ──
providers:
  hermes-cli:
    type: hermes
    timeout: 30
    min_severity: info

channels:
  default:
    provider: hermes-cli
    target: "telegram:xzf_hermes"

hooks:
  on_workflow_failure:
    - id: notify-failure
      type: notify
      channel: default
      template:
        severity: error
        title: "❌ $vars.display_name — 工作流失败"
        body: "📝 Idea: $inputs.idea\n🔴 失败节点: ${hook.failed_node_id | default:unknown}\n⏱️ 已运行: ${hook.total_duration_ms | duration}\n\n💡 错误: ${hook.error | default:Unknown error}"

  on_complete:
    - id: notify-complete-success
      type: notify
      condition: '$hook.final_status == "completed"'
      channel: default
      template:
        severity: info
        title: "🏁 $vars.display_name — 工作流完成"
        body: "🎉 全部完成！\n✅ 完成: $hook.completed_count / ⏭️ 跳过: $hook.skipped_count / 📊 总计: $hook.total_count\n⏱️ 总耗时: ${hook.total_duration_ms | duration}"

    - id: notify-complete-with-failures
      type: notify
      condition: '$hook.final_status != "completed"'
      channel: default
      template:
        severity: warn
        title: "🏁 $vars.display_name — 工作流结束"
        body: "⚠️ 状态: $hook.final_status\n✅ 完成: $hook.completed_count / ⏭️ 跳过: $hook.skipped_count / ❌ 失败: $hook.failed_count / 📊 总计: $hook.total_count\n⏱️ 总耗时: ${hook.total_duration_ms | duration}"

  on_node_success:
    - id: notify-setup
      type: notify
      nodes: [setup]
      channel: default
      template:
        severity: info
        title: "🔨 $vars.display_name 启动"
        body: "📝 Idea: $inputs.idea\n📂 输出: $vars.output_dir\n😈 对抗审查: $inputs.enable_adversarial (Swarm 内置)"

    - id: notify-clarify
      type: notify
      nodes: [clarify]
      channel: default
      template:
        severity: info
        title: "🧭 $vars.display_name — Clarify 完成"
        body: "📂 项目类型: $vars.project_type\n🎯 设计重点: $vars.design_focus\n🔑 关键决策: $vars.key_decisions\n\n💡 核心洞察: $vars.conclusion"

    - id: notify-discover-swarm
      type: notify
      nodes: [discover-write]
      channel: default
      template:
        severity: info
        title: "🔍 $vars.display_name — Discover Swarm 完成"
        body: "📄 需求文档: $vars.discovery_file\n🔄 辩论轮次: $vars.discover_swarm_rounds\n🤝 共识度: $vars.discover_swarm_consensus\n\n💡 $vars.conclusion"

    - id: notify-define-swarm
      type: notify
      nodes: [define-write]
      channel: default
      template:
        severity: info
        title: "📋 $vars.display_name — Define Swarm 完成"
        body: "👤 画像: $vars.personas_count | 📖 故事: $vars.user_stories_count\n📄 需求文档: $vars.requirements_file\n🔄 辩论轮次: $vars.define_swarm_rounds\n🤝 共识度: $vars.define_swarm_consensus\n\n💡 $vars.conclusion"

    - id: notify-design-swarm
      type: notify
      nodes: [design-write]
      channel: default
      template:
        severity: info
        title: "🏗️ $vars.display_name — Design Swarm 完成"
        body: "📊 实体: $vars.entities_count | 🔌 API: $vars.api_count\n📄 技术方案: $vars.solution_file\n🔄 辩论轮次: $vars.design_swarm_rounds\n🤝 共识度: $vars.design_swarm_consensus\n\n💡 $vars.conclusion"

    - id: notify-uiux-swarm
      type: notify
      nodes: [uiux-write]
      channel: default
      template:
        severity: info
        title: "🎨 $vars.display_name — UI/UX Swarm 完成"
        body: "📄 UI 规范: $vars.ui_file\n📄 UX 交互: $vars.ux_file\n👥 专家数: $vars.uiux_swarm_experts\n📊 页面数: $vars.ui_pages_count\n\n💡 $vars.conclusion"

    - id: notify-completeness-swarm
      type: notify
      nodes: [completeness-write]
      channel: default
      template:
        severity: info
        title: "✅ $vars.display_name — Completeness Swarm 完成"
        body: "📊 覆盖: $vars.completeness_score\n📝 缺失: ${vars.completeness_missing | default:无}\n🔍 审查分: $vars.completeness_swarm_score\n✅ 通过: $vars.completeness_passed\n\n💡 $vars.conclusion"

    - id: notify-output
      type: notify
      nodes: [output]
      channel: default
      template:
        severity: info
        title: "✅ $vars.display_name — PRD 生成完成！"
        body: "📝 名称: $vars.prd_name\n📊 完整性: $vars.completeness_score\n📄 PRD: $vars.final_prd_file\n📝 字数: $vars.prd_word_count\n\n💡 $vars.conclusion"

nodes:
  # ═══════════════════════════════════════════════════════════════
  # Phase 0: Setup — 环境准备 + 输出目录初始化
  # （与 prd-forge 一致）
  # ═══════════════════════════════════════════════════════════════
  - id: setup
    type: agent
    timeout: 600
    prompt: |
      你正在执行 PRD Forge (Swarm Edition) 工作流的环境准备阶段。

      ## 你的任务

      ### 1. 安装 superpowers-zh 技能
      ```bash
      npx superpowers-zh@latest --tool claude --force 2>&1 | head -5
      ```

      ### 2. 安装 agency-agents-zh 代理
      ```bash
      AGENTS_TARGET="$(pwd)/.claude/agents"
      mkdir -p "$AGENTS_TARGET"

      NEED_CLONE=false
      for agent in engineering-software-architect engineering-security-engineer product-manager design-ux-architect design-ui-designer; do
        if [ ! -f "$AGENTS_TARGET/$agent.md" ]; then
          NEED_CLONE=true
          break
        fi
      done

      if [ "$NEED_CLONE" = "true" ]; then
        echo "Cloning agency-agents-zh..."
        DEPS_DIR="$(pwd)/dependencies"
        mkdir -p "$DEPS_DIR"

        if [ ! -d "$DEPS_DIR/agency-agents-zh" ]; then
          git clone --depth 1 https://github.com/jnMetaCode/agency-agents-zh.git "$DEPS_DIR/agency-agents-zh" 2>&1
        fi

        REPO="$DEPS_DIR/agency-agents-zh"

        for f in product-manager; do
          [ -f "$REPO/product/$f.md" ] && cp "$REPO/product/$f.md" "$AGENTS_TARGET/"
        done
        for f in design-ux-architect design-ui-designer; do
          [ -f "$REPO/design/$f.md" ] && cp "$REPO/design/$f.md" "$AGENTS_TARGET/"
        done
        for f in engineering-software-architect engineering-security-engineer; do
          [ -f "$REPO/engineering/$f.md" ] && cp "$REPO/engineering/$f.md" "$AGENTS_TARGET/"
        done

        INSTALLED=$(ls "$AGENTS_TARGET"/engineering-*.md "$AGENTS_TARGET"/product-*.md "$AGENTS_TARGET"/design-*.md 2>/dev/null | wc -l)
        echo "Installed $INSTALLED agency agents to $AGENTS_TARGET"
      else
        echo "All agency agents already installed, skipping clone"
      fi
      ```

      ### 3. 安装 devil-advocate + architecture-explorer（core-pack 内置）
      ```bash
      AGENTS_TARGET="$(pwd)/.claude/agents"
      COREPACK_AGENTS=""
      for d in \
        "$(pwd)/.octopus/core-pack/agents" \
        "$(pwd)/packages/core-pack/agents" \
        "$(pwd)/../core-pack/agents"; do
        if [ -f "$d/devil-advocate.md" ]; then
          COREPACK_AGENTS="$d"
          break
        fi
      done
      if [ -n "$COREPACK_AGENTS" ]; then
        cp "$COREPACK_AGENTS/devil-advocate.md" "$AGENTS_TARGET/"
        [ -f "$COREPACK_AGENTS/architecture-explorer.md" ] && cp "$COREPACK_AGENTS/architecture-explorer.md" "$AGENTS_TARGET/"
        echo "Installed core-pack agents from $COREPACK_AGENTS"
      fi
      ```

      ### 4. 计算输出目录
      ```bash
      OUTPUT_ROOT="./docs/prd-forge"
      mkdir -p "$OUTPUT_ROOT"

      MAX_INDEX=0
      for dir in "$OUTPUT_ROOT"/prd-*/; do
        if [ -d "$dir" ]; then
          INDEX=$(basename "$dir" | sed 's/prd-0*//' | sed 's/^$/0/')
          if [ "$INDEX" -gt "$MAX_INDEX" ] 2>/dev/null; then
            MAX_INDEX=$INDEX
          fi
        fi
      done

      NEW_INDEX=$((MAX_INDEX + 1))
      PRD_INDEX=$(printf "%03d" $NEW_INDEX)
      OUTPUT_DIR="$OUTPUT_ROOT/prd-$PRD_INDEX"
      mkdir -p "$OUTPUT_DIR"
      echo "Output directory: $OUTPUT_DIR"
      ```

      ### 5. 生成 PRD 名称
      根据 $inputs.idea 生成一个简短的 PRD 名称（英文，kebab-case，最多 5 个单词）。

      ## 输出要求
      在回复末尾直接输出纯 JSON 行（不要用代码块包裹）:
      {"vars_update":{"output_dir":"$OUTPUT_DIR","prd_index":"<序号>","prd_name":"<简短名称>","display_name":"PRD Forge Swarm #<序号> · <简短名称>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 0.5: Clarify — Idea 理解与上下文分析
  # （与 prd-forge 一致）
  # ═══════════════════════════════════════════════════════════════
  - id: clarify
    type: agent
    depends_on: [setup]
    timeout: 1200
    prompt: |
      你是一位经验丰富的技术产品分析师，正在深入理解用户的 idea。

      ## 用户 Idea
      $inputs.idea

      ## 输出目录
      $vars.output_dir

      ## 你的任务

      ### 1. 项目类型识别 ⭐ 最重要
      | 类型 | 特征 | 后续重点 |
      |------|------|----------|
      | **product** | 面向终端用户、需要 UI/UX、有商业模式 | 用户画像、故事、API、GTM |
      | **infrastructure** | 内部工具、配置改造、架构重构 | 接口设计、配置语法、迁移策略 |
      | **hybrid** | 兼具产品和基础设施特征 | 两者兼顾 |

      ### 2. 关键设计决策点提取
      ### 3. 用户核心价值推断
      ### 4. Idea 中的技术线索

      ## 输出
      将分析结果保存到 `$vars.output_dir/00-clarify.md`

      {"vars_update":{"clarify_file":"$vars.output_dir/00-clarify.md","project_type":"<product/infrastructure/hybrid>","design_focus":"<设计重点>","key_decisions":"<关键决策点>","user_emphasis":"<用户核心价值>","conclusion":"<2-3句话>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 0.7: Locked Scope — 范围锁定
  # （与 prd-forge 一致）
  # ═══════════════════════════════════════════════════════════════
  - id: locked-scope
    type: agent
    depends_on: [clarify]
    timeout: 1200
    prompt: |
      你是范围分析师。本节点决定后续 PRD 的"什么是需求、什么是举例"。

      ## 输入
      - 原始 Idea: $inputs.idea
      - 上下文分析: $vars.clarify_file
      - 范围模式: $inputs.scope_mode

      ## 分类规则

      ### strict 模式（默认）
      1. **IN-SCOPE**：仅提取用户明确用功能动词表达的需求
      2. **EXAMPLE-ONLY**：所有 idea 中以"例如"、"比如"开头的内容
      3. **OUT-OF-SCOPE**：用户没提但 LLM 觉得"应该加"的通用功能
      4. EXTENSION-CANDIDATE 在 strict 模式下不允许产出

      ### creative 模式
      同 strict 但额外允许 **EXTENSION-CANDIDATE**

      ## 输出
      保存到 `$vars.output_dir/02-scope.md`

      {"vars_update":{"scope_file":"$vars.output_dir/02-scope.md","in_scope_count":"<数量>","out_of_scope_count":"<数量>","example_only_count":"<数量>","extension_candidate_count":"<数量>","conclusion":"<scope_mode> 模式：IN-SCOPE N 项 / OUT-OF-SCOPE M 项"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 1: Discover Swarm — 需求发现 + 对抗质疑（合并原 discover + refine-discover）
  # ═══════════════════════════════════════════════════════════════
  - id: discover-swarm
    type: swarm
    depends_on: [locked-scope]
    timeout: 3600
    topic: |
      对用户 idea 进行深入的需求发现分析，同时质疑所有假设。

      ## 用户 Idea
      $inputs.idea

      ## 范围契约（硬约束）
      $vars.scope_file
      ⛔ 不写 OUT-OF-SCOPE 项进入需求发现
      ⛔ 不把 EXAMPLE-ONLY 当成独立需求展开
      ✅ creative 模式可以把 EXTENSION-CANDIDATE 写入（需明确标注"扩展项"）

      ## Idea 上下文分析
      $vars.clarify_file

      ## 项目类型: $vars.project_type（$vars.design_focus）
      ## 用户强调的核心价值: $vars.user_emphasis

      ## 输出目录: $vars.output_dir
    mode: debate
    rounds: 2
    consensus_threshold: 0.7
    budget: 500000
    context_tier: "200k"

    expert_defaults:
      model: pro-max
      tools: ["Read", "Grep", "Glob", "Write"]

    experts:
      - role: product-manager
        agent_file: ".claude/agents/product-manager.md"
        perspective: "资深产品经理，擅长需求发现、问题陈述、目标用户分析"
        task: |
          深入分析用户 idea，输出需求发现文档。必须覆盖：
          1. 问题陈述（谁有痛点？频率？不解决的代价？）
          2. 问题证据（市场信号、竞品、替代方案分析）
          3. 目标用户群体（画像、规模）
          4. 机会假设（为什么现在是好时机？核心差异化？）
          5. 不做这件事的代价

          如果 project_type 是 infrastructure，重点关注技术债务、架构约束、迁移成本。
          如果 project_type 是 product，重点关注用户痛点、市场信号、竞品分析。
          $vars.user_emphasis 对应的维度必须最深入。

      - role: domain-analyst
        perspective: "领域分析师，专注于市场信号、竞品分析和技术趋势"
        prompt: |
          从市场和技术角度分析这个 idea：
          1. 竞品分析：现有替代方案有哪些？它们做得好/不好的地方？
          2. 市场信号：行业趋势、技术成熟度、用户行为变化
          3. 技术可行性初判：核心技术是否成熟？有无技术风险？
          4. 差异化机会：在竞品基础上，哪些维度可以做出显著差异？

      - role: devil-advocate
        agent_file: ".claude/agents/devil-advocate.md"
        perspective: "魔鬼代言人 — 默认立场：NEEDS MORE EVIDENCE"
        task: |
          对所有假设进行质疑：
          - 🔴 CRITICAL: 问题是否真实存在？还是凭空想象？
          - 🔴 CRITICAL: 目标用户是否具体？还是"所有人"？
          - 🟡 RISK: 是否遗漏了关键利益相关者？
          - 🟡 RISK: 市场时机是否合理？
          - 🔵 QUESTION: 是否有更根本的问题被忽略？

    host:
      role: discovery-host
      model: pro-max
      prompt: |
        综合所有专家的需求发现意见，产出最终的需求发现文档。

        ## 综合原则
        1. 产品经理和领域分析师的共识内容直接采纳
        2. 魔鬼代言人的质疑必须逐条回应：
           - 🔴 CRITICAL: 必须在文档中补充证据或修正假设
           - 🟡 RISK: 评估后采纳或记录缓解措施
           - 🔵 QUESTION: 酌情补充
        3. 专家间的分歧需要你的判断，写清楚理由

        ## 输出要求
        将完整的需求发现文档直接作为 synthesis 输出，格式为 markdown。
        文档必须包含：问题陈述、问题证据、目标用户、机会假设、不做代价、对抗质疑回应。
        保持 2000 字以内。

        ## 共识评估（JSON，最后一行）
        ```json
        {"assessment": {"consensus_score": 0.0-1.0, "should_continue": true/false, "reason": "<1-2句>"}}
        ```

  # ── discover-swarm 输出落盘 ──
  - id: discover-write
    type: agent
    depends_on: [discover-swarm]
    timeout: 300
    prompt: |
      将 discover-swarm 的综合输出写入文件并设置变量。

      ## 任务
      1. 读取 $vars.discover-swarm_synthesis（Swarm 综合输出）
      2. 将完整内容写入 `$vars.output_dir/01-discovery.md`
      3. 如果有对抗质疑内容，同时写入 `$vars.output_dir/01-discovery.challenges.md`

      ## 输出
      {"vars_update":{"discovery_file":"$vars.output_dir/01-discovery.md","discover_swarm_rounds":"$vars.discover-swarm_rounds_used","discover_swarm_consensus":"$vars.discover-swarm_consensus_score","conclusion":"<从 synthesis 提取 2-3 句话总结>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 2: Define Swarm — 需求定义 + 完整性审查（合并原 define + refine-define）
  # ═══════════════════════════════════════════════════════════════
  - id: define-swarm
    type: swarm
    depends_on: [discover-write]
    timeout: 7200
    topic: |
      基于需求发现文档，进行完整的需求定义，同时审查完整性。

      ## 范围契约（硬约束）
      $vars.scope_file
      ⛔ 不把 OUT-OF-SCOPE 项写成 User Story
      ⛔ 不把 EXAMPLE-ONLY 当成独立 Story 展开
      ✅ creative 模式的 EXTENSION-CANDIDATE 可写入但必须标记为"扩展项"

      ## 需求发现文档
      $vars.discovery_file

      ## 项目类型: $vars.project_type
      ## 用户强调的核心价值: $vars.user_emphasis
      ## 输出目录: $vars.output_dir
    mode: debate
    rounds: 2
    consensus_threshold: 0.7
    budget: 500000
    context_tier: "200k"

    expert_defaults:
      model: pro-max
      tools: ["Read", "Grep", "Glob", "Write"]

    experts:
      - role: product-manager
        agent_file: ".claude/agents/product-manager.md"
        perspective: "资深产品经理，擅长用户画像、用户故事、功能优先级"
        task: |
          输出完整的需求定义文档，必须覆盖：

          ### 1. 用户画像（至少 2-3 个）
          每个画像包含：名字、职业背景、使用场景、核心痛点、期望目标、技术水平。

          ### 2. 用户故事（每个核心功能至少 3 个）
          格式：作为[画像]，我想要[操作]，以便[结果]。
          验收标准：Given/When/Then。
          涉及 UI 操作的故事必须包含：UI 入口、操作步骤、页面状态、错误反馈。

          ### 3. 功能界面声明
          是否有 UI？界面类型？核心页面清单？

          ### 4. Non-Goals（明确不做的事 + 原因）
          ### 5. 用户旅程地图（发现→注册→核心流程→留存）
          ### 6. 边界情况（空状态/错误/极端数据/并发）
          ### 7. 功能优先级（Required=P0 / Enhancement=P1 / Won't Have）

          ⛔ P0 和 P1 都必须 100% 实现和测试。

      - role: ux-architect
        agent_file: ".claude/agents/design-ux-architect.md"
        perspective: "UX 架构师，关注用户体验完整性、交互流程、无障碍"
        task: |
          从 UX 视角审查和补充需求定义：
          1. 用户旅程是否有断点？转化漏斗是否合理？
          2. 涉及 UI 的 Story 是否定义了完整的交互序列？
          3. 每个页面是否覆盖 5 种状态（空/加载/成功/错误/部分数据）？
          4. 边界情况的 UI 表现是否明确？
          5. 无障碍需求是否覆盖（键盘导航、色彩对比度、屏幕阅读器）？

      - role: devil-advocate
        agent_file: ".claude/agents/devil-advocate.md"
        perspective: "魔鬼代言人 — 默认立场：INCOMPLETE"
        task: |
          对需求定义进行完整性审查：
          - 🔴 CRITICAL: 用户画像是否具体到可以识别真人？
          - 🔴 CRITICAL: 用户故事是否覆盖所有核心功能？
          - 🔴 CRITICAL: 验收标准是否可自动化测试？
          - 🔴 CRITICAL: 涉及 UI 操作的 Story 是否包含完整 UI 操作步骤？
          - 🔴 CRITICAL: 是否包含功能界面声明？
          - 🟡 RISK: 是否遗漏关键边界情况的 UI 表现？
          - 🟡 RISK: Non-Goals 是否合理？
          - 🟡 RISK: 用户旅程地图是否标注了每步对应的页面和交互元素？

    host:
      role: define-host
      model: pro-max
      prompt: |
        综合所有专家的需求定义意见，产出最终的需求定义文档。

        ## 综合原则
        1. 产品经理的用户故事和画像是基础，直接采纳
        2. UX 架构师的补充必须纳入（交互序列、页面状态、无障碍）
        3. 魔鬼代言人的质疑逐条回应：
           - 🔴 CRITICAL: 必须补充到文档
           - 🟡 RISK: 评估后补充或记录理由
        4. 专家间的分歧需要你的判断

        ## 输出要求
        将完整的需求定义文档直接作为 synthesis 输出，格式为 markdown。
        必须包含：画像、故事、界面声明、Non-Goals、旅程、边界、优先级、对抗质疑回应。
        保持 3000 字以内。

        ## 共识评估（JSON，最后一行）
        ```json
        {"assessment": {"consensus_score": 0.0-1.0, "should_continue": true/false, "reason": "<1-2句>"}}
        ```

  # ── define-swarm 输出落盘 ──
  - id: define-write
    type: agent
    depends_on: [define-swarm]
    timeout: 300
    prompt: |
      将 define-swarm 的综合输出写入文件并设置变量。

      ## 任务
      1. 读取 $vars.define-swarm_synthesis
      2. 写入 `$vars.output_dir/02-requirements.md`
      3. 统计画像数量和用户故事数量

      ## 输出
      {"vars_update":{"requirements_file":"$vars.output_dir/02-requirements.md","define_swarm_rounds":"$vars.define-swarm_rounds_used","define_swarm_consensus":"$vars.define-swarm_consensus_score","personas_count":"<画像数>","user_stories_count":"<故事数>","conclusion":"<2-3句话总结>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 2.8: Acceptance Cases — 抽象验收用例
  # （与 prd-forge 一致）
  # ═══════════════════════════════════════════════════════════════
  - id: acceptance-cases
    type: agent
    depends_on: [define-write]
    timeout: 3600
    prompt: |
      你是验收测试架构师，正在为 PRD 生成抽象验收用例（BDD 左移）。

      ## 输入
      - 需求定义: $vars.requirements_file
      - Idea 上下文: $vars.clarify_file
      - 项目类型: $vars.project_type

      ## 你的任务

      ### 1. 用例提取规则
      逐一遍历 User Stories，每个 Story 至少 1 条 P0 用例。

      ### 2. 用例字段
      | 字段 | 说明 |
      |------|------|
      | case_id | TC-001 起递增 |
      | story_id | 关联 Story 编号 |
      | priority | P0/P1 |
      | source | user/agent |
      | scenario | 一句话场景 |
      | given | 抽象前置条件 |
      | when | 抽象操作 |
      | then | 断言意图 |
      | evidence_type | api_response / ui_state / file_content / cli_output / workflow_execution |
      | binding_hints | 给下游的绑定提示 |

      ### 3. 边界与异常用例
      至少为 30% 的 Story 补充边界用例。

      ## 输出
      保存到 `$vars.output_dir/06-acceptance-cases.md`

      {"vars_update":{"acceptance_cases_file":"$vars.output_dir/06-acceptance-cases.md","acceptance_cases_count":"<总数>","acceptance_p0_count":"<P0数>","conclusion":"<2-3句话>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 3: Design Swarm — 方案设计 + 对抗审查 + 综合
  # （合并原 design + challenge-design + synthesis-design）
  # ═══════════════════════════════════════════════════════════════
  - id: design-swarm
    type: swarm
    depends_on: [define-write]
    timeout: 7200
    topic: |
      基于需求定义，设计完整的技术方案，同时进行多角度审查。

      ## 范围契约（硬约束）
      $vars.scope_file
      ⛔ 不为 OUT-OF-SCOPE 项设计架构、API 或数据模型

      ## 需求定义文档: $vars.requirements_file
      ## Idea 上下文: $vars.clarify_file
      ## 项目类型: $vars.project_type
      ## 用户核心价值: $vars.user_emphasis
      ## 设计重点: $vars.design_focus
      ## 输出目录: $vars.output_dir
    mode: debate
    rounds: 2
    consensus_threshold: 0.7
    budget: 800000
    context_tier: "1m"

    expert_defaults:
      model: pro-max
      tools: ["Read", "Grep", "Glob", "Write"]

    experts:
      - role: software-architect
        agent_file: ".claude/agents/engineering-software-architect.md"
        perspective: "资深软件架构师，负责系统架构、数据模型、API 设计"
        task: |
          基于需求定义，输出完整的技术方案文档。

          **根据 $vars.project_type 选择模板：**

          ### infrastructure 型：
          方案概述 → 架构对比图 → 接口与配置设计 → 迁移策略 → 技术选型 → 安全 → 性能 → 错误处理 → 依赖 → 风险

          ### product 型：
          方案概述 → 系统架构图 → UI/UX 设计（页面清单/核心页面/交互流程/状态设计/响应式） → 数据模型 → API 设计 → 技术选型 → 安全 → 性能 → 错误处理 → 依赖 → 风险

          ### hybrid 型：合并两个模板

          核心原则：
          - 深度优先于广度
          - $vars.user_emphasis 对应的章节必须最详细
          - 每个用户故事都有对应技术方案

      - role: security-engineer
        agent_file: ".claude/agents/engineering-security-engineer.md"
        perspective: "安全工程师，关注认证授权、数据保护、威胁建模"
        task: |
          从安全视角审查和补充技术方案：
          1. 认证/授权设计是否完备？
          2. 数据传输和存储是否有加密方案？
          3. 是否有 CSRF/XSS/SQL注入 防护？
          4. API 是否有速率限制和输入验证？
          5. 是否有审计日志设计？

      - role: feasibility-reviewer
        agent_file: ".claude/agents/engineering-software-architect.md"
        perspective: "可行性审查者，关注技术选型成熟度、工作量、单点故障"
        task: |
          审查技术方案的可行性：
          1. 技术选型是否成熟稳定？
          2. 工作量估算是否合理？
          3. 是否有单点故障风险？
          4. 是否有过度设计的部分？
          5. 有没有被忽视的更优设计路径？

      - role: architecture-explorer
        agent_file: ".claude/agents/architecture-explorer.md"
        perspective: "架构探索者 — 默认立场：这个方案还可以更深入"
        task: |
          探索让方案从"能用"变为"出色"的机会：
          1. 有没有被忽视的更优设计路径？
          2. $vars.user_emphasis 在方案中是否被充分展开？
          3. 有没有创造性的解法？
          4. 业界有哪些优雅的设计可以参考？

          输出按 🟢 OPPORTUNITY / 🔵 DEEPEN / 💡 CREATIVE 分级。

    host:
      role: design-host
      model: pro-max
      prompt: |
        综合所有专家的技术方案意见，产出最终的技术方案文档。

        ## 综合原则
        1. 软件架构师的方案是基础骨架
        2. 安全工程师的补充必须纳入（认证/授权/加密）
        3. 可行性审查者的 CRITICAL 问题必须修正
        4. 架构探索者的建议：
           - 🟢 OPPORTUNITY: 评估后纳入，与 $vars.user_emphasis 相关的必须纳入
           - 🔵 DEEPEN: 选至少 2 个方向深入展开
           - 💡 CREATIVE: 可行的纳入"替代方案"或"未来演进"
        5. 专家间的冲突需要你的判断，写进文档

        ## 输出要求
        将完整的技术方案文档直接作为 synthesis 输出，格式为 markdown。
        必须包含：概述、架构、核心设计章节（按项目类型）、安全、性能、错误处理、依赖、风险、对抗审查回应。
        保持 4000 字以内。

        ## 共识评估（JSON，最后一行）
        ```json
        {"assessment": {"consensus_score": 0.0-1.0, "should_continue": true/false, "reason": "<1-2句>"}}
        ```

  # ── design-swarm 输出落盘 ──
  - id: design-write
    type: agent
    depends_on: [design-swarm]
    timeout: 300
    prompt: |
      将 design-swarm 的综合输出写入文件并设置变量。

      ## 任务
      1. 读取 $vars.design-swarm_synthesis
      2. 写入 `$vars.output_dir/03-solution.md`
      3. 统计实体数和 API 数

      ## 输出
      {"vars_update":{"solution_file":"$vars.output_dir/03-solution.md","design_swarm_rounds":"$vars.design-swarm_rounds_used","design_swarm_consensus":"$vars.design-swarm_consensus_score","entities_count":"<实体数>","api_count":"<API数>","conclusion":"<2-3句话>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 3.8: UI/UX Swarm — UI 规范 + UX 交互（合并原 ui-design + ux-flow）
  # （条件触发：仅 product/hybrid 项目）
  # ═══════════════════════════════════════════════════════════════
  - id: uiux-swarm
    type: swarm
    depends_on: [design-write]
    timeout: 3600
    execute_when: '$vars.project_type != "infrastructure"'
    topic: |
      基于需求定义和技术方案，产出 UI 规范和 UX 交互流程文档。

      ## 需求定义: $vars.requirements_file
      ## 技术方案: $vars.solution_file
      ## Idea 上下文: $vars.clarify_file
      ## 输出目录: $vars.output_dir
    mode: review
    budget: 500000
    context_tier: "200k"

    expert_defaults:
      model: pro-max
      tools: ["Read", "Write", "Grep", "Glob"]

    experts:
      - role: ui-designer
        agent_file: ".claude/agents/design-ui-designer.md"
        perspective: "UI 设计师 — 设计 tokens、组件库、布局规范"
        task: |
          产出独立 UI 规范文档（ui.md = 静态表现层）。

          必须覆盖：
          1. 页面全谱（页面ID/名称/路由/用途/主要组件/Story 关联）
          2. 设计 Tokens（色彩/字体/间距/断点）
          3. 组件清单（表单/反馈/导航/数据展示，标注 P0/P1）
          4. 布局规范（栅格/容器/页面模板）
          5. 响应式与无障碍
          6. 实现提示

      - role: ux-architect
        agent_file: ".claude/agents/design-ux-architect.md"
        perspective: "UX 架构师 — 交互流程、页面状态机、用户旅程"
        task: |
          产出独立 UX 交互流程文档（ux.md = 动态行为层）。

          必须覆盖：
          1. 用户旅程地图（绑定 ui.md 页面ID）
          2. 页面状态机（核心页面 5 种状态：空/加载/成功/错误/部分数据）
          3. 核心交互序列（每个 P0 Story 的完整交互：入口→触发→反馈→后续）
          4. 错误与恢复路径
          5. 实时/异步反馈（乐观更新、SSE/WebSocket）
          6. 快捷路径（快捷键、深链接）

      - role: frontend-developer
        agent_file: ".claude/agents/engineering-frontend-developer.md"
        perspective: "前端开发者 — 从实现角度审查 UI/UX 规范的可落地性"
        task: |
          从前端实现角度审查 UI/UX 规范：
          1. 组件清单是否与现有组件库一致？有没有重复造轮子的风险？
          2. 交互序列是否可以用现有技术栈实现？
          3. 响应式断点是否合理？移动端适配策略是否可行？
          4. 状态设计是否与现有状态管理方案兼容？
          5. 有无实现成本过高但可以简化的设计？

    host:
      role: uiux-host
      model: pro-max
      prompt: |
        综合所有专家的 UI/UX 意见，产出两份文档内容。

        ## 综合原则
        1. UI 设计师的输出是 ui.md 的基础
        2. UX 架构师的输出是 ux.md 的基础
        3. 前端开发者的反馈必须纳入（可落地性审查）
        4. UI 和 UX 之间的不一致需要你的判断

        ## 输出要求
        在 synthesis 中用明确的分隔标记产出两份文档：

        ===UI_MD_START===
        <ui.md 完整内容>
        ===UI_MD_END===

        ===UX_MD_START===
        <ux.md 完整内容>
        ===UX_MD_END===

  # ── uiux-swarm 输出落盘 ──
  - id: uiux-write
    type: agent
    depends_on: [uiux-swarm]
    timeout: 300
    execute_when: '$vars.project_type != "infrastructure"'
    prompt: |
      将 uiux-swarm 的综合输出拆分为两份文件。

      ## 任务
      1. 读取 $vars.uiux-swarm_synthesis
      2. 提取 ===UI_MD_START=== 和 ===UI_MD_END=== 之间的内容 → 写入 `$vars.output_dir/07-ui.md`
      3. 提取 ===UX_MD_START=== 和 ===UX_MD_END=== 之间的内容 → 写入 `$vars.output_dir/08-ux.md`
      4. 统计页面数

      ## 输出
      {"vars_update":{"ui_file":"$vars.output_dir/07-ui.md","ux_file":"$vars.output_dir/08-ux.md","uiux_swarm_experts":"$vars.uiux-swarm_expert_count","ui_pages_count":"<页面数>","conclusion":"<2-3句话>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 5: Completeness Swarm — 完整性终审（升级原 completeness-review）
  # ═══════════════════════════════════════════════════════════════
  - id: completeness-swarm
    type: swarm
    depends_on: [acceptance-cases, uiux-write, design-write]
    timeout: 3600
    topic: |
      对照完整性维度清单，逐项检查所有 PRD 文档。

      ## 文档清单
      - 需求发现: $vars.discovery_file
      - 需求定义: $vars.requirements_file
      - 技术方案: $vars.solution_file
      - 验收用例: $vars.acceptance_cases_file
      - UI 规范: $vars.ui_file（可能为空）
      - UX 交互: $vars.ux_file（可能为空）
      - 范围契约: $vars.scope_file
      - Idea 上下文: $vars.clarify_file

      ## 项目类型: $vars.project_type
      ## 用户核心价值: $vars.user_emphasis
    mode: review
    budget: 500000
    context_tier: "1m"

    expert_defaults:
      model: pro-max
      tools: ["Read", "Grep"]

    experts:
      - role: completeness-pm
        agent_file: ".claude/agents/product-manager.md"
        perspective: "产品完整性审查 — 需求覆盖度、用户故事质量、优先级合理性"
        task: |
          审查以下维度：
          1. 问题定义 — 问题陈述清晰、有证据支撑
          2. 目标用户 — 画像具体（名字、场景、痛点）
          3. 用户故事 — Given/When/Then 格式、可验证
          4. 功能范围 — 明确 MVP 边界、Non-Goals
          5. 用户核心价值覆盖 — $vars.user_emphasis 在 PRD 中有深入展开

          对每个维度判断：✅ 覆盖 / ❌ 缺失 / ⚠️ 部分覆盖。
          对 ❌ 和 ⚠️ 说明缺失什么、如何补充。

      - role: completeness-architect
        agent_file: ".claude/agents/engineering-software-architect.md"
        perspective: "技术完整性审查 — 架构、API、数据模型、安全、性能"
        task: |
          审查以下维度：
          5. 技术接口 — 数据模型/配置语法/接口定义
          6. API/配置设计 — 架构级描述是否清晰
          7. 项目类型适配 — 文档结构和重点是否匹配项目类型
          11. 安全 — 认证、授权、数据保护
          12. 性能 — 延迟目标、并发、容量
          13. 错误处理 — 异常场景、降级策略

          根据 project_type 调整标准：
          - infrastructure: 重点看配置语法完备性、迁移策略
          - product: 重点看 API 设计、数据模型

      - role: completeness-ui-reviewer
        agent_file: ".claude/agents/design-ux-architect.md"
        perspective: "UI/UX 完整性审查 — 页面设计、交互流程、验收用例"
        task: |
          审查以下维度（仅当 project_type != infrastructure 时）：
          8. UI 规范完整性 — 07-ui.md 覆盖页面全谱？Tokens 完整？组件清单四大类？
          9. UX 交互完整性 — 08-ux.md 有用户旅程？5 种状态？P0 Story 交互序列？
          10. 验收用例完整性 — 06-acceptance-cases.md 覆盖度？P0 Story 有用例？边界覆盖 30%？

          如果 project_type == infrastructure 但 ui_file/ux_file 为空 → 标注"不适用"。
          如果 project_type == product 但 ui_file/ux_file 为空 → ❌ 严重缺失。

      - role: completeness-scope-checker
        perspective: "范围一致性审查 — 检查文档是否有越界内容"
        prompt: |
          审查以下维度：
          15. 文档跨引用一致性 — solution 里的 API 是否都能在 acceptance-cases 找到验收点？
              ui 里的页面是否都在 ux 里有状态机？
          16. 范围契约一致性 — 对照 02-scope.md：
              - requirements / solution / acceptance-cases / ui / ux 中是否引入了 OUT-OF-SCOPE 项？
              - 是否把 EXAMPLE-ONLY 当成独立 Story/模块展开？
              - creative 模式下 EXTENSION-CANDIDATE 是否被明确标注为"扩展项"？
              - 任一文档引入了 OUT-OF-SCOPE 项 → ❌ 严重缺失

    host:
      role: completeness-host
      model: pro-max
      prompt: |
        综合所有专家的完整性审查结果，产出最终的完整性审查报告。

        ## 综合格式
        产出一张汇总表：
        | 维度 | 状态 | 审查者 | 备注 |
        |------|------|--------|------|
        | 问题定义 | ✅/❌/⚠️ | PM | ... |

        ## 判定规则
        - 全部 ✅: 通过
        - ❌ 数量 <= $inputs.completeness_threshold: 通过，记录缺失项
        - ❌ 数量 > $inputs.completeness_threshold: 不通过

        ## 输出要求
        在 synthesis 中输出：
        1. 汇总表
        2. 通过/不通过判定
        3. 缺失项清单（如何补充）
        4. 范围一致性结论

  # ── completeness-swarm 输出落盘 ──
  - id: completeness-write
    type: agent
    depends_on: [completeness-swarm]
    timeout: 300
    prompt: |
      将 completeness-swarm 结果写入文件并判定是否通过。

      ## 任务
      1. 读取 $vars.completeness-swarm_synthesis
      2. 写入 `$vars.output_dir/05-completeness-review.md`
      3. 从 synthesis 中提取：
         - completeness_score: 覆盖维度数/16
         - completeness_missing: 缺失维度列表
         - completeness_passed: 根据 ❌ 数量与 $inputs.completeness_threshold 判定

      ## 输出
      {"vars_update":{"completeness_file":"$vars.output_dir/05-completeness-review.md","completeness_score":"<覆盖维度数>/16","completeness_missing":"<缺失维度>","completeness_swarm_score":"$vars.completeness-swarm_consensus_score","completeness_passed":"<true/false>","conclusion":"<2-3句话>"}}

  # ═══════════════════════════════════════════════════════════════
  # Completeness Fix Loop — 引擎级循环修复缺失维度（最多 3 轮）
  # 设计：completeness-swarm 发现问题，本循环驱动修复。
  # 每轮：读取缺失 → 补充文档 → 重新评估。
  # 达标或 3 轮耗尽都继续 → output（Always-Deliver）。
  # ═══════════════════════════════════════════════════════════════
  - id: completeness-fix-loop
    type: loop
    depends_on: [completeness-write]
    max_iterations: 3
    break_when: '$vars.completeness_passed == "true"'
    nodes:
      - id: completeness-fix-round
        type: agent
        timeout: 3600
        context: new
        prompt: |
          完整性审查第 $iteration 轮修复（最多 3 轮）。

          ## 当前状态
          - 覆盖: $vars.completeness_score
          - 缺失维度: $vars.completeness_missing
          - 审查详情: $vars.completeness_file

          ## 你的任务

          ### 1. 补充缺失内容
          读取审查详情，理解每个缺失维度需要什么，补充到对应文档：
          - 问题/用户相关 → 更新 $vars.requirements_file
          - 技术相关 → 更新 $vars.solution_file
          - UI/UX 相关 → 更新 $vars.ui_file / $vars.ux_file
          - 验收用例相关 → 更新 $vars.acceptance_cases_file

          ### 2. 范围越界特殊处理
          维度 16 (scope_leakage)：读取 $vars.scope_file 的 OUT-OF-SCOPE 列表，
          在文档中**删除**越界项，不重新写。

          ### 3. 重新评估
          补充完成后，重新检查所有 16 个维度：
          - 对每个之前缺失的维度，判断是否已补充 ✅
          - 计算新的 completeness_score
          - 判断是否通过（❌ 数量 <= $inputs.completeness_threshold）

          ### 4. 发送通知
          ```bash
          octopus notify --ignore-failure \
            --title "🔧 $vars.display_name — 完整性修复第 $iteration 轮" \
            --body "补充前: $vars.completeness_score | 补充后: <新分数>\n缺失: $vars.completeness_missing"
          ```

          ## 输出
          {"vars_update":{"completeness_score":"<新分数>/16","completeness_missing":"<剩余缺失>","completeness_passed":"<true/false>","completeness_file":"$vars.output_dir/05-completeness-review.md","conclusion":"第 $iteration 轮: 补充了 N 个维度，剩余 M 个缺失"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 6: Output — 最终 PRD 输出
  # ⚠️ Always-Deliver: 无论完整性是否达标，都生成最终 PRD。
  # completeness-fix-loop 耗尽后自然流入此节点。
  # ═══════════════════════════════════════════════════════════════
  - id: output
    type: agent
    depends_on: [completeness-fix-loop]
    timeout: 3600
    prompt: |
      你是资深产品经理，正在撰写最终 PRD 文档。

      ## ⚠️ Always-Deliver 原则
      无论完整性审查结果如何，都必须产出最终 PRD。
      如果 completeness_passed == "false"，在 PRD 附录中如实记录缺失维度和后续改进建议。
      不因任何质量指标未达标而拒绝输出——产出物是交付的前提。

      ## ⚠️ 这不是文档拼接任务

      你的工作是基于一手材料，以专业产品经理的视角，**重新撰写**一份连贯、有洞察力的 PRD。
      不要简单地把各文档的章节搬过来拼接。你需要：
      - 理解每个文档的核心论点
      - 找到它们之间的逻辑关系
      - 用一条贯穿全文的叙事线把它们编织成一个整体
      - 对矛盾和冲突给出你的判断

      ## 输入材料（全部读取）
      - Idea 分析: $vars.clarify_file
      - 需求发现: $vars.discovery_file
      - 需求定义: $vars.requirements_file
      - 技术方案: $vars.solution_file
      - 验收用例: $vars.acceptance_cases_file
      - UI 规范: $vars.ui_file
      - UX 交互: $vars.ux_file
      - 完整性审查: $vars.completeness_file（记录最终完整度状态）

      ## 当前完整性状态
      - 完整度: $vars.completeness_score
      - 是否达标: $vars.completeness_passed
      - 修复轮数: 最多 3 轮（completeness-fix-loop 已执行完毕）

      ## 撰写原则
      1. 以叙事线贯穿：问题→谁有→为什么→方案→为什么这样设计→如何落地
      2. $vars.user_emphasis 必须深入展开
      3. Swarm 辩论中的矛盾要解决，给出你的判断
      4. 项目类型适配（infrastructure vs product 重点不同）
      5. 质量优先于覆盖
      6. 发布计划（发布阶段/成功指标/GTM/回滚/时间线）
      7. 如果完整性未达标，在附录中记录"已知缺失与改进建议"

      ## 输出
      将最终 PRD 保存到 `$vars.output_dir/PRD-FINAL.md`

      {"vars_update":{"final_prd_file":"$vars.output_dir/PRD-FINAL.md","prd_word_count":"<字数>","conclusion":"<2-3句话，含完整度状态>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 7: Done
  # ═══════════════════════════════════════════════════════════════
  - id: done
    type: bash
    depends_on: [output]
    timeout: 10
    bash: |
      echo "═══════════════════════════════════════"
      echo "  ✅ PRD Forge (Swarm Edition) 完成"
      echo "═══════════════════════════════════════"
      echo "📂 输出: $vars.output_dir"
      echo "📄 PRD:  $vars.final_prd_file"
      echo "📊 完整性: $vars.completeness_score"
      echo "🔍 Discover: $vars.discover_swarm_rounds 轮 / $vars.discover_swarm_consensus"
      echo "📋 Define:   $vars.define_swarm_rounds 轮 / $vars.define_swarm_consensus"
      echo "🏗️ Design:   $vars.design_swarm_rounds 轮 / $vars.design_swarm_consensus"
      echo "═══════════════════════════════════════"
