      验证全部通过:
      {"vars_update":{"integration_passed":"true","conclusion":"集成验证通过"}}

      验证失败且无法修复:
      {"vars_update":{"integration_passed":"false","__status":"failed","conclusion":"集成验证失败: <原因>"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 3: Review + Fix
  # ═══════════════════════════════════════════════════════════════
  - id: review
    type: agent
    depends_on: [implement, integrate]
    timeout: 7200
    agents:
      code-reviewer:
        description: "独立代码审查员"
        agent_file: ".claude/agents/engineering-code-reviewer.md"
        model: pro-max
        tools: ["Bash", "Read", "Grep", "Glob"]
      security-engineer:
        description: "安全工程师"
        agent_file: ".claude/agents/engineering-security-engineer.md"
        model: pro-max
        tools: ["Bash", "Read", "Grep", "Glob"]
      product-completeness-assessor:
        description: "产品完整度评估员 — 对照 PRD 必需功能评估实现完整度"
        prompt: |
          ## 产品完整度评估（硬证据驱动）

          对照 PRD 需求文档 $vars.requirements_file 中的功能评估实现完整度。
          **P0（核心）和 P1（增强）都必须 100% 实现。P0 要求深度测试，P1 要求基本功能验证通过。**

          ⛔ **规则：用户输入的所有功能都是"必需"，如果某个用户提出的功能未实现，必须列为缺失项。**
          ⛔ **硬证据规则：每个维度打分必须基于 Grep/Read/Bash 的实际输出，不允许"代码看上去应该能用"类型评分。**

          ## 评估维度（5 个，加权计分）

          ### 1. 全部功能覆盖（权重 35%）— 硬证据
          逐个检查 PRD 列出的功能（P0+P1，不含 Won't Have）：
          - **证据要求**：`pnpm build` 通过（Bash 输出为证）+ 功能对应文件存在且非空壳（Read 确认）
          - **无 build 证据 → 0 分**（即使代码文件存在）
          - 评分: 有证据的功能数 / 全部功能总数 × 100%

          ### 2. 接线完整性（权重 15%）— Grep 硬证据
          检查每个已实现功能是否正确接入宿主调用链：
          - **Server 路由**: 用 Grep 在契约指定的入口文件中搜索新路由文件的 import + 注册语句
          - **前端组件**: 用 Grep 在路由配置/父组件中搜索新组件的 import + 渲染
          - **生命周期/Hook**: 用 Grep 在 hook 链/启动序列中搜索新函数调用
          - 评分: Grep 命中的接线数 / 需接线总数 × 100%
          - ⚠️ 项目不涉及路由/页面 → N/A 并给 100%

          ### 3. UI/UX 操作闭环（权重 30%，仅当功能涉及 UI 时评估）— Grep 硬证据
          对每个涉及 UI 的功能：
          - **入口**: 用 Grep 确认页面在导航配置/路由中可达
          - **操作**: 用 Read 确认组件实现了表单/交互序列
          - **反馈**: 用 Grep 确认 toast/状态变化代码存在
          - **恢复**: 用 Grep 确认错误提示/重试代码存在
          - 4 项都有 Grep/Read 证据 → 闭环完整
          - **只有 API/后端但无 UI 操作路径证据 → 闭环缺失**

          ### 4. 验收标准通过率（权重 15%）
          - ⚠️ **review 阶段不打分** — 留到 E2E 阶段运行时验证
          - 固定给 80%（假定代码层面可通过，E2E 验证后修正）

          ### 5. Non-Goals 遵守（权重 5%）
          - 检查 Won't Have 列表
          - 用 Grep 搜索是否误实现了明确不做的功能
          - 无误实现证据 → 100%，有误实现证据 → 0%

          ## 总分计算
          总分 = 维度1×0.35 + 维度2×0.15 + 维度3×0.3 + 维度4×0.15 + 维度5×0.05

          ## 输出格式

          ### 评分明细
          | 维度 | 权重 | 评分 | 详情 |
          |------|------|------|------|
          | 全部功能覆盖 | 35% | N% | X/Y 个功能已实现 |
          | 接线完整性 | 15% | N% | X/Y 个功能已接入调用链 |
          | UI/UX 操作闭环 | 30% | N% | X/Y 个 UI 功能闭环完整 |
          | 验收标准通过率 | 15% | N% | X/Y 条标准可通过 |
          | Non-Goals 遵守 | 5% | N% | 有/无误实现 |
          | **总分** | **100%** | **N%** | |

          ### 缺失项清单（按优先级排序）
          每个缺失项:
          - **具体描述**: 缺什么（具体到文件/组件/页面）
          - **涉及文件**: 应该在哪个文件中补充
          - **修复方式**: 具体怎么补
          - **优先级**: 高/中/低
          - **预期分值**: 修复后预计提升多少分
        model: pro-max
        tools: ["Bash", "Read", "Grep", "Glob"]
    prompt: |
      你是审查协调者。你有 3 个子代理。

      $vars.workspace_rules

      ## 审查基准
      - 实现计划: $vars.plan_file
      - PRD: $vars.prd_final_file
      - 交付物类型: $vars.impl_type
      - 宿主契约: $vars.host_contract_file ⚠️ 必读，作为一致性判据依据

      ## 工作流
      1. 委派 code-reviewer: "审查代码/YAML 变更，对照 $vars.plan_file"
      2. 委派 security-engineer: "安全审查"（yaml-workflow 类型可跳过）
      3. 委派 product-completeness-assessor: "对照 $vars.requirements_file 评估产品完整度"
      4. **宿主契约一致性检查（新增）**：
         - 读取 $vars.host_contract_file 的 "必须复用的现有资产" 与 "强烈不建议" 清单
         - 扫描本次变更的 git diff，逐项检查：
           - 是否创建了与契约中同名现有组件重复的新组件？
           - 是否绕过了 lib/api.ts 直接 fetch？
           - 是否新建了 packages/？
           - 是否引入了新的 CSS 方案与现有不一致？
           - 是否重写了现有错误中间件/鉴权机制？
         - 每项违反都计为 1 个 BLOCKER，并在 review_issues 里详述 "违反了契约的哪一项"
      5. 汇总报告。以下两类问题计入 review_blockers（会由 review-fix 循环驱动修复）：
         - host_contract_violations（宿主契约违反）
         - product-completeness-assessor 缺失项清单中"接线完整性"维度且优先级为"高"的项

      ## 附加记录
      6. 从 product-completeness-assessor 的评分结果中提取：
         - wiring_issues: 接线完整性维度中得分 <100% 的具体项数量（缺失项清单中属于"接线完整性"维度的条目数）
         - verification_depth: 固定为 "static_only"（review 阶段仅做静态分析，运行时验证由下游 E2E 负责）

      ## 输出
      {"vars_update":{"review_blockers":"<数量，含 host 契约违反 + 接线高优先级项>","review_issues":"<汇总，独立列出 host 契约违反项和接线缺失项>","host_contract_violations":"<仅 host 契约违反数量>","wiring_issues":"<接线完整性缺失项数量>","verification_depth":"static_only","completeness_score":"<0-100>","completeness_passed":"<score == 100>","conclusion":"<2-3句话，必须提及 host 契约一致性结论>"}}

  - id: review-fix
    type: agent
    depends_on: [review]
    timeout: 7200
    context: new
    execute_when: '$vars.review_blockers != "0"'
    prompt: |
      审查发现了 BLOCKER 问题，需要修复。

      $vars.workspace_rules

      ## 审查发现: $vars.review_issues
      ## BLOCKER 数量: $vars.review_blockers

      ## 自循环（最多 3 轮）
      1. 分析根因 → 修复 → pnpm build/test 验证
      2. 仍有 BLOCKER → 继续（最多 3 轮）

      ## 输出
      {"vars_update":{"review_blockers":"<剩余>","conclusion":"<2-3句话>"}}


  # ═══════════════════════════════════════════════════════════════
  # Phase 4-5: E2E — 压缩为 3 节点（e2e-bind + e2e-run + delivery-audit）
  # 合并原 9 节点：case-bind + completeness-bind + setup + real-e2e-ui +
  # completeness-loop + fix-loop + reality-check + reality-merge + teardown + cleanup
  # ═══════════════════════════════════════════════════════════════
  - id: e2e-bind
    type: agent
    depends_on: [review-fix, integrate, implement]
    timeout: 3600
    execute_when: '$inputs.run_e2e == "true"'
    agents:
      api-tester:
        description: "API 测试架构师 — 将抽象验收用例绑定到可执行脚本"
        agent_file: ".claude/agents/testing-api-tester.md"
        model: pro
        tools: ["Read", "Write", "Edit", "Grep", "Glob"]
    prompt: |
      你是 E2E 用例绑定工程师。合并原 e2e-case-bind + completeness-bind。

      ## ⚡ 短路检查
      如果 `$vars.output_dir/e2e-cases.md` 和 `$vars.output_dir/completeness-checklist.md` 都存在，
      直接读取并输出 vars_update，跳过生成。

      $vars.workspace_rules

      ## 输入
      1. 抽象验收用例: $vars.acceptance_cases_file（首选，如空退化到需求推导）
      2. 需求定义: $vars.requirements_file
      3. API 契约: $vars.contract_file（split-code 时必读）
      4. UI 规范: $vars.ui_file
      5. UX 交互: $vars.ux_file
      6. 实现计划: $vars.plan_file

      ## 任务 1: 绑定可执行测试用例
      对每条抽象用例按 evidence_type 绑定：
      | evidence_type | 绑定目标 |
      |---------------|----------|
      | api_response | HTTP method+path+状态码+响应字段断言 |
      | ui_state | 页面ID+selector+UI 状态转换断言 |
      | file_content | 文件路径+内容模式 |
      | cli_output | 命令行+输出模式+退出码 |
      | workflow_execution | YAML 路径+入参+产出验证 |

      ⛔ 禁止标记 N/A，必须重新绑定到兼容的 evidence_type。
      ⛔ 前置过滤：排除 benchmark/performance 类用例。

      输出: `$vars.output_dir/e2e-cases.md`

      ## 任务 2: 生成 completeness-checklist
      从 $vars.requirements_file 提取所有必需 Story，交叉引用 solution/ui/ux/test-cases，
      生成多维度检查清单。每个 Story 生成一个检查项（描述、验收标准、技术规格、UI 组件、测试用例、验证方法）。

      输出: `$vars.output_dir/completeness-checklist.md`

      ## 输出
      {"vars_update":{"e2e_cases_file":"$vars.output_dir/e2e-cases.md","completeness_checklist_file":"$vars.output_dir/completeness-checklist.md","e2e_total":"<总数>","e2e_p0_count":"<P0>","e2e_p1_count":"<P1>","conclusion":"绑定 N 条用例 + M 个 Story 检查项"}}

  - id: e2e-run
    type: loop
    depends_on: [e2e-bind]
    execute_when: '$inputs.run_e2e == "true"'
    max_iterations: 15
    break_when: '$vars.e2e_all_passed == "true" || $iteration >= 15'
    nodes:
      - id: e2e-round
        type: agent
        timeout: 7200
        context: new
        prompt: |
          你是 E2E 测试工程师。第 $iteration 轮（上限 15 轮）。
          合并原 setup + real-e2e-ui + completeness-round + fix-round + teardown。

          $vars.workspace_rules
          $inputs.e2e_project_rules

          ## 当前状态
          - Server: http://localhost:$vars.e2e_server_port（如为空，本轮需启动）
          - Web: http://localhost:$vars.e2e_web_port
          - 项目目录: $vars.e2e_octopus_dir

          ## 本轮任务

          ### A. 环境准备（仅首轮或 Server 未运行时）
          如果 $vars.e2e_server_port 为空或 Server 不可达：
          1. 构建项目：`<按 e2e_project_rules 构建命令>`
          2. 启动隔离服务（隔离端口，不碰保护端口 $inputs.protected_ports）
          3. 健康检查（轮询最多 120 秒）
          4. 记录 server_port、web_port、dev_pid

          ### B. 测试执行（逐 TC 执行）
          1. 读取 `$vars.e2e_cases_file`，提取所有 TC
          2. 按 evidence_type 分发：
             - **api_response**: 用 `curl -v` 执行 HTTP 请求 + 断言响应
             - **ui_state**: 委派 browser-tester 子代理（如有）用 agent-browser 操作 + 截图 + DOM 断言
             - **cli_output**: 执行命令 + 断言输出
             - **file_content**: Read 文件 + 断言内容模式
          3. ⛔ **硬证据规则**：
             - API TC: 必须有 curl 响应文本
             - UI TC: 必须有截图 + DOM 断言
             - CLI TC: 必须有命令输出
             - ⛔ 禁止 "代码看上去应该能用" 类型评分

          ### C. 修复失败用例
          1. 诊断根因：CODE_BUG / FEATURE_NOT_IMPL / ASSERTION_ERROR / PORT_CONFLICT / YAML_ERROR / ENVIRONMENT
          2. 按根因修复 → build → 重启 Server（仅 kill $vars.e2e_dev_pid）→ 重测
          3. ⛔ Server 重启只允许 kill $vars.e2e_dev_pid，禁止广杀

          ### D. 完整度评估
          对照 `$vars.completeness_checklist_file`，逐 Story 打分（硬证据）：
          - 有 TC passed 证据 → 1 分
          - 无证据 → 0 分
          - completeness_score = 得分 Story 数 / 总 Story 数 × 100

          ### E. 退出判定
          - **全部 TC passed + completeness == 100%** → e2e_all_passed = true
          - **连续 3 轮无进展**（score == n1 == n2）→ 退出
          - **均未命中** → 继续下一轮

          ### F. 进度文件（⚠️ 必须使用）
          读取 `$vars.output_dir/e2e-fix-progress.json`（如存在），更新每个 TC 的 status/last_tested_round。
          写回文件后再输出 vars_update。

          ### 发送通知
          ```bash
          octopus notify --ignore-failure \
            --title "🧪 $vars.display_name — [E2E $iteration] 完成" \
            --body "P0: $vars.e2e_p0_passed/$vars.e2e_p0_count | P1: $vars.e2e_p1_passed/$vars.e2e_p1_count\n完整度: <score>% | 全部通过: <true/false>"
          ```

          ## 输出
          {"vars_update":{"e2e_p0_passed":"<通过数>","e2e_p1_passed":"<通过数>","e2e_fix_all_passed":"<true/false>","completeness_score":"<0-100>","completeness_passed":"<true/false>","completeness_score_n1":"<本轮分>","completeness_score_n2":"$vars.completeness_score_n1","e2e_server_port":"<端口>","e2e_web_port":"<端口>","e2e_dev_pid":"<PID>","e2e_octopus_dir":"<目录>","e2e_all_passed":"<true/false>","conclusion":"第 $iteration 轮: <摘要>"}}

  - id: delivery-audit
    type: agent
    depends_on: [e2e-run]
    execute_when: '$inputs.run_e2e == "true"'
    timeout: 1200
    prompt: |
      你是交付审计工程师。合并原 pre-pr-cleanup + delivery-audit + teardown。

      $vars.workspace_rules

      ## 任务 1: 环境清理
      1. 关闭浏览器会话：`agent-browser --session e2e close 2>/dev/null || true`
      2. 删除测试工作空间（yaml-workflow 类型）
      3. 杀临时服务进程（仅 kill $vars.e2e_dev_pid）

      ## 任务 2: PR 前清理
      1. 沙箱泄漏：unstage .e2e-sandbox/
      2. 测试 workflow 污染：隔离到 leaked/
      3. 记录范围越界（scope-leak-report.md）
      4. 记录宿主契约违反（host-contract-violations.md）

      ## 任务 3: 生成交付审计报告
      输出 `$vars.output_dir/delivery-audit.md`，结构：
      ```markdown
      # 交付审计报告

      产品: <PRD 名称> | 生成时间: <ISO> | 工作流: prd-impl

      ## 总体结论
      - 完整度总分: $vars.completeness_score / 100
      - 质量判定: e2e_passed=$vars.e2e_passed
      - 推荐动作: <merge / 继续迭代 / 放弃>

      ## E2E 验收证据
      - P0: $vars.e2e_p0_passed/$vars.e2e_p0_count
      - P1: $vars.e2e_p1_passed/$vars.e2e_p1_count
      - 修复轮数: $vars.e2e_fix_rounds
      - 完整度轮数: $vars.completeness_rounds

      ## 范围一致性
      - OUT-OF-SCOPE 越界: $vars.scope_leak_count

      ## 宿主契约一致性
      - 违反项: $vars.host_contract_violations

      ## 未达项 / 已知问题
      <逐项列出 failed TC 与未实现 Story>
      ```

      ## ready_to_merge 判定规则（仅建议）
      ready_to_merge = "true" 仅在以下同时成立：
      - completeness_score == 100
      - e2e_passed == "true"
      - scope_leak_count == "0"
      - host_contract_violations == "0"

      ## 最终判定
      e2e_passed = (e2e_fix_all_passed == "true") && (completeness_passed == "true")

      ## 输出
      {"vars_update":{"e2e_passed":"<true/false>","audit_file":"$vars.output_dir/delivery-audit.md","ready_to_merge":"<true/false>","scope_leak_count":"<N>","host_contract_violations":"<N>","conclusion":"完整度 $vars.completeness_score% / e2e_passed=<true/false> / ready_to_merge=<true/false>"}}



  # ═══════════════════════════════════════════════════════════════
  # Phase 6: Ship — 始终创建 PR，并附带审计报告
  # ═══════════════════════════════════════════════════════════════
  - id: ship
    type: agent
    depends_on: [delivery-audit]
    timeout: 86400
    prompt: |
      遍历所有项目，提交、推送并创建 PR。
      ⚠️ Always-Deliver 原则：无论完整度是否达 100%，都必须提交 PR。
      资产营造代价很高，不能因为完整度未达就跳过 PR。

      $vars.workspace_rules

      ## 环境
      - 项目: $vars.projects
      - 分支: $vars.branch
      - 目标: $inputs.base_branch
      - 完整度: $vars.completeness_score%
      - ready_to_merge: $vars.ready_to_merge（仅建议）

      ## ⚠️ PR 标题和描述质量要求（强制）

      **标题必须体现功能名称**，不能用泛化的 "PRD implementation"。

      ### 功能名称提取
      1. 读取 `$vars.prd_final_file` 前 10 行，提取 PRD 标题或产品名称
      2. 或从 `$inputs.prd_dir` 的目录名提取（去掉 prd- 前缀和序号）
      3. 或从 `$vars.display_name` 提取
      4. 选最短最有辨识度的作为 `<功能名>`

      ### PR 标题格式
      ```
      feat(<scope>): <功能名> — <一句话功能描述>
      ```
      - `<scope>` 从交付物类型推导：impl_type=split-code 用 "fullstack"，monolith-code 用 "backend"，yaml-workflow 用 "workflow"
      - `<功能名>` 必须是具体功能（如 "MOA Swarm Mode"、"用户认证系统"）
      - `<一句话功能描述>` 从 PRD 执行摘要或 solution_file 概述提取，10-20 字
      - ⛔ 禁止 "PRD implementation"、"实现 PRD" 等泛化用语
      - ⛔ 标题不超过 72 字符

      ### PR 标题示例
      ✅ feat(fullstack): MOA Swarm Mode — 多智能体混合协作引擎
      ✅ feat(backend): 用户权限系统 — RBAC + OAuth2 集成
      ❌ feat: PRD implementation (完整度 88%)
      ❌ feat: implement PRD prd-001

      ### PR Body 结构（⚠️ 不是审计报告原文转储）

      PR 描述必须有上下文，让 reviewer 不读 PRD 也能理解这个 PR 做了什么。
      按以下结构生成 PR Body：

      ```markdown
      ## 🎯 功能概述
      <2-3 句话：这个 PRD 要实现什么？解决什么问题？核心价值是什么？>
      <从 PRD 执行摘要或 requirements_file 的用户画像/故事中提取>

      ## 🏗️ 实现内容
      <从 git log --oneline 的 commit 列表中总结主要交付物>
      - **后端**: <主要模块/功能>
      - **前端**: <主要页面/组件>（如有）
      - **测试**: <测试覆盖情况>

      ## 📊 完成状态
      - 完整度: <score>% (<通过维度数>/<总维度数>)
      - E2E: <passed/failed> (P0: <passed>/<total>, P1: <passed>/<total>)
      - 修复轮数: <N>

      {{#if 有未完成项}}
      ## ⚠️ 已知未完成项
      <从 delivery-audit.md 的"未达项"章节提取，每项说明：>
      - <具体缺什么> — <原因/状态>
      {{/if}}

      <details>
      <summary>📋 完整审计报告</summary>

      <粘贴 delivery-audit.md 全文>

      </details>
      ```

      ### PR Body 写作规则
      - **功能概述必须有人话**：让不了解 PRD 的人看懂这是什么功能
      - **完成状态要诚实**：score < 100% 就写 < 100%，不要写 "100%" 然后下面又列缺失项
      - **审计报告折叠**：用 `<details>` 标签包裹，不占据 PR 正文主体
      - **未完成项要具体**：不能只写 "部分 E2E 未验证"，要写清楚具体缺什么

      ## 对每个有变更的项目

      1. **进入项目目录**: cd projects/<项目名>
      2. **检查变更**: git status --porcelain（无变更 → 跳过）
      3. **提取功能名称**: 从 PRD 文件或 display_name 提取
      4. **提交**:
         ```bash
         git add -A
         git commit -m "feat(<scope>): <功能名> — <描述> (完整度 $vars.completeness_score%)"
         ```
      5. **推送**: git push -u origin $vars.branch
      6. **创建或更新 PR**:
         - 检查是否已有 PR: `EXISTING_PR=$(gh pr list --head "$vars.branch" --json url --jq '.[0].url' 2>/dev/null)`
         - **按上面 PR Body 结构生成描述**（不是 cat delivery-audit.md）
         - **创建**：
           ```bash
           if [ -n "$EXISTING_PR" ]; then
             gh pr comment "$EXISTING_PR" --body "$PR_BODY"
             gh pr edit "$EXISTING_PR" --title "$PR_TITLE"
             PR_URL="$EXISTING_PR"
           else
             PR_URL=$(gh pr create \
               --title "$PR_TITLE" \
               --body "$PR_BODY" \
               --base "$inputs.base_branch")
           fi
           ```
      7. **收集 PR URL**

      ## ⛔ 绝对不能做的事
      - 不要因为 completeness_score < 100 跳过 PR 创建
      - 不要因为 ready_to_merge=false 跳过 PR
      - 不要用 "PRD implementation" 作为 PR 标题
      - 不要把 delivery-audit.md 原文直接作为 PR Body 主体（必须折叠到 details 标签内）
      - 不要在 PR Body 中省略功能概述（reviewer 需要知道这是什么功能）

      ## 输出
      {"vars_update":{"pr_urls":"<JSON Map>","pr_count":"<数量>","conclusion":"创建/更新 N 个 PR: <PR 标题>"}}

  - id: done
    type: bash
    depends_on: [ship]
    timeout: 10
    bash: |
      echo "=== PRD Impl Flow 完成 ==="
      echo "类型: $vars.impl_type | PRs: $vars.pr_count | 完整度: $vars.completeness_score% | E2E: $vars.e2e_passed"
      echo "审计报告: $vars.audit_file"
      echo "ready_to_merge: $vars.ready_to_merge（仅作为人工判断建议，不表示工作流失败）"

      # Always-Deliver：不再写 __status=failed。
      # PR 已创建即表示工作流完成交付即使完整度低。
      # 未达 100% 时画由用户基于审计报告决定后续动作（merge / 迭代 / 放弃）。
      # 如仍需"低完整度"通知，由 hook 根据 ready_to_merge=false 发送"建议人工查看"通知。
      if [ "$vars.ready_to_merge" != "true" ] && [ "$inputs.run_e2e" = "true" ]; then
        REASON="完整度未达 100% 但 PR 已交付｜E2E: $vars.e2e_summary｜完整度: $vars.completeness_score% (退出 $vars.completeness_exit_code)｜必需: $vars.completeness_must_have_score%｜修复: $vars.e2e_fix_rounds 轮｜完整度: $vars.completeness_rounds/$inputs.completeness_max_rounds 轮"
        echo "⚠️ $REASON"
        printf '{"vars_update":{"failed_reason":"%s"}}\n' "$REASON"
      fi
