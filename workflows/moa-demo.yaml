name: moa-demo
description: MOA mode demo — 3 experts + aggregator with 1 refinement round
nodes:
  moa-analysis:
    type: swarm
    topic: "Review this codebase for security, performance, and maintainability"
    mode: moa
    rounds: 1
    experts:
      - role: security-reviewer
        prompt: "Analyze security vulnerabilities and provide recommendations"
        model: pro-max
      - role: performance-engineer
        prompt: "Analyze performance bottlenecks and optimization opportunities"
        model: pro
      - role: maintainability-reviewer
        prompt: "Analyze code quality, patterns, and maintainability concerns"
        model: pro
    aggregator:
      role: tech-lead
      prompt: "Synthesize the expert reviews into a unified action plan, prioritizing by impact"
      model: pro-max
