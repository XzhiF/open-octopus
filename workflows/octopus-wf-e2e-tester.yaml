# yaml-language-server: $schema=./workflow-schema.json
apiVersion: octopus/v1
kind: Workflow
name: octopus-wf-e2e-tester
description: >
  通用 E2E 工作流链测试器（Prompt 模式）。
  在 isolated Octopus 环境中创建新工作空间，运行任意目标工作流链（execution tree），
  监控执行直到全部完成。失败时自主诊断根因、修复代码/YAML、重建重测，迭代直到通过。
  环境损坏时支持废弃工作空间并重建新环境。
  编排策略: prompt + agents 子代理，精细控制每一步。

model: pro-max
engine: claude
execution_mode: serial
timeout: 86400

inputs:
  target_workflows:
    description: >
      目标工作流。支持两种格式:
      1) 工作流名称，多个逗号分隔:
         "octopus-dev-flow,octopus-pr-review-fix-flow"
         Agent 从当前工作空间的 config.json 找到 octopus 项目的 worktree_path，
         然后在 {worktree_path}/packages/core-pack/workflows/ 中查找对应 YAML
      2) JSON 数组（向后兼容）:
         [{"ref":"octopus-dev-flow","inputs":{"requirement":"xxx"}}]
      第一个为 root execution，后续为 children。
      Agent 会自动分析每个工作流的 inputs 定义，结合 test_requirement 智能生成输入值。
    required: true
  test_requirement:
    description: >
      测试目标描述（自然语言）。优先级高于 target_workflows 中指定的 inputs。
      Agent 会基于此描述 + 工作流 inputs 定义 + 环境信息，智能生成每个工作流的输入。
      留空时 Agent 基于工作流描述自行推断。
    required: false
    default: ""
  org:
    description: "组织名。留空时从当前工作空间自动推断。"
    required: false
    default: ""
  repos:
    description: "项目 repos JSON 数组。留空时从工作空间 config.json 自动推断。"
    required: false
    default: ""
  workspace_name:
    description: "测试工作空间名。留空时 Agent 按前缀+序号自动生成（如 e2e-test-001）。"
    required: false
    default: ""
  protected_ports:
    description: "不可杀死的端口（逗号分隔）"
    required: false
    default: "3000,3001,3098,3099"
  max_fix_rounds:
    description: "最大修复-重测轮数"
    required: false
    default: "5"
  max_workspace_rebuilds:
    description: "最大工作空间重建次数"
    required: false
    default: "2"
  keep_on_failure:
    description: "测试失败时保留环境供手动检查"
    required: false
    default: "true"

variables:
  # ── 前 20 位（Goal Mode 可见，变量名按字母排序后取前 20）──
  all_passed: "false"
  build_ok: "false"
  conclusion: ""
  evidence_snapshot: ""
  failed_details: ""
  fix_log: ""
  notify_target: "telegram:xzf_hermes"
  per_execution_status: ""
  rebuild_count: "0"
  rebuild_log: ""
  root_execution_id: ""
  server_pid: ""
  server_port: ""
  tested_execution_ids: ""
  total_rounds: "0"
  verification_details: ""
  verification_status: ""
  web_port: ""
  workspace_id: ""
  display_name: ""
  # ── 20 位之后（仅 Prompt Mode 可见）──
  resolved_workspace_name: ""
  resolved_org: ""
  resolved_repos: ""
  resolved_inputs: ""
  pr_url: ""
  ship_summary: ""
  last_diagnosis: ""
  max_workspace_rebuilds_val: ""

auto_answers:
  - pattern: ".*"
    answer: "proceed"

# ── Notify 子系统配置 ──
providers:
  hermes-cli:
    type: hermes
    timeout: 30
    min_severity: info

channels:
  default:
    provider: hermes-cli
    target: "telegram:xzf_hermes"

hooks:
  # ① 工作流失败 — 节点执行错误导致终止
  on_workflow_failure:
    - id: notify-failure
      type: notify
      channel: default
      template:
        severity: error
        title: "❌ $vars.display_name (Prompt) — 工作流失败"
        body: "🆔 Workspace: ${vars.resolved_workspace_name | default:${vars.workspace_id | default:unknown}}\n🔴 失败节点: ${hook.failed_node_id | default:unknown}\n⏱️ 已运行: ${hook.total_duration_ms | duration}\n📊 修复轮数: ${vars.total_rounds | default:0} | 重建次数: ${vars.rebuild_count | default:0}\n\n💡 *错误信息*:\n${hook.error | default:Unknown error}"

  # ② 服务中断 — 保留 bash（引擎未触发此事件）
  on_interrupt:
    - id: notify-interrupt
      type: bash
      timeout: 30
      bash: |
        DISPLAY="${vars.display_name:-Octopus E2E Tester}"
        WORKSPACE="${vars.resolved_workspace_name:-${vars.workspace_id:-unknown}}"
        WEB_URL=""
        [ -n "$vars.workspace_id" ] && [ -n "$vars.web_port" ] && WEB_URL="http://localhost:$vars.web_port/workspaces/$vars.workspace_id"

        hermes send -t "${vars.notify_target:-telegram:xzf_hermes}" -q "⚠️ ${DISPLAY} (Prompt) — 工作流被中断
        🆔 Workspace: ${WORKSPACE}
        🔧 原因: ${hook.interrupt_reason:-unknown}
        📊 修复轮数: ${vars.total_rounds:-0}
        ${WEB_URL:+🔗 ${WEB_URL}}" 2>&1 || echo "WARN: hermes send failed"

  # ③ 用户取消 — 保留 bash（引擎未触发此事件）
  on_cancel:
    - id: notify-cancel
      type: bash
      timeout: 30
      bash: |
        DISPLAY="${vars.display_name:-Octopus E2E Tester}"
        WORKSPACE="${vars.resolved_workspace_name:-${vars.workspace_id:-unknown}}"

        hermes send -t "${vars.notify_target:-telegram:xzf_hermes}" -q "🛑 ${DISPLAY} (Prompt) — 工作流已取消
        🆔 Workspace: ${WORKSPACE}
        📊 修复轮数: ${vars.total_rounds:-0}" 2>&1 || echo "WARN: hermes send failed"

  # ④ 工作流完成（无论成功/失败）— 使用 octopus notify
  on_complete:
    - id: notify-complete
      type: bash
      timeout: 30
      bash: |
        DISPLAY="${vars.display_name:-Octopus E2E Tester}"
        WORKSPACE="${vars.resolved_workspace_name:-${vars.workspace_id:-unknown}}"
        STATUS_ICON="✅"
        [ "$vars.all_passed" != "true" ] && STATUS_ICON="❌"
        PR_INFO=""
        [ -n "$vars.pr_url" ] && PR_INFO="🔗 PR: $vars.pr_url"
        WEB_URL=""
        [ -n "$vars.workspace_id" ] && [ -n "$vars.web_port" ] && [ -n "$vars.root_execution_id" ] && WEB_URL="http://localhost:$vars.web_port/workspaces/$vars.workspace_id?tab=detail&execId=$vars.root_execution_id"

        octopus notify --ignore-failure \
          --title "${STATUS_ICON} ${DISPLAY} (Prompt) — 测试完成" \
          --body "🆔 Workspace: ${WORKSPACE}
        📊 修复轮数: ${vars.total_rounds:-0} | 重建次数: ${vars.rebuild_count:-0}
        🔍 验证: ${vars.verification_status:-unknown}
        ${PR_INFO}
        ${WEB_URL:+🔗 ${WEB_URL}}

        💡 *结论*:
        ${vars.conclusion:-无}"

  # ⑤ 节点级通知 — 使用新 notify 特性
  on_node_success:
    # Setup 完成
    - id: notify-setup
      type: notify
      nodes: [setup-env]
      channel: default
      template:
        severity: info
        title: "🚀 $vars.display_name (Prompt) 启动"
        body: "🖥️ Server: http://localhost:$vars.server_port\n🌐 Web: http://localhost:$vars.web_port\n📦 构建: $vars.build_ok\n🔒 保护端口: $inputs.protected_ports\n📋 目标工作流: $inputs.target_workflows\n🎯 测试需求: ${inputs.test_requirement | default:(自动推断)}"

    # Final Verify 完成
    - id: notify-final-verify
      type: notify
      nodes: [final-verify]
      channel: default
      template:
        severity: info
        title: "🔍 $vars.display_name — 证据验证: $vars.verification_status"
        body: "📋 $vars.verification_details"

nodes:
  # ═══════════════════════════════════════════════════════════════
  # Phase 0: Setup Environment — 构建 + 启动 isolated server + 安装依赖
  # ═══════════════════════════════════════════════════════════════
  - id: setup-env
    type: agent
    timeout: 900
    context: new
    skills: [verification-before-completion]
    goal: |
      在当前工作空间中完成以下环境搭建。
      **重要**: 首先保存工作空间根目录路径，后续所有安装操作必须在此目录下。

      ```bash
      WORKSPACE_ROOT="$(pwd)"
      ```

      ## 1. 安装 superpowers-zh 技能（必须首先执行，安装到工作空间根目录）
      ```bash
      cd "$WORKSPACE_ROOT"
      echo "Installing superpowers-zh skills..."
      npx superpowers-zh@latest --tool claude --force 2>&1 | head -5
      ```

      ## 2. 安装 agency-agents-zh 代理（安装到工作空间根目录的 .claude/agents/）
      ```bash
      cd "$WORKSPACE_ROOT"
      AGENTS_TARGET="$WORKSPACE_ROOT/.claude/agents"
      mkdir -p "$AGENTS_TARGET"

      NEED_CLONE=false
      for agent in engineering-software-architect testing-reality-checker testing-evidence-collector; do
        if [ ! -f "$AGENTS_TARGET/$agent.md" ]; then
          NEED_CLONE=true
          break
        fi
      done

      if [ "$NEED_CLONE" = "true" ]; then
        echo "Cloning agency-agents-zh..."
        DEPS_DIR="$WORKSPACE_ROOT/dependencies"
        mkdir -p "$DEPS_DIR"

        if [ ! -d "$DEPS_DIR/agency-agents-zh" ]; then
          git clone --depth 1 https://github.com/jnMetaCode/agency-agents-zh.git "$DEPS_DIR/agency-agents-zh" 2>&1
        fi

        REPO="$DEPS_DIR/agency-agents-zh"

        echo "Installing selected agents..."
        for f in code-reviewer software-architect; do
          [ -f "$REPO/engineering/engineering-$f.md" ] && cp "$REPO/engineering/engineering-$f.md" "$AGENTS_TARGET/"
        done

        for f in reality-checker evidence-collector api-tester; do
          [ -f "$REPO/testing/testing-$f.md" ] && cp "$REPO/testing/testing-$f.md" "$AGENTS_TARGET/"
        done

        INSTALLED=$(ls "$AGENTS_TARGET"/engineering-*.md "$AGENTS_TARGET"/testing-*.md 2>/dev/null | wc -l)
        echo "Installed $INSTALLED agency agents to $AGENTS_TARGET"
      fi
      ```

      ## 3. 构建项目
      进入 octopus 项目目录执行:
      ```bash
      cd projects/<octopus_worktree_dir>
      pnpm install
      pnpm build
      ```
      如果构建失败，分析错误并修复后重试（最多2轮）。

      ## 4. 启动 isolated Octopus server + web-app
      ```bash
      cd "$WORKSPACE_ROOT/projects/<octopus_worktree_dir>"
      pnpm dev > /tmp/octopus-dev.log 2>&1 &
      DEV_PID=$!
      echo "pnpm dev PID: $DEV_PID"
      ```

      ## 5. 验证端口（关键步骤！）
      pnpm dev 会启动 server 和 web-app，端口由 dev.mjs 自动分配（isolated 模式下为 hash 端口）。
      **必须从实际运行进程获取端口，不要猜测！**

      ```bash
      # 等待启动
      sleep 10

      # 从日志中找到实际端口
      grep -oP 'server=\K[0-9]+' /tmp/octopus-dev.log || grep 'server:' /tmp/octopus-dev.log
      grep -oP 'web:\s+\K[0-9]+' /tmp/octopus-dev.log || grep 'web:' /tmp/octopus-dev.log

      # 如果日志格式不清晰，从进程命令行获取:
      # wmic process where "commandline like '%next dev%'" get commandline
      # 或: ps aux | grep "next dev"

      # 验证 server 健康检查
      curl -s http://localhost:<server_port>/api/health  # 必须返回 200

      # 验证 web-app 可访问（web_port 通常是 server_port + 1）
      curl -s -o /dev/null -w "%{http_code}" http://localhost:<web_port>/  # 必须返回 200
      ```

      **报告端口前必须确保两个 HTTP 验证都通过！** 如果验证失败，重新检测端口。

      ## 6. 计算 display_name（必须非空）
      优先使用 $vars.execution_name，其次 $vars.workflow_name，兜底 "Octopus E2E Tester"

      ## 输出
      在回复末尾直接输出 JSON（不要用 ```json 包裹，直接输出纯 JSON 行）:
      {"vars_update":{"server_port":"<端口>","web_port":"<端口>","server_pid":"<PID>","build_ok":"true","display_name":"<非空名称>"}}
    constraints:
      - "绝不能杀死端口 $inputs.protected_ports"
      - "pnpm build 失败时先诊断根因再修复"
      - "必须验证健康检查返回200才算启动成功"
      - "必须同时验证 server_port 和 web_port 都可通过 HTTP 访问"
      - "报告的端口必须是实际捕获并验证的端口，不能猜测"
      - "必须安装 superpowers-zh: npx superpowers-zh@latest --tool claude --force"
      - "必须 clone agency-agents-zh 并复制 agent 文件到 .claude/agents/"
    planning:
      tools: [Bash, Read, Grep, Glob]
      verify: true

  # ═══════════════════════════════════════════════════════════════
  # Phase 1: Orchestrator — 工作空间管理 + 启动 + 监控 + 诊断修复
  # ═══════════════════════════════════════════════════════════════
  - id: orchestrator
    type: agent
    depends_on: [setup-env]
    timeout: 86400
    context: new
    skills: [systematic-debugging, verification-before-completion, dispatching-parallel-agents]
    agents:
      workspace-manager:
        description: "工作空间管理员 — 校验环境、创建工作空间、验证项目完整性、拷贝工作流、创建执行树、按需清理重建"
        prompt: |
          ## 工作空间管理任务

          严格按以下步骤执行。**每步必须验证成功后才能进入下一步。任何步骤失败必须报错停止，不要跳过。**

          ### Step 1: 校验当前环境
          ```bash
          ls projects/ | grep -i octopus
          cat config.json
          cd <worktree_path> && git status && git log --oneline -1
          ```
          **门控**: octopus 项目不存在或 git 无效 → 报错停止。

          ### Step 2: 解析 target_workflows
          **格式 A** — 逗号分隔的工作流名称:
          从 config.json 找 octopus worktree_path，在 `{worktree_path}/packages/core-pack/workflows/` 查找:
          - 验证每个文件存在: `ls <path>/<name>.yaml`
          - 读取 YAML 提取 `name:` 和 `inputs:` 定义
          **格式 B** — JSON 数组: 直接使用。
          **门控**: 任一工作流 YAML 不存在 → 报错停止。

          ### Step 3: 智能推断参数
          - test_requirement 优先级最高（覆盖 org/repos/workspace_name）
          - org 空 → ~/.octopus/ 或 config.json
          - repos 空 → config.json 或 repos/index.md
          - workspace_name 空 → "e2e-test-" 前缀+序号

          ### Step 4: 清理旧环境（仅重建场景）
          如果是重建（有旧 workspace_id）:
          ```bash
          # 查找旧工作空间占用的端口和进程
          # 杀死旧 server/web-app 进程（不杀 protected_ports!）
          # DELETE /api/workspaces/<old_id>
          ```
          **门控**: 旧进程未清理 → 不创建新工作空间。

          ### Step 5: 创建新工作空间（或检测已有）
          **先检查是否已有同名或同用途的工作空间**:
          ```bash
          # 查询所有工作空间
          curl -s http://localhost:<port>/api/workspaces | jq '.[] | select(.name | startswith("e2e-test-"))'
          ```
          - 如果已有工作空间且状态正常 → **直接复用，不创建新的，返回已有 workspace_id**
          - 如果没有 → POST /api/workspaces 创建新的
          **验证**: `GET /api/workspaces/<id>` 必须返回 200。

          ### Step 6: 验证新工作空间项目完整性（关键！）
          ```bash
          WS_PATH=$(curl -s http://localhost:<port>/api/workspaces/<id> | jq -r .path)
          ls "$WS_PATH/projects/"
          for dir in "$WS_PATH/projects/"/*/; do
            git -C "$dir" status
            git -C "$dir" log -1
          done
          ls "$WS_PATH/projects/" | grep -i octopus
          ls "<octopus_worktree>/packages/core-pack/workflows/"
          ```
          **门控**: 任一 worktree 无效 / 缺少 octopus 项目 → 报错停止，不继续。

          ### Step 7: 拷贝目标工作流
          ```bash
          cp <yaml_path> <新workspace>/workflows/
          ls <新workspace>/workflows/
          ```

          ### Step 8: 生成 input_values 并创建执行树
          - test_requirement 非空 → 优先用它语义生成
          - 否则分析 inputs 定义 + 环境生成
          - 创建 root + children execution
          **验证**: `GET /api/workspaces/<id>/executions/tree` 确认完整。

          ## 输出
          在回复末尾直接输出纯 JSON 行（不要用代码块包裹）:
          {"vars_update":{"workspace_id":"<ID>","root_execution_id":"<ID>","resolved_workspace_name":"<名称>","resolved_org":"<org>","resolved_repos":"<repos>","resolved_inputs":"<摘要>"}}
        model: pro
        tools: [Bash, Read, Write, Grep, Glob]

      diagnostician:
        description: "深度诊断分析员 — 分析失败 execution 的完整日志，定位根因并给出修复方案"
        agent_file: ".claude/agents/engineering-software-architect.md"
        prompt: |
          ## 诊断任务
          分析 execution 失败原因。

          1. GET /api/workspaces/<workspace_id>/executions/<id> 获取详情
          2. 对每个 failed 节点，提取错误信息
          3. 判断根因类型:
             YAML_ERROR / REF_RESOLVE_ERROR / ENGINE_BUG / AGENT_TIMEOUT /
             PORT_CONFLICT / ENVIRONMENT_CORRUPT / WORKSPACE_CONFIG_ERROR / OTHER
          4. 给出具体修复方案（改哪个文件、改什么内容）
          5. 判断是否需要 workspace 重建（ENVIRONMENT_CORRUPT / WORKSPACE_CONFIG_ERROR）

          ## 输出
          ```json
          {"root_cause":"<类型>","details":"<描述>","fix_plan":"<修复方案>","needs_workspace_rebuild":"<true/false>"}
          ```
        model: pro
        tools: [Bash, Read, Grep, Glob]

      evidence-collector:
        description: "证据收集者 — 确保每个 execution 的执行有实质日志/token/时间等证据支撑"
        agent_file: ".claude/agents/testing-evidence-collector.md"
        prompt: |
          ## 证据收集任务
          收集所有 execution 的执行证据链:
          - 每个 execution 的 durationMs（< 5 秒 = 可疑）
          - 每个 agent 节点的 token 使用量（0 tokens = 未真实执行）
          - 每个 bash 节点的 exit code 和日志内容
          - node_executions 表中的实际输出

          ## 输出
          ```json
          {"evidence":[{execution_id, node_id, type, duration, tokens, has_real_output}]}
          ```
        model: pro
        tools: [Bash, Read, Grep]

      reality-checker:
        description: "现实检验者 — 验证 execution 真实执行。默认 NEEDS WORK，要求压倒性证据"
        agent_file: ".claude/agents/testing-reality-checker.md"
        prompt: |
          ## 验收任务
          基于 evidence-collector 收集的证据，判定目标工作流是否真实执行。

          默认判定: NEEDS WORK
          只有在压倒性证据下才判定 PASSED。

          自动失败触发:
          - execution 时长 < 5 秒
          - agent 节点 0 token 使用
          - bash 节点无日志输出
          - "全部通过"但无实质证据

          输出判定: PASSED / NEEDS WORK / FAILED
        model: pro-max
        tools: [Bash, Read, Grep]

      shipper:
        description: "提交推送员 — 将 octopus 项目中的修复提交并创建 PR"
        prompt: |
          ## Ship 任务

          将 octopus 项目中的修复代码提交、推送并创建 Pull Request。

          ### 步骤 1：检查是否有变更
          ```bash
          cd projects/<octopus_worktree_dir>
          git status --porcelain
          ```
          如果没有变更，输出 `{"vars_update":{"pr_url":"","ship_summary":"无代码变更，跳过 ship"}}` 并结束。

          ### 步骤 2：提交更改
          ```bash
          git add -A
          git commit -m "fix: e2e-tester auto-fix from workflow testing"
          ```

          ### 步骤 3：推送分支
          ```bash
          git push -u origin HEAD
          ```
          失败时重试最多 2 次（non-fast-forward 时先 pull --rebase）。

          ### 步骤 4：创建 PR
          ```bash
          PR_URL=$(gh pr create \
            --base "main" \
            --title "fix: e2e-tester 自动修复" \
            --body "## 修复内容\n<fix_log 摘要>\n\n## 测试情况\n- E2E 测试通过\n- 反假跑验证通过\n\n## 修复轮数\n<total_rounds>" \
            2>&1)
          echo "$PR_URL"
          ```

          ## 关键规则
          - 无人值守模式
          - gh pr create 失败时重试最多 2 次
          - 如果已有 PR（gh pr list --head <branch> 非空），获取已有 PR URL 而非重复创建

          ## 输出
          直接输出纯 JSON 行:
          {"vars_update":{"pr_url":"<PR URL>","ship_summary":"<总结>"}}
        model: pro
        tools: [Bash, Read, Grep]
    prompt: |
      你是工作流 E2E 测试 Orchestrator。你的职责是管理测试工作空间、运行目标工作流链、
      监控执行、诊断修复、验证真实性，全程通过 octopus notify 发送进度通知。

      ## 环境
      - Server: http://localhost:$vars.server_port
      - Web: http://localhost:$vars.web_port
      - 受保护端口: $inputs.protected_ports
      - 最大修复轮数: $inputs.max_fix_rounds
      - 最大 workspace 重建次数: $inputs.max_workspace_rebuilds

      ## 输入参数
      - target_workflows: `$inputs.target_workflows`
      - test_requirement: `$inputs.test_requirement`（**最高优先级**，覆盖所有其他输入的推断）
      - org: `$inputs.org`（空 = 自动推断，test_requirement 优先）
      - repos: `$inputs.repos`（空 = 自动推断，test_requirement 优先）
      - workspace_name: `$inputs.workspace_name`（空 = 自动生成，test_requirement 优先）

      ## 关键路径说明
      - octopus 项目的实际目录名**不是固定的**，从 config.json 的 `repos[].name == "octopus"` 取 `worktree_path`
      - 工作流 YAML 位置: `{worktree_path}/packages/core-pack/workflows/<name>.yaml`
      - 修复代码位置: `{worktree_path}/` 下对应的源码目录

      ## 你有 5 个子代理（通过 Agent 工具调用）
      - **workspace-manager**: 校验环境、创建/重建工作空间、验证项目完整性、拷贝工作流、创建执行树
      - **diagnostician**: 深度根因分析（7 种根因类型）
      - **evidence-collector**: 证据链收集
      - **reality-checker**: 反假跑验证
      - **shipper**: 提交修复代码并创建 PR

      ## ⛔ 强制规则
      1. 禁止跳过/模拟任何执行步骤
      2. 必须通过 API 获取真实 execution 状态
      3. 所有结论必须有证据支撑
      4. reality-checker 默认 NEEDS WORK
      5. 绝不能杀 $inputs.protected_ports 端口
      6. 修复代码在 config.json 中 octopus 项目的 worktree_path 目录操作
      7. 子代理调用失败时，分析错误并重试（最多 2 次），不要直接放弃
      8. **每个 Bash 命令必须在 120 秒内完成** — 引擎有 300 秒 idle timeout，Bash 执行期间无 LLM 事件，sleep > 120s 会导致 idle timeout abort

      ## ⛔ 反重复规则（极其重要！）
      1. **禁止使用 TodoWrite、Write 创建计划文件或任务列表** — 你不是在规划，你是在执行
      2. **严格按 Step 1→2→3→4→5→6 顺序线性执行，完成一步后永远不回头重做**
      3. **每个 Step 只执行一次**（Step 4 的修复循环除外）
      4. 如果 workspace_id 已有值且 workspace 正常运行，**不要再次调用 workspace-manager**
      5. 如果 execution 已在运行，**不要再次 start**，直接进入监控
      6. **通知每种类型只发一次**：📦工作空间创建、▶️执行树启动 各只发一次，不要重复发送
      7. 如果你发现自己想"重新开始"或"重新确认"已完成的步骤 — **停下来，直接进入下一步**

      ## ⛔ 自修正机制
      **子代理调用失败处理**:
      - workspace-manager 失败 → 分析错误信息，修正参数后重试（最多 2 次）
      - diagnostician 失败 → 直接用 API 获取 execution 错误信息自行分析
      - 任何子代理超时 → 缩短 prompt 范围后重试

      **计数跟踪**（必须在每轮结束时更新）:
      - current_fix_round: 当前修复轮数（从 0 开始，每轮 +1）
      - current_rebuild_count: 当前重建次数（从 0 开始，每次重建 +1）
      - 当 current_fix_round >= max_fix_rounds 时，停止修复，all_passed=false
      - 当 current_rebuild_count >= max_workspace_rebuilds 时，停止重建，标记 ENVIRONMENT_CORRUPT 无法恢复

      ## ⛔ 通知规则
      **每完成一个大步骤，必须通过 Bash 发送通知**:
      ```bash
      octopus notify --ignore-failure --title "<emoji> <标题>" --body "<详情>"
      ```
      通知时机:
      - Step 1 完成后: 📦 工作空间已创建（含 workspace ID、名称、org、**Web UI 访问链接**）
      - Step 1 失败重试时: ⚠️ 工作空间创建失败，正在重试（含错误信息）
      - Step 2 完成后: ▶️ 执行树已启动（含 execution IDs、**Web UI 访问链接**）
      - Step 3 每轮监控完成: 📊 监控状态（含各 execution 状态）
      - Step 4 每轮修复完成: 🔧 修复结果（含修复文件、根因、当前轮数/最大轮数）
      - Step 4 触发重建时: 🔄 工作空间重建（含原因、old→new ID、**新 Web UI 链接**、当前重建次数/最大次数）
      - Step 5 完成后: 🔍 反假跑验证结果
      - Step 6 完成后: 🚀 Ship 结果（含 PR URL）

      **Web UI 链接格式**（所有涉及工作空间的通知都要包含）:
      ```
      🔗 查看: http://localhost:$vars.web_port/workspaces/{workspace_id}?tab=detail&execId={root_execution_id}
      ```

      ## 自循环工作流

      ### Step 1: 创建工作空间（委派 workspace-manager，最多重试 2 次）
      **前置检查**: 如果 $vars.workspace_id 已有值，先验证该 workspace 是否仍在运行:
      ```bash
      curl -s http://localhost:$vars.server_port/api/workspaces/$vars.workspace_id
      ```
      - 如果返回 200 且 workspace 正常 → **跳过 Step 1，直接进入 Step 2**
      - 如果返回 404 或异常 → 继续执行 Step 1

      1. 委派 workspace-manager，传入完整参数:
         `Agent(subagent_type="workspace-manager", prompt="...target_workflows: $inputs.target_workflows, test_requirement: $inputs.test_requirement, org: $inputs.org, repos: $inputs.repos, workspace_name: $inputs.workspace_name, server_port: $vars.server_port...")`
      2. 检查 workspace-manager 返回结果:
         - 成功 → 记录 workspace_id, root_execution_id → **发送通知** → 进入 Step 2
         - 失败 → 分析错误 → 修正参数 → 重试（最多 2 次）
         - 2 次重试都失败 → all_passed=false，输出失败信息，结束

      ### Step 2: 启动执行树（失败重试 2 次）
      **前置检查**: 先检查 execution 当前状态:
      ```bash
      curl -s http://localhost:$vars.server_port/api/workspaces/$vars.workspace_id/executions/tree
      ```
      - 如果 root execution 已是 running/completed → **跳过 start，直接进入 Step 3 监控**
      - 如果是 pending → 继续执行 start

      1. POST /api/workspaces/$vars.workspace_id/executions/$vars.root_execution_id/start
      2. 等待 30 秒让 chain engine 自动启动 children
      3. GET /api/workspaces/$vars.workspace_id/executions/tree 检查状态
      4. 如果有 children 仍为 pending，逐个 POST /start
      5. 如果 start API 返回错误 → 等 10 秒后重试（最多 2 次）
      6. **发送通知**（含 execution IDs + Web UI 链接）

      ### Step 3: 监控执行树
      **⚠️ 关键限制: 每个 Bash 命令必须在 120 秒内完成！绝不能用 sleep 超过 120 秒！**
      引擎有 300 秒 idle timeout，超过 300 秒无 LLM 事件会强制中止。Bash 执行期间不产生 LLM 事件。

      轮询方式（必须严格遵守）:
      ```bash
      # 每次循环: sleep 60s + curl 检查（总计 < 120s）
      for i in $(seq 1 360); do
        sleep 60
        STATUS=$(curl -s http://localhost:$vars.server_port/api/workspaces/$vars.workspace_id/executions/tree | jq -r '.[].status' | sort -u)
        echo "[$i] Statuses: $STATUS"
        # 如果全部到达终态，退出循环
        echo "$STATUS" | grep -qvE "^(running|pending)$" || continue
        break
      done
      ```
      - sleep 间隔: **60 秒**（绝不超过 120 秒）
      - 总超时: 6 小时 (360 次循环 × 60 秒)
      - 所有 execution 到达终态 → 退出循环
      - **发送通知**（各 execution 状态摘要 + Web UI 链接）

      ### Step 4: 诊断修复（循环，最多 max_fix_rounds 轮）
      **前置检查**: 如果有 failed execution 且 current_fix_round < max_fix_rounds:

      1. current_fix_round++
      2. 对每个 failed execution:
         a. 委派 **diagnostician**:
            `Agent(subagent_type="diagnostician", prompt="分析 workspace $vars.workspace_id 中 execution <id> 的失败原因。Server: http://localhost:$vars.server_port")`
         b. 如果 diagnostician 调用失败 → 直接用 GET API 获取 execution 详情自行分析
      3. 根据根因分类处理:
         - **YAML_ERROR**: 修复 {worktree_path} 中的 YAML → pnpm build → 删除旧 execution → 重建
         - **ENGINE_BUG**: 修复 {worktree_path} 中的 engine 代码 → pnpm build → retry 失败节点
         - **AGENT_TIMEOUT**: 调整 timeout → POST /retry
         - **PORT_CONFLICT**: 杀冲突进程（不杀 protected_ports）→ restart → retry
         - **ENVIRONMENT_CORRUPT / WORKSPACE_CONFIG_ERROR**:
           → 检查 current_rebuild_count < max_workspace_rebuilds
           → 如果可以重建: 委派 workspace-manager 重建（传入旧 workspace_id 让它清理）
           → rebuild_count++
           → **发送 Hermes 重建通知**（含 old→new ID + Web UI 链接）
           → 如果已达重建上限: 标记无法恢复，all_passed=false
      4. 重新启动执行（POST /start，这属于 Step 4 修复循环的一部分，不违反反重复规则）
      5. 重新监控执行状态（轮询直到终态，这属于 Step 4 修复循环的一部分）
      6. **发送 Hermes 修复通知**（含当前轮数/最大轮数）
      7. 如果仍有 failed → 回到第 1 点开始下一轮修复

      **退出条件**:
      - 全部 completed → 进入 Step 5
      - current_fix_round >= max_fix_rounds → all_passed=false，进入 Step 5

      ### Step 5: 反假跑验证
      1. 委派 **evidence-collector** 收集所有 execution 的执行证据
      2. 委派 **reality-checker** 验证真实性
      3. **发送 Hermes 验证通知**
      4. PASSED → all_passed=true; NEEDS WORK/FAILED → all_passed=false

      ### Step 6: Ship（仅在 all_passed=true 且有代码修复时）
      如果 all_passed=true 且 fix_log 非空:
      1. 委派 **shipper**:
         `Agent(subagent_type="shipper", prompt="将 {worktree_path} 中的修复代码提交并创建 PR。fix_log: <fix_log>, total_rounds: <total_rounds>")`
      2. 如果 shipper 失败 → 自行执行 git add/commit/push/gh pr create
      3. 记录 pr_url 和 ship_summary
      4. **发送通知**: 🚀 Ship 完成 + PR URL

      ## 输出
      在回复末尾直接输出纯 JSON 行（不要用代码块包裹）:
      {"vars_update":{"all_passed":"<true/false>","total_rounds":"<轮数>","rebuild_count":"<次数>","tested_execution_ids":"[<ids>]","per_execution_status":"{<id>:<status>}","fix_log":"[{round,files,root_cause}]","rebuild_log":"[{round,reason,old_id,new_id}]","failed_details":"<信息>","evidence_snapshot":"<摘要>","workspace_id":"<ID>","root_execution_id":"<ID>","resolved_workspace_name":"<名称>","resolved_org":"<org>","pr_url":"<URL>","ship_summary":"<总结>","conclusion":"<2-3句话>"}}

  - id: notify-orchestrator
    type: bash
    depends_on: [orchestrator]
    timeout: 15
    bash: |
      WEB_URL="http://localhost:$vars.web_port/workspaces/$vars.workspace_id?tab=detail&execId=$vars.root_execution_id"
      if [ "$vars.all_passed" = "true" ]; then
        octopus notify --ignore-failure \
          --title "✅ $vars.display_name — Orchestrator 完成" \
          --body "📊 修复轮数: $vars.total_rounds | 重建次数: $vars.rebuild_count
        🎯 全部 execution 通过
        🔗 $WEB_URL

        💡 *结论*:
        $vars.conclusion"
      else
        octopus notify --ignore-failure --severity warn \
          --title "❌ $vars.display_name — Orchestrator 未通过" \
          --body "📊 修复轮数: $vars.total_rounds | 重建次数: $vars.rebuild_count
        🔗 $WEB_URL
        📝 $vars.failed_details"
      fi

  # ═══════════════════════════════════════════════════════════════
  # Phase 3: Final Verification — 证据完整性检查
  # ═══════════════════════════════════════════════════════════════
  - id: final-verify
    type: agent
    depends_on: [notify-orchestrator]
    timeout: 600
    context: new
    skills: [verification-before-completion]
    prompt: |
      验证测试证据完整性。

      ## 输入
      - all_passed: $vars.all_passed
      - per_execution_status: $vars.per_execution_status
      - fix_log: $vars.fix_log
      - total_rounds: $vars.total_rounds
      - tested_execution_ids: $vars.tested_execution_ids
      - evidence_snapshot: $vars.evidence_snapshot
      - rebuild_log: $vars.rebuild_log
      - rebuild_count: $vars.rebuild_count

      ## 验证项
      1. 所有 tested_execution_ids 都有状态记录
      2. fix_log 结构完整（每轮有 round/files/root_cause）
      3. all_passed=true 时，per_execution_status 全部 completed
      4. all_passed=false 时，failed_details 非空
      5. evidence_snapshot 包含实质证据（非空字符串）
      6. rebuild_count 与 rebuild_log 条目数一致

      ## 输出
      直接输出纯 JSON 行:
      {"vars_update":{"verification_status":"<passed/failed>","verification_details":"<详细说明>","conclusion":"$vars.conclusion"}}

  # ═══════════════════════════════════════════════════════════════
  # Phase 4: Gate + Cleanup / Preserve
  # ═══════════════════════════════════════════════════════════════
  - id: verify-gate
    type: condition
    depends_on: [final-verify]
    cases:
      - when: '$vars.all_passed == "true"'
        then: cleanup
      - when: default
        then: preserve-for-debug

  - id: cleanup
    type: bash
    timeout: 60
    execute_when: '$vars.all_passed == "true"'
    bash: |
      echo "=== 测试通过，清理 isolated 环境 ==="
      if [ -n "$vars.server_pid" ]; then
        # Windows: taskkill; Unix: kill
        if command -v taskkill &>/dev/null; then
          taskkill /PID "$vars.server_pid" /T /F 2>/dev/null || true
        else
          kill "$vars.server_pid" 2>/dev/null || true
        fi
      fi
      echo "Workspace $vars.workspace_id 保留（可通过 API 手动删除）"
      printf '{"vars_update":{"cleanup_done":"true"}}\n'

  - id: preserve-for-debug
    type: bash
    timeout: 30
    execute_when: '$vars.all_passed != "true"'
    bash: |
      echo "=== 测试失败，保留环境供手动检查 ==="
      echo "Workspace ID: $vars.workspace_id"
      echo "Server: http://localhost:$vars.server_port"
      echo "Web: http://localhost:$vars.web_port"
      echo "Server PID: $vars.server_pid"
      echo "Rebuild count: $vars.rebuild_count"
      printf '{"vars_update":{"preserved_for_debug":"true"}}\n'

  # ═══════════════════════════════════════════════════════════════
  # Phase 5: Final Summary
  # ═══════════════════════════════════════════════════════════════
  - id: final-notify
    type: bash
    depends_on: [cleanup, preserve-for-debug]
    timeout: 60
    bash: |
      echo "=== Octopus E2E Tester 最终报告 ==="
      echo "Workspace:    $vars.workspace_id"
      echo "All Passed:   $vars.all_passed"
      echo "Fix Rounds:   $vars.total_rounds"
      echo "Rebuilds:     $vars.rebuild_count"
      echo "Verification: $vars.verification_status"
      echo "Conclusion:   $vars.conclusion"
      echo "================================"

      # 工作流失败时标记
      if [ "$vars.all_passed" != "true" ]; then
        printf '{"vars_update":{"__status":"failed"}}\n'
      fi
